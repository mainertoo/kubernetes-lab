# Proxmox VE API credentials for the local tooling in scripts/proxmox/ (pvinfo.py).
# NOT a Kubernetes Secret and NOT reconciled by Flux — consumed only by the local CLI
# via `sops -d`. Covered by the root .sops.yaml `^scripts/.+\.sops\.ya?ml$` rule, so
# VS Code auto-encrypts stringData on save (verify it shows ENC[...] before committing).
#
# === FILL THESE IN, then save (auto-encrypts) ============================================
# 1. In the Proxmox UI: Datacenter > Permissions > Users  → add user  claude@pve
# 2. Datacenter > Permissions > API Tokens → add token  claude@pve!automation
#       UNCHECK "Privilege Separation" so the token inherits the user's role.
# 3. Datacenter > Permissions > Add  → assign the user (path "/") a role with read+write:
#       a tailored role (Datastore.Audit, VM.Audit, VM.PowerMgmt, VM.Snapshot, Sys.Audit,
#       Sys.Modify) is preferred over root@pam / Administrator.
# 4. PROXMOX_TOKEN_ID is the full  user@realm!tokenid  string; PROXMOX_TOKEN_SECRET is the
#    UUID shown ONCE on token creation.
# 5. PROXMOX_HOSTS (optional): comma/newline list of extra base URLs for PVE hosts NOT in
#    the main cluster (pve-mac/pve-s13/pve-ugreen/pve-s12). The same token must also exist
#    on each standalone host. Leave empty if they're all clustered behind PROXMOX_URL.
# =========================================================================================
