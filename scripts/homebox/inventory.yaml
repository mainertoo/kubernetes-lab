# inventory.yaml — declarative source of truth for Homebox.
# Apply with:  ./inventory.py apply inventory.yaml          (dry-run)
#              ./inventory.py apply inventory.yaml --commit  (write)
#
# Matching is by NAME, so the spec is idempotent: re-applying only creates/updates
# what's missing or changed. Renaming a node here creates a NEW one (delete the old
# in the UI). Run `./inventory.py pull -o current.yaml` to snapshot live state.

# ── Locations: a nested tree. Items reference these by full slash-path. ──
locations:
  - name: Garage
    description: Main garage
    children:
      - name: Workbench
      - name: Shelving Unit A
        children:
          - name: Bin 1
          - name: Bin 2
  - name: Office
    children:
      - name: Desk Drawer

# ── Labels (Homebox "tags"): flat, matched by name. ──
tags:
  - name: Electronics
    color: "#3b82f6"
  - name: Tools
  - name: Consumable

# ── Items: name is required; location is a path into the tree above. ──
items:
  - name: Cordless Drill
    location: Garage/Workbench
    tags: [Tools]
    quantity: 1
    description: DeWalt 20V MAX
    manufacturer: DeWalt
    modelNumber: DCD777

  - name: USB-C Cables
    location: Office/Desk Drawer
    tags: [Electronics, Consumable]
    quantity: 6
