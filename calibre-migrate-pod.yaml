apiVersion: v1
kind: Pod
metadata:
  name: calibre-migrate
  namespace: media
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  containers:
    - name: migrate
      image: alpine:3.20
      command: ["/bin/sh", "-lc"]
      args:
        - |
          set -e
          echo "Migrate pod is ready."
          echo "Config mount:"
          ls -lah /config || true
          echo "Library mount:"
          ls -lah /calibre-library || true
          sleep 36000
      volumeMounts:
        - name: calibre-config
          mountPath: /config
        - name: calibre-library
          mountPath: /calibre-library
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: calibre-config
      persistentVolumeClaim:
        claimName: calibre
    - name: calibre-library
      persistentVolumeClaim:
        claimName: calibre-library-cephfs
    - name: tmp
      emptyDir: {}