apiVersion: v1
kind: Pod
metadata:
  name: seerr-migrate
  namespace: seerr
spec:
  restartPolicy: Never
  containers:
    - name: helper
      image: debian:12-slim
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: seerr-config
          mountPath: /app/config
  volumes:
    - name: seerr-config
      persistentVolumeClaim:
        claimName: seerr