apiVersion: apps/v1
kind: Deployment
metadata:
  name: riven-backend-debug
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: riven-backend-debug
  template:
    metadata:
      labels:
        app: riven-backend-debug
    spec:
      nodeSelector:
        kubernetes.io/hostname: mainertoo-k3s-worker-2
      containers:
        - name: backend
          image: docker.io/spoked/riven:latest
          envFrom:
            - secretRef:
                name: riven-backend-secret
            - configMapRef:
                name: riven-backend-configmap
          env:
            - name: TZ
              value: America/Los_Angeles
          volumeMounts:
            - name: data
              mountPath: /riven/data
            - name: media
              mountPath: /mnt/library
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: riven-backend-pvc
        - name: media
          persistentVolumeClaim:
            claimName: shared-media-pvc