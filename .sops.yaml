# .sops.yaml
# Tell SOPS to encrypt Secret data/stringData in these paths
creation_rules:
  # Encrypt any *.sops.yaml / *.sops.yml under clusters/
  - path_regex: ^clusters/.+\.sops\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age:
      - "age1znqy83dnxfsdg88ahwxgt2dmazcj5aandmyg5fxty0nheup0jums6grjvk"

  # Encrypt any *.sops.yaml / *.sops.yml under infrastructure/
  - path_regex: ^infrastructure/.+\.sops\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age:
      - "age1znqy83dnxfsdg88ahwxgt2dmazcj5aandmyg5fxty0nheup0jums6grjvk"

  # Encrypt any *.sops.yaml / *.sops.yml under apps/{base,staging,production}/
  - path_regex: ^apps/(base|staging|production)/.*/.+\.sops\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age:
      - "age1znqy83dnxfsdg88ahwxgt2dmazcj5aandmyg5fxty0nheup0jums6grjvk"

# 🔹 NEW: encrypt any *.sops.yaml / *.sops.yml under components/
  - path_regex: ^components/.+\.sops\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age:
      - "age1znqy83dnxfsdg88ahwxgt2dmazcj5aandmyg5fxty0nheup0jums6grjvk"

  # Encrypt any *.sops.yaml / *.sops.yml under scripts/ (local tooling credentials,
  # not reconciled by Flux — e.g. the Dispatcharr API key used by scripts/dispatcharr/)
  - path_regex: ^scripts/.+\.sops\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age:
      - "age1znqy83dnxfsdg88ahwxgt2dmazcj5aandmyg5fxty0nheup0jums6grjvk"