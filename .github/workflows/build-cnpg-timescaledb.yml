---
name: Build cnpg-timescaledb

# CloudNativePG operand image: PostgreSQL + TimescaleDB, pinned to match the
# live tracearr DB (see docker/cnpg-timescaledb/README.md).
#
# workflow_dispatch ONLY — this is a build-once-and-forget pinned image, not an
# upstream-tracking build. No cron. Re-run manually (optionally overriding the
# inputs) when you deliberately bump TimescaleDB or the PG major.

on:
  workflow_dispatch:
    inputs:
      ts_version:
        description: "TimescaleDB version to pin (must be >= the live source DB)"
        required: false
        default: "2.25.0"
      pg_major:
        description: "PostgreSQL major version"
        required: false
        default: "16"
      base_tag:
        description: "cloudnative-pg/postgresql base image tag"
        required: false
        default: "16-bookworm"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mainertoo/cnpg-timescaledb

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tag
        id: meta
        run: |
          TS="${{ github.event.inputs.ts_version }}"
          PG="${{ github.event.inputs.pg_major }}"
          TAG="${PG}-${TS}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG"

      - name: Check if image already exists for this tag
        id: check
        run: |
          if docker manifest inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image not found — will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: docker/cnpg-timescaledb
          file: docker/cnpg-timescaledb/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          build-args: |
            BASE_TAG=${{ github.event.inputs.base_tag }}
            TS_VERSION=${{ github.event.inputs.ts_version }}
            PG_MAJOR=${{ github.event.inputs.pg_major }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=CloudNativePG operand image — PostgreSQL ${{ github.event.inputs.pg_major }} + TimescaleDB ${{ github.event.inputs.ts_version }}
