---
name: Build pocket-bridge

# Phase 1a of the pocket-bridge plan (docs/plans/pocket-to-open-notebook-pipeline.md).
# Builds the FastAPI bridge image and pushes to GHCR. The src/ directory and
# Dockerfile are added in Phase 1b — until then this workflow is path-gated
# and only fires when src/** changes land.

on:
  push:
    branches: [master]
    paths:
      - "apps/base/pocket-bridge/src/**"
  pull_request:
    paths:
      - "apps/base/pocket-bridge/src/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mainertoo/pocket-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if Dockerfile missing (Phase 1a no-op)
        id: gate
        run: |
          if [ ! -f apps/base/pocket-bridge/src/Dockerfile ]; then
            echo "Dockerfile not present yet (pre-Phase-1b); skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.gate.outputs.skip == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.gate.outputs.skip == 'false'
        id: tags
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}"
          # Only tag :latest on master pushes, not PRs
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.gate.outputs.skip == 'false'
        uses: docker/build-push-action@v7
        with:
          context: apps/base/pocket-bridge/src
          file: apps/base/pocket-bridge/src/Dockerfile
          # Only push on master pushes (PRs build for validation but don't publish)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Pocket AI -> Open Notebook ingestion bridge
