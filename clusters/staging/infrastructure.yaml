apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 10m
  # Staging uses a curated minimum of upstream controllers — see
  # infrastructure/controllers-staging/kustomization.yaml for what's
  # in vs out. Production reconciles the full infrastructure/controllers/
  # tree.
  path: ./infrastructure/controllers-staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-secrets
  namespace: flux-system
spec:
  interval: 10m
  # Cross-cluster shared secrets — see infrastructure/secrets-shared/.
  path: ./infrastructure/secrets-shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cert-manager-config
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra-controllers
  path: ./infrastructure/configs/cert-manager/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
# kyverno-policies intentionally omitted from staging — controllers-staging
# doesn't ship the kyverno controller, so the ClusterPolicy CRs in
# ./infrastructure/controllers/kyverno/policies would fail dry-run
# (no matching CRD). Add this Kustomization back if/when kyverno gets
# opted into infrastructure/controllers-staging/kustomization.yaml.

