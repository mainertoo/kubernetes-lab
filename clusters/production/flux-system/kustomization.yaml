apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
- cluster-secrets.sops.yaml
- flux-pdbs.yaml
patches:
  # Scale the kustomize/helm/notification controllers to 2 replicas
  # each. They use leader election internally, so the second pod is
  # a hot standby that takes over within seconds if the leader's
  # node dies. Topology spread is "ScheduleAnyway" so a degraded
  # cluster never leaves Flux Pending.
  #
  # source-controller is intentionally NOT scaled here. Its standby
  # pod never becomes Ready (port 9090 only binds after acquiring
  # the leader lease), which makes kube-prometheus-stack alert on
  # KubeDeploymentReplicasMismatch / KubeDeploymentRolloutStuck
  # forever. With replicas: 1, the standard 30s eviction grace
  # gives ~45s recovery on node failure -- comparable to the hot-
  # standby benefit since source-controller's emptyDir cache is
  # wiped on pod death anyway.
  - target:
      kind: Deployment
      name: kustomize-controller
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: kustomize-controller
  - target:
      kind: Deployment
      name: helm-controller
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: helm-controller
  - target:
      kind: Deployment
      name: notification-controller
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: notification-controller
