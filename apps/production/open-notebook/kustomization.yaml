---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app open-notebook
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/open-notebook
  targetNamespace: open-notebook
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: open-notebook
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: "8502"
      # Frontend redirects "/" → "/notebooks" (307), so check the redirect
      # target directly to avoid a false-positive on the internal endpoint.
      GATUS_PATH: /notebooks

      VOLSYNC_REPO_PATH: open-notebook/data
      CAPACITY: 10Gi
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
