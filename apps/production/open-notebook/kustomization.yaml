---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — open-notebook on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/open-notebook/open-notebook-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-notebook
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/open-notebook"
  targetNamespace: open-notebook
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: open-notebook
      APP_NAMESPACE: open-notebook
      SUBDOMAIN: open-notebook
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: '8502'
      GATUS_PATH: "/notebooks"
