---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 0b2 — adds tailscale-proxy-networkpolicy.yaml. The app now spans
# two namespaces (Service in ollama-egress, NetPol in tailscale), so
# targetNamespace is intentionally omitted. Each resource self-namespaces.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mac-ollama-egress
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/mac-ollama-egress"
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
