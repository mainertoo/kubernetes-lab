---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mealie
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  interval: 1h
  path: ./apps/base/mealie
  postBuild:
    substitute:
      APP: *app
      SUBDOMAIN: *app
      GATUS_PATH: /api/app/about
      GATUS_PORT: "9000"

      # Backup-only volsync: PVC is created by apps/base/mealie/mealie-pvc.yaml
      # and named "mealie-data" (not matching APP).
      VOLSYNC_SOURCE_PVC: mealie-data
      VOLSYNC_REPO_PATH: mealie/data
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: &namespace mealie
  timeout: 5m
  wait: false
