---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app audiobookshelf
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  interval: 1h
  path: ./apps/base/audiobookshelf

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: media

      # External hostname: https://audiobookshelf.lab.mainertoo.com
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      # If your app has a real HTTP path check, set it; otherwise "/" is fine.
      GATUS_PATH: /

      # Internal check uses tcp://...:${GATUS_PORT}
      GATUS_PORT: "80"

  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false