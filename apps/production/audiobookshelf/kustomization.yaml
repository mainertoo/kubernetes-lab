---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: audiobookshelf
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/audiobookshelf
  targetNamespace: media
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  # ✅ REQUIRED so Flux decrypts *.sops.yaml rendered by this Kustomization
  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync/backup        # backup only (restore is NOT included)
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: audiobookshelf
      APP_NAMESPACE: media

      # CephFS app PVC
      APP_STORAGECLASS: cephfs
      CAPACITY: 100Gi
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_ACCESSMODE: ReadWriteMany
      VOLSYNC_ACCESSMODES: ReadWriteMany

      # Cache PVC stays RBD
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce

      # Gatus
      SUBDOMAIN: audiobookshelf
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage