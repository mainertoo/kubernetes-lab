apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: audiobookshelf
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/audiobookshelf
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: audiobookshelf
      APP_NAMESPACE: media
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      CAPACITY: 100Gi

      VOLSYNC_REPO_PATH: audiobookshelf/abs

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      # ✅ FIX: match the app user so restic can chmod restored files
      VOLSYNC_MOVER_UID: "1000"
      VOLSYNC_MOVER_GID: "1000"
      VOLSYNC_MOVER_FSGROUP: "1000"

      # Temp/cache PVCs can remain on RBD
      VOLSYNC_MOVER_STORAGECLASS: ceph-rbd
      VOLSYNC_MOVER_ACCESSMODES: ReadWriteOnce

      SUBDOMAIN: audiobookshelf
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base