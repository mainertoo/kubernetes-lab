---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app audiobookshelf
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
    # - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  interval: 1h
  path: ./apps/base/audiobookshelf

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: media

      # Ceph RBD app PVC (RWO)
      APP_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 3Gi

      # Gatus
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false