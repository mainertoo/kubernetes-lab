---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — grocy on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/grocy/grocy-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grocy
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: grocy
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  interval: 1h
  path: "./apps/base/grocy"
  postBuild:
    substitute:
      APP: grocy
      SUBDOMAIN: grocy
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '80'
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: grocy
  timeout: 5m
  wait: false
