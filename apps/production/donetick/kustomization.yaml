---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
#
# Phase 1c step 2: donetick is now fully production-tier.
#
# - The PVC is volsync-owned (volsync-v2/bootstrap creates the donetick
#   PVC with dataSourceRef pointing at the donetick-bootstrap
#   ReplicationDestination, which restores the latest snapshot from
#   the donetick/data restic repo in Garage).
# - The pre-flight backup laid down by the previous PR is the source
#   of that first restore.
# - A follow-up PR drops volsync-v2/bootstrap → plain volsync-v2 once
#   the new PVC is verified populated with intact data, and removes
#   the VOLSYNC_SCHEDULE override so the canonical 12h cadence resumes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app donetick
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/donetick
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/bootstrap
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      # --- volsync (bootstrap restores from S3 on first PVC creation) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 2Gi

      VOLSYNC_REPO_PATH: donetick/data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # PoC: hourly cadence so we can quickly confirm backups continue
      # incrementally on the same restic repo after the bootstrap restore.
      # Removed in the Stage 3 follow-up PR (settle to canonical 12h).
      VOLSYNC_SCHEDULE: "0 * * * *"

      # --- gatus health checks ---
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "2021"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
