---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5 of Kopia transition — dawarich on production with label-driven
# Kopia backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/dawarich-media/dawarich-media-pvc.yaml with `backup: daily` +
# `backup-engine: kopia`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dawarich-media
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/dawarich-media"
  targetNamespace: dawarich
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      APP: dawarich-media
      APP_NAMESPACE: dawarich
