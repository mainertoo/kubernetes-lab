---
# Phase 3c (dawarich): deploy a CloudNativePG-managed postgres cluster `dawarich-db`
# alongside the existing `dawarich-dawarich-db` Deployment. App still connects to
# the OLD database — this PR just makes the new one exist with WAL streaming to
# Garage S3, so we can validate the bootstrap path before any data migration.
#
# Cutover (separate PR after migration verified): point dawarich's HelmRelease at
# dawarich-db-rw service; build connection string from CNPG-generated
# dawarich-db-app Secret.
#
# Image note: dawarich requires postgis (uses .points.coordinates). Using the
# CNPG community postgis image which matches the legacy postgis 17/3.5 schema.
#
# Storage note: the legacy dawarich-db PVC is 25 GiB; current DB size is ~4.9 GB
# (2.9M points across 61 days, 2 active power users). 50Gi gives ~10x headroom
# and 1.5–15 years of runway depending on usage. CNPG supports volume expansion
# later if needed (just bump CNPG_STORAGE_SIZE and reconcile).
#
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  # Flux Kustomization name must differ from the legacy `dawarich-db` (in
  # db.yaml). The CNPG Cluster created by this Kustomization is still named
  # `dawarich-db` (via the APP substitute below), so the cutover PR will
  # connect to Service `dawarich-db-rw` as expected.
  name: dawarich-db-cnpg
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: dawarich
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  # Health-check the CNPG Cluster so the cutover PR (which will set
  # `dependsOn: dawarich-db` on the dawarich app Kustomization) properly waits
  # for the new postgres to be Ready during a from-scratch GitOps restore.
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: dawarich-db
      namespace: dawarich
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/cnpg-cluster/base
    - ../../../components/cnpg-cluster/initdb
  postBuild:
    substitute:
      APP: dawarich-db
      APP_NAMESPACE: dawarich
      CNPG_DB_NAME: dawarich
      CNPG_DB_OWNER: dawarich
      # Postgis 17.x / 3.5 — matches the legacy postgis/postgis:17-3.5-alpine
      # image used by dawarich-dawarich-db, so dump/restore is same-version.
      CNPG_IMAGE: ghcr.io/cloudnative-pg/postgis:17-3.5
      # 50Gi: ~10x current DB size (4.9 GB), comfortable headroom for WAL/temp
      # and several years of point ingestion. Expandable via CNPG later.
      CNPG_STORAGE_SIZE: 50Gi
      CNPG_STORAGECLASS: ceph-rbd
      CNPG_INSTANCES: "1"
      # Daily base backup at 06:00 UTC — clear of joplin (04:30), qnap_pbs
      # (04:45), zilean (05:15), qnap_garage (05:30), riven (05:45).
      # CNPG cron format: <s> <m> <h> <dom> <mon> <dow>
      CNPG_BACKUP_SCHEDULE: "0 0 6 * * *"
      CNPG_RETENTION: "30d"
      # Slightly higher resource request than other CNPG clusters: dawarich
      # is the largest of the migrating DBs (~5 GB) and runs heavy postgis
      # geometry queries (point clustering, distance calcs).
      CNPG_CPU_REQUEST: "200m"
      CNPG_MEMORY_REQUEST: "512Mi"
      CNPG_MEMORY_LIMIT: "2Gi"
      CNPG_LINEAGE: v1
      CNPG_RESTORE_FROM_LINEAGE: v0
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
