apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dawarich
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/dawarich
  targetNamespace: dawarich

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  # CNPG cutover 2026-05-09 (Phase 3c-cutover): the dawarich app now
  # depends on the CNPG-managed dawarich-db Cluster. From-scratch GitOps
  # restore must wait for the Cluster to become Ready before the app
  # tries to read the dawarich-db-app Secret (auto-generated by CNPG).
  dependsOn:
    - name: dawarich-db-cnpg

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: dawarich
      APP_NAMESPACE: dawarich

      SUBDOMAIN: dawarich
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8080"

      GATUS_APP: dawarich
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base