---
# Flux Kustomization: app-consistent pg_dump CronJob + dump-PVC backup via volsync
# Closes audit Finding F4 (postgres backed up via raw-PVC volsync = crash-consistent only).
# Layered ON TOP of the existing raw-PVC backup in db.yaml — both run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dawarich-db-dumps
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/dawarich-db-dumps
  targetNamespace: dawarich

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: dawarich-db-dumps
      APP_NAMESPACE: dawarich
      VOLSYNC_SOURCE_PVC: dawarich-db-dumps

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce

      VOLSYNC_REPO_PATH: dawarich/postgres-dumps

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      VOLSYNC_PUID: "999"
      VOLSYNC_PGID: "999"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
