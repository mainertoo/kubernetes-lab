---
# Flux Kustomization for the mkdocs app — the in-cluster MkDocs Material site
# that git-syncs mainertoo/wiki and publishes guides.mainertoo.com (external,
# via Newt -> Pangolin) and guides.lab.mainertoo.com (internal IngressRoute).
#
# The gatus/internal + gatus/external components establish both health-check
# endpoints declaratively (auto-discovered ConfigMaps), satisfying the
# "deploy establishes a gatus internal + external endpoint" requirement.
#
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mkdocs
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/mkdocs
  targetNamespace: mkdocs
  prune: true
  retryInterval: 2m
  timeout: 5m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  postBuild:
    substitute:
      APP: *app
      # External public host is guides.mainertoo.com (not the app name).
      SUBDOMAIN: guides
      GATUS_DOMAIN: mainertoo.com
      GATUS_PORT: "80"
      GATUS_PATH: /
