---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tandoor
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/tandoor
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/bootstrap
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      # --- volsync (rbd) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 10Gi

      VOLSYNC_REPO_PATH: tandoor/data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # app runs as root
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"

      # hourly during migration — revert on Stage 3 settle
      VOLSYNC_SCHEDULE: "0 * * * *"

      # --- gatus health checks ---
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
