apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actual-budget
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/actual-budget
  targetNamespace: actual-budget

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: actual-budget
      APP_NAMESPACE: actual-budget

      # --- VolSync PVC settings (RBD) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      # v2: snapshot-derived PVC access mode (keeps it explicit)
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 5Gi

      # Repo path inside the Garage bucket/prefix
      VOLSYNC_REPO_PATH: actual-budget/data

      # Cache PVC (RBD -> RBD is fine)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # --- Gatus ---
      SUBDOMAIN: actual-budget
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "5006"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base