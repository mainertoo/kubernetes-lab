---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opencut
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/opencut
  targetNamespace: opencut
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  # CNPG cutover 2026-05-09 (Phase 3e-cutover): the opencut app now depends
  # on the CNPG-managed opencut-cnpg-db Cluster. From-scratch GitOps
  # restore must wait for the Cluster to become Ready before the app tries
  # to read the opencut-cnpg-db-app Secret (auto-generated by CNPG).
  dependsOn:
    - name: opencut-db-cnpg

  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  postBuild:
    substitute:
      APP: *app
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: "3000"
      GATUS_PATH: /api/health
      GATUS_APP: opencut-web
