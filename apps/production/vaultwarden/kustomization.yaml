apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/vaultwarden
  targetNamespace: vaultwarden

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: vaultwarden
      APP_NAMESPACE: vaultwarden

      # =========================
      # VolSync PVC settings
      # =========================
      # Default: ceph-rbd (RWO) – typical for Vaultwarden
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 5Gi

      # Repo path inside the Garage bucket/prefix
      VOLSYNC_REPO_PATH: vaultwarden/data

      # Cache PVC (RBD -> RBD is fine)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # ---- If you ever switch Vaultwarden to CephFS (RWX), use this instead: ----
      # VOLSYNC_STORAGECLASS: cephfs
      # VOLSYNC_ACCESSMODES: ReadWriteMany
      # VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      # CAPACITY: 5Gi
      # VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      # VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      # VOLSYNC_CACHE_CAPACITY: 2Gi

      # =========================
      # Gatus
      # =========================
      SUBDOMAIN: vaultwarden
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base