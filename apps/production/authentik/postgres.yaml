apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-postgresql
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/authentik-postgresql-backup
  targetNamespace: authentik

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: authentik-postgresql
      APP_NAMESPACE: authentik

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce

      # Fresh restic repo path so old empty snapshots don't mix with real ones
      VOLSYNC_REPO_PATH: authentik/postgresql-data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # bitnami postgres runs as 1001:1001
      VOLSYNC_PUID: "1001"
      VOLSYNC_PGID: "1001"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base