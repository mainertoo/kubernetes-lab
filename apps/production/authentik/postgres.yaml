apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-postgresql
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: authentik

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: authentik-postgresql
      APP_NAMESPACE: authentik

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 5Gi

      VOLSYNC_REPO_PATH: authentik/postgresql

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # IMPORTANT for PG: preserve uid/gid behavior
      VOLSYNC_PUID: "1001"
      VOLSYNC_PGID: "1001"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base