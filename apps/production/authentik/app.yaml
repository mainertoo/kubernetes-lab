apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/authentik
  targetNamespace: authentik

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  # dependsOn:
  #   - name: authentik-postgresql
  #   - name: authentik-media

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: authentik
      APP_NAMESPACE: authentik

      # External component uses these
      SUBDOMAIN: authentik
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

      # Internal component override: service name should be authentik-server (not authentik)
      GATUS_APP: authentik-server
      GATUS_STATUS_INTERNAL: "200"
      # keep internal on / unless you specifically want /-/health/ready/
      # If you prefer health endpoint, swap the next line and remove/ignore the GATUS_PATH above:
      # GATUS_PATH: /-/health/ready/

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base