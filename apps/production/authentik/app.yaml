apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/authentik
  targetNamespace: authentik

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  dependsOn:
    - name: authentik-postgresql
    - name: authentik-media

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: authentik
      APP_NAMESPACE: authentik

      SUBDOMAIN: authentik
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base