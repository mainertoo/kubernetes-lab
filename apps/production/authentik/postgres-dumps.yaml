---
# Flux Kustomization: app-consistent pg_dump CronJob + dump-PVC backup via volsync
# Closes audit Finding F4 (postgres backed up via raw-PVC volsync = crash-consistent only).
# Layered ON TOP of the existing raw-PVC backup in postgres.yaml — both run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-postgresql-dumps
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/authentik-postgresql-dumps
  targetNamespace: authentik

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: authentik-postgresql-dumps
      APP_NAMESPACE: authentik
      VOLSYNC_SOURCE_PVC: authentik-postgresql-dumps

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce

      VOLSYNC_REPO_PATH: authentik/postgresql-dumps

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      VOLSYNC_PUID: "1001"
      VOLSYNC_PGID: "1001"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
