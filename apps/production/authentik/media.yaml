---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — authentik-media on production with label-driven
# volsync backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/authentik-media/authentik-media-pvc.yaml with
# `backup: daily`. New dedicated base dir replaces the previous
# `apps/base/empty/` sentinel because we now need real manifests here.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-media
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/authentik-media"
  targetNamespace: authentik
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      APP: authentik-media
      APP_NAMESPACE: authentik
