---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — dumbassets on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/dumbassets/dumbassets-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dumbassets
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/dumbassets"
  targetNamespace: dumbassets
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: dumbassets
      APP_NAMESPACE: dumbassets
      SUBDOMAIN: dumbassets
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '3000'
