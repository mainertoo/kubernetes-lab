---
# Phase 3f (sparky-fitness): deploy a CloudNativePG-managed postgres cluster
# `sparky-fitness-cnpg-db` alongside the existing `sparky-fitness-db`
# in-pod controller (postgres 15.15-alpine on the legacy `sparky-fitness`
# 20 GiB PVC).
#
# Cutover (separate PR after migration verified): point sparky-fitness's
# DB connection env at the new CNPG cluster's credentials.
#
# Source DB has these extensions (verified 2026-05-09):
#   - plpgsql            (default, present everywhere)
#   - pgcrypto           (trusted in PG13+ — app user can install)
#   - uuid-ossp          (trusted in PG13+ — app user can install)
#   - pg_stat_statements (NOT trusted; monitoring-only — SKIP for migration)
#
# So the migration Job can run a normal pg_dump | psql; the dump's
# CREATE EXTENSION IF NOT EXISTS pgcrypto/uuid-ossp will succeed under the
# CNPG-generated app user without superuser intervention. We will explicitly
# DROP the pg_stat_statements extension on dest before the dump (or filter
# it via --extension flags) to avoid the non-trusted permission error.
#
# Naming: legacy in-pod controller is `sparky-fitness-db`, so the CNPG
# Cluster is `sparky-fitness-cnpg-db` to avoid collision. App will connect
# to Service `sparky-fitness-cnpg-db-rw`.
#
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparky-fitness-db-cnpg
  namespace: flux-system
spec:
  interval: 1h
  # Path now points at apps/base/sparky-fitness/db-cnpg/ which holds the
  # SOPS-encrypted Secret for the sparky_app role's password. The
  # cnpg-cluster Component below renders the Cluster, ScheduledBackup,
  # and S3 credentials Secret. By co-locating both under this single
  # Flux Kustomization, the password Secret reconciles together with
  # the Cluster — avoiding the ordering pitfall where managed.roles
  # would reference a Secret that doesn't yet exist.
  path: ./apps/base/sparky-fitness/db-cnpg
  targetNamespace: sparky-fitness
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: sparky-fitness-cnpg-db
      namespace: sparky-fitness
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # Note: components paths are relative to spec.path (./apps/base/sparky-fitness/db-cnpg),
  # which is 4 directory levels deep, so we need 4 `..` segments to reach the
  # repo root before descending into components/.
  components:
    - ../../../../components/cnpg-cluster/base
    - ../../../../components/cnpg-cluster/initdb
  # Patch the Cluster (rendered by the cnpg-cluster Component) to add
  # CNPG-managed roles and post-init application SQL. This captures the
  # sparky_app role + its grants in GitOps so a fresh `bootstrap.initdb`
  # restore reproduces them automatically — no more manual psql commands.
  #
  # - managed.roles: declares the sparky_app login role; CNPG keeps the
  #   role's password in sync with sparky-fitness-app-db-secret.
  # - postInitApplicationSQL: runs once at initdb in the app database.
  #   ALTER DEFAULT PRIVILEGES means any tables sparky creates in the
  #   future (e.g. when the migration Job re-imports data) auto-grant
  #   SELECT/INSERT/UPDATE/DELETE to sparky_app — same outcome as the
  #   manual GRANT statements done during the May 9 migration.
  #
  # Note: using strategic merge patch (with apiVersion/kind/metadata) rather
  # than JSON6902. The earlier JSON6902 form silently rendered without
  # applying — `flux build` showed the Cluster missing the patched fields.
  patches:
    # Patch must match the resource name as kustomize sees it BEFORE Flux
    # postBuild substitution. The cnpg-cluster Component renders the
    # Cluster with metadata.name: ${APP} (literal text). Targeting the
    # literal placeholder makes the merge match; postBuild then rewrites
    # both the patched and the original to the real name.
    - target:
        kind: Cluster
        name: \${APP}
      patch: |-
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: ${APP}
        spec:
          managed:
            roles:
              - name: sparky_app
                login: true
                ensure: present
                passwordSecret:
                  name: sparky-fitness-app-db-secret
          bootstrap:
            initdb:
              postInitApplicationSQL:
                - "ALTER DEFAULT PRIVILEGES FOR ROLE sparky GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO sparky_app;"
                - "ALTER DEFAULT PRIVILEGES FOR ROLE sparky GRANT USAGE, SELECT ON SEQUENCES TO sparky_app;"
  postBuild:
    substitute:
      APP: sparky-fitness-cnpg-db
      APP_NAMESPACE: sparky-fitness
      # Source DB name has an underscore (sparkyfitness_db, not sparky-fitness)
      # — verified by `psql -l` on the legacy postgres pod.
      CNPG_DB_NAME: sparkyfitness_db
      CNPG_DB_OWNER: sparky
      # Postgres 15 — match the legacy postgres:15.15-alpine major.
      CNPG_IMAGE: ghcr.io/cloudnative-pg/postgresql:15.14-bookworm
      CNPG_STORAGE_SIZE: 5Gi
      CNPG_STORAGECLASS: ceph-rbd
      CNPG_INSTANCES: "1"
      # Daily base backup at 07:30 UTC — clear of the others.
      CNPG_BACKUP_SCHEDULE: "0 30 7 * * *"
      CNPG_RETENTION: "30d"
      CNPG_CPU_REQUEST: "100m"
      CNPG_MEMORY_REQUEST: "256Mi"
      CNPG_MEMORY_LIMIT: "1Gi"
      CNPG_LINEAGE: v1
      CNPG_RESTORE_FROM_LINEAGE: v0
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
