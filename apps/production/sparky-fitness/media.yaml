apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparky-fitness-media
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: sparky-fitness

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      # IMPORTANT: this must match the PVC name your HelmRelease expects
      APP: sparky-fitness-media
      APP_NAMESPACE: sparky-fitness

      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      CAPACITY: 10Gi

      VOLSYNC_REPO_PATH: sparky-fitness/media

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # Helps avoid CephFS perms pain
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base