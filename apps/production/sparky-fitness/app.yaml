apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparky-fitness
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/sparky-fitness
  targetNamespace: sparky-fitness

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: sparky-fitness
      APP_NAMESPACE: sparky-fitness

      SUBDOMAIN: sparky-fitness
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      # Service is stable on 80 (health sidecar)
      GATUS_PORT: "80"

      # service name is sparky-fitness
      GATUS_APP: sparky-fitness
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base