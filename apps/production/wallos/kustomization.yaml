---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — wallos on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/wallos/wallos-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wallos
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/wallos"
  targetNamespace: wallos
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: wallos
      APP_NAMESPACE: wallos
      SUBDOMAIN: wallos
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: '80'
      GATUS_PATH: "/"
