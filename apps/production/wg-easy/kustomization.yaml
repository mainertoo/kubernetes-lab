# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# wg-easy — WireGuard server + management UI. Re-activated 2026-06.
# UI is lab-only (own login); WireGuard UDP exposed via the wg-easy-external
# LoadBalancer Service (MetalLB) — external reachability via Pangolin is
# configured on the VPS side. PVC owned by apps/base/wg-easy/wg-easy-pvc.yaml
# with `backup: daily` + `backup-engine: kopia`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wg-easy
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/wg-easy"
  targetNamespace: wg-easy
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: wg-easy
      APP_NAMESPACE: wg-easy
      SUBDOMAIN: wg-easy
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: '51821'
      GATUS_PATH: "/"
