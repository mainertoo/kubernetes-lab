---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Flux wrapper for the in-cluster Hermes agent. Hermes terminal SSH now points
# directly at the always-on VM 701 / zwave-js ops node; the older Mac SSH egress
# app remains separate for Mac-specific fallback or future use. This app can use
# targetNamespace + the shared gatus Components like every other app. Decryption
# is required for hermes-secret.sops.yaml.
#
# gatus endpoints (via components/gatus):
#   internal → http://hermes.hermes.svc.cluster.local:8642/health  (== 200)
#   external → https://hermes.lab.mainertoo.com/health  (< 500; Hermes dashboard basic-auth may protect UI paths)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/hermes"
  targetNamespace: hermes
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - "../../../components/gatus/internal"
    - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: hermes
      APP_NAMESPACE: hermes
      # GATUS_APP defaults to ${APP}=hermes, which is the actual service name
      # (bjw-s collapses a single service to the release name). Gateway port + /health.
      GATUS_PORT: '8642'
      GATUS_PATH: "/health"
      SUBDOMAIN: hermes
      GATUS_DOMAIN: lab.mainertoo.com
