---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5 of Kopia transition — scrypted on production with label-driven
# Kopia backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/scrypted/scrypted-pvc.yaml with `backup: daily` +
# `backup-engine: kopia`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scrypted
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/scrypted"
  targetNamespace: scrypted
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: scrypted
      APP_NAMESPACE: scrypted
      SUBDOMAIN: scrypted
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '10443'
      GATUS_SCHEME: https
      GATUS_STATUS_INTERNAL: '200'
      GATUS_INSECURE: 'true'
