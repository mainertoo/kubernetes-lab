---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app loki
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/loki
  targetNamespace: loki

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: loki

      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /ready
      GATUS_PORT: "3100"
