---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app dumbdo
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: dumbdo

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: dumbdo

      VOLSYNC_SOURCE_PVC: dumbdo
      VOLSYNC_REPO_PATH: dumbdo/data
      VOLSYNC_SCHEDULE: "0 * * * *"

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
