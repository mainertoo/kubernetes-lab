---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5 of Kopia transition — ui-toolkit on production with label-driven
# Kopia backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/ui-toolkit/ui-toolkit-pvc.yaml with `backup: daily` +
# `backup-engine: kopia`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ui-toolkit
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/ui-toolkit"
  targetNamespace: ui-toolkit
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: ui-toolkit
      APP_NAMESPACE: ui-toolkit
      SUBDOMAIN: ui-toolkit
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/health"
      GATUS_PORT: '80'
      GATUS_APP: ui-toolkit
      GATUS_STATUS_INTERNAL: '200'
