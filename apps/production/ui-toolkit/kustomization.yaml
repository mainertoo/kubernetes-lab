apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ui-toolkit
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/ui-toolkit
  targetNamespace: ui-toolkit

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    # Single PVC via volsync component (like audiobookshelf pattern)
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote

    # Uptime checks
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: ui-toolkit
      APP_NAMESPACE: ui-toolkit

      # --- VolSync PVC settings (single PVC) ---
      # This must match HelmRelease existingClaim: ui-toolkit
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 5Gi

      VOLSYNC_REPO_PATH: ui-toolkit/data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # --- Gatus ---
      SUBDOMAIN: ui-toolkit
      GATUS_DOMAIN: lab.mainertoo.com

      # Hit the upstream health endpoint
      GATUS_PATH: /health
      GATUS_PORT: "80"

      GATUS_APP: ui-toolkit
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base