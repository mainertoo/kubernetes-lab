---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Stage 3 (settled) — grafana on production with volsync-v2 ongoing backup.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app grafana
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/grafana
  targetNamespace: grafana
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: grafana
      VOLSYNC_REPO_PATH: grafana/data
      CAPACITY: 10Gi
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi
      VOLSYNC_PUID: "472"
      VOLSYNC_PGID: "472"
      VOLSYNC_RESTORE_PUID: "472"
      VOLSYNC_RESTORE_PGID: "472"
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
