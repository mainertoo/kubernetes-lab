apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dumb
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/dumb
  targetNamespace: dumb

  prune: true
  retryInterval: 2m
  timeout: 30m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: dumb
      APP_NAMESPACE: dumb

      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      CAPACITY: 100Gi

      VOLSYNC_REPO_PATH: dumb/dumb

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      SUBDOMAIN: dumb-frontend
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "3005"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base