---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — dumb on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/dumb/dumb-rbd-pvc.yaml with `backup: daily` (migrated off
# cephfs to ceph-rbd 2026-06-08; old cephfs `dumb` PVC decommissioned).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dumb
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/dumb"
  targetNamespace: dumb
  prune: true
  retryInterval: 2m
  timeout: 30m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: dumb
      APP_NAMESPACE: dumb
      SUBDOMAIN: dumb
      GATUS_APP: dumb-frontend
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '3005'
