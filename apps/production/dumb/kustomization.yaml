apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dumb
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/dumb
  targetNamespace: dumb

  prune: true
  retryInterval: 2m
  timeout: 30m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: dumb
      APP_NAMESPACE: dumb

      SUBDOMAIN: dumb
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "3005"