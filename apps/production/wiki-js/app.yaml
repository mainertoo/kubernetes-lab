---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app wiki-js
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/wiki-js
  targetNamespace: wiki-js

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  # CNPG cutover 2026-05-09 (Phase 3g-cutover): the wiki-js app now
  # depends on the CNPG-managed wiki-js-cnpg-db Cluster.
  dependsOn:
    - name: wiki-js-db-cnpg

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: wiki-js

      # --- gatus health checks ---
      SUBDOMAIN: wiki
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "3000"
      # Renamed wiki-js-main → wiki-js when the db sidecar was removed in PR #306.
      GATUS_APP: wiki-js

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
