---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app wiki-js-db
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: wiki-js

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/bootstrap
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: wiki-js

      # --- volsync (ceph-rbd, RWO — postgres) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 10Gi
      VOLSYNC_REPO_PATH: wiki-js/postgres

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      VOLSYNC_PUID: "999"
      VOLSYNC_PGID: "999"

      # hourly during migration — revert on Stage 3 settle
      VOLSYNC_SCHEDULE: "0 * * * *"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
