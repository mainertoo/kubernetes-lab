---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Tailscale egress to the Mac's llama.cpp server (:8080), mirroring
# mac-ollama-egress. Spans two namespaces (Service in llama-egress, NetPol
# in tailscale), so targetNamespace is intentionally omitted — each
# resource self-namespaces.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mac-llama-egress
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/mac-llama-egress"
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
