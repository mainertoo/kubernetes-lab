apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zilean
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/zilean
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  # Wait for the CNPG cluster (zilean-db) to be Ready before applying the
  # zilean app. Matters for from-scratch GitOps restores so the app pod
  # doesn't CrashLoopBackOff trying to read a not-yet-existing
  # zilean-db-app Secret.
  dependsOn:
    - name: zilean-db

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: zilean
      APP_NAMESPACE: media

      SUBDOMAIN: zilean
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /healthchecks/ping
      GATUS_PORT: "8282"
      # If you want to pin expected status explicitly:
      # GATUS_STATUS_INTERNAL: "200"
      # GATUS_STATUS_EXTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base