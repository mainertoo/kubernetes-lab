apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seerr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/seerr
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync-v2
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: seerr
      APP_NAMESPACE: media

      # volsync-v2 PVC characteristics (match your current PVC intent)
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      CAPACITY: 10Gi

      # keep repo path stable
      VOLSYNC_REPO_PATH: seerr/config

      # optional cache (if your volsync-v2 component expects/uses it)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      # gatus
      SUBDOMAIN: seerr
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /api/v1/status
      GATUS_PORT: "80"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base