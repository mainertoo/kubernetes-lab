apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: notifiarr-config-pvc
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      # IMPORTANT: match the claim name referenced by HelmRelease (existingClaim: notifiarr)
      APP: notifiarr
      APP_NAMESPACE: media

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 2Gi

      VOLSYNC_REPO_PATH: media/notifiarr/config

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # Notifiarr runs as 1000 in your chart values
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base