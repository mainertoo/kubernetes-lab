apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: notifiarr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/notifiarr
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  # notifiarr's PVCs (notifiarr-pvc.yaml + notifiarr-shared-pvc.yaml) are
  # declared inline in apps/base/media/notifiarr/ — folded back from their
  # former standalone Flux Kustomizations in the round-5 consolidation.

  components:
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: notifiarr
      APP_NAMESPACE: media

      SUBDOMAIN: notifiarr
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "5454"
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base