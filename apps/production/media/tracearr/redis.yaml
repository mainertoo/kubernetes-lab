apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tracearr-redis
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync
    - ../../../../components/volsync/remote

  postBuild:
    substitute:
      # MUST match HelmRelease existingClaim name
      APP: tracearr-redis
      APP_NAMESPACE: media

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 2Gi

      VOLSYNC_REPO_PATH: media/tracearr/redis

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # redis:8-alpine runs as root by default unless overridden
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base