---
# CloudNativePG cluster for tracearr, replacing the inline TimescaleDB pod
# (timescale/timescaledb:latest-pg16) that currently runs inside the tracearr
# HelmRelease. Renders Cluster + ScheduledBackup + ObjectStore + S3 Secret via
# the shared cnpg-cluster Components, patched here for TimescaleDB.
#
# TimescaleDB nuance (see docs/migrations/tracearr-cnpg-2026-06-08.yaml §approach):
#   - The live DB genuinely uses TimescaleDB hypertables (public.sessions,
#     public.library_snapshots) with chunks in _timescaledb_internal — it is NOT
#     droppable to plain Postgres. So the operand image must ship the extension.
#   - No community CNPG+TimescaleDB image was new enough (live DB = ts 2.25.0;
#     clevyr/imusmanmalik stalled at 2.19.x), so we build + pin our own operand
#     image: ghcr.io/mainertoo/cnpg-timescaledb:16-2.25.0 (docker/cnpg-timescaledb/).
#   - PG major stays 16 → 16 so the migration is a same-version timescale
#     dump/restore (the lowest-risk variant).
#
# Superuser posture (mirrors immich): the app role `tracearr` is a plain,
# non-superuser owner. shared_preload_libraries must list timescaledb (it is a
# preload-required extension) and CREATE EXTENSION timescaledb runs at bootstrap
# via postInitApplicationSQL, which CNPG executes as the postgres superuser — so
# the running app never needs superuser. The one-time data restore Job excludes
# EXTENSION objects since they are pre-created here.
#
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tracearr-db-cnpg
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/tracearr/db-cnpg
  targetNamespace: media
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: tracearr-cnpg-db
      namespace: media
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # Component paths are relative to spec.path
  # (./apps/base/media/tracearr/db-cnpg), which is 5 directory levels deep →
  # 5 `..` segments to reach the repo root before descending into components/.
  components:
    - ../../../../../components/cnpg-cluster/base
    - ../../../../../components/cnpg-cluster/initdb
  # Patch the Component-rendered Cluster to enable TimescaleDB:
  #   - shared_preload_libraries: timescaledb must be preloaded at server start
  #     before CREATE EXTENSION timescaledb can succeed.
  #   - postInitApplicationSQL runs once at initdb in the app DB (as the postgres
  #     superuser) creating the extensions the live DB uses. Verified live
  #     2026-06-08: timescaledb 2.25.0, pg_trgm. (plpgsql is always present.)
  # Target the literal ${APP} placeholder (Flux substitutes the real name
  # afterward). Strategic-merge form (the JSON6902 form silently no-ops here).
  patches:
    - target:
        kind: Cluster
        name: \${APP}
      patch: |-
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: ${APP}
        spec:
          postgresql:
            shared_preload_libraries:
              - "timescaledb"
          bootstrap:
            initdb:
              postInitApplicationSQL:
                - "CREATE EXTENSION IF NOT EXISTS timescaledb;"
                - "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
  postBuild:
    substitute:
      APP: tracearr-cnpg-db
      APP_NAMESPACE: media
      CNPG_DB_NAME: tracearr
      CNPG_DB_OWNER: tracearr
      # Self-built operand image — PG16 + TimescaleDB 2.25.0 pinned to match the
      # live source DB (loader + extension both pinned; the -1 revision corrects
      # the first build where the loader floated to 2.27.2). See
      # docker/cnpg-timescaledb/. Renovate-ignored. Post-migration this bumps to
      # a 16-2.27.2 image + ALTER EXTENSION timescaledb UPDATE to land current.
      CNPG_IMAGE: ghcr.io/mainertoo/cnpg-timescaledb:16-2.25.0-1
      # Live DB is 893 MB; 5Gi gives >5x headroom (chunks + WAL + bloat).
      CNPG_STORAGE_SIZE: 5Gi
      CNPG_STORAGECLASS: ceph-rbd
      CNPG_INSTANCES: "1"
      # Daily base backup at 06:45 UTC — clear of the other CNPG schedules.
      CNPG_BACKUP_SCHEDULE: "0 45 6 * * *"
      CNPG_RETENTION: "30d"
      CNPG_CPU_REQUEST: "100m"
      # TimescaleDB with 4121+ chunks + background workers (compression/retention
      # jobs) and the migration restore spike OOM-killed the 1Gi pod. Bumped to
      # 2Gi (matches immich's CNPG); request raised so the scheduler reserves it.
      CNPG_MEMORY_REQUEST: "512Mi"
      CNPG_MEMORY_LIMIT: "2Gi"
      CNPG_LINEAGE: v1
      CNPG_RESTORE_FROM_LINEAGE: v0
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
