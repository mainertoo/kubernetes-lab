---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — media on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/media/sonarr4k-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarr4k
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/media/sonarr4k"
  targetNamespace: media
  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../../components/gatus/internal"
  - "../../../../components/gatus/external"
  postBuild:
    substitute:
      APP: sonarr4k
      APP_NAMESPACE: media
      SUBDOMAIN: sonarr4k
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '8989'
