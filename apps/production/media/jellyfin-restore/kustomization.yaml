apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin-restore
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/jellyfin
  targetNamespace: media

  prune: false
  retryInterval: 2m
  timeout: 30m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync-v2/restore
    - ../../../../components/volsync/remote

  postBuild:
    substitute:
      APP: jellyfin
      APP_NAMESPACE: media

      # RESTORE TARGET MUST BE RBD (reliable snapshot restore)
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 150Gi

      VOLSYNC_REPO_PATH: media/jellyfin

      # Cache PVC for mover/restic (RBD RWO)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      # Bump this token every restore attempt
      VOLSYNC_RESTORE_TOKEN: restore-2026-02-16-01

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base