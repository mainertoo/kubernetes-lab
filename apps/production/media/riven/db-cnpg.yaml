---
# Phase 3b (riven): deploy a CloudNativePG-managed postgres cluster `riven-db`
# alongside the existing postgres SIDECAR container in the riven pod. The
# riven app keeps connecting to the in-pod postgres via Service riven-postgres
# until the cutover PR.
#
# Cutover (separate PR after migration verified):
#   - Remove the postgres container from controllers.riven.containers
#   - Remove `service.postgres` from the helm release
#   - Override RIVEN_DATABASE_HOST via explicit env entry in the helm values:
#       RIVEN_DATABASE_HOST: "postgresql+psycopg2://$(PGUSER):$(PGPASSWORD)@riven-db-rw/riven"
#     where PGUSER + PGPASSWORD are valueFrom riven-db-app Secret (CNPG-generated)
#   - K8s evaluates env[] AFTER envFrom, so this overrides the legacy URL still
#     present in riven-backend-secret (no SOPS edit needed)
#   - Add dependsOn for restore ordering
#
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: riven-db
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: media
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  # Wait for the CNPG Cluster to reach Ready before the cutover PR's
  # `dependsOn: riven-db` allows the riven app HelmRelease to apply.
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: riven-db
      namespace: media
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/cnpg-cluster/base
    - ../../../components/cnpg-cluster/initdb
  postBuild:
    substitute:
      APP: riven-db
      APP_NAMESPACE: media
      CNPG_DB_NAME: riven
      CNPG_DB_OWNER: riven
      # Match the existing postgres sidecar version (17.5)
      CNPG_IMAGE: ghcr.io/cloudnative-pg/postgresql:17.5-bookworm
      # Existing DB is 12 MB; bumping to 2Gi for headroom (legacy was 1Gi
      # for the entire backend PVC including OS overhead)
      CNPG_STORAGE_SIZE: 2Gi
      CNPG_STORAGECLASS: ceph-rbd
      CNPG_INSTANCES: "1"
      # 05:45 UTC slot: between zilean-db (05:15) and qnap_garage (05:30 +
      # ~5 min runtime) — clear of the contention window
      # CNPG cron format: <s> <m> <h> <dom> <mon> <dow>
      CNPG_BACKUP_SCHEDULE: "0 45 5 * * *"
      CNPG_RETENTION: "30d"
      CNPG_CPU_REQUEST: "100m"
      CNPG_MEMORY_REQUEST: "256Mi"
      CNPG_MEMORY_LIMIT: "1Gi"
      CNPG_LINEAGE: v1
      CNPG_RESTORE_FROM_LINEAGE: v0
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
