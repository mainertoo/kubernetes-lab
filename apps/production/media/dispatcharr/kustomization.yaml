apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dispatcharr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/dispatcharr
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: dispatcharr
      APP_NAMESPACE: media

      # === VolSync PVC + Snapshot configuration (RBD RWO) ===
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 15Gi

      # Repo path inside your S3 bucket/prefix
      VOLSYNC_REPO_PATH: media/dispatcharr

      # Cache PVC for mover/restic (RBD RWO)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # === Gatus (external + internal) ===
      SUBDOMAIN: dispatcharr
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"

      # If internal check ever goes yellow due to redirects:
      # GATUS_STATUS_INTERNAL: "302"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base