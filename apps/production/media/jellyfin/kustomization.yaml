apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/jellyfin
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: jellyfin
      APP_NAMESPACE: media

      # === VolSync PVC + Snapshot configuration (CephFS RWX) ===
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      CAPACITY: 150Gi

      # Repo path inside your S3 bucket/prefix
      VOLSYNC_REPO_PATH: media/jellyfin

      # Cache PVC for mover/restic (RBD RWO)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      # === Gatus (external) ===
      SUBDOMAIN: jellyfin
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8096"

      # === Gatus (internal: hit Service directly) ===
      # Jellyfin returns 302 on / when unauthenticated, so expect 302.
      # GATUS_APP: jellyfin
      # GATUS_PATH_INTERNAL: /
      # GATUS_PORT_INTERNAL: "8096"
      # GATUS_STATUS_INTERNAL: "302"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base