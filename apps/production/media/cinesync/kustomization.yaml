---
# Phase 5b (settled) — media/cinesync on production with label-driven
# volsync backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/media/cinesync/cinesync-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cinesync
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/cinesync
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: cinesync
      APP_NAMESPACE: media

      SUBDOMAIN: cinesync
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8082"
      GATUS_STATUS_INTERNAL: "200"
