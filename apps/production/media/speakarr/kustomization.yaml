apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: speakarr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/speakarr
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: speakarr
      APP_NAMESPACE: media

      # === VolSync PVC + Snapshot configuration (RBD RWO) ===
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 10Gi

      # Repo path inside your S3 bucket/prefix
      VOLSYNC_REPO_PATH: media/speakarr

      # Cache PVC for mover/restic (RBD RWO)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # === Gatus (external + internal) ===
      SUBDOMAIN: speakarr
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8787"

      # Readarr sometimes redirects on / (rare); enable if internal check stays yellow:
      # GATUS_STATUS_INTERNAL: "302"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base