apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/media/plex
  targetNamespace: media

  prune: true
  retryInterval: 2m
  timeout: 30m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync-v2
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: plex
      APP_NAMESPACE: media

      # === VolSync PVC + Snapshot configuration (CephFS RWX) ===
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      CAPACITY: 150Gi

      # Repo path inside your S3 bucket/prefix
      VOLSYNC_REPO_PATH: media/plex

      # Cache PVC for mover/restic (RBD RWO)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 30Gi

      # === Gatus (external + internal) ===
      SUBDOMAIN: plex
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /identity
      GATUS_PORT: "32400"
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base