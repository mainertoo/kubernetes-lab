---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5 of Kopia transition — media on production with label-driven
# Kopia backup. components/volsync-v2 + volsync/remote removed; PVC
# owned by apps/base/plex/plex-pvc.yaml with `backup: daily` +
# `backup-engine: kopia`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/media/plex"
  targetNamespace: media
  prune: true
  retryInterval: 2m
  timeout: 30m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../../components/gatus/internal"
  - "../../../../components/gatus/external"
  postBuild:
    substitute:
      APP: plex
      APP_NAMESPACE: media
      SUBDOMAIN: plex
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/identity"
      GATUS_PORT: '32400'
      GATUS_STATUS_INTERNAL: '200'
