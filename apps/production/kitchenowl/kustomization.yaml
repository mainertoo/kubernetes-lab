---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kitchenowl
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/_volsync-stub
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      # --- volsync (rbd) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce

      # existing PVC name is kitchenowl-data — canonical rename happens in Stage 2
      VOLSYNC_SOURCE_PVC: kitchenowl-data
      VOLSYNC_REPO_PATH: kitchenowl/data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # hourly during migration — revert on Stage 3 settle
      VOLSYNC_SCHEDULE: "0 * * * *"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
