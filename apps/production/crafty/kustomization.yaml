---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app crafty
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/crafty
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      # --- volsync (cephfs, RWX) ---
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      CAPACITY: 50Gi

      VOLSYNC_REPO_PATH: crafty/data

      # cache stays on rbd
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 5Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # --- gatus health checks ---
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8443"
      GATUS_SCHEME: https
      GATUS_STATUS_INTERNAL: "302"
      GATUS_INSECURE: "true"
      GATUS_DONT_FOLLOW_REDIRECTS: "true"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
