---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — crafty on production with label-driven volsync
# backup. components/volsync-v2 + volsync/remote removed; PVC owned by
# apps/base/crafty/crafty-pvc.yaml with `backup: daily`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crafty
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/crafty"
  targetNamespace: crafty
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
  - "../../../components/gatus/internal"
  - "../../../components/gatus/external"
  postBuild:
    substitute:
      APP: crafty
      APP_NAMESPACE: crafty
      SUBDOMAIN: crafty
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: "/"
      GATUS_PORT: '8443'
      GATUS_SCHEME: https
      GATUS_STATUS_INTERNAL: '200'
      GATUS_INSECURE: 'true'
