---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Stage 1 — volsync backup-only pre-flight.
# lcshare continues to run in staging. This Kustomization backs up the live
# staging PVC to Garage S3. Replace with full deployment in Stage 2.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app lcshare
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/empty
  targetNamespace: lcshare
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: lcshare
      VOLSYNC_SOURCE_PVC: lcshare
      VOLSYNC_REPO_PATH: lcshare/data
      VOLSYNC_SCHEDULE: "0 * * * *"
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
