---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Stage 3 (settled) — homepage on production with volsync-v2 ongoing backup.
# PVC renamed from homepage-config → homepage to match volsync convention.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app homepage
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/homepage
  targetNamespace: homepage
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/volsync-v2
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: homepage
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: "3000"
      GATUS_PATH: /
      VOLSYNC_REPO_PATH: homepage/config
      CAPACITY: 2Gi
      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
      VOLSYNC_RESTORE_PUID: "1000"
      VOLSYNC_RESTORE_PGID: "1000"
    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
