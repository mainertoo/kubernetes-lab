---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Phase 5b (settled) — homepage on production with label-driven volsync
# backup. Replaces the legacy components/volsync-v2 + volsync/remote
# pair. PVC is now owned by a static manifest in apps/base/homepage/
# that carries `backup: daily`; ClusterPolicy `volsync-pvc-backup-
# restore` generates the per-PVC Secret + RS + RD trio off the label.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app homepage
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/homepage
  targetNamespace: homepage
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: homepage
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PORT: "3000"
      GATUS_PATH: /
