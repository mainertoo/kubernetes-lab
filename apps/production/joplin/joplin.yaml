---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app joplin
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/joplin
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  # Postgres state is owned by the CNPG cluster joplin-db (db-cnpg.yaml),
  # which has its own backup chain (WAL streaming + base backups to Garage).
  # The joplin app pod itself is stateless, so no volsync is needed here.
  components:
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      # --- gatus health checks ---
      SUBDOMAIN: *app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "22300"
      GATUS_STATUS_INTERNAL: "404"
