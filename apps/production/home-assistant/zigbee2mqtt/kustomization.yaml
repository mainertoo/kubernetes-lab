apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zigbee2mqtt
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/home-assistant/zigbee2mqtt
  targetNamespace: home-assistant

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    # VolSync owns the PVC named "${APP}" (we set APP=zigbee2mqtt below)
    - ../../../../components/volsync-v2
    - ../../../../components/volsync/remote

    # Gatus internal/external
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      # --------------------
      # App identity
      # --------------------
      APP: zigbee2mqtt
      APP_NAMESPACE: home-assistant

      # --------------------
      # VolSync PVC settings
      # --------------------
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 2Gi

      # Pick the repo path you want in Garage
      VOLSYNC_REPO_PATH: home-assistant/zigbee2mqtt/config

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # --------------------
      # Gatus
      # --------------------
      SUBDOMAIN: zigbee2mqtt
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base