apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: esphome
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/home-assistant/esphome
  targetNamespace: home-assistant

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync-v2
    - ../../../../components/volsync/remote
    - ../../../../components/gatus/internal
    - ../../../../components/gatus/external

  postBuild:
    substitute:
      APP: esphome
      APP_NAMESPACE: home-assistant

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 20Gi

      VOLSYNC_REPO_PATH: home-assistant/esphome/config

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # since you run as root, these are mostly irrelevant, but keep consistent:
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"

      SUBDOMAIN: esphome
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "80"
      GATUS_STATUS_INTERNAL: "200"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base