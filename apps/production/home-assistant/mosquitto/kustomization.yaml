apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/home-assistant/mosquitto
  targetNamespace: home-assistant

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../../components/volsync-v2
    - ../../../../components/volsync/remote

  postBuild:
    substitute:
      APP: mosquitto
      APP_NAMESPACE: home-assistant

      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteOnce
      CAPACITY: 2Gi

      VOLSYNC_REPO_PATH: home-assistant/mosquitto/data

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 1Gi

      # mosquitto runs as 1883
      VOLSYNC_PUID: "1883"
      VOLSYNC_PGID: "1883"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base