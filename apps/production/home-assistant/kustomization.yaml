apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/home-assistant
  targetNamespace: home-assistant

  prune: true
  retryInterval: 2m
  timeout: 15m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync
    - ../../../components/volsync/remote
    - ../../../components/gatus/internal
    - ../../../components/gatus/external

  postBuild:
    substitute:
      APP: home-assistant
      APP_NAMESPACE: home-assistant

      # --- VolSync PVC settings (RBD) ---
      VOLSYNC_STORAGECLASS: ceph-rbd
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      VOLSYNC_SNAPSHOTCLASS: ceph-rbd-snapclass
      CAPACITY: 20Gi

      # Repo path inside the Garage bucket/prefix
      VOLSYNC_REPO_PATH: home-assistant/config

      # Cache PVC (RBD -> RBD)
      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 2Gi

      # --- Gatus ---
      SUBDOMAIN: home-assistant
      GATUS_APP: home-assistant-app
      GATUS_DOMAIN: lab.mainertoo.com
      GATUS_PATH: /
      GATUS_PORT: "8123"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base