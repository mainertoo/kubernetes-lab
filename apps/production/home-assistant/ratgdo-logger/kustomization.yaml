---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Diagnostic: persistent bus-level capture for the RIGHT ratgdo (secplus1,
# 192.168.20.152) to catch the next overnight spontaneous open. Headless —
# no ingress/gatus. See docs/runbooks via wiki smart-home/devices/garage-ratgdo.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ratgdo-logger
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/base/home-assistant/ratgdo-logger"
  targetNamespace: home-assistant
  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
