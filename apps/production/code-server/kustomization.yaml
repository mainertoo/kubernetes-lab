---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
#
# Phase 1c rollout, app 2/17. Pre-flight backup of the staging-tier
# code-server PVC.
#
# Notes for this app vs. donetick:
# - Storage class is cephfs (RWX), so VOLSYNC_SNAP_ACCESSMODES must be
#   ReadWriteMany (cephfs CSI does not support RWO clones).
# - The existing PVC is named `code-server-config`, not the canonical
#   `${APP}` = `code-server`. Stage 2 will rename to canonical and
#   update the HelmRelease's `existingClaim`. Restic repo path is
#   `code-server/data` regardless of source PVC name.
# - Cache stays on ceph-rbd RWO (canonical for cephfs apps; mover cache
#   doesn't need RWX).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app code-server
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/_volsync-stub
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 5m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  components:
    - ../../../components/volsync-v2/backup-only
    - ../../../components/volsync/remote

  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: *app

      VOLSYNC_SOURCE_PVC: code-server-config
      VOLSYNC_REPO_PATH: code-server/data

      VOLSYNC_STORAGECLASS: cephfs
      VOLSYNC_SNAPSHOTCLASS: cephfs-snapclass
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany

      VOLSYNC_CACHE_STORAGECLASS: ceph-rbd
      VOLSYNC_CACHE_ACCESSMODES: ReadWriteOnce
      VOLSYNC_CACHE_CAPACITY: 10Gi

      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

      # PoC: hourly cadence so we don't wait 12h for the first cephfs
      # backup to land in Garage. Removed in Stage 3 settle.
      VOLSYNC_SCHEDULE: "0 * * * *"

    substituteFrom:
      - kind: Secret
        name: volsync-garage-base
