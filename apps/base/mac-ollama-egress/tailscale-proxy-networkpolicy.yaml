---
# NetworkPolicy lives in the `tailscale` namespace (where the operator
# places the egress-proxy Pod), NOT in `ollama-egress` (where the
# user-facing Service lives). Selecting by the Pod's actual labels
# captured live in Phase 0b1 — operator uses `parent-resource` (no
# `-name` suffix) and `parent-resource-type: svc` (not `egress`).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tailscale-proxy-mac-ollama-allowlist
  namespace: tailscale
spec:
  podSelector:
    matchLabels:
      tailscale.com/managed: "true"
      tailscale.com/parent-resource: mac-ollama
      tailscale.com/parent-resource-ns: ollama-egress
      tailscale.com/parent-resource-type: svc
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: open-notebook
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: open-webui
      ports:
        - protocol: TCP
          port: 11434
