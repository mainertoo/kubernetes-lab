apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dumbdo
  namespace: dumbdo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      dumbdo:
        containers:
          app:
            image:
              repository: dumbwareio/dumbdo
              tag: "latest@sha256:03a01d15847ba59ed845a3bcf60bba22889e1d27fc9a66ab31ccd7195b52efcc"
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
            envFrom:
              - secretRef:
                  name: dumbdo-secret

    service:
      app:
        controller: dumbdo
        ports:
          http:
            port: 3000

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data