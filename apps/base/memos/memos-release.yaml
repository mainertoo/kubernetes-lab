apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memos
  namespace: memos
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: neosmemo/memos
              tag: 0.29.1
              pullPolicy: IfNotPresent

            env:
              TZ:
                value: America/Los_Angeles

            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 5230

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /var/opt/memos