apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: memos
  namespace: memos
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Memos"
    gethomepage.dev/group: "Productivity"
    gethomepage.dev/description: "Lightweight notes & memos"
    gethomepage.dev/href: "https://memos.lab.mainertoo.com"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`memos.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: memos
          port: 5230
  tls: {}