apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: esphome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      esphome:
        pod:
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

          # Run as root to avoid PlatformIO/uv cache permission issues
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0

        containers:
          app:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.1.1

            env:
              TZ: America/Los_Angeles

              # Keep state in /config regardless
              PLATFORMIO_CORE_DIR: /config/.platformio

              # Optional: reduce telemetry noise
              PLATFORMIO_SETTING_ENABLE_TELEMETRY: "no"
              PLATFORMIO_DISABLE_TELEMETRY: "true"

            ports:
              - name: http
                containerPort: 6052
                protocol: TCP

    service:
      app:
        controller: esphome
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 6052

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 4Gi
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet