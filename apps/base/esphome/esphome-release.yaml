apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: esphome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      esphome:
        pod:
          # Pin to same node as Home Assistant + matter-server for stable mDNS/OTA behavior
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          init-platformio:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                mkdir -p /config/.platformio
                mkdir -p /config/.esphome
                # Make sure writable by the non-root user we run as
                chown -R 1000:1000 /config/.platformio /config/.esphome || true
                chmod -R 0775 /config/.platformio /config/.esphome || true

        containers:
          app:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.1.1

            env:
              TZ: America/Los_Angeles

              # ✅ FIX: keep PlatformIO state out of "/"
              PLATFORMIO_CORE_DIR: /config/.platformio

              # ✅ Prefer the setting-based knob (more reliable than "DISABLE" in some PIO versions)
              PLATFORMIO_SETTING_ENABLE_TELEMETRY: "no"
              # (Optional extra belt+suspenders; harmless if ignored)
              PLATFORMIO_DISABLE_TELEMETRY: "true"

            # ESPHome dashboard listens on 6052
            ports:
              - name: http
                containerPort: 6052
                protocol: TCP

    service:
      app:
        controller: esphome
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 6052

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 4Gi
        advancedMounts:
          esphome:
            app:
              - path: /config
            init-platformio:
              - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet