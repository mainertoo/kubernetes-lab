apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: esphome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      esphome:
        containers:
          app:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.1.1

            env:
              TZ: America/Los_Angeles

            # ESPHome dashboard listens on 6052
            ports:
              - name: http
                containerPort: 6052
                protocol: TCP

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: esphome
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 6052

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false

      # Strongly recommended for ESPHome discovery + smooth OTA (mDNS/zeroconf).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet