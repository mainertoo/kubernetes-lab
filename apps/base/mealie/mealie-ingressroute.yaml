apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mealie
  namespace: mealie
  annotations:
    gethomepage.dev/href: "https://mealie.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Mealie"
    gethomepage.dev/description: "Self-hosted recipe manager and meal planner"
    gethomepage.dev/app: mealie
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-mealie.svg"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mealie.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: mealie
          port: 9000
  tls: {}