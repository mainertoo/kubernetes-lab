apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
  namespace: mealie
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.3.2

            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PUID
                value: "1000"
              - name: PGID
                value: "1000"

              # Your external URL for Mealie
              - name: BASE_URL
                value: "https://mealie.lab.mainertoo.com"

              # Local auth behavior
              - name: ALLOW_SIGNUP
                value: "false"

              # DB (as you had it)
              - name: DB_TYPE
                value: sqlite

              # -----------------------
              # OIDC / Authentik SSO
              # -----------------------
              - name: OIDC_AUTH_ENABLED
                value: "true"
              - name: OIDC_PROVIDER_NAME
                value: "authentik"

              # IMPORTANT: keep this URL exactly as authentik publishes it
              # (and yes, the trailing "/" patterns often matter in these configs)
              - name: OIDC_CONFIGURATION_URL
                value: "https://authentik.lab.mainertoo.com/application/o/mealie/.well-known/openid-configuration"

              # Groups in Authentik (set these to your real group names/slugs)
              - name: OIDC_USER_GROUP
                value: "authentik users"
              - name: OIDC_ADMIN_GROUP
                value: "authentik Admins"
              - name: OIDC_SIGNUP_ENABLED
                value: "true"
              - name: OIDC_AUTO_REDIRECT
                value: "true"
              - name: OIDC_REMEMBER_ME
                value: "true"

              # Pull client id/secret from a Kubernetes Secret (SOPS-managed)
              - name: OIDC_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: mealie-sso-secret
                    key: OIDC_CLIENT_ID
              - name: OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: mealie-sso-secret
                    key: OIDC_CLIENT_SECRET

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      main:
        controller: main
        ports:
          http:
            port: 9000

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data