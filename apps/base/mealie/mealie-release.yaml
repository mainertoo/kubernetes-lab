apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: mealie
spec:
  interval: 5m
  releaseName: mealie
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false


  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.0
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PUID
                value: "1000"
              - name: PGID
                value: "1000"

              # Your external URL for Mealie
              - name: BASE_URL
                value: "https://mealie.lab.mainertoo.com"

              # Local auth behavior
              - name: ALLOW_SIGNUP
                value: "false"

              # DB (as you had it)
              - name: DB_TYPE
                value: sqlite

              # -----------------------
              # OIDC / Authentik SSO
              # -----------------------
              - name: OIDC_AUTH_ENABLED
                value: "true"
              - name: OIDC_PROVIDER_NAME
                value: "authentik"

              # IMPORTANT: keep this URL exactly as authentik publishes it
              # (and yes, the trailing "/" patterns often matter in these configs)
              - name: OIDC_CONFIGURATION_URL
                value: "https://authentik.lab.mainertoo.com/application/o/mealie/.well-known/openid-configuration"

              # Groups in Authentik (set these to your real group names/slugs)
              - name: OIDC_USER_GROUP
                value: "authentik users"
              - name: OIDC_ADMIN_GROUP
                value: "authentik Admins"

              - name: OIDC_SIGNUP_ENABLED
                value: "true"
              - name: OIDC_AUTO_REDIRECT
                value: "true"
              - name: OIDC_REMEMBER_ME
                value: "true"

              # Pull client id/secret from a Kubernetes Secret (SOPS-managed)
              - name: OIDC_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: mealie-sso-secret
                    key: OIDC_CLIENT_ID
              - name: OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: mealie-sso-secret
                    key: OIDC_CLIENT_SECRET


            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      main:
        controller: main
        ports:
          http:
            port: 9000

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        existingClaim: mealie-data
        globalMounts:
          - path: /app/data