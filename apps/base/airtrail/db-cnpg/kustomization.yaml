apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: airtrail
# The airtrail Namespace is created HERE (the DB layer), not in the app layer,
# so it exists before the cnpg-cluster Components (referenced from
# apps/production/airtrail/db-cnpg.yaml) render the Cluster / ScheduledBackup /
# ObjectStore / S3 Secret into it. The app layer (apps/base/airtrail) depends on
# airtrail-db-cnpg and simply lands in this pre-existing namespace at reconcile.
# Same bootstrap pattern as apps/base/immich/db-cnpg.
resources:
  - airtrail-namespace.yaml
