apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: airtrail
resources:
  # Namespace is created by the DB layer (apps/base/airtrail/db-cnpg) so it
  # exists before the CNPG cluster targets it; this layer dependsOn that.
  - airtrail-secret.sops.yaml
  - airtrail-pvc.yaml
  - airtrail-release.yaml
  - airtrail-ingressroute.yaml
