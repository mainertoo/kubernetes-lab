apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app riven
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      riven:
        # keep Riven pinned to the node that has /mnt/zurg mounted
        # pod:
        #   nodeSelector:
        #     kubernetes.io/hostname: mainertoo-k3s-worker-2

        containers:
          postgres:
            image:
              repository: postgres
              tag: 17.0-alpine3.20
            envFrom:
              - secretRef:
                  name: riven-postgres-secret
              - configMapRef:
                  name: riven-postgres-configmap
            env:
              # use a subdir in the mounted volume as PGDATA
              - name: PGDATA
                value: /var/lib/postgresql/data/pgdata
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "postgres"]
                  initialDelaySeconds: 10
                  periodSeconds: 5

          backend:
            image:
              repository: docker.io/spoked/riven
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-backend-secret
              - configMapRef:
                  name: riven-backend-configmap
            dependsOn: postgres

          frontend:
            image:
              repository: docker.io/spoked/riven-frontend
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-frontend-secret
              - configMapRef:
                  name: riven-frontend-configmap
            dependsOn: backend

    service:
      frontend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portfrontend 3000

      backend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portbackend 8080

      postgres:
        controller: riven
        type: ClusterIP
        ports:
          postgres:
            port: &portpostgres 5432
            targetPort: 5432

    persistence:
      # 🔹 Riven backend app data (settings, logs, etc.) – persistent
      data:
        existingClaim: riven-data-pvc
        advancedMounts:
          riven:
            backend:
              - path: /riven/data

      # 🔹 HostPath rclone mount for Zurg – backend only
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        advancedMounts:
          riven:
            backend:
              - path: /mnt/zurg
                readOnly: true

      # 🔹 Media library (Ceph-backed shared-media-pvc)
      media:
        existingClaim: shared-media-pvc
        advancedMounts:
          riven:
            backend:
              - path: /mnt/library

      # 🔹 Postgres data – persistent, on riven-backend-pvc
      database:
        existingClaim: riven-backend-pvc
        advancedMounts:
          riven:
            postgres:
              # PVC will be mounted at /var/lib/postgresql/data
              # with PGDATA=/var/lib/postgresql/data/pgdata
              - path: /var/lib/postgresql/data