apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app riven
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      riven:
        containers:
          postgres:
            image:
              repository: postgres
              tag: 17.0-alpine3.20
            env:
              # Match the working debug deployment:
              # PVC mounted at /var/lib/postgresql/data, PGDATA points to subdir
              - name: PGDATA
                value: /var/lib/postgresql/data/pgdata
            envFrom:
              - secretRef:
                  name: riven-postgres-secret
              - configMapRef:
                  name: riven-postgres-configmap
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "postgres"]
                  initialDelaySeconds: 10
                  periodSeconds: 5

          backend:
            image:
              repository: docker.io/spoked/riven
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-backend-secret
              - configMapRef:
                  name: riven-backend-configmap
            dependsOn: postgres

          frontend:
            image:
              repository: docker.io/spoked/riven-frontend
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-frontend-secret
              - configMapRef:
                  name: riven-frontend-configmap
            dependsOn: backend

    service:
      frontend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portfrontend 3000

      backend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portbackend 8080

      postgres:
        controller: riven
        type: ClusterIP
        ports:
          postgres:
            port: &portpostgres 5432
            targetPort: 5432

    persistence:
      # Riven backend app data (settings, etc.)
      data:
        existingClaim: riven-backend-pvc
        advancedMounts:
          riven:
            backend:
              - path: /riven/data

      # HostPath rclone mount for Zurg
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      # Media library (your shared media PVC)
      media:
        existingClaim: shared-media-pvc
        advancedMounts:
          riven:
            backend:
              - path: /mnt/library

      # Postgres data — PVC mounted at /var/lib/postgresql/data
      # with PGDATA set to /var/lib/postgresql/data/pgdata
      database:
        existingClaim: riven-backend-pvc
        advancedMounts:
          riven:
            postgres:
              - path: /var/lib/postgresql/data