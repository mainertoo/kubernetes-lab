apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dumbassets
  namespace: dumbassets
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      dumbassets:
        containers:
          app:
            image:
              repository: dumbwareio/dumbassets
              tag: latest
            env:
              - name: NODE_ENV
                value: "production"
              - name: DEBUG
                value: "true"
              - name: SITE_TITLE
                value: "DumbAssets"
              - name: BASE_URL
                value: "https://dumbassets.lab.mainertoo.com"
              - name: DUMBASSETS_PIN
                value: "6996"
              - name: ALLOWED_ORIGINS
                value: "*"
              - name: APPRISE_URL
                value: "-"
              - name: TZ
                value: America/Los_Angeles

    service:
      app:
        controller: dumbassets
        ports:
          http:
            port: 3000

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data