# Internal preview route. Public content — no Authentik SSO middleware.
# External access is via Newt -> Pangolin (guides.mainertoo.com), configured in
# the Pangolin UI on the VPS with target mkdocs.mkdocs.svc.cluster.local:80.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: guides-ingressroute
  namespace: mkdocs
  annotations:
    gethomepage.dev/href: "https://guides.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Guides"
    gethomepage.dev/description: "Public how-to guides (MkDocs)"
    gethomepage.dev/app: mkdocs
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-material-for-mkdocs.png"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`guides.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: mkdocs
          port: 80
          scheme: http
  tls: {}
