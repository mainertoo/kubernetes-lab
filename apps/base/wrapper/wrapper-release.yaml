apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wrapper
  namespace: media
spec:
  interval: 30m
  releaseName: wrapper

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      wrapper:
        strategy: Recreate

        containers:
          app:
            image:
              repository: ghcr.io/worldobservationlog/wrapper
              tag: latest

            tty: true
            stdin: true

            env:
              WRAPPER_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: wrapper-secret
                    key: WRAPPER_USERNAME
              WRAPPER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: wrapper-secret
                    key: WRAPPER_PASSWORD
              args: "-L $(WRAPPER_USERNAME):$(WRAPPER_PASSWORD) -H 0.0.0.0"

            ports:
              - name: http-10020
                containerPort: 10020
              - name: http-20020
                containerPort: 20020
              - name: http-30020
                containerPort: 30020

    service:
      wrapper:
        controller: wrapper
        ports:
          http-10020:
            port: 10020
          http-20020:
            port: 20020
          http-30020:
            port: 30020

    persistence:
      data:
        enabled: true
        type: pvc
        existingClaim: wrapper
        globalMounts:
          - path: /app/rootfs/data

    pod:
      restartPolicy: Always