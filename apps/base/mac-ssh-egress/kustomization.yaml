apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:` — this app spans two namespaces:
#   hermes     (the egress Service the pod dials)
#   tailscale  (NetworkPolicy on the operator-managed egress-proxy Pod)
# Each resource self-namespaces.
resources:
  - mac-ssh-egress-service.yaml
  - tailscale-proxy-networkpolicy.yaml
