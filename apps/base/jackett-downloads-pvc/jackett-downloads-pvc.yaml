apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jackett-downloads
  # No backup labels: this PVC is a transient indexer downloads scratch dir
  # (Jackett→riven) that has never held data — the mover reported Successful
  # but wrote NO Kopia snapshot, so the oracle correctly read `fresh`.
  # Dropped `backup: daily` + `backup-engine: kopia` 2026-06-08 so the
  # volsync-pvc-backup-restore-kopia policy no longer manages it. Nothing to
  # restore on a rebuild — it comes up empty by design.
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 5Gi
