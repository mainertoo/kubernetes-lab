apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jackett-downloads
  labels:
    # Phase 5 of the Kopia transition (docs/volsync-kopia-transition.md).
    # ClusterPolicy volsync-pvc-backup-restore-kopia matches both labels
    # and generates volsync-jackett-downloads Secret + jackett-downloads-backup RS + RD with
    # spec.kopia in this ns.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 5Gi
