apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
spec:
  template:
    spec:
      initContainers:
        - name: fix-media-permissions
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              echo "Fixing permissions on /media..."
              chown -R 1000:1000 /media || true
              chmod -R g+rwXs /media || true
              echo "Done."
          volumeMounts:
            - name: media
              mountPath: /media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
spec:
  template:
    spec:
      initContainers:
        - name: fix-media-permissions
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              echo "Fixing permissions on /media..."
              chown -R 1000:1000 /media || true
              chmod -R g+rwXs /media || true
              echo "Done."
          volumeMounts:
            - name: media
              mountPath: /media