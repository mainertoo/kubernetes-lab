apiVersion: v1
kind: Pod
metadata:
  name: authentik-media-fix
  namespace: authentik
spec:
  restartPolicy: Never
  containers:
    - name: fix-perms
      image: busybox:latest
      command:
        - sh
        - -c
        - |
          echo "Fixing permissions on /media..."
          ls -ld /media
          ls -l /media || true
          chown -R 1000:1000 /media
          chmod -R 775 /media
          echo "Done. Final perms:"
          ls -ld /media
          ls -l /media
          sleep 10
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: media
          mountPath: /media
  volumes:
    - name: media
      persistentVolumeClaim:
        claimName: authentik-media