apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-ingressroute
  namespace: authentik
  annotations:
    gethomepage.dev/href: "https://authentik.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Authentik"
    gethomepage.dev/description: "SSO / Identity Provider"
    gethomepage.dev/app: authentik
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "sh-authentik.svg"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`authentik.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
  tls: {}