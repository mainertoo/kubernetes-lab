apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  timeout: 5m
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: 2025.10.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    ## --- BITNAMI POSTGRES GLOBAL AUTH (fixes password upgrade error) ---
    global:
      postgresql:
        auth:
          username: authentik
          database: authentik
          existingSecret: authentik-postgresql
         
    ## --- AUTHENTIK CORE CONFIG ---
    authentik:
      media:
      # These default to UID/GID 1000 inside container
        owner: "1000"
        group: "1000"
        mode: "0775"
      log_level: info

      # Secret key for cookies / IDs
      # Don't change after first install
      secret_key: ""
      
      web:
        # Root path
        path: /

      # Email via Gmail SMTP, # Email config: static bits here, secrets via env
      email:
        host: "smtp.gmail.com"
        port: 587
        use_tls: true
        use_ssl: false
        username: ""
        password: ""
        from: ""
        # from: "mainertoo@gmail.com"

      # DB connection FROM Authentik's perspective
      postgresql:
        host: "{{ .Release.Name }}-postgresql"
        name: "authentik"
        user: "authentik"
        password: "6Sxl48ve8uET3DXp+F5+th416QiruJgPujWDTHMoPAU="   # PG_PASS
        port: 5432

      redis:
        host: "{{ .Release.Name }}-redis-master"
        password: ""

    ## --- EMBEDDED REDIS CONFIG ---
    redis:
      enabled: true
      architecture: replication
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
      replica:
        persistence:
          enabled: false

    ## --- EMBEDDED POSTGRES CONFIG ---
    postgresql:
      enabled: true
      auth:
        username: "authentik"
        database: "authentik"
        existingSecret: "authentik-postgresql"
      primary:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 5Gi

    ## --- SERVER & WORKER: MOUNT MEDIA PVC ON /media ---
    server:
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media
      podSecurityContext:
        fsGroup: 1000

      # 👇 Pull all secrets from the SOPS-managed Secret
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__USERNAME
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__PASSWORD
        - name: AUTHENTIK_EMAIL__FROM
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__FROM

        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password

      # We use Traefik IngressRoute instead of the built-in Ingress
      ingress:
        enabled: false

    worker:
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media
      podSecurityContext:
        fsGroup: 1000

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password