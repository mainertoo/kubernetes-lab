apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  timeout: 10m
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: 2025.10.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    global:
      postgresql:
        auth:
          username: authentik
          database: authentik
          existingSecret: authentik-postgresql

    authentik:
      media:
        owner: "1000"
        group: "1000"
        mode: "0775"
      log_level: info

      secret_key: ""

      web:
        path: /

      email:
        host: "smtp.gmail.com"
        port: 587
        use_tls: true
        use_ssl: false
        username: ""
        password: ""
        from: ""

      postgresql:
        host: "{{ .Release.Name }}-postgresql"
        name: "authentik"
        user: "authentik"
        password: "6Sxl48ve8uET3DXp+F5+th416QiruJgPujWDTHMoPAU="
        port: 5432

      redis:
        host: "{{ .Release.Name }}-redis-master"
        password: ""

    redis:
      enabled: true
      architecture: replication
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
      replica:
        persistence:
          enabled: false

    postgresql:
      enabled: true
      auth:
        username: "authentik"
        database: "authentik"
        existingSecret: "authentik-postgresql"
      primary:
        persistence:
          enabled: true
          existingClaim: authentik-postgresql

    server:
      # Ensure group ownership works even if files come in funky
      podSecurityContext:
        fsGroup: 1000

      # --- initContainer to fix /media perms (GitOps-safe) ---
      initContainers:
        fix-media-perms:
          image: busybox:stable
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              echo "Fixing perms on /media..."
              echo "Before:"
              ls -ld /media || true
              find /media -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
              chown -R 1000:1000 /media || true
              chmod -R 0775 /media || true
              echo "After:"
              ls -ld /media || true
              find /media -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
              echo "Done."
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: media
              mountPath: /media

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__USERNAME
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__PASSWORD
        - name: AUTHENTIK_EMAIL__FROM
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__FROM

        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password

      ingress:
        enabled: false

    worker:
      podSecurityContext:
        fsGroup: 1000

      initContainers:
        fix-media-perms:
          image: busybox:stable
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              echo "Fixing perms on /media (worker)..."
              ls -ld /media || true
              chown -R 1000:1000 /media || true
              chmod -R 0775 /media || true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: media
              mountPath: /media

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password