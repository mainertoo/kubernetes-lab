apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  timeout: 15m
  releaseName: authentik

  chart:
    spec:
      chart: authentik
      version: 2025.10.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    global:
      postgresql:
        auth:
          username: authentik
          database: authentik
          existingSecret: authentik-postgresql

    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-postgresql
      primary:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 5Gi

    redis:
      enabled: true
      architecture: replication
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
      replica:
        persistence:
          enabled: false

    authentik:
      log_level: info
      web:
        path: /
      media:
        owner: "1000"
        group: "1000"
        mode: "0775"
      email:
        host: smtp.gmail.com
        port: 587
        use_tls: true
        use_ssl: false
      postgresql:
        host: "{{ .Release.Name }}-postgresql"
        name: authentik
        user: authentik
        port: 5432
      redis:
        host: "{{ .Release.Name }}-redis-master"

    server:
      ingress:
        enabled: false

      # Mount your external media PVC at /media (shared with worker)
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      podSecurityContext:
        fsGroup: 1000

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__USERNAME
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__PASSWORD
        - name: AUTHENTIK_EMAIL__FROM
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__FROM

        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password

    worker:
      # Mount the same media PVC at /media
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      podSecurityContext:
        fsGroup: 1000

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: password