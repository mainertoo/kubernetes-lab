apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  timeout: 15m
  releaseName: authentik

  chart:
    spec:
      chart: authentik
      version: 2026.5.3
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    # Mount declarative blueprints from SOPS-encrypted Secrets. The worker
    # discovers any key ending in `.yaml` and applies it on a schedule.
    blueprints:
      secrets:
        - authentik-blueprint-discord-signup

    global:
      postgresql:
        auth:
          username: authentik
          database: authentik
          existingSecret: authentik-postgresql

    # Bitnami postgresql subchart disabled in Phase 5g (CNPG migration
    # cleanup 2026-05-09). The authentik app has been on the CNPG-managed
    # authentik-db-rw cluster since PR #287. Disabling the subchart removes
    # the legacy StatefulSet from the cluster.
    #
    # NOTE: the authentik-postgresql-0 PVC `data-authentik-postgresql-0`
    # (5 GiB) is NOT auto-deleted by helm — bitnami StatefulSets create
    # their PVCs via volumeClaimTemplate which Helm does not own. After
    # this PR merges and the StatefulSet terminates, a manual `kubectl
    # delete pvc data-authentik-postgresql-0 -n authentik` is required to
    # reclaim the 5 GiB. The orphan PVC is harmless until then.
    postgresql:
      enabled: false

    redis:
      enabled: true
      architecture: replication
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
      replica:
        persistence:
          enabled: false

    authentik:
      log_level: info
      web:
        path: /
      media:
        owner: "1000"
        group: "1000"
        mode: "0775"
      email:
        host: smtp.gmail.com
        port: 587
        use_tls: true
        use_ssl: false
      postgresql:
        # CNPG cutover 2026-05-09 (Phase 3d-cutover): point at the
        # CNPG-managed authentik-db-rw service. The legacy bitnami
        # subchart (postgresql.enabled: true below) keeps its
        # StatefulSet running but unused — decommission in Phase 3d
        # after the 24h soak.
        host: authentik-db-rw
        name: authentik
        user: authentik
        port: 5432
      redis:
        host: "{{ .Release.Name }}-redis-master"

    server:
      ingress:
        enabled: false

      # Mount your external media PVC at /media (shared with worker)
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      podSecurityContext:
        fsGroup: 1000

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__USERNAME
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__PASSWORD
        - name: AUTHENTIK_EMAIL__FROM
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_EMAIL__FROM

        # CNPG cutover 2026-05-09 (Phase 3d-cutover): switch the postgres
        # password to the CNPG-auto-generated Secret. The other Secrets
        # (AUTHENTIK_SECRET_KEY, AUTHENTIK_EMAIL__*) are unrelated to
        # postgres and stay on authentik-postgresql.
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password

    worker:
      # Mount the same media PVC at /media
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /media

      podSecurityContext:
        fsGroup: 1000

      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-postgresql
              key: AUTHENTIK_SECRET_KEY

        # CNPG cutover 2026-05-09 (Phase 3d-cutover): switch the postgres
        # password to the CNPG-auto-generated Secret. The other Secrets
        # (AUTHENTIK_SECRET_KEY, AUTHENTIK_EMAIL__*) are unrelated to
        # postgres and stay on authentik-postgresql.
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password