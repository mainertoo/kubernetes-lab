apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app convertx
  namespace: convertx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      convertx:
        containers:
          app:
            image:
              # repository: ghcr.io/c4illin/convertx
              # tag: main
              repository: ghcr.io/nidplays/convertx-cc
              tag: main-e8ecd03
            env:
              TZ: America/Los_Angeles
              HTTP_ALLOWED: "true"
              ACCOUNT_REGISTRATION: "true"

              JWT_SECRET:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: JWT_SECRET }

              OIDC_ISSUER_URL:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_ISSUER_URL }
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_CLIENT_ID }
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_CLIENT_SECRET }
              OIDC_REDIRECT_URI:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_REDIRECT_URI }
              OIDC_ONLY:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_ONLY }
              OIDC_BUTTON_TEXT:
                valueFrom:
                  secretKeyRef: { name: convertx-secret, key: OIDC_BUTTON_TEXT }

    service:
      app:
        controller: convertx
        ports:
          http:
            port: 3000

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data