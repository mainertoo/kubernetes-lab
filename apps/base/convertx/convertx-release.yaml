apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app convertx
  namespace: convertx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      convertx:
        containers:
          app:
            image:
              repository: ghcr.io/c4illin/convertx
              tag: latest
            env:
              TZ: America/Los_Angeles
              HTTP_ALLOWED: "true"
              ACCOUNT_REGISTRATION: "true"
            envFrom:
              - secretRef:
                  name: convertx-secret

    service:
      app:
        controller: convertx
        ports:
          http:
            port: 3000

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data