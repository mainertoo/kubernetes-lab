apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    // Discover Kubernetes pods
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Read pod logs and send to processing pipeline
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.process.k8s.receiver]
    }

    // Enrich labels and forward to Loki
    loki.process "k8s" {
      forward_to = [loki.write.default.receiver]

      stage.labels {
        values = {
          namespace = "namespace",
          pod       = "pod",
          container = "container",
          node      = "node",
          job       = "job",
        }
      }
    }

    // Push to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
      }
    }