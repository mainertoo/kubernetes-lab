apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Read pod logs from Kubernetes API
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.relabel.k8s.receiver]
    }

    // Create namespace/pod/container labels by parsing the existing "instance" label:
    // instance="namespace/pod:container"
    loki.relabel "k8s" {
      forward_to = [loki.write.default.receiver]

      // namespace
      rule {
        source_labels = ["instance"]
        regex         = "^([^/]+)/.+$"
        target_label  = "namespace"
        replacement   = "$1"
      }

      // pod
      rule {
        source_labels = ["instance"]
        regex         = "^[^/]+/([^:]+):.+$"
        target_label  = "pod"
        replacement   = "$1"
      }

      // container
      rule {
        source_labels = ["instance"]
        regex         = "^[^/]+/[^:]+:(.+)$"
        target_label  = "container"
        replacement   = "$1"
      }
    }

    // Push to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
      }
    }