apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    // Discover pods, but restrict to pods on the SAME NODE as this Alloy instance
    // (important when running Alloy as a DaemonSet).
    discovery.kubernetes "pod" {
      role = "pod"

      selectors {
        role  = "pod"
        field = "spec.nodeName=" + coalesce(sys.env("ALLOY_NODE_NAME"), constants.hostname)
      }
    }

    // Turn Kubernetes meta labels into real Loki stream labels.
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pod.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action        = "replace"
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        action        = "replace"
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        action        = "replace"
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        action        = "replace"
        target_label  = "node"
      }

      // Optional but very useful:
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        action        = "replace"
        target_label  = "app"
      }

      // Stable job label: namespace/container
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
        target_label  = "job"
        separator     = "/"
        action        = "replace"
        regex         = "(.*)"
        replacement   = "$1"
      }
    }

    // Tail logs via Kubernetes API
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
    }

    // Add a cluster label (helps if you ever federate)
    loki.process "pod_logs" {
      stage.static_labels {
        values = {
          cluster = "lab",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // Push to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
      }
    }