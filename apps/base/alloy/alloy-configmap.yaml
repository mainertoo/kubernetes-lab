apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Read pod logs from Kubernetes API
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.process.k8s.receiver]
    }

    // Extract labels from the existing "instance" label:
    // instance="namespace/pod:container"
    loki.process "k8s" {
      forward_to = [loki.write.default.receiver]

      stage.regex {
        source     = "instance"
        expression = "^(?P<namespace>[^/]+)/(?P<pod>[^:]+):(?P<container>.+)$"
      }

      stage.labels {
        values = {
          namespace = "namespace",
          pod       = "pod",
          container = "container",
        }
      }
    }

    // Push to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
      }
    }