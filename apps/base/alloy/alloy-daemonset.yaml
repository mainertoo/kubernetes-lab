apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: alloy
  labels:
    app.kubernetes.io/name: alloy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
    spec:
      serviceAccountName: alloy

      containers:
        - name: alloy
          image: grafana/alloy:latest@sha256:f94b1c82957accb77cd11385fd5e3600758ef1b1ab79557c97319ad28590735a
          imagePullPolicy: IfNotPresent

          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345

          env:
            # This is critical for the node selector in config.alloy
            - name: ALLOY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          ports:
            - name: http
              containerPort: 12345

          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
              readOnly: true

      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
            items:
              - key: config.alloy
                path: config.alloy