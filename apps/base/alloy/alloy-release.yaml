apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: alloy
      interval: 1h

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controller:
      type: daemonset

    serviceAccount:
      create: true
      name: alloy

    service:
      enabled: true
      port: 12345

    mounts:
      varlog:
        enabled: true
        readOnly: true

    extraVolumes:
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers

    extraVolumeMounts:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlogcontainers
        mountPath: /var/log/containers
        readOnly: true

    # IMPORTANT: chart expects config under alloy.configMap (not top-level configMap)
    alloy:
      configMap:
        create: true
        content: |
          discovery.kubernetes "pods" {
            role = "pod"
          }

          loki.source.kubernetes "pod_logs" {
            targets    = discovery.kubernetes.pods.targets
            forward_to = [loki.process.k8s.receiver]
          }

          loki.process "k8s" {
            forward_to = [loki.write.default.receiver]

            # Promote useful labels for querying
            stage.labels {
              values = {
                namespace = "namespace",
                pod       = "pod",
                container = "container",
                node      = "node",
                job       = "job",
              }
            }

            # Optional: drop Alloy’s own spam if you want later
            # stage.drop {
            #   expression = "namespace == \"alloy\""
            # }
          }

          loki.write "default" {
            endpoint {
              url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
            }
          }