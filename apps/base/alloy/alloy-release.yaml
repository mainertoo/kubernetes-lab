apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "*"            # optionally pin later
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: alloy
      interval: 1h

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controller:
      type: daemonset

    serviceAccount:
      create: true
      name: alloy

    # Expose Alloy's UI/service inside cluster (and optionally via ingress)
    service:
      enabled: true
      port: 12345

    mounts:
      varlog:
        enabled: true
        readOnly: true

    extraVolumes:
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers

    extraVolumeMounts:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlogcontainers
        mountPath: /var/log/containers
        readOnly: true

    configMap:
      create: true
      content: |
        // Discover Kubernetes pods
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Read pod logs from this node and send into a processing pipeline
        loki.source.kubernetes "pod_logs" {
          targets    = discovery.kubernetes.pods.targets
          forward_to = [loki.process.k8s.receiver]
        }

        // Enrich labels + forward to Loki
        loki.process "k8s" {
          forward_to = [loki.write.default.receiver]

          stage.labels {
            values = {
              namespace = "namespace",
              pod       = "pod",
              container = "container",
              node      = "node",
            }
          }
        }

        // Push to Loki (cluster-internal)
        loki.write "default" {
          endpoint {
            url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
          }
        }