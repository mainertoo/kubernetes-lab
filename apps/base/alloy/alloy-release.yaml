apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: alloy
      interval: 1h

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controller:
      type: daemonset

    rbac:
      create: true

    serviceAccount:
      create: true
      # leave null so chart uses its generated name, or set to "alloy" if you prefer
      name: null

    service:
      enabled: true

    # ✅ This is where the chart expects the Alloy config
    alloy:
      listenPort: 12345
      enableHttpServerPort: true

      configMap:
        create: true
        # key: null  # leave default
        content: |-
          logging {
            level  = "info"
            format = "logfmt"
          }

          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Read pod logs via Kubernetes API and forward into the processing pipeline.
          // NOTE: Alloy config does NOT support '#' comments. Use '//' only.
          loki.source.kubernetes "pod_logs" {
            targets    = discovery.kubernetes.pods.targets
            forward_to = [loki.process.k8s.receiver]
          }

          // Add labels we can query in Loki/Grafana
          loki.process "k8s" {
            forward_to = [loki.write.default.receiver]

            stage.labels {
              values = {
                namespace = "namespace",
                pod       = "pod",
                container = "container",
                node      = "node",
              }
            }
          }

          // Push to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

      # Keep your host log mounts
      mounts:
        # Chart boolean mount of /var/log (optional; harmless to keep)
        varlog: true

        # Explicit mounts for Kubernetes log files on the node
        extra:
          - name: varlogpods
            mountPath: /var/log/pods
            readOnly: true
          - name: varlogcontainers
            mountPath: /var/log/containers
            readOnly: true

    # ✅ The chart expects extra volumes here (NOT extraVolumes)
    volumes:
      extra:
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers