apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: alloy
      interval: 1h

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controller:
      type: daemonset

    serviceAccount:
      create: true
      name: alloy

    service:
      enabled: true
      port: 12345

    # Keep your host log mounts
    mounts:
      varlog:
        enabled: true
        readOnly: true

    extraVolumes:
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers

      # NEW: our config dir (this will replace /etc/alloy)
      - name: alloy-config
        configMap:
          name: alloy-config
          items:
            - key: config.alloy
              path: config.alloy

    extraVolumeMounts:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlogcontainers
        mountPath: /var/log/containers
        readOnly: true

      # NEW: override the whole config directory
      - name: alloy-config
        mountPath: /etc/alloy
        readOnly: true