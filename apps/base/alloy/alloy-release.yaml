---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # Example chart version. If Flux complains, we’ll bump to what GHCR offers.
    tag: 0.8.1
  url: oci://ghcr.io/grafana/helm-charts/alloy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: alloy
    namespace: alloy

  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controller:
      type: daemonset

    serviceAccount:
      create: true
      name: alloy

    # Mount host logs (k3s/containerd style paths)
    mounts:
      varlog:
        enabled: true
        readOnly: true

    extraVolumes:
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers

    extraVolumeMounts:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true
      - name: varlogcontainers
        mountPath: /var/log/containers
        readOnly: true

    configMap:
      create: true
      content: |
        // Discover pods running on this node
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Read container logs from the node
        loki.source.kubernetes "pod_logs" {
          targets    = discovery.kubernetes.pods.targets
          forward_to = [loki.write.default.receiver]

          // Optional: drop very noisy namespaces if you want later
          // relabel_rules = loki.relabel.drop_noisy.rules
        }

        // Add/normalize labels
        loki.process "pipeline" {
          forward_to = [loki.write.default.receiver]

          stage.labels {
            values = {
              namespace = "namespace",
              pod       = "pod",
              container = "container",
              node      = "node",
            }
          }
        }

        // Write to Loki in-cluster
        loki.write "default" {
          endpoint {
            url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
          }
        }