apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app joplin
  namespace: joplin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      joplin-db:
        containers:
          app:
            image:
              repository: postgres
              tag: "16"
            env:
              # ✅ Put DB files in a subdir under the mount
              PGDATA: /var/lib/postgresql/data/pgdata

              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: joplin-secret, key: POSTGRES_PASSWORD }
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef: { name: joplin-secret, key: POSTGRES_USER }
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef: { name: joplin-secret, key: POSTGRES_DB }

      joplin:
        containers:
          app:
            image:
              repository: joplin/server
              tag: 3.6.1
            env:
              TZ: America/Los_Angeles
              APP_PORT: "22300"
              APP_BASE_URL: "https://joplin.lab.mainertoo.com"
              DB_CLIENT: "pg"
              # CNPG cutover 2026-05-08: joplin app now talks to the CNPG-managed
              # cluster (joplin-db) instead of the legacy joplin-joplin-db Deployment.
              # The legacy Deployment is intentionally left running for now (no traffic);
              # decommission in a follow-up PR after 24h soak.
              POSTGRES_HOST: "joplin-db-rw"
              POSTGRES_PORT: "5432"
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: joplin-db-app, key: password }
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef: { name: joplin-db-app, key: username }
              # CNPG bootstrap.initdb.database creates a DB literally named "joplin"
              # (matching the legacy DB name from joplin-secret/POSTGRES_DB).
              POSTGRES_DATABASE: "joplin"

    service:
      joplin-db:
        controller: joplin-db
        ports:
          postgres:
            port: 5432
      joplin:
        controller: joplin
        ports:
          http:
            port: 22300

    persistence:
      db:
        enabled: true
        # PVC is provisioned by components/volsync-v2 with name = ${APP}.
        # Renamed from joplin-db during the Phase 1c migration.
        existingClaim: joplin
        advancedMounts:
          joplin-db:
            app:
              # ✅ Mount one level up; PGDATA handles the subdir
              - path: /var/lib/postgresql/data