apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app joplin
  namespace: joplin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      joplin:
        containers:
          app:
            image:
              repository: joplin/server
              tag: 3.7.1
            env:
              TZ: America/Los_Angeles
              APP_PORT: "22300"
              APP_BASE_URL: "https://joplin.lab.mainertoo.com"
              DB_CLIENT: "pg"
              # Postgres is provided by the CNPG cluster joplin-db (see
              # apps/production/joplin/db-cnpg.yaml). The legacy
              # joplin-joplin-db Deployment, its PVC, and its volsync chain
              # were retired 2026-05-09 (Phase 2d).
              POSTGRES_HOST: "joplin-db-rw"
              POSTGRES_PORT: "5432"
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: joplin-db-app, key: password }
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef: { name: joplin-db-app, key: username }
              # CNPG bootstrap.initdb.database creates a DB literally named "joplin".
              POSTGRES_DATABASE: "joplin"

    service:
      joplin:
        controller: joplin
        ports:
          http:
            port: 22300