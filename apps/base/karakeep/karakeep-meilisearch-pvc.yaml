apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: karakeep-meilisearch
  namespace: karakeep
  # No backup labels: the Meilisearch index is fully reproducible from the
  # SQLite DB on /data (Karakeep can re-index from Admin → "Reindex all
  # bookmarks"), so it is not worth Kopia churn.
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 5Gi
