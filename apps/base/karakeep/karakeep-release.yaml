apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
  namespace: karakeep
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      # ── Web app (Next.js) — the only stateful, user-facing controller ──────
      web:
        strategy: Recreate # RWO /data PVC — avoid multi-attach on rollout
        containers:
          app:
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.32.0
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: DATA_DIR
                value: /data
              - name: NEXTAUTH_URL
                value: https://karakeep.lab.mainertoo.com
              - name: MEILI_ADDR
                value: http://karakeep-meilisearch:7700
              - name: BROWSER_WEB_URL
                value: http://karakeep-chrome:9222
              - name: DISABLE_NEW_RELEASE_CHECK
                value: "true"
              # ── Authentik native OIDC (login shows "Sign in with Authentik") ──
              - name: OAUTH_WELLKNOWN_URL
                value: https://authentik.lab.mainertoo.com/application/o/karakeep/.well-known/openid-configuration
              - name: OAUTH_PROVIDER_NAME
                value: Authentik
              - name: OAUTH_SCOPE
                value: openid email profile
              - name: OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING
                value: "true"
              # ── AI auto-tagging via the DGX Spark (Qwen, OpenAI-compatible) ──
              # Embeddings/semantic-search live on a separate Spark model+port;
              # Karakeep only supports one OpenAI base URL, so text auto-tagging
              # is wired here and embeddings are left off for now.
              - name: OPENAI_BASE_URL
                value: http://spark-llm.spark-egress.svc.cluster.local:8000/v1
              - name: INFERENCE_TEXT_MODEL
                value: nvidia/Qwen3.6-35B-A3B-NVFP4
              - name: INFERENCE_CONTEXT_LENGTH
                value: "32768"
            envFrom:
              # NEXTAUTH_SECRET, MEILI_MASTER_KEY, OAUTH_CLIENT_ID/SECRET,
              # OPENAI_API_KEY (dummy — vLLM ignores the value but needs presence)
              - secretRef:
                  name: karakeep-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5
              startup:
                enabled: false

      # ── Headless Chrome — stateless crawler/screenshotter ─────────────────
      chrome:
        containers:
          app:
            image:
              repository: gcr.io/zenika-hub/alpine-chrome
              tag: "124"
            args:
              - --no-sandbox
              - --disable-gpu
              - --disable-dev-shm-usage
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --hide-scrollbars
              - --disable-blink-features=AutomationControlled
              - --window-size=1440,900
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: false }

      # ── Meilisearch — full-text index (reproducible from the DB; no backup) ─
      meilisearch:
        strategy: Recreate # RWO /meili_data PVC
        containers:
          app:
            image:
              repository: getmeili/meilisearch
              tag: v1.49.0
            env:
              - name: MEILI_NO_ANALYTICS
                value: "true"
              - name: MEILI_ENV
                value: production
              - name: MEILI_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    name: karakeep-secret
                    key: MEILI_MASTER_KEY
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: false }

    service:
      # Web service → Service resource "karakeep-app" (multi-service bjw-s names
      # each Service <release>-<key>). The IngressRoute targets karakeep-app.
      app:
        controller: web
        ports:
          http:
            port: 3000
      chrome:
        controller: chrome
        ports:
          http:
            port: 9222
      meilisearch:
        controller: meilisearch
        ports:
          http:
            port: 7700

    persistence:
      data:
        existingClaim: karakeep-data
        advancedMounts:
          web:
            app:
              - path: /data
      meili-data:
        existingClaim: karakeep-meilisearch
        advancedMounts:
          meilisearch:
            app:
              - path: /meili_data
