apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyseerr
  namespace: jellyseerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      jellyseerr:
        containers:
          app:
            image:
              repository: docker.io/fallenbagel/jellyseerr
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PORT
                value: &port 80

        # Init container for CephFS permissions on /app/config
        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /app/config..."
                ls -ld /app/config || true
                chown -R 1000:1000 /app/config || true
                chmod -R 0775 /app/config || true
                echo "After:"
                ls -ld /app/config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    # Match Plex/Jellyfin pod security defaults
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: jellyseerr
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          jellyseerr:
            app:
              - path: /app/config
            fix-config-perms:
              - path: /app/config

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp