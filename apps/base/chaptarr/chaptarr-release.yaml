apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app chaptarr
  namespace: chaptarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      chaptarr:
        type: deployment
        replicas: 1
        containers:
          app:
            # Community-maintained image — Chaptarr is a Readarr fork that handles
            # audiobooks + ebooks in one instance. No official/GitHub image yet,
            # only this Docker Hub build, and only a `latest` tag is published
            # (nothing to pin — Renovate has no version stream to track here).
            image:
              repository: robertlordhood/chaptarr
              tag: "latest@sha256:4b79c55b61044ddc1c3bfa7812c559e7a76dc986d9fade45db3271d31881dc6f"
            env:
              TZ: "America/Los_Angeles"
              # Servarr defaults: PUID/PGID drive file ownership on /config.
              PUID: "1000"
              PGID: "1000"
            # Servarr exposes /ping, but on first boot the app generates its DB +
            # config which can take a bit; probes left off for the staging eval to
            # avoid masking a real crash loop. Tighten to a /ping HTTP probe on
            # 8787 once it's confirmed booting cleanly.
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      app:
        enabled: true
        controller: chaptarr
        ports:
          http:
            # Chaptarr listens on 8789 (the fork bumped off Readarr's 8787 —
            # confirmed via the container's "Now listening on: http://[::]:8789").
            port: 8789

    persistence:
      config:
        existingClaim: chaptarr
        globalMounts:
          - path: /config
      # Throwaway eval library on the isolated staging-rbd pool (chaptarr-media
      # PVC). Holds COPIES of the audiobook (ABS/QNAS) + ebook (CWA/calibre)
      # libraries — Chaptarr only ever touches copies, never the originals. In
      # the Chaptarr UI, add root folders pointing at /media/audiobooks and
      # /media/ebooks. No downloads volume — eval is import/metadata only.
      media:
        existingClaim: chaptarr-media
        globalMounts:
          - path: /media

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1Gi
