apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 30m
  releaseName: minecraft

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      bedrock:
        strategy: Recreate
        containers:
          main:
            image:
              repository: itzg/minecraft-bedrock-server
              tag: latest
            env:
              EULA: "TRUE"
              VERSION: "LATEST"
              TZ: "America/Los_Angeles"
              PACKAGE_BACKUP_KEEP: "2"
              ENABLE_SSH: "true"
              UID: "1000"
              GID: "1000"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              runAsUser: 1000
              runAsGroup: 1000
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

      landing:
        strategy: Recreate
        containers:
          main:
            image:
              repository: nginx
              tag: alpine
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              # Run as root so nginx can create /var/cache/nginx/*
              runAsUser: 0
              runAsGroup: 0
              # Optional hardening (works fine with nginx):
              readOnlyRootFilesystem: false

    service:
      bedrock:
        controller: bedrock
        type: LoadBalancer
        ports:
          bedrock:
            port: 19132
            targetPort: 19132
            protocol: UDP
          ssh:
            port: 2222
            targetPort: 2222
            protocol: TCP

      landing:
        controller: landing
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

    persistence:
      bedrock-data:
        enabled: true
        existingClaim: minecraft-bedrock-data
        advancedMounts:
          bedrock:
            main:
              - path: /data

      landing-html:
        enabled: true
        type: configMap
        name: minecraft-landing
        advancedMounts:
          landing:
            main:
              - path: /usr/share/nginx/html/index.html
                subPath: index.html
                readOnly: true