apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 5m
  releaseName: vaultwarden

  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: 1.34.3
              pullPolicy: IfNotPresent

            # Non-secret env vars
            env:
              - name: DOMAIN
                value: "https://vaultwarden.lab.mainertoo.com"
              - name: SIGNUPS_ALLOWED
                value: "false"

              # SSO / OIDC
              - name: SSO_ENABLED
                value: "true"

              # IMPORTANT (per vaultwarden): should be base URL, no trailing slash
              # Authentik often looks like:
              #   https://authentik.company/application/o/<application_slug>
              - name: SSO_AUTHORITY
                value: "https://authentik.lab.mainertoo.com/application/o/vaultwarden"

              - name: SSO_SCOPES
                value: "openid email profile offline_access"
              - name: SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION
                value: "false"
              - name: SSO_CLIENT_CACHE_EXPIRATION
                value: "0"
              - name: SSO_ONLY
                value: "false"
              - name: SSO_SIGNUPS_MATCH_EMAIL
                value: "true"

            # Secret env vars (SSO_CLIENT_ID / SSO_CLIENT_SECRET)
            envFrom:
              - secretRef:
                  name: vaultwarden-sso-secret

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        existingClaim: vaultwarden-data