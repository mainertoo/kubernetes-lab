apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 5m
  releaseName: vaultwarden
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: 1.32.0
              pullPolicy: IfNotPresent
            env:
              - name: DOMAIN
                value: "https://vaultwarden.lab.mainertoo.com"
              - name: SIGNUPS_ALLOWED
                value: "false"

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        # use the PVC that is already Bound:
        existingClaim: vaultwarden-data
