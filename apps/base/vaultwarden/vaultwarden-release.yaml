apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 5m
  releaseName: vaultwarden
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: testing
              pullPolicy: IfNotPresent

            env:
              - name: DOMAIN
                value: "https://vaultwarden.lab.mainertoo.com"
              - name: SIGNUPS_ALLOWED
                value: "false"

              - name: SSO_ENABLED
                value: "true"

              # NOTE: your comment says "no trailing slash" but your value HAS one.
              # I'd remove it to match the comment and avoid odd redirect/callback issues:
              - name: SSO_AUTHORITY
                value: "https://authentik.lab.mainertoo.com/application/o/vaultwarden/"

              - name: SSO_SCOPES
                value: "openid email profile offline_access"
              - name: SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION
                value: "false"
              - name: SSO_CLIENT_CACHE_EXPIRATION
                value: "0"
              - name: SSO_ONLY
                value: "false"
              - name: SSO_SIGNUPS_MATCH_EMAIL
                value: "true"

            envFrom:
              - secretRef:
                  name: vaultwarden-sso-secret
              - secretRef:
                  name: vaultwarden-admin-secret