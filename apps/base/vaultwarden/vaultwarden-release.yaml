apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 5m
  releaseName: vaultwarden

  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false


  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: 1.36.0
              pullPolicy: IfNotPresent

            env:
              - name: DOMAIN
                value: "https://vaultwarden.lab.mainertoo.com"
              - name: SIGNUPS_ALLOWED
                value: "false"

              # SSO / OIDC
              - name: SSO_ENABLED
                value: "true"
              - name: SSO_AUTHORITY
                value: "https://authentik.lab.mainertoo.com/application/o/vaultwarden/"
              - name: SSO_SCOPES
                value: "openid email profile offline_access"
              - name: SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION
                value: "false"
              - name: SSO_CLIENT_CACHE_EXPIRATION
                value: "0"
              - name: SSO_ONLY
                value: "false"
              - name: SSO_SIGNUPS_MATCH_EMAIL
                value: "true"

            envFrom:
              - secretRef:
                  name: vaultwarden-sso-secret
              - secretRef:
                  name: vaultwarden-admin-secret

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        # VolSync (production) will create a PVC named exactly "vaultwarden"
        existingClaim: vaultwarden