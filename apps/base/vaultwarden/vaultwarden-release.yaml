apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    image:
      repository: vaultwarden/server
      tag: 1.32.0
      pullPolicy: IfNotPresent

    env:
      - name: DOMAIN
        value: "https://vaultwarden.lab.mainertoo.com"
      - name: SIGNUPS_ALLOWED
        value: "false"

    service:
      main:
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        type: pvc
        existingClaim: vaultwarden-data