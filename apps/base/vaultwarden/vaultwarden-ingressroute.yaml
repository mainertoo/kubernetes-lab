apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: vaultwarden
  annotations:
    gethomepage.dev/href: "https://vaultwarden.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Vaultwarden"
    gethomepage.dev/description: "Bitwarden-compatible password manager (SSO via Authentik)"
    gethomepage.dev/app: vaultwarden
    gethomepage.dev/group: "Security & Network"
    gethomepage.dev/icon: "sh-bitwarden.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`vaultwarden.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
  tls: {}