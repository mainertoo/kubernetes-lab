apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-default-config
  namespace: homepage
data:
  bookmarks.yaml: |
    - Developer:
        - kubernetes-lab (GitHub):
            - abbr: KLAB
              href: https://github.com/mainertoo/kubernetes-lab
        - Hephaestus (upstream):
            - abbr: HEPH
              href: https://github.com/willnotcy/Hephaestus
        - Kubesearch:
            - abbr: KS
              href: https://kubesearch.dev/
        - Selfh.st icons:
            - abbr: ICONS
              href: https://selfh.st/icons/

  docker.yaml: |
    {}

  kubernetes.yaml: |
    mode: cluster
    traefik: true

  services.yaml: |
    - Infrastructure:
        - pve-whistler:
            href: https://pve-whistler.lab.mainertoo.com:8006
            description: Proxmox (whistler)
            icon: sh-proxmox.svg
        - pve-s13:
            href: https://pve-s13.lab.mainertoo.com:8006
            description: Proxmox (s13)
            icon: sh-proxmox.svg
        - pve-s12:
            href: https://pve-s12.lab.mainertoo.com:8006
            description: Proxmox (s12)
            icon: sh-proxmox.svg
        - pve-ugreen:
            href: https://pve-ugreen.lab.mainertoo.com:8006
            description: Proxmox (ugreen)
            icon: sh-proxmox.svg
        - pve-mac:
            href: https://pve-mac.lab.mainertoo.com:8006
            description: Proxmox (mac)
            icon: sh-proxmox.svg
        - pve-zermatt:
            href: https://pve-zermatt.lab.mainertoo.com:8006
            description: Proxmox (zermatt)
            icon: sh-proxmox.svg
        - pve-mammoth:
            href: https://pve-mammoth.lab.mainertoo.com:8006
            description: Proxmox (mammoth)
            icon: sh-proxmox.svg
        - pbs:
            href: https://pbs.lab.mainertoo.com:8007
            description: Proxmox Backup Server
            icon: sh-proxmox-backup-server.svg

  settings.yaml: |
    title: "mainertoo lab"
    theme: dark
    layout:
      Infrastructure:     { style: row, columns: 4 }
      Monitoring:         { style: row, columns: 5 }
      Media:              { style: row, columns: 5 }
      DUMB-Media:         { style: row, columns: 5 }
      Automation:         { style: row, columns: 4 }
      AI:                 { style: row, columns: 3 }
      Apps:               { style: row, columns: 5 }
      Security & Network: { style: row, columns: 3 }

  widgets.yaml: |
    - search:
        provider: [google]
        focus: false
        target: _blank
    - greeting:
        text_size: xl
        text: "Hey Darcy 👋"
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "k3s"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true