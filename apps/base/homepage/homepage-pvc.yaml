apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homepage
  labels:
    # Phase 5b of the volsync label-driven restore project. The label
    # is consumed by ClusterPolicy `volsync-pvc-backup-restore` which
    # generates `volsync-homepage` Secret + `homepage-backup` RS + RD
    # in this namespace. Was previously a kubectl-patched out-of-band
    # label (PR #353 patch attempt didn't survive Flux's pre-postBuild
    # patch timing) — now baked into the static manifest.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteMany
  # dataSourceRef is immutable post-bind. The live PVC has a stale
  # `homepage-bootstrap` ref left over from the original volsync-v2/
  # bootstrap variant's one-time populator (the bootstrap RD itself
  # is long gone). The field can't be removed, so we mirror it here
  # to keep Flux's dry-run happy. On a fresh cluster rebuild,
  # Kyverno's mutate rule will replace this with `homepage-backup`
  # at admission time before the PVC binds.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: homepage-bootstrap
  resources:
    requests:
      storage: 2Gi
  storageClassName: cephfs
