apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app homepage
  namespace: homepage
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      homepage:
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.8.0
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: HOMEPAGE_ALLOWED_HOSTS
                value: homepage.lab.mainertoo.com,portal.mainertoo.com

        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                echo "Bootstrapping /app/config (only missing files)..."
                mkdir -p /app/config
                for f in bookmarks.yaml docker.yaml kubernetes.yaml services.yaml settings.yaml widgets.yaml; do
                  if [ ! -s "/app/config/$f" ]; then
                    echo "  -> seeding $f"
                    cp "/defaults/$f" "/app/config/$f"
                  else
                    echo "  -> keeping existing $f"
                  fi
                done

                echo "Fixing perms..."
                chown -R 1000:1000 /app/config || true
                chmod -R 0775 /app/config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000

    persistence:
      config:
        existingClaim: homepage-config
        advancedMounts:
          homepage:
            app:
              - path: /app/config
            init-config:
              - path: /app/config

      defaults:
        type: configMap
        name: homepage-default-config
        advancedMounts:
          homepage:
            init-config:
              - path: /defaults
                readOnly: true

    serviceAccount:
      create: true
      name: *app