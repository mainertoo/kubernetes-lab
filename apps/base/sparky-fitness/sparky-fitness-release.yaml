apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sparky-fitness
  namespace: sparky-fitness
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      sparky-fitness:
        strategy: Recreate

        initContainers:
          wait-for-db:
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                DB_FQDN="sparky-fitness-db.sparky-fitness.svc.cluster.local"

                until nslookup "${DB_FQDN}" >/dev/null 2>&1; do
                  echo "waiting for DNS: ${DB_FQDN}"
                  sleep 2
                done

                until nc -z -w 2 "${DB_FQDN}" 5432; do
                  echo "waiting for postgres: ${DB_FQDN}:5432"
                  sleep 2
                done

                echo "db is reachable"

          init-media-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init SparkyFitness media dirs..."
                mkdir -p /media/uploads /media/backup
                chown -R 1000:1000 /media || true
                chmod -R 0775 /media || true
                ls -la /media || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          server:
            image:
              repository: codewithcj/sparkyfitness_server
              tag: latest
            env:
              TZ: America/Los_Angeles
              NODE_ENV: production
              SPARKY_FITNESS_LOG_LEVEL: ERROR

              # ✅ MUST match your actual Service name
              SPARKY_FITNESS_DB_HOST: sparky-fitness-db.sparky-fitness.svc.cluster.local
              SPARKY_FITNESS_DB_PORT: "5432"

              SPARKY_FITNESS_FRONTEND_URL: "https://sparky-fitness.lab.mainertoo.com"

              SPARKY_FITNESS_DISABLE_SIGNUP: "false"
              SPARKY_FITNESS_FORCE_EMAIL_LOGIN: "true"

            envFrom:
              - secretRef:
                  name: sparky-fitness-secret

            ports:
              - name: http
                containerPort: 3010
                protocol: TCP

          app:
            image:
              repository: codewithcj/sparkyfitness
              tag: latest
            env:
              SPARKY_FITNESS_SERVER_HOST: "127.0.0.1"
              SPARKY_FITNESS_SERVER_PORT: "3010"
            ports:
              - name: web
                containerPort: 3000
                protocol: TCP

          health:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-lc"]
            args:
              - |
                set -e
                mkdir -p /www
                echo "ok" >/www/index.html
                exec httpd -f -p 8080 -h /www
            ports:
              - name: health
                containerPort: 8080
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      sparky-fitness-db:
        strategy: Recreate

        initContainers:
          init-pgdata-dir:
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux
                mkdir -p /var/lib/postgresql/data/pgdata
                chown -R 999:999 /var/lib/postgresql/data/pgdata || true
                chmod 0700 /var/lib/postgresql/data/pgdata || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          db:
            image:
              repository: postgres
              tag: 15-alpine
            env:
              PGDATA: /var/lib/postgresql/data/pgdata
            envFrom:
              - secretRef:
                  name: sparky-fitness-secret

    service:
      sparky-fitness:
        controller: sparky-fitness
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 8080

      # ✅ Explicitly name the DB service exactly "sparky-fitness-db"
      sparky-fitness-db:
        controller: sparky-fitness-db
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

    persistence:
      data:
        enabled: true
        existingClaim: sparky-fitness
        advancedMounts:
          sparky-fitness-db:
            init-pgdata-dir:
              - path: /var/lib/postgresql/data
            db:
              - path: /var/lib/postgresql/data

      media:
        enabled: true
        existingClaim: sparky-fitness-media
        advancedMounts:
          sparky-fitness:
            init-media-perms:
              - path: /media
            server:
              - path: /media

    defaultPodOptions:
      automountServiceAccountToken: false