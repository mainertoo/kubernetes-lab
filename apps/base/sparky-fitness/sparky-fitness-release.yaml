apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparky-fitness
  namespace: sparky-fitness
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      sparky-fitness:
        strategy: Recreate

        initContainers:
          # NOTE:
          # Do NOT use shell variables here. app-template templating can blank them.
          # Hardcode the DB service FQDN directly (Tracearr pattern).
          wait-for-db:
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                until nslookup sparky-fitness-sparky-fitness-db.sparky-fitness.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: sparky-fitness-sparky-fitness-db.sparky-fitness.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 sparky-fitness-sparky-fitness-db.sparky-fitness.svc.cluster.local 5432; do
                  echo "waiting for postgres: sparky-fitness-sparky-fitness-db.sparky-fitness.svc.cluster.local:5432"
                  sleep 2
                done

                echo "db is reachable"

          init-media-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init SparkyFitness media dirs..."
                mkdir -p /media/uploads /media/backup
                chown -R 1000:1000 /media || true
                chmod -R 0775 /media || true
                ls -la /media || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          server:
            image:
              repository: codewithcj/sparkyfitness_server
              tag: latest
            env:
              TZ: America/Los_Angeles
              NODE_ENV: production
              SPARKY_FITNESS_LOG_LEVEL: ERROR

              # IMPORTANT:
              # Use the *actual* Service name currently present in your cluster:
              # sparky-fitness-sparky-fitness-db
              SPARKY_FITNESS_DB_HOST: sparky-fitness-sparky-fitness-db.sparky-fitness.svc.cluster.local
              SPARKY_FITNESS_DB_PORT: "5432"

              SPARKY_FITNESS_FRONTEND_URL: "https://sparky-fitness.lab.mainertoo.com"
              SPARKY_FITNESS_DISABLE_SIGNUP: "false"
              SPARKY_FITNESS_FORCE_EMAIL_LOGIN: "true"

            envFrom:
              - secretRef:
                  name: sparky-fitness-secret

            ports:
              - name: http
                containerPort: 3010
                protocol: TCP

          app:
            image:
              repository: codewithcj/sparkyfitness
              tag: latest
            env:
              SPARKY_FITNESS_SERVER_HOST: "127.0.0.1"
              SPARKY_FITNESS_SERVER_PORT: "3010"
            ports:
              - name: web
                containerPort: 3000
                protocol: TCP

          # Health sidecar listens on 8080, Service maps port 80 -> 8080 for Gatus.
          health:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-lc"]
            args:
              - |
                set -e
                mkdir -p /www
                echo "ok" >/www/index.html
                exec httpd -f -p 8080 -h /www
            ports:
              - name: health
                containerPort: 8080
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      sparky-fitness-db:
        strategy: Recreate

        initContainers:
          # Fix the "lost+found" mountpoint issue by using PGDATA under a subdir,
          # and set ownership to Postgres uid/gid (999 in the official image).
          init-pgdata-dir:
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux
                mkdir -p /var/lib/postgresql/data/pgdata
                chown -R 999:999 /var/lib/postgresql/data/pgdata || true
                chmod 0700 /var/lib/postgresql/data/pgdata || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          db:
            image:
              repository: postgres
              tag: 15-alpine
            env:
              PGDATA: /var/lib/postgresql/data/pgdata

              # REQUIRED by postgres image when initializing:
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: sparky-fitness-secret
                    key: SPARKY_FITNESS_DB_NAME
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: sparky-fitness-secret
                    key: SPARKY_FITNESS_DB_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sparky-fitness-secret
                    key: SPARKY_FITNESS_DB_PASSWORD

            # optional: keep envFrom if you want other vars available in the db container
            envFrom:
              - secretRef:
                  name: sparky-fitness-secret

    service:
      sparky-fitness:
        controller: sparky-fitness
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 8080

      # NOTE:
      # Your cluster currently shows the DB Service as "sparky-fitness-sparky-fitness-db".
      # This service block may not override the generated name the way you expect with your chart version.
      # We keep it here, but we ALSO hardcode the observed Service name in the app initContainer + env.
      sparky-fitness-db:
        controller: sparky-fitness-db
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

    persistence:
      # Postgres data (RBD / RWO)
      data:
        enabled: true
        existingClaim: sparky-fitness
        advancedMounts:
          sparky-fitness-db:
            init-pgdata-dir:
              - path: /var/lib/postgresql/data
            db:
              - path: /var/lib/postgresql/data

      # App media (CephFS / RWX)
      media:
        enabled: true
        existingClaim: sparky-fitness-media
        advancedMounts:
          sparky-fitness:
            init-media-perms:
              - path: /media
            server:
              - path: /media

    defaultPodOptions:
      automountServiceAccountToken: false