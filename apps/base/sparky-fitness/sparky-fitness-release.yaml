apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparky-fitness
  namespace: sparky-fitness
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      sparky-fitness:
        strategy: Recreate

        initContainers:
          init-media-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init SparkyFitness media dirs..."
                mkdir -p /media/uploads /media/backup
                chown -R 1000:1000 /media || true
                chmod -R 0775 /media || true
                ls -la /media || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

          wait-for-db:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                # CNPG cutover 2026-05-09 (Phase 3f-cutover): wait on the
                # CNPG-managed sparky-fitness-cnpg-db-rw service.
                until nslookup sparky-fitness-cnpg-db-rw.sparky-fitness.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: sparky-fitness-cnpg-db-rw.sparky-fitness.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 sparky-fitness-cnpg-db-rw.sparky-fitness.svc.cluster.local 5432; do
                  echo "waiting for postgres: sparky-fitness-cnpg-db-rw.sparky-fitness.svc.cluster.local:5432"
                  sleep 2
                done

                echo "db is reachable"

        containers:
          server:
            image:
              repository: codewithcj/sparkyfitness_server
              tag: v0.16.6.2
              pullPolicy: Always
            # CNPG cutover 2026-05-09 (Phase 3f-cutover): SPARKY_FITNESS_DB_HOST
            # now points at the CNPG-managed cluster's read-write Service.
            # SPARKY_FITNESS_DB_PASSWORD is overridden via valueFrom to the
            # CNPG auto-generated Secret (env wins over envFrom). The
            # SPARKY_FITNESS_APP_DB_USER / APP_DB_PASSWORD pair stay from
            # envFrom — the sparky_app role + password were recreated on the
            # CNPG cluster as part of the migration (the legacy password is
            # used so envFrom values still work).
            env:
              TZ: America/Los_Angeles
              NODE_ENV: production
              SPARKY_FITNESS_LOG_LEVEL: ERROR

              SPARKY_FITNESS_DB_HOST: sparky-fitness-cnpg-db-rw
              SPARKY_FITNESS_DB_PORT: "5432"

              SPARKY_FITNESS_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sparky-fitness-cnpg-db-app
                    key: password

              SPARKY_FITNESS_FRONTEND_URL: "https://sparky-fitness.lab.mainertoo.com"
              SPARKY_FITNESS_DISABLE_SIGNUP: "false"
              SPARKY_FITNESS_FORCE_EMAIL_LOGIN: "true"
            envFrom:
              - secretRef:
                  name: sparky-fitness-secret
            ports:
              - name: api
                containerPort: 3010
                protocol: TCP

          app:
            image:
              repository: codewithcj/sparkyfitness
              tag: v0.16.6.3
              pullPolicy: Always
            env:
              SPARKY_FITNESS_SERVER_HOST: "127.0.0.1"
              SPARKY_FITNESS_SERVER_PORT: "3010"
            # IMPORTANT:
            # This image runs nginx on port 80 (NOT 3000). Your exec proved it.
            ports:
              - name: http
                containerPort: 80
                protocol: TCP

          health:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-lc"]
            args:
              - |
                set -e
                mkdir -p /www
                echo "ok" >/www/index.html
                exec httpd -f -p 8080 -h /www
            ports:
              - name: health
                containerPort: 8080
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      # Legacy `sparky-fitness-db` controller (postgres:15-alpine) removed
      # in Phase 5d (CNPG migration cleanup 2026-05-09). App now connects
      # to sparky-fitness-cnpg-db-rw via the env override on the `server`
      # container above.

    service:
      # This is what Traefik points to (port 80)
      sparky-fitness:
        controller: sparky-fitness
        type: ClusterIP
        ports:
          http:
            port: 80
            # nginx in the frontend container listens on 80
            targetPort: 80

      # `sparky-fitness-db` Service removed in Phase 5d. App connects to
      # sparky-fitness-cnpg-db-rw (CNPG-managed cluster).

    persistence:
      # `data` (mounted to the legacy sparky-fitness-db controller, claim
      # name `sparky-fitness`, 20 GiB) removed in Phase 5d. The PVC is also
      # pruned via removal of apps/production/sparky-fitness/db.yaml below.

      media:
        enabled: true
        existingClaim: sparky-fitness-media
        advancedMounts:
          sparky-fitness:
            init-media-perms:
              - path: /media
            server:
              - path: /media

    defaultPodOptions:
      automountServiceAccountToken: false