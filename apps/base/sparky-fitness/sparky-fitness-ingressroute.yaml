apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sparky-fitness-ingressroute
  namespace: sparky-fitness
  annotations:
    gethomepage.dev/href: "https://sparky-fitness.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "SparkyFitness"
    gethomepage.dev/description: "Self-hosted fitness tracking"
    gethomepage.dev/app: sparky-fitness
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "mdi-heart-pulse"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`sparky-fitness.lab.mainertoo.com`)
      kind: Rule
      # middlewares:
      #   - name: authentik-sso
      #     namespace: traefik-system
      services:
        - name: sparky-fitness
          port: 80
          scheme: http
  tls: {}