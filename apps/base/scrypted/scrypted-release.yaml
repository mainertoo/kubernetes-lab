apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrypted
  namespace: scrypted
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      scrypted:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/koush/scrypted
              tag: latest
            env:
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: scrypted-secret

            # Scrypted often needs broad access when using host sockets + discovery.
            securityContext:
              privileged: true

            ports:
              https:
                containerPort: 10443
              http:
                containerPort: 10444

    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        controller: scrypted
        ports:
          https:
            port: 10443
            targetPort: 10443
          http:
            port: 10444
            targetPort: 10444

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /server/volume

      # host sockets (same as your compose)
      dbus:
        enabled: true
        type: hostPath
        hostPath: /var/run/dbus
        globalMounts:
          - path: /var/run/dbus
            readOnly: false

      avahi:
        enabled: true
        type: hostPath
        hostPath: /var/run/avahi-daemon/socket
        globalMounts:
          - path: /var/run/avahi-daemon/socket
            readOnly: false

      # GPU (Intel QSV etc.)
      dri:
        enabled: true
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
            readOnly: false