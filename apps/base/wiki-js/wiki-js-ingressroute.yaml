apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wiki-js-ingressroute
  namespace: wiki-js
  annotations:
    gethomepage.dev/href: "https://wiki.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Wiki.js"
    gethomepage.dev/description: "Personal knowledge base"
    gethomepage.dev/app: wiki-js
    gethomepage.dev/group: "Utilities"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/wiki.js.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`wiki.lab.mainertoo.com`)
      kind: Rule
      # middlewares:
      #   - name: authentik-sso
      #     namespace: traefik-system
      services:
        - name: wiki-js-main
          port: 3000