apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wiki-js-ingressroute
  namespace: wiki-js
  annotations:
    gethomepage.dev/href: "https://wiki.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Wiki.js"
    gethomepage.dev/description: "Personal knowledge base"
    gethomepage.dev/app: wiki-js
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-wiki-js.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`wiki.lab.mainertoo.com`)
      kind: Rule
      # middlewares:
      #   - name: authentik-sso
      #     namespace: traefik-system
      services:
        # Service was renamed wiki-js-main → wiki-js when the legacy `db`
        # sidecar was removed from the HelmRelease in PR #306 (Phase 5b).
        # bjw-s app-template renders <release-name>-<service-key> when the
        # release has multiple services, but collapses to <release-name>
        # when only one service remains. Updating to the post-decom name.
        - name: wiki-js
          port: 3000