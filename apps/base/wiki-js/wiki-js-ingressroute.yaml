apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wiki-js-ingressroute
  namespace: wiki-js
  annotations:
    gethomepage.dev/href: "https://wiki.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Wiki JS"
    gethomepage.dev/description: "Self-hosted wiki platform"
    gethomepage.dev/app: wiki-js
    gethomepage.dev/group: "Utilities"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/bookstack.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`wiki.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: wiki-js
          port: 3000
      # If you later want Authentik forward-auth:
      # middlewares:
      #   - name: tinyauth
      #     namespace: tinyauth