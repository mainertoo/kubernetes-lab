apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wiki-js
  namespace: wiki-js
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        replicas: 1
        containers:
          # 1) Wiki.js application container
          app:
            image:
              repository: ghcr.io/requarks/wiki
              tag: "2"
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: wiki-js-secret

            env:
              TZ: America/Los_Angeles
              PORT: "3000"

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

          # 2) Postgres DB sidecar
          db:
            image:
              repository: postgres
              tag: "15-alpine"
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: wiki-js-secret

            env:
              # Postgres official env variable names
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_DB
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_PASSWORD
              # Use a subdirectory so Ceph RBD's lost+found doesn't break initdb
              PGDATA: /var/lib/postgresql/data/pgdata

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - |
                        pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - |
                        pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5

    # 🔑 Important change: no runAsNonRoot here anymore.
    # We let each image run as whatever user it defines (node / root).
    defaultPodOptions:
      securityContext:
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 3000

      db:
        enabled: true
        controller: main
        ports:
          postgres:
            enabled: true
            port: 5432

    persistence:
      # Persist Postgres data only. Do NOT mount anything at /wiki.
      db-data:
        enabled: true
        existingClaim: wiki-js-postgres
        globalMounts:
          - path: /var/lib/postgresql/data
            subPath: pgdata