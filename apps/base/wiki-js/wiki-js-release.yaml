apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wiki-js
  namespace: wiki-js
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        replicas: 1

        # Init container for CephFS perms on /wiki/config + /wiki/data
        initContainers:
          chown-wiki-data:
            image:
              repository: busybox
              tag: "1.37.0"
            command:
              - sh
              - -c
              - |
                mkdir -p /wiki/config /wiki/data
                chown -R 1000:1000 /wiki/config /wiki/data || true
                chmod -R g+rwX /wiki/config /wiki/data || true

        containers:
          # 1) Wiki.js app
          app:
            image:
              repository: ghcr.io/requarks/wiki
              tag: "2.5.308"
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: wiki-js-secret

            env:
              TZ: America/Los_Angeles
              PORT: "3000"

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

          # 2) Postgres DB sidecar
          db:
            image:
              repository: postgres
              tag: "15-alpine"
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: wiki-js-secret

            env:
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_DB
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-secret
                    key: POSTGRES_PASSWORD
              # # keep the PGDATA subdir trick for Ceph RBD
              # PGDATA: /var/lib/postgresql/data/pgdata

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - |
                        pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - |
                        pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5

    defaultPodOptions:
      securityContext:
        # simple, no runAsNonRoot — we let images use their own UIDs
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 3000

      db:
        enabled: true
        controller: main
        ports:
          postgres:
            enabled: true
            port: 5432

    persistence:
      # Postgres data on Ceph RBD
      db-data:
        enabled: true
        existingClaim: wiki-js-postgres
        globalMounts:
          - path: /var/lib/postgresql/data
            subPath: pgdata

      # CephFS for config + data
      wiki-data:
        enabled: true
        existingClaim: wiki-js-data
        advancedMounts:
          main:
            app:
              - path: /wiki/config
                subPath: config
              - path: /wiki/data
                subPath: data
            chown-wiki-data:
              - path: /wiki/config
                subPath: config
              - path: /wiki/data
                subPath: data