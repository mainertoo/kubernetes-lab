apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wiki-js
  namespace: wiki-js
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        replicas: 1

        # Init container for CephFS perms on /wiki/config + /wiki/data
        initContainers:
          chown-wiki-data:
            image:
              repository: busybox
              tag: "1.38.0"
            command:
              - sh
              - -c
              - |
                mkdir -p /wiki/config /wiki/data
                chown -R 1000:1000 /wiki/config /wiki/data || true
                chmod -R g+rwX /wiki/config /wiki/data || true
                # The blanket g+rwX above loosens the git-storage SSH key to
                # 0660 — openssh then refuses it ("UNPROTECTED PRIVATE KEY
                # FILE") and the mainertoo/wiki git mirror silently stops
                # syncing (broken 2026-06-15 → 2026-07-14, found via the
                # Hermes second-brain wiki mirror going stale). Same failure
                # class as the Hermes doctor SSH key (PR #763). Re-tighten
                # key material AFTER the blanket chmod, every start.
                [ -d /wiki/data/secure ] && chmod 700 /wiki/data/secure || true
                [ -f /wiki/data/secure/git-ssh.pem ] && chmod 600 /wiki/data/secure/git-ssh.pem || true

        containers:
          # 1) Wiki.js app
          app:
            image:
              repository: ghcr.io/requarks/wiki
              tag: "2.5.314"
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: wiki-js-secret

            # CNPG cutover 2026-05-09 (Phase 3g-cutover): override DB_HOST
            # (was localhost from wiki-js-secret) and DB_PASS (was the
            # legacy literal in the secret) to point at the CNPG-managed
            # wiki-js-cnpg-db. env wins over envFrom so the wiki-js-secret
            # values for DB_HOST and DB_PASS no longer matter at runtime.
            env:
              TZ: America/Los_Angeles
              PORT: "3000"

              DB_HOST: wiki-js-cnpg-db-rw
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: wiki-js-cnpg-db-app
                    key: password

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

          # Legacy postgres `db` sidecar removed in Phase 5b (CNPG migration
          # cleanup). App now connects to wiki-js-cnpg-db-rw via the env
          # override on the `app` container above.

    defaultPodOptions:
      securityContext:
        # simple, no runAsNonRoot — we let images use their own UIDs
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 3000

      # `db` Service (5432 → in-pod sidecar) removed in Phase 5b. Migration
      # tooling and the app both go through wiki-js-cnpg-db-rw now.

    persistence:
      # `db-data` (mounted to the legacy `db` sidecar at /var/lib/postgresql/data)
      # removed in Phase 5b. The wiki-js-db PVC itself is also pruned via
      # removal of apps/production/wiki-js/db.yaml below — reclaims 10 GiB.

      # CephFS for config + data
      wiki-data:
        enabled: true
        existingClaim: wiki-js-data
        advancedMounts:
          main:
            app:
              - path: /wiki/config
                subPath: config
              - path: /wiki/data
                subPath: data
            chown-wiki-data:
              - path: /wiki/config
                subPath: config
              - path: /wiki/data
                subPath: data