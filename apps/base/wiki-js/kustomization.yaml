apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wiki-js
resources:
  - wiki-js-namespace.yaml
  # PVCs owned by volsync-v2 (bootstrap on first deploy, plain after settle).
  # wiki-js-data managed by wiki-js-data kustomization (cephfs 20Gi)
  # wiki-js-db   managed by wiki-js-db   kustomization (ceph-rbd 10Gi, was wiki-js-postgres)
  # - wiki-js-postgres-pvc.yaml
  # - wiki-js-data-pvc.yaml
  - wiki-js-secret.sops.yaml
  - wiki-js-release.yaml
  - wiki-js-ingressroute.yaml
  # NOTE: the docs-publisher CronJob was retired 2026-06-08 — wiki content is
  # now backed up via Wiki.js native bidirectional Git Storage to the PRIVATE
  # mainertoo/wiki repo (deploy key in WIKI_GIT_SSH_KEY). The whole wiki, not
  # just docs/*, is mirrored there.