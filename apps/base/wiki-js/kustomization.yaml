apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wiki-js
resources:
  - wiki-js-namespace.yaml
  # Storage is owned by sibling Flux Kustomizations, not this base:
  #   - wiki-js-data (cephfs 20Gi) — app uploads/assets, volsync backup: daily,
  #     deployed from apps/base/wiki-js-data/ via apps/production/wiki-js/data.yaml
  #   - the Postgres DB is CNPG (cluster wiki-js-cnpg-db), deployed from
  #     apps/base/wiki-js/db-cnpg/ via apps/production/wiki-js/db-cnpg.yaml;
  #     backed up daily by the barman-cloud plugin ScheduledBackup to S3.
  # The legacy in-tree postgres sidecar + its PVC were removed in the Phase 5b
  # CNPG migration — no PVC resources belong here.
  - wiki-js-secret.sops.yaml
  - wiki-js-release.yaml
  - wiki-js-ingressroute.yaml
  # NOTE: the docs-publisher CronJob was retired 2026-06-08 — wiki content is
  # now backed up via Wiki.js native bidirectional Git Storage to the PRIVATE
  # mainertoo/wiki repo (deploy key in WIKI_GIT_SSH_KEY). The whole wiki, not
  # just docs/*, is mirrored there.