apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wiki-js
resources:
  - wiki-js-namespace.yaml
  - wiki-js-data-pvc.yaml
  # wiki-js-data (cephfs 20Gi, volsync backup: daily) is declared inline here —
  # folded back from its former standalone Flux Kustomization in the round-5
  # consolidation. The Postgres DB is still CNPG (cluster wiki-js-cnpg-db),
  # deployed as a sibling Flux Kustomization from apps/base/wiki-js/db-cnpg/
  # (apps/production/wiki-js/db-cnpg.yaml), backed up daily by barman-cloud to S3.
  - wiki-js-secret.sops.yaml
  - wiki-js-release.yaml
  - wiki-js-ingressroute.yaml
  # NOTE: the docs-publisher CronJob was retired 2026-06-08 — wiki content is
  # now backed up via Wiki.js native bidirectional Git Storage to the PRIVATE
  # mainertoo/wiki repo (deploy key in WIKI_GIT_SSH_KEY). The whole wiki, not
  # just docs/*, is mirrored there.