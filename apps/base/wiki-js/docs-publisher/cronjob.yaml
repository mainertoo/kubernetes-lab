---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wiki-js-docs-publisher
  labels:
    app.kubernetes.io/name: wiki-js-docs-publisher
    app.kubernetes.io/part-of: wiki-js
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wiki-js-docs-publisher
            app.kubernetes.io/part-of: wiki-js
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: clone-repo
              image: alpine/git:v2.52.0
              command:
                - sh
                - -c
                - |
                  set -eu
                  git clone --depth 1 --single-branch --branch master \
                    https://github.com/mainertoo/kubernetes-lab /workspace
                  ls /workspace/docs | head -3
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: false
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          containers:
            - name: publish
              image: python:3.12-alpine3.21
              command: ["python3", "/scripts/publish.py"]
              env:
                - name: REPO_DOCS_PATH
                  value: /workspace/docs
                - name: WIKI_API_URL
                  value: http://wiki-js.wiki-js.svc.cluster.local:3000/graphql
                - name: WIKI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: wiki-js-secret
                      key: WIKI_API_KEY
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                  readOnly: true
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: workspace
              emptyDir:
                sizeLimit: 200Mi
            - name: script
              configMap:
                name: wiki-js-docs-publisher
                defaultMode: 0o555
            - name: tmp
              emptyDir:
                sizeLimit: 32Mi
