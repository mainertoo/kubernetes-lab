apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pocket-bridge
  namespace: open-notebook
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        # Plan F2-009 — bridge never calls the K8s API
        serviceAccount:
          create: false
        pod:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            # Match redis sidecar's UID/GID 999 so it can write to the
            # mounted Redis PVC. OnRootMismatch avoids re-chowning on every
            # pod start (just checks root-dir ownership at mount time).
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          # ----- bridge (FastAPI) -----------------------------------------
          bridge:
            image:
              repository: ghcr.io/mainertoo/pocket-bridge
              # Renovate will bump this to the latest sha-XXXX tag automatically.
              tag: latest
              # Always (not IfNotPresent) because we use `:latest`. With
              # IfNotPresent, kubelet trusts its cached :latest forever even
              # when the registry digest changes — Pod restart pulls nothing,
              # runs stale code. Cost: ~1s startup re-check; cleanest until
              # Renovate pins to sha-XXX digests.
              pullPolicy: Always
            env:
              TZ:
                value: America/Los_Angeles
              REDIS_HOST:
                value: "127.0.0.1"      # sidecar in same Pod
              REDIS_PORT:
                value: "6379"
              OPEN_NOTEBOOK_BASE_URL:
                value: "http://open-notebook.open-notebook.svc.cluster.local:5055"
              POCKET_API_BASE_URL:
                value: "https://api.usepocket.com/v1"
              WEBHOOK_PORT:
                value: "8080"
              ADMIN_PORT:
                value: "8081"
              METRICS_PORT:
                value: "8082"
              HMAC_TIMESTAMP_WINDOW_S:
                value: "300"
              BODY_SIZE_LIMIT_BYTES:
                value: "1048576"        # 1 MB (F12)
              # PHASE 3a FIXTURE CAPTURE — set to "true" temporarily so the
              # bridge dumps incoming headers + writes the raw body to /tmp
              # instead of processing the webhook. Revert after capture.
              POCKET_CAPTURE_FIXTURE:
                value: "true"
              LEASE_TTL_S:
                value: "60"
              LEASE_REFRESH_S:
                value: "20"
              POCKET_WEBHOOK_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: pocket-bridge-secret
                    key: POCKET_WEBHOOK_SECRET
              REPLAY_ADMIN_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: pocket-bridge-secret
                    key: REPLAY_ADMIN_TOKEN
              POCKET_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: pocket-bridge-secret
                    key: POCKET_API_TOKEN
              # Open Notebook auth currently disabled (Phase 0d probe); the
              # secret ships an empty string for this key. `optional: true`
              # was rejected by bjw-s v5 schema, so we just rely on the key
              # being present-but-empty.
              OPEN_NOTEBOOK_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: pocket-bridge-secret
                    key: OPEN_NOTEBOOK_API_KEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
              startup:
                enabled: false
            securityContext:
              # Pod-level runAsNonRoot=true requires either numeric image USER
              # or an explicit numeric runAsUser at container level. Dockerfile
              # uses `USER bridge` (named); override here with the matching UID
              # we created in the Dockerfile (useradd -u 10001).
              runAsUser: 10001
              runAsGroup: 10001
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 25m
                memory: 96Mi
              limits:
                cpu: 500m
                memory: 256Mi

          # ----- redis (sidecar, AOF on PVC) ------------------------------
          redis:
            image:
              repository: redis
              tag: 8.8.0
              pullPolicy: IfNotPresent
            args:
              - redis-server
              - --appendonly
              - "yes"
              - --appendfsync
              - everysec
              - --dir
              - /data
              - --save
              - ""              # disable RDB; AOF only (smaller, simpler)
              - --maxmemory
              - 128mb
              - --maxmemory-policy
              - noeviction       # never drop dedup state under pressure
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [redis-cli, ping]
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [redis-cli, ping]
                  initialDelaySeconds: 2
                  periodSeconds: 10
              startup:
                enabled: false
            securityContext:
              # Official `redis` image defines user/group `redis` = UID/GID 999.
              # Same runAsNonRoot enforcement as the bridge container: override
              # to the numeric UID so K8s can verify non-root.
              runAsUser: 999
              runAsGroup: 999
              allowPrivilegeEscalation: false
              # NOT readOnlyRootFilesystem: redis writes a tmp PID and may
              # touch /tmp during fsync. /data PVC handles AOF persistence;
              # adding tmp/run emptyDir mounts to satisfy readOnly is more
              # plumbing than the security gain is worth for a sidecar.
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 200m
                memory: 192Mi

    # Three Services — plan D15 (one Pod, three ports, three Services)
    service:
      public:
        controller: main
        ports:
          http:
            port: 8080
      admin:
        controller: main
        ports:
          http:
            port: 8081
      metrics:
        controller: main
        ports:
          http:
            port: 8082

    persistence:
      # Redis AOF — Pod-restart durability. NOT backed up (D10).
      redis-data:
        enabled: true
        existingClaim: pocket-bridge-redis
        advancedMounts:
          main:
            redis:
              - path: /data
      # bridge has readOnlyRootFilesystem: true. /tmp emptyDir gives the
      # Phase 3a capture-mode webhook handler a place to write the
      # captured body JSON. Small + ephemeral; safe to keep permanently
      # so future debug paths don't need a manifest change.
      tmp-bridge:
        enabled: true
        type: emptyDir
        sizeLimit: 64Mi
        advancedMounts:
          main:
            bridge:
              - path: /tmp
