apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pocket-bridge
  namespace: open-notebook
  labels:
    # No release-label selector on this cluster's kube-prom-stack
    # (per [[feedback_kube_prom_servicemonitor_selector_trap]]), but the
    # Service must be label-discoverable. The Service has app.kubernetes.io/*
    # labels from bjw-s by default.
    app.kubernetes.io/name: pocket-bridge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pocket-bridge
      # bjw-s app-template names Services <release>-<service-key>, so the
      # service label value is the FULL Service name not just `metrics`.
      app.kubernetes.io/service: pocket-bridge-metrics
  endpoints:
    - port: http
      # Trailing slash — prometheus_client's make_asgi_app mounted at /metrics
      # 307-redirects to /metrics/. Prometheus follows 307s but the canonical
      # path avoids the per-scrape extra hop.
      path: /metrics/
      interval: 30s
