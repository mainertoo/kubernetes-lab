apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: node-red-ingressroute
  namespace: home-assistant
  annotations:
    gethomepage.dev/href: "https://node-red.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Node-RED"
    gethomepage.dev/description: "Flows & automations for Home Assistant"
    gethomepage.dev/app: node-red
    gethomepage.dev/group: "Automation"
    gethomepage.dev/icon: "sh-node-red.svg"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`node-red.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: node-red
          port: 80
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
  tls: {}