apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-red
  namespace: home-assistant
spec:
  interval: 30m
  releaseName: node-red

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      node-red:
        containers:
          app:
            image:
              repository: nodered/node-red
              tag: 5.0.1

            env:
              TZ: America/Los_Angeles

            ports:
              - name: http
                containerPort: 1880
                protocol: TCP

            # Node-RED image runs as "node-red" user in many setups; this avoids permission surprises
            # while still keeping the pod non-root.
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: node-red
        ports:
          http:
            port: 80
            targetPort: 1880

    # VolSync component will create/own the PVC named "node-red"
    persistence:
      data:
        enabled: true
        existingClaim: node-red
        globalMounts:
          - path: /data

    defaultPodOptions:
      automountServiceAccountToken: false