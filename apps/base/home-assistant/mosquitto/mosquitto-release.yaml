apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
  namespace: mosquitto
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      mosquitto:
        initContainers:
          init-auth:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            envFrom:
              - secretRef:
                  name: mosquitto
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                umask 077
                mkdir -p /mosquitto/external_config
                # Create/overwrite password file from secret env vars
                mosquitto_passwd -c -b /mosquitto/external_config/mosquitto_pwd "$${MQTT_USERNAME}" "$${MQTT_PASSWORD}"
                chmod 0600 /mosquitto/external_config/mosquitto_pwd

        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            env:
              TZ: America/Los_Angeles

    service:
      app:
        controller: mosquitto
        ports:
          mqtt:
            port: 1883

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: mosquitto
        globalMounts:
          - path: /mosquitto/data

      config-file:
        type: configMap
        name: mosquitto-configmap
        advancedMounts:
          mosquitto:
            app:
              - path: /mosquitto/config/mosquitto.conf
                subPath: mosquitto.conf

      external-config:
        type: emptyDir
        advancedMounts:
          mosquitto:
            app:
              - path: /mosquitto/external_config
            init-auth:
              - path: /mosquitto/external_config

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        fsGroupChangePolicy: OnRootMismatch