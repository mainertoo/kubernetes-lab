apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
spec:
  interval: 30m
  releaseName: zigbee2mqtt

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      zigbee2mqtt:
        containers:
          app:
            image:
              repository: ghcr.io/koenkk/zigbee2mqtt
              tag: 2.12.0

            ports:
              - name: http
                containerPort: 8080
                protocol: TCP

            envFrom:
              - secretRef:
                  name: zigbee2mqtt
            env:
              TZ: America/Los_Angeles
              ZIGBEE2MQTT_DATA: /config

              ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
              ZIGBEE2MQTT_CONFIG_FRONTEND_URL: "https://zigbee2mqtt.lab.mainertoo.com"

              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://mosquitto.home-assistant.svc.cluster.local:1883"
              ZIGBEE2MQTT_CONFIG_MQTT_VERSION: "5"
              ZIGBEE2MQTT_CONFIG_MQTT_KEEPALIVE: "60"
              ZIGBEE2MQTT_CONFIG_MQTT_INCLUDE_DEVICE_INFORMATION: "true"

              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_PERMIT_JOIN: "false"

              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL: "info"
              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_OUTPUT: '["console"]'
              ZIGBEE2MQTT_CONFIG_ADVANCED_LAST_SEEN: "ISO_8601"

            # The Zigbee coordinator is network-attached (tcp://192.168.1.55:6638).
            # When that TCP socket drops, z2m stops its adapter (restart=false) but
            # the container PID stays alive, so K8s never restarts it and the frontend
            # on :8080 goes dead silently. An HTTP liveness probe on the frontend
            # catches that wedge and restarts the container so it reconnects.
            probes:
              liveness: &fe-probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *fe-probe
              # Give the coordinator-connect + frontend boot up to ~150s before
              # liveness engages, so a slow/unreachable adapter at startup doesn't
              # trigger a restart loop.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  periodSeconds: 5
                  failureThreshold: 30

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: zigbee2mqtt
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      config:
        enabled: true
        existingClaim: zigbee2mqtt
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false