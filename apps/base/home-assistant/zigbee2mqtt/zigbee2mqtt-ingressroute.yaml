apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zigbee2mqtt-ingressroute
  namespace: home-assistant
  annotations:
    gethomepage.dev/href: "https://zigbee2mqtt.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Zigbee2MQTT"
    gethomepage.dev/description: "Zigbee to MQTT bridge"
    gethomepage.dev/app: zigbee2mqtt
    gethomepage.dev/group: "Automation"
    gethomepage.dev/icon: "sh-zigbee2mqtt.svg"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zigbee2mqtt.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: zigbee2mqtt
          port: 80
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
  tls: {}