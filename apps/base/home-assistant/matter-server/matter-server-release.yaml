apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
  namespace: home-assistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      matter-server:
        pod:
          # Matter discovery/commissioning is happiest on the LAN/mDNS
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

          # Pin to same node as Home Assistant:
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

        containers:
          app:
            image:
              repository: ghcr.io/matter-js/python-matter-server
              tag: 8.1.2

            # hostNetwork exposes EVERY node interface (eth0/VLAN90, lan0/VLAN1,
            # flannel.1, cni0, ~59 K8s veth pairs = 63 total) to CHIP's minimal mDNS
            # resolver. It drowns in pod-to-pod/overlay multicast it can't parse and
            # floods "DNSSD packet parsing failed", which kills device discovery so no
            # NEW Matter device can be commissioned (existing nodes stay paired). Pin
            # mDNS + link-local to the home-LAN NIC (lan0 / VLAN 1, where HA's macvlan
            # also lives); reflected Matter mDNS from VLAN 10/20 lands there.
            #
            # NOTE: the image is Entrypoint=["matter-server"], CMD=["--storage-path",
            # "/data","--paa-root-cert-dir","/data/credentials"]. Setting args REPLACES
            # CMD, so those two flags MUST be repeated here or matter-server loses its
            # fabric + PAA credentials.
            args:
              - --storage-path
              - /data
              - --paa-root-cert-dir
              - /data/credentials
              - --primary-interface
              - lan0
              # Quiet the CHIP SDK's error-level "DNSSD packet parsing failed" flood:
              # the UniFi mDNS reflector relays every non-Matter service (printers,
              # AirPlay, etc.) onto lan0, and CHIP's minimal resolver logs an ERROR per
              # packet it can't parse — cosmetic (it correctly ignores them), but
              # thousands of lines/min. This silences only the SDK's logging; matter-
              # server's own app logs (discovery/commissioning) use --log-level and are
              # unaffected. Community-confirmed cosmetic (python-matter-server #307/#323).
              - --log-level-sdk
              - none

            env:
              TZ: America/Los_Angeles

            # python-matter-server listens on 5580 (WebSocket endpoint: /ws)
            ports:
              - name: http
                containerPort: 5580
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      app:
        controller: matter-server
        type: ClusterIP
        ports:
          http:
            port: 5580
            targetPort: 5580

    # IMPORTANT: app-template schema expects per-volume objects under persistence.<name>
    # Do NOT set persistence.enabled/type/existingClaim/globalMounts at the root.
    persistence:
      data:
        enabled: true
        existingClaim: matter-server
        globalMounts:
          - path: /data

      # Optional: only needed if you plan to commission Matter-over-BLE via the host
      # (Safe to leave; it’s read-only)
      dbus:
        enabled: true
        type: hostPath
        hostPath: /run/dbus
        hostPathType: Directory
        globalMounts:
          - path: /run/dbus
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false