apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: home-assistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      esphome:
        pod:
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0

        containers:
          app:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.6.5

            env:
              TZ: America/Los_Angeles
              PLATFORMIO_CORE_DIR: /config/.platformio
              PLATFORMIO_SETTING_ENABLE_TELEMETRY: "no"
              PLATFORMIO_DISABLE_TELEMETRY: "true"

            ports:
              - name: http
                containerPort: 6052
                protocol: TCP

    service:
      app:
        controller: esphome
        type: ClusterIP
        ports:
          # httpa: null
          http:
            port: 80
            targetPort: 6052

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: esphome
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet