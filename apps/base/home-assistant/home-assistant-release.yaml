apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  namespace: home-assistant
spec:
  releaseName: home-assistant
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              # Official image/tag (Docker Hub)
              repository: homeassistant/home-assistant
              tag: 2025.12.1
            env:
              TZ: America/Los_Angeles

        initContainers:
          # Ensures HA trusts Traefik reverse-proxy headers (x-forwarded-for).
          # Also creates configuration.yaml if it doesn't exist yet.
          ensure-http-proxy:
            image:
              repository: busybox
              tag: 1.36
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                CONFIG_FILE="/config/configuration.yaml"

                # Create file if missing
                if [ ! -f "$CONFIG_FILE" ]; then
                  echo "# created by gitops initContainer" > "$CONFIG_FILE"
                fi

                # Add http: block if missing
                if ! grep -qE '^[[:space:]]*http:' "$CONFIG_FILE"; then
                  echo "" >> "$CONFIG_FILE"
                  echo "http:" >> "$CONFIG_FILE"
                  echo "  use_x_forwarded_for: true" >> "$CONFIG_FILE"
                  echo "  trusted_proxies:" >> "$CONFIG_FILE"
                  echo "    - 10.42.0.0/16" >> "$CONFIG_FILE"  # k3s pod CIDR (common)
                  echo "    - 10.43.0.0/16" >> "$CONFIG_FILE"  # k3s service CIDR (common)
                else
                  # Ensure use_x_forwarded_for exists
                  if ! grep -qE '^[[:space:]]*use_x_forwarded_for:' "$CONFIG_FILE"; then
                    echo "  use_x_forwarded_for: true" >> "$CONFIG_FILE"
                  fi
                  # Ensure trusted_proxies exists
                  if ! grep -qE '^[[:space:]]*trusted_proxies:' "$CONFIG_FILE"; then
                    echo "  trusted_proxies:" >> "$CONFIG_FILE"
                    echo "    - 10.42.0.0/16" >> "$CONFIG_FILE"
                    echo "    - 10.43.0.0/16" >> "$CONFIG_FILE"
                  fi
                fi

          # Optional: Bootstrap HACS by downloading hacs.zip into /config/custom_components/hacs
          # (You still complete setup in the HA UI after restart.)
          # hacs-bootstrap:
          #   image:
          #     repository: alpine
          #     tag: 3.20
          #   command:
          #     - /bin/sh
          #     - -c
          #     - |
          #       set -eu
          #       apk add --no-cache curl unzip
          #       mkdir -p /config/custom_components
          #       cd /config/custom_components
          #       rm -rf hacs
          #       mkdir -p hacs
          #       curl -fsSL -o /tmp/hacs.zip https://github.com/hacs/integration/releases/latest/download/hacs.zip
          #       unzip -o /tmp/hacs.zip -d hacs
          #       echo "HACS extracted to /config/custom_components/hacs"

    service:
      app:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8123

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant-config
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false