apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  namespace: home-assistant
spec:
  releaseName: home-assistant
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              tag: 2025.12.1
            env:
              TZ: America/Los_Angeles

        initContainers:
          # Ensures HA trusts Traefik reverse-proxy headers (x-forwarded-for).
          # Also creates configuration.yaml if it doesn't exist yet.
          # Adds OIDC (hass-openid) config if missing.
          ensure-http-proxy:
            image:
              repository: busybox
              tag: 1.36
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                CONFIG_FILE="/config/configuration.yaml"

                # Create file if missing
                if [ ! -f "$CONFIG_FILE" ]; then
                  echo "# created by gitops initContainer" > "$CONFIG_FILE"
                fi

                # Add http: block if missing
                if ! grep -qE '^[[:space:]]*http:' "$CONFIG_FILE"; then
                  echo "" >> "$CONFIG_FILE"
                  echo "http:" >> "$CONFIG_FILE"
                  echo "  use_x_forwarded_for: true" >> "$CONFIG_FILE"
                  echo "  trusted_proxies:" >> "$CONFIG_FILE"
                  echo "    - 10.42.0.0/16" >> "$CONFIG_FILE"  # k3s pod CIDR
                  echo "    - 10.43.0.0/16" >> "$CONFIG_FILE"  # k3s service CIDR
                else
                  # Ensure use_x_forwarded_for exists
                  if ! grep -qE '^[[:space:]]*use_x_forwarded_for:' "$CONFIG_FILE"; then
                    echo "  use_x_forwarded_for: true" >> "$CONFIG_FILE"
                  fi
                  # Ensure trusted_proxies exists
                  if ! grep -qE '^[[:space:]]*trusted_proxies:' "$CONFIG_FILE"; then
                    echo "  trusted_proxies:" >> "$CONFIG_FILE"
                    echo "    - 10.42.0.0/16" >> "$CONFIG_FILE"
                    echo "    - 10.43.0.0/16" >> "$CONFIG_FILE"
                  fi
                fi

                # Add openid: block (hass-openid) if missing
                if ! grep -qE '^[[:space:]]*openid:' "$CONFIG_FILE"; then
                  echo "" >> "$CONFIG_FILE"
                  echo "openid:" >> "$CONFIG_FILE"
                  echo "  client_id: !secret authentik_client_id" >> "$CONFIG_FILE"
                  echo "  client_secret: !secret authentik_client_secret" >> "$CONFIG_FILE"
                  echo "  configure_url: \"https://authentik.lab.mainertoo.com/application/o/home-assistant/.well-known/openid-configuration\"" >> "$CONFIG_FILE"
                  echo "  scope: \"openid profile email\"" >> "$CONFIG_FILE"
                  echo "  username_field: \"preferred_username\"" >> "$CONFIG_FILE"
                  echo "  block_login: false" >> "$CONFIG_FILE"
                  echo "  openid_text: \"Login with Authentik\"" >> "$CONFIG_FILE"
                  echo "  create_user: true" >> "$CONFIG_FILE"
                fi

    service:
      app:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8123

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant-config
        globalMounts:
          - path: /config

      # Mount secrets.yaml into /config/secrets.yaml
      secrets:
        type: secret
        name: home-assistant-secret
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false