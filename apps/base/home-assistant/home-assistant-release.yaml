apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  releaseName: home-assistant
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      home-assistant:
        # ✅ app-template v3 schema uses controllers.<name>.pod.annotations
        pod:
          annotations: {}
          # Re-enable Multus later by adding:
          # k8s.v1.cni.cncf.io/networks: |
          #   [
          #     {"name":"lan-macvlan","namespace":"home-assistant","interface":"lan0"}
          #   ]

        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              tag: 2025.12.1
            env:
              TZ: America/Los_Angeles

        # ✅ initContainers usually belong under controllers.<name>.initContainers
        initContainers:
          ensure-http-proxy:
            image:
              repository: busybox
              tag: 1.36
            command: ["/bin/sh","-c"]
            args:
              - |
                set -eu
                CONFIG_FILE="/config/configuration.yaml"

                if [ ! -f "$CONFIG_FILE" ]; then
                  echo "# created by gitops initContainer" > "$CONFIG_FILE"
                fi

                if ! grep -qE '^[[:space:]]*http:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                http:
                  use_x_forwarded_for: true
                  trusted_proxies:
                    - 10.42.0.0/16
                    - 10.43.0.0/16
                EOF
                else
                  if ! grep -qE '^[[:space:]]*use_x_forwarded_for:' "$CONFIG_FILE"; then
                    echo "  use_x_forwarded_for: true" >> "$CONFIG_FILE"
                  fi
                  if ! grep -qE '^[[:space:]]*trusted_proxies:' "$CONFIG_FILE"; then
                    cat >> "$CONFIG_FILE" <<'EOF'
                  trusted_proxies:
                    - 10.42.0.0/16
                    - 10.43.0.0/16
                EOF
                  fi
                fi

                if ! grep -qE '^[[:space:]]*openid:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                openid:
                  client_id: !secret authentik_client_id
                  client_secret: !secret authentik_client_secret
                  configure_url: "https://authentik.lab.mainertoo.com/application/o/home-assistant/.well-known/openid-configuration"
                  scope: "openid profile email"
                  username_field: "preferred_username"
                  block_login: false
                  openid_text: "Login with Authentik"
                  create_user: true
                EOF
                fi
            volumeMounts:
              - name: config
                mountPath: /config

    service:
      app:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8123

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant
        globalMounts:
          - path: /config

      secrets:
        type: secret
        name: home-assistant-secret
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false