apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  releaseName: home-assistant
  interval: 30m

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      home-assistant:
        pod:
          # 🔒 Pin Home Assistant to the same node as Matter + ESPHome
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

        containers:
          app:
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              # Dreame Vacuum integration's first cloud/map sync (mini-racer V8 +
              # numpy/pillow lidar-map decode) spikes past 2Gi → OOMKill loop, and
              # steady-state idle sits ~2.2Gi. 4Gi clears it; worker-2 has ~19Gi free.
              limits:
                memory: 4Gi
            image:
              repository: homeassistant/home-assistant
              tag: 2026.7.2
            env:
              TZ: America/Los_Angeles

          # VS Code in the browser, sharing /config with HA
          code:
            dependsOn: app
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.129.0
            args:
              - --auth
              - "none"
              - --user-data-dir
              - "/config/.vscode"
              - --extensions-dir
              - "/config/.vscode"
              - --port
              - "8081"
              - "/config"

        initContainers:
          ensure-ha-config:
            image:
              repository: busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu

                CONFIG_FILE="/config/configuration.yaml"

                # Create file once if missing
                if [ ! -f "$CONFIG_FILE" ]; then
                  cat > "$CONFIG_FILE" <<'EOF'
                # created by gitops initContainer


                zeroconf:


                default_config:

                # Mobile application



                http:
                  use_x_forwarded_for: true
                  trusted_proxies:
                    - 10.42.0.0/16
                    - 10.43.0.0/16
                    - 192.168.90.0/24
                    - 192.168.1.0/24

                openid:
                  client_id: !secret authentik_client_id
                  client_secret: !secret authentik_client_secret
                  configure_url: "https://authentik.lab.mainertoo.com/application/o/home-assistant/.well-known/openid-configuration"
                  scope: "openid profile email"
                  username_field: "preferred_username"
                  block_login: false
                  openid_text: "Login with Authentik"
                  create_user: true

                logger:
                  default: notset

                system_health:

                ios:

                discovery:

                mobile_app:

                # include automation, scripts and scene
                automation: !include automations.yaml
                script: !include scripts.yaml
                scene: !include scenes.yaml
                EOF
                fi

                # If the user edits config manually, do NOT overwrite it.
                # Only ensure required top-level blocks exist.

                # Ensure http block exists (and includes trusted_proxies)
                if ! grep -qE '^[[:space:]]*http:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                http:
                  use_x_forwarded_for: true
                  trusted_proxies:
                    - 10.42.0.0/16
                    - 10.43.0.0/16
                    - 192.168.90.0/24
                    - 192.168.1.0/24
                EOF
                fi

                # Ensure openid block exists
                if ! grep -qE '^[[:space:]]*openid:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                openid:
                  client_id: !secret authentik_client_id
                  client_secret: !secret authentik_client_secret
                  configure_url: "https://authentik.lab.mainertoo.com/application/o/home-assistant/.well-known/openid-configuration"
                  scope: "openid profile email"
                  username_field: "preferred_username"
                  block_login: false
                  openid_text: "Login with Authentik"
                  create_user: true
                EOF
                fi

                # Ensure basic blocks exist
                if ! grep -qE '^[[:space:]]*logger:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                logger:
                  default: notset
                EOF
                fi

                if ! grep -qE '^[[:space:]]*system_health:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                system_health:
                EOF
                fi

                if ! grep -qE '^[[:space:]]*ios:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                ios:
                EOF
                fi

                if ! grep -qE '^[[:space:]]*discovery:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                discovery:
                EOF
                fi

                if ! grep -qE '^[[:space:]]*mobile_app:' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                mobile_app:
                EOF
                fi

                # Ensure include lines exist
                if ! grep -qE '^[[:space:]]*automation:[[:space:]]*!include[[:space:]]+automations\.yaml' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'

                # include automation, scripts and scene
                automation: !include automations.yaml
                EOF
                fi

                if ! grep -qE '^[[:space:]]*script:[[:space:]]*!include[[:space:]]+scripts\.yaml' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'
                script: !include scripts.yaml
                EOF
                fi

                if ! grep -qE '^[[:space:]]*scene:[[:space:]]*!include[[:space:]]+scenes\.yaml' "$CONFIG_FILE"; then
                  cat >> "$CONFIG_FILE" <<'EOF'
                scene: !include scenes.yaml
                EOF
                fi

    service:
      app:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8123

      code:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8081

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            code:
              - path: /config
            ensure-ha-config:
              - path: /config

      secrets:
        type: secret
        name: home-assistant-secret
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet