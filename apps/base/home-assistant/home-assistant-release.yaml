apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  releaseName: home-assistant
  interval: 30m

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              tag: 2025.12.1
            env:
              TZ: America/Los_Angeles

        initContainers:
          ensure-http-proxy:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu

                CONFIG_FILE="/config/configuration.yaml"
                TMP_FILE="/config/.configuration.yaml.tmp"

                # Ensure file exists
                if [ ! -f "$CONFIG_FILE" ]; then
                  printf "%s\n" "# created by gitops initContainer" > "$CONFIG_FILE"
                fi

                # 1) Copy everything EXCEPT selected top-level blocks into a temp file.
                #    (We rebuild those blocks deterministically below.)
                awk '
                  function is_toplevel(line) { return line ~ /^[^[:space:]][^:]*:/ }
                  BEGIN { skip=0 }
                  {
                    if (is_toplevel($0)) {
                      if ($0 ~ /^(http|openid|homeassistant|logger|system_health|ios|discovery|mobile_app):/) { skip=1; next }
                      if (skip==1) { skip=0 }
                    }
                    if (skip==0) print
                  }
                ' "$CONFIG_FILE" > "$TMP_FILE"

                # 2) Append clean, known-good http: block (Traefik trust)
                cat >> "$TMP_FILE" <<'EOF'

                http:
                  use_x_forwarded_for: true
                  trusted_proxies:
                    - 10.42.0.0/16
                    - 10.43.0.0/16
                    - 192.168.90.0/24
                    - 192.168.1.0/24
                EOF

                # 3) Append clean openid: block (Authentik OIDC)
                cat >> "$TMP_FILE" <<'EOF'

                openid:
                  client_id: !secret authentik_client_id
                  client_secret: !secret authentik_client_secret
                  configure_url: "https://authentik.lab.mainertoo.com/application/o/home-assistant/.well-known/openid-configuration"
                  scope: "openid profile email"
                  username_field: "preferred_username"
                  block_login: false
                  openid_text: "Login with Authentik"
                  create_user: true
                EOF

                # 4) Append additional required blocks
                cat >> "$TMP_FILE" <<'EOF'

                logger:
                  default: notset

                system_health:

                # iOS alerts
                ios:

                # Discover some devices automatically
                discovery:

                # Mobile application
                mobile_app:
                EOF

                # 5) Replace atomically
                mv -f "$TMP_FILE" "$CONFIG_FILE"
    service:
      app:
        controller: home-assistant
        type: ClusterIP
        ports:
          http:
            port: 8123

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            ensure-http-proxy:
              - path: /config

      secrets:
        type: secret
        name: home-assistant-secret
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet