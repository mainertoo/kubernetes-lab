apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    gethomepage.dev/href: "https://home-assistant.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Home Assistant"
    gethomepage.dev/description: "Self-hosted home automation"
    gethomepage.dev/app: home-assistant
    gethomepage.dev/group: "Automation"
    gethomepage.dev/icon: "sh-home-assistant.svg"
spec:
  entryPoints: [websecure, web]
  routes:
    - match: Host(`home-assistant.lab.mainertoo.com`) || Host(`ha.lab.mainertoo.com`)
      kind: Rule

      services:
        - name: home-assistant-app
          port: 8123
          scheme: http
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant-code
  namespace: home-assistant
  annotations:
    gethomepage.dev/href: "https://home-assistant-code.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "VSCode - Home Assistant"
    gethomepage.dev/description: "Code server for Home Assistant config"
    gethomepage.dev/app: home-assistant
    gethomepage.dev/group: "Automation"
    gethomepage.dev/icon: "sh-visual-studio-code.svg"
spec:
  entryPoints: [websecure, web]
  routes:
    - match: Host(`home-assistant-code.lab.mainertoo.com`) || Host(`hacode.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        # Adjust these if your Authentik forwardAuth middleware has a different name/namespace
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: home-assistant-code
          port: 8081
          scheme: http
  tls: {}