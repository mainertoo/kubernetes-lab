apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    gethomepage.dev/href: "https://home-assistant.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Home Assistant"
    gethomepage.dev/description: "Self-hosted home automation"
    gethomepage.dev/group: "Automation"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/home-assistant.svg"
spec:
  entryPoints: [websecure, web]
  routes:
    - match: Host(`home-assistant.lab.mainertoo.com`) || Host(`ha.lab.mainertoo.com`)
      kind: Rule

      # If you want Authentik in front of HA, uncomment this.
      # Note: HA already has its own auth; SSO via forward-auth is optional.
      # middlewares:
      #   - name: authentik-middleware
      #     namespace: traefik

      services:
        - name: home-assistant
          port: 8123
          scheme: http
  tls: {}