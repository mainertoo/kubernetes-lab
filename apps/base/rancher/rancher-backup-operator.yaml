apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher-backup-operator
  namespace: cattle-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: rancher-backup
  chart:
    spec:
      chart: rancher-backup
      version: 109.0.2+up10.0.2
      sourceRef:
        kind: HelmRepository
        name: rancher-charts
        namespace: flux-system
  targetNamespace: cattle-resources-system
  install:
    createNamespace: true
  values:
    persistence:
      enabled: false
