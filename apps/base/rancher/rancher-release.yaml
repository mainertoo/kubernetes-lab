apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: cattle-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: rancher
  chart:
    spec:
      chart: rancher
      version: 2.13.3     # example; we can adjust once we pick a target
      sourceRef:
        kind: HelmRepository
        name: rancher-latest
        namespace: flux-system

  values:
    hostname: rancher.lab.mainertoo.com

    # Let Traefik handle ingress; disable Rancher’s own ingress
    ingress:
      enabled: false

    global:
      cattle:
        bootstrapPassword: ""
        bootstrapPasswordSecretName: rancher-bootstrap

    replicas: 1

    # Optional: tighten resources a bit for home-lab
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "2Gi"