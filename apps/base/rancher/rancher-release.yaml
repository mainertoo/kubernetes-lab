apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: cattle-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: rancher
  chart:
    spec:
      chart: rancher
      version: 2.14.2
      sourceRef:
        kind: HelmRepository
        name: rancher-latest
        namespace: flux-system

  values:
    hostname: rancher.lab.mainertoo.com

    # Let Traefik handle ingress; disable Rancher’s own ingress
    ingress:
      enabled: false

    global:
      cattle:
        bootstrapPassword: ""
        bootstrapPasswordSecretName: rancher-bootstrap

    # HA: 3 replicas spread across worker nodes. The chart defaults to 3 with
    # antiAffinity=preferred + topologyKey=hostname, which already matches the
    # cluster's "ScheduleAnyway"-style spread (see docs/ha-architecture.md).
    replicas: 3

    # Optional: tighten resources a bit for home-lab
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "2Gi"