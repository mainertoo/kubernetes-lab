---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 9.0.0
  url: oci://ghcr.io/grafana/helm-charts/grafana
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: grafana
    namespace: grafana

  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    deploymentStrategy:
      type: Recreate

    envFromSecrets:
      - name: grafana-secret

    env:
      TZ: America/Los_Angeles
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
      GF_EXPLORE_ENABLED: "true"
      GF_SERVER_ROOT_URL: "https://grafana.lab.mainertoo.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

    persistence:
      enabled: true
      type: pvc
      storageClassName: ceph-rbd
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      finalizers:
        - kubernetes.io/pvc-protection

    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
      news:
        news_feed_enabled: false

      auth:
        oauth_auto_login: true
        signout_redirect_url: "https://authentik.lab.mainertoo.com/application/o/grafana/end-session/"

      auth.generic_oauth:
        name: authentik
        enabled: true
        allow_sign_up: true
        allow_assign_grafana_admin: true

        client_id: "PGFpYVkcDaeM6OVsgGE9dCKjpIWU3mZYga3A7iYM"
        client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}

        scopes: "openid profile email"
        auth_url: "https://authentik.lab.mainertoo.com/application/o/authorize/"
        token_url: "https://authentik.lab.mainertoo.com/application/o/token/"
        api_url: "https://authentik.lab.mainertoo.com/application/o/userinfo/"

        login_attribute_path: preferred_username || username || email
        name_attribute_path: name
        email_attribute_path: email

        groups_attribute_path: groups
        role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'

    # 🔥 Key change: enable sidecar import of dashboards/datasources from labeled ConfigMaps/Secrets
    sidecar:
      dashboards:
        enabled: true
        # kube-prometheus-stack typically uses this label when enabled
        label: grafana_dashboard
        labelValue: "1"
        # import from ALL namespaces so dashboards from kube-prometheus-stack namespace are discovered
        searchNamespace: ALL
        # if a dashboard CM has annotation grafana_folder, it will be placed into that folder
        folderAnnotation: grafana_folder
        # if folder annotation missing, this is the default folder name
        defaultFolderName: "Kubernetes"
        # allow UI edits without being overwritten constantly
        allowUiUpdates: true
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: ALL

    datasources:
      datasources.yaml:
        apiVersion: 1
        deleteDatasources:
          - { name: Alertmanager, orgId: 1 }
          - { name: Prometheus, orgId: 1 }
          - { name: Loki, orgId: 1 }

        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            access: proxy
            url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090
            isDefault: true

          - name: Alertmanager
            type: alertmanager
            uid: alertmanager
            access: proxy
            url: http://kube-prometheus-stack-alertmanager.kube-prometheus-stack.svc.cluster.local:9093
            jsonData:
              implementation: prometheus

          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki.loki.svc.cluster.local:3100
            jsonData:
              maxLines: 2000

    # Keep your existing "download dashboards" mechanism too (optional, but harmless)
    dashboards:
      default:
        volsync:
          gnetId: 21356
          revision: 3
          datasource:
            - { name: DS_PROMETHEUS, value: Prometheus }
            - { name: VAR_REPLICATIONDESTNAME, value: .*-dst }