# apps/base/plex/plex-config-perms-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: plex-config-perms-fix
  namespace: plex
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: fix
          image: busybox:stable
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "Fixing perms on /config..."
              echo "Before:"
              ls -ld /config || true
              find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true

              echo "Applying chown/chmod..."
              chown -R 1000:1000 /config || true
              chmod -R 0775 /config || true

              echo "After:"
              ls -ld /config || true
              find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
              echo "Done."
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex