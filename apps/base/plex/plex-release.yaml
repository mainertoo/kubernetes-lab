apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app plex
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      plex:
        # Make sure Plex always lands on GPU nodes
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/plex
              # You said "latest version tag" — you can pin this later if you want
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PLEX_ADVERTISE_URL
                value: "https://plex.lab.mainertoo.com"
              # - name: PLEX_CLAIM        # 👈 ADD THIS
              #   value: "claim-tsWH8jYPt-n7Zfy_a1ML"
            securityContext:
              privileged: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

    # Default pod options (these can be relaxed if needed later)
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: plex
        type: ClusterIP
        ports:
          http:
            port: &port 32400

    persistence:
      # Plex config PVC (named "plex" to match &app)
      config:
        existingClaim: *app
        advancedMounts:
          plex:
            app:
              - path: /config

      plex-cache:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache

      logs:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Logs

      # rclone / zurg mount (adjust path if your DaemonSet uses something else)
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      media:
        existingClaim: shared-media-pvc
        advancedMounts:
          plex:
            app:
              - path: /data/media

      transcode:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /transcode

      # NEW: pass the GPU device nodes straight through like the working smoke pod
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri