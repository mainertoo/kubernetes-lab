---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dawarich-db-dump
spec:
  schedule: "0 22 * * *"            # 22:00 UTC, before the 00:05 volsync sweep
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
          containers:
            - name: dump
              image: postgres:17-bookworm
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-c"]
              args:
                # NOTE: the $$ escapes are required because Flux postBuild.substitute
                # interprets ${VAR} as its own placeholder and replaces undefined vars
                # with empty string. Use $$VAR / $${VAR} to pass literal $ to bash.
                - |
                  set -euo pipefail
                  STAMP=$$(date -u +%Y%m%d-%H%M%SZ)
                  OUT="/dumps/dawarich-$${STAMP}.sql.gz"
                  echo "[dump] start $${STAMP} → $${OUT}"
                  pg_dump \
                    -h dawarich-dawarich-db \
                    -U "$${POSTGRES_USER}" \
                    --no-owner --no-acl \
                    "$${POSTGRES_DB}" \
                    | gzip --rsyncable -9 > "$${OUT}"
                  ls -lh "$${OUT}"
                  # Retain the last 14 dumps locally; volsync provides longer history
                  echo "[dump] rotating, keeping latest 14"
                  ls -t /dumps/dawarich-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -v
                  echo "[dump] done"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: dawarich-secret
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: dawarich-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: dawarich-secret
                      key: POSTGRES_DB
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: dawarich-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: dumps
                  mountPath: /dumps
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: dumps
              persistentVolumeClaim:
                claimName: dawarich-db-dumps
