apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wg-easy
  namespace: wg-easy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      wg-easy:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/wg-easy/wg-easy
              tag: "15"

            envFrom:
              - secretRef:
                  name: wg-easy-secret

            # WireGuard needs kernel/module access
            securityContext:
              privileged: true

            # app-template 3.x requires ports as an ARRAY
            ports:
              - name: http
                containerPort: 51821
                protocol: TCP
              - name: wireguard
                containerPort: 51822
                protocol: UDP

    defaultPodOptions:
      # sysctls required for WG routing/marks (matches your Swarm sysctls).
      # ⚠️ These are "unsafe" namespaced sysctls. K3s kubelets reject them at
      # admission (SysctlForbidden) UNLESS each is listed in the kubelet's
      # --allowed-unsafe-sysctls. Before re-activating wg-easy (see
      # apps/production/kustomization.yaml), EITHER add these via an Ansible K3s
      # config drop-in (kubelet-arg "allowed-unsafe-sysctls=net.ipv4.ip_forward,
      # net.ipv4.conf.all.src_valid_mark,net.ipv6.conf.all.disable_ipv6,
      # net.ipv6.conf.all.forwarding,net.ipv6.conf.default.forwarding" on workers),
      # OR delete this sysctls block and let the privileged container set them.
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv6.conf.all.disable_ipv6
            value: "0"
          - name: net.ipv6.conf.all.forwarding
            value: "1"
          - name: net.ipv6.conf.default.forwarding
            value: "1"

    service:
      wg-easy:
        controller: wg-easy
        ports:
          http:
            port: 51821
            targetPort: http
            protocol: TCP
          wireguard:
            port: 51822
            targetPort: wireguard
            protocol: UDP

    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /etc/wireguard

      # host module access (read-only)
      lib-modules:
        enabled: true
        type: hostPath
        hostPath: /lib/modules
        globalMounts:
          - path: /lib/modules
            readOnly: true