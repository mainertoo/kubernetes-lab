apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rclone-zurg-mount
  namespace: rclone
  labels:
    app: rclone-zurg
spec:
  selector:
    matchLabels:
      app: rclone-zurg
  template:
    metadata:
      labels:
        app: rclone-zurg
    spec:
      nodeSelector:
        rclone-mount: "true"

      containers:
        - name: rclone-zurg
          image: rclone/rclone@sha256:9ce0d49b611d3781233e25334e9e23d7af01e5546da7087f90d55f034ef13637
          command: ["rclone", "mount", "zurg:", "/mnt/zurg"]
          args:
            - "--umask=000"
            - "--dir-cache-time=30s"
            - "--allow-other"
            - "--allow-non-empty"
            - "-v"
            - "--vfs-cache-mode=full"
            - "--vfs-cache-max-size=2G"
            - "--read-only"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: data
              mountPath: /var/lib/rclone
            - name: rclone-config
              mountPath: /root/.rclone.conf
              subPath: rclone.conf
            - name: zurg-mount
              mountPath: /mnt/zurg
              mountPropagation: Bidirectional

      volumes:
        - name: data
          hostPath:
            path: /var/lib/rclone
            type: DirectoryOrCreate
        - name: rclone-config
          configMap:
            name: rclone-config
        - name: zurg-mount
          hostPath:
            path: /mnt/zurg
            type: DirectoryOrCreate
      restartPolicy: Always