apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      jellyfin:
        pod:
          # land on GPU node(s), same pattern as Plex
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        # initContainer to fix config perms BEFORE Jellyfin starts
        initContainers:
          fix-config-perms:
            image: busybox:stable
            imagePullPolicy: IfNotPresent
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /config..."
                echo "Before:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true

                echo "Applying chown/chmod..."
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true

                echo "After:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
                echo "Done."

            volumeMounts:
              - name: config
                mountPath: /config

        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
            # You can add GPU-related env vars here later if needed

    # default pod security (same vibe as Plex)
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: &port 8096

    persistence:
      # Jellyfin config PVC on CephFS
      config:
        existingClaim: *app
        advancedMounts:
          jellyfin:
            app:
              - path: /config

      # Shared CephFS library from Riven (/mnt/library)
      library:
        existingClaim: shared-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/library

      # QNAP big media library
      qnap-media:
        existingClaim: qnap-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /data/qnas

      # rclone / Zurg mount (same as Plex & Riven)
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      # cache + transcode
      tmp:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /transcode
                subPath: transcode

      # GPU device nodes passthrough
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri