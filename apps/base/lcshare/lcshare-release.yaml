apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lcshare
  namespace: lcshare
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      lcshare:
        containers:
          app:
            image:
              repository: tanq16/local-content-share
              tag: v37
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"

    service:
      app:
        controller: lcshare
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data