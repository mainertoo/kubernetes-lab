apiVersion: v1
kind: Service
metadata:
  name: mac-llama
  namespace: llama-egress
  annotations:
    # Same Mac as mac-ollama-egress, different port (llama-server :8080).
    # The tailscale-operator forwards all TCP to the tailnet host, so the
    # port distinction is made by the consumer's connection, not here.
    tailscale.com/tailnet-fqdn: darcys-macbookpro.tuxedo-halosaur.ts.net
    tailscale.com/tags: tag:k8s-egress
spec:
  type: ExternalName
  externalName: unused.tailscale-operator-target.invalid
