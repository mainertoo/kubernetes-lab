apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:` — this app spans two namespaces:
#   llama-egress  (Service)
#   tailscale     (NetworkPolicy on operator-managed proxy Pod)
# Each resource carries its own metadata.namespace.
resources:
  - mac-llama-egress-namespace.yaml
  - mac-llama-egress-service.yaml
  - tailscale-proxy-networkpolicy.yaml
