---
# NetworkPolicy lives in the `tailscale` namespace (where the operator
# places the egress-proxy Pod for the mac-llama Service), NOT in
# `llama-egress` (where the user-facing Service lives). Mirrors
# mac-ollama-egress: select the proxy Pod by its operator-applied labels
# and allow ingress only from the consuming namespace(s).
#   :8080 — chat (Qwen3.6-27B)        consumed by open-webui
#   :8081 — embeddings (mxbai)        consumed by open-webui + open-notebook
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tailscale-proxy-mac-llama-allowlist
  namespace: tailscale
spec:
  podSelector:
    matchLabels:
      tailscale.com/managed: "true"
      tailscale.com/parent-resource: mac-llama
      tailscale.com/parent-resource-ns: llama-egress
      tailscale.com/parent-resource-type: svc
  policyTypes:
    - Ingress
  ingress:
    # Both consuming namespaces use the Mac llama.cpp servers over the same
    # egress: :8080 = chat (Qwen3.6-27B), :8081 = embeddings (mxbai). Open
    # Notebook gained both when the Mac-Ollama path (chat + mxbai embeddings)
    # was consolidated onto llama.cpp (Phase 4, 2026-06-08); pocket-bridge
    # reaches both indirectly via Open Notebook (svc :5055), so it needs no
    # direct egress here.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: open-webui
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: open-notebook
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
