apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      audiobookshelf:
        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -e
                echo "== audiobookshelf init-perms =="

                echo "-- Before --"
                ls -ld /config /metadata || true

                echo "Creating expected dirs..."
                mkdir -p /config /metadata /metadata/logs || true

                echo "Fixing ownership/permissions..."
                chown -R 1000:1000 /config /metadata || true
                chmod -R 0775 /config /metadata || true

                echo "-- After --"
                ls -ld /config /metadata || true
                ls -ld /metadata/logs || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.35.1
            env:
              - name: TZ
                value: America/Los_Angeles
              # IMPORTANT:
              # Do NOT set CONFIG_PATH / METADATA_PATH.
              # Let ABS use its native defaults (/config + /metadata).
              - name: AUDIOBOOKSHELF_UID
                value: "1000"
              - name: AUDIOBOOKSHELF_GID
                value: "1000"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 991

    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            port: 80

    persistence:
      # One PVC, mounted twice using subPath (GitOps clean)
      abs:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: audiobookshelf
        advancedMounts:
          audiobookshelf:
            app:
              - path: /config
                subPath: config
              - path: /metadata
                subPath: metadata
            init-perms:
              - path: /config
                subPath: config
              - path: /metadata
                subPath: metadata

      qnap-books:
        type: nfs
        server: 192.168.1.252
        path: /QNAS/data/media/books
        globalMounts:
          - path: /books
            readOnly: false

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/audiobooks
        globalMounts:
          - path: /mnt/zurg/audiobooks
            readOnly: true