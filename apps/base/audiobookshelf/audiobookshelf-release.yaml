apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      audiobookshelf:
        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-lc"]
            args: |
              set -e
              echo "== audiobookshelf init-perms =="
              echo "-- Before --"
              ls -ld /data || true
              ls -ld /data/config /data/metadata || true

              echo "Creating expected dirs..."
              mkdir -p /data/config /data/metadata /data/metadata/logs || true

              echo "Fixing ownership/permissions..."
              chown -R 1000:1000 /data || true
              chmod -R 0775 /data || true

              echo "-- After --"
              ls -ld /data /data/config /data/metadata || true
              ls -ld /data/metadata/logs || true
              echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.30.0
            env:
              - name: TZ
                value: America/Los_Angeles

              # CRITICAL: keep ABS paths inside the mounted PVC
              - name: CONFIG_PATH
                value: /data/config
              - name: METADATA_PATH
                value: /data/metadata

              # keep your UID/GID alignment
              - name: AUDIOBOOKSHELF_UID
                value: "1000"
              - name: AUDIOBOOKSHELF_GID
                value: "1000"

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 991

    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            port: 80

    persistence:
      # One CephFS RWX PVC mounted ONCE at /data (works cleanly with schema)
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: audiobookshelf
        advancedMounts:
          audiobookshelf:
            app:
              - path: /data
            init-perms:
              - path: /data

      # Your library (read-only)
      qnap-books:
        type: nfs
        server: 192.168.1.252
        path: /QNAS/data/media/books
        globalMounts:
          - path: /books
            readOnly: true

      # Optional: zurg mount
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/audiobooks
        globalMounts:
          - path: /mnt/zurg/audiobooks
            readOnly: true