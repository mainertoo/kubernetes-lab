apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app audiobookshelf
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      audiobookshelf:
        # Init runs as root and fixes perms on BOTH mounts
        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -e
                echo "== audiobookshelf init-perms =="

                echo "-- Before --"
                ls -ld /config /metadata || true

                echo "Creating expected dirs..."
                mkdir -p /config /metadata /metadata/logs || true

                echo "Fixing ownership/permissions..."
                chown -R 1000:1000 /config /metadata || true
                chmod -R 0775 /config /metadata || true

                echo "-- After --"
                ls -ld /config /metadata || true
                ls -ld /metadata/logs || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.30.0
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: AUDIOBOOKSHELF_UID
                value: "1000"
              - name: AUDIOBOOKSHELF_GID
                value: "1000"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 991

    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            port: 80

    persistence:
      # Single RWX CephFS PVC created by Helm, mounted at BOTH /config and /metadata
      abs:
        enabled: true
        type: pvc
        storageClass: cephfs
        accessMode: ReadWriteMany
        size: 100Gi
        globalMounts:
          - path: /config
          - path: /metadata

      # QNAP NFS books directory mounted into the container as /books
      qnap-books:
        type: nfs
        server: 192.168.1.252
        path: /QNAS/data/media/books
        globalMounts:
          - path: /books
            readOnly: true

      # Optional: keep your zurg mount for later
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/audiobooks
        globalMounts:
          - path: /mnt/zurg/audiobooks
            readOnly: true