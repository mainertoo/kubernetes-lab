apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      audiobookshelf:
        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -e
                echo "Preparing /config and /metadata..."
                mkdir -p /config /metadata || true
                echo "Fixing perms..."
                chown -R 1000:1000 /config /metadata || true
                chmod -R 0775 /config /metadata || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.30.0
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: AUDIOBOOKSHELF_UID
                value: "1000"
              - name: AUDIOBOOKSHELF_GID
                value: "1000"
              # Explicitly set metadata path (matches our mount)
              - name: METADATA_PATH
                value: /metadata
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 991

    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            port: 80

    persistence:
      # CephFS RWX PVC (same claim provides /config + /metadata via subPaths)
      config:
        existingClaim: audiobookshelf
        advancedMounts:
          audiobookshelf:
            app:
              - path: /config
                subPath: config
              - path: /metadata
                subPath: metadata
            fix-config-perms:
              - path: /config
              - path: /metadata

      # QNAP NFS books directory mounted as the library root inside the app
      qnap-books:
        type: nfs
        server: 192.168.1.252
        path: /QNAS/data/media/books
        globalMounts:
          - path: /books
            readOnly: true

      # Optional: keep your zurg mount for later Decypharr integration
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/audiobooks
        globalMounts:
          - path: /mnt/zurg/audiobooks
            readOnly: true