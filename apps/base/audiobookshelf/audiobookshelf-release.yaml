apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controllers:
      audiobookshelf:
        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-lc"]
            args: |
              set -e
              mkdir -p /config /metadata /metadata/logs
              chown -R 1000:1000 /config /metadata
              chmod -R 0775 /config /metadata
            securityContext:
              runAsUser: 0
              runAsGroup: 0

        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.30.0
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: AUDIOBOOKSHELF_UID
                value: "1000"
              - name: AUDIOBOOKSHELF_GID
                value: "1000"

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            port: 80

    persistence:
      # 🚨 Disable the chart’s built-in metadata volume
      metadata:
        enabled: false

      # ✅ Single CephFS PVC mounted twice
      abs:
        enabled: true
        type: pvc
        storageClass: cephfs
        accessMode: ReadWriteMany
        size: 100Gi
        globalMounts:
          - path: /config
          - path: /metadata

      qnap-books:
        type: nfs
        server: 192.168.1.252
        path: /QNAS/data/media/books
        globalMounts:
          - path: /books
            readOnly: true