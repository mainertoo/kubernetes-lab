values:
  controllers:
    audiobookshelf:
      initContainers:
        init-perms:
          image:
            repository: busybox
            tag: stable
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -e
              echo "== audiobookshelf init-perms =="

              echo "-- Before --"
              ls -ld /data /data/config /data/metadata /metadata || true

              echo "Creating expected dirs..."
              mkdir -p /data/config /data/metadata
              # Also create legacy path the app insists on touching
              mkdir -p /metadata

              echo "Fixing ownership/permissions..."
              chown -R 1000:1000 /data/config /data/metadata /metadata || true
              chmod -R 0775 /data/config /data/metadata /metadata || true

              echo "-- After --"
              ls -ld /data /data/config /data/metadata /metadata || true
              echo "Done."
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false

      containers:
        app:
          image:
            repository: ghcr.io/advplyr/audiobookshelf
            tag: 2.30.0
          env:
            - name: TZ
              value: America/Los_Angeles
            - name: AUDIOBOOKSHELF_UID
              value: "1000"
            - name: AUDIOBOOKSHELF_GID
              value: "1000"
            # Your real paths
            - name: CONFIG_PATH
              value: /data/config
            - name: METADATA_PATH
              value: /data/metadata
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false

  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
      supplementalGroups:
        - 991

  service:
    app:
      controller: audiobookshelf
      ports:
        http:
          port: 80

  persistence:
    # Your real data PVC mounted once at /data
    data:
      type: persistentVolumeClaim
      existingClaim: audiobookshelf
      globalMounts:
        - path: /data

    # Compatibility mount so ABS can mkdir /metadata without dying
    metadata-compat:
      type: emptyDir
      globalMounts:
        - path: /metadata

    qnap-books:
      type: nfs
      server: 192.168.1.252
      path: /QNAS/data/media/books
      globalMounts:
        - path: /books
          readOnly: true

    rclone:
      type: hostPath
      hostPath: /mnt/zurg/audiobooks
      globalMounts:
        - path: /mnt/zurg/audiobooks
          readOnly: true