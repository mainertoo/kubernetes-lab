# Bespoke ReplicationSource for authentik's bitnami PostgreSQL StatefulSet.
#
# WHY THIS EXISTS (not the volsync-v2 component):
# The authentik chart deploys postgres as a StatefulSet, which generates its
# own PVC named `data-authentik-postgresql-0` via volumeClaimTemplates. The
# generic volsync-v2 component creates a PVC named `${APP}` that nothing
# mounts — so it would back up empty data. This manifest targets the actual
# StatefulSet PVC by name.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}"
spec:
  sourcePVC: data-authentik-postgresql-0
  trigger:
    schedule: "05 00/12 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 14

    repository: "${APP}-volsync"

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=10Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]

    storageClassName: "${VOLSYNC_STORAGECLASS:=ceph-rbd}"
    accessModes: ["${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}"]

    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}

    retain:
      hourly: 24
      daily: 7
      weekly: 5
      monthly: 3
