apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: open-webui
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: openwebui/open-webui
              tag: 0.9.6
              pullPolicy: IfNotPresent

            env:
              TZ:
                value: America/Los_Angeles
              # Single-user mode — no login screen. Tailnet-only access via
              # Traefik IngressRoute on chat.lab.mainertoo.com (no public
              # exposure). Revisit if exposing externally.
              WEBUI_AUTH:
                value: "false"
              # Mac-Ollama is reached via the OpenAI-compatible /v1 endpoint
              # (Phase 0c per pocket-bridge plan §5 — F6 single-mode rule).
              # Native Ollama API path explicitly disabled so the UI doesn't
              # offer two ways to call the same backend.
              ENABLE_OPENAI_API:
                value: "true"
              ENABLE_OLLAMA_API:
                value: "false"
              # Single OpenAI-compatible backend on the Mac via Tailscale
              # egress: mac-llama :8080 — llama.cpp serving Qwen3.6-27B.
              # (Mac-Ollama retired 2026-06-08 — chat consolidated onto
              # llama.cpp, embeddings onto :8081; mac-ollama-egress dropped.)
              OPENAI_API_BASE_URLS:
                value: "http://mac-llama.llama-egress.svc.cluster.local:8080/v1"
              # The backend doesn't enforce the API key, but Open WebUI still
              # requires a non-empty value.
              OPENAI_API_KEYS:
                value: "llama-cpp-ignores-this-too"
              # Route RAG embeddings through the DGX Spark's mxbai embeddings
              # server (:8081 on the Spark, via the spark-embed-egress
              # Service). Same mxbai-embed-large-v1 model / 1024-dim CLS
              # pooling as the Mac instance it replaces — verified cosine
              # ~1.000, so already-stored RAG vectors remain valid (no
              # re-index needed). Moves embeddings onto the Spark alongside
              # the Qwen3.6 chat endpoint so the Mac is out of the inference
              # path entirely. Still skips the default HuggingFace
              # sentence-transformers download (that OOM-killed the Pod
              # inside 1Gi loading the model into RAM).
              RAG_EMBEDDING_ENGINE:
                value: "openai"
              RAG_OPENAI_API_BASE_URL:
                value: "http://spark-embed.spark-egress.svc.cluster.local:8081/v1"
              RAG_OPENAI_API_KEY:
                value: "llama-cpp-ignores-this-too"
              RAG_EMBEDDING_MODEL:
                value: "ChristianAzinn/mxbai-embed-large-v1-gguf:Q8_0"
              # Chunking, tuned for the mxbai embedder's 512-token ceiling.
              # Use the TOKEN splitter (not the default character splitter):
              # it hard-caps every chunk at CHUNK_SIZE *tokens* regardless of
              # separators, so even a page with a huge unbreakable blob (long
              # data: URIs, link dumps) can't produce an oversized chunk that
              # 500s the whole embed batch -> "No sources found". 320 tiktoken
              # tokens leaves margin under mxbai's 512 even though mxbai's
              # WordPiece tokenizer counts a bit higher than tiktoken's BPE.
              RAG_TEXT_SPLITTER:
                value: "token"
              CHUNK_SIZE:
                value: "320"
              CHUNK_OVERLAP:
                value: "64"
              # Pull more chunks into context for research-grade answers — the
              # Spark Qwen3.6 endpoint serves a 262K context, so a larger
              # top-k is cheap and improves synthesis across sources.
              RAG_TOP_K:
                value: "8"
              # Full-page web research: load the actual result pages (not just
              # search snippets) and run them through real retrieval. Both
              # bypasses are OFF — the embed 500 is fixed at the root by the
              # token splitter above, so we no longer trade depth for
              # robustness. Snippets were shallow/contradictory; full pages +
              # Spark embeddings + reranking give grounded answers.
              # (Caveat: live, JS-rendered data like in-progress sports scores
              # still isn't in scraped HTML — that needs a real-time tool, not
              # web scraping.)
              BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL:
                value: "false"
              BYPASS_WEB_SEARCH_WEB_LOADER:
                value: "false"
              # Breadth: fetch more results and scrape them concurrently so a
              # few anti-bot 500s still leave plenty of usable sources.
              WEB_SEARCH_RESULT_COUNT:
                value: "6"
              WEB_SEARCH_CONCURRENT_REQUESTS:
                value: "6"
              # Web search + page loading via the in-cluster self-hosted
              # Firecrawl (apps/base/firecrawl). Firecrawl covers both: its
              # /search proxies to the QNAS SearXNG (its SEARXNG_ENDPOINT),
              # and it scrapes the result pages. firecrawl-api svc, :3002.
              ENABLE_WEB_SEARCH:
                value: "true"
              WEB_SEARCH_ENGINE:
                value: "firecrawl"
              WEB_LOADER_ENGINE:
                value: "firecrawl"
              FIRECRAWL_API_BASE_URL:
                value: "http://firecrawl-api.firecrawl.svc.cluster.local:3002"
              # Self-hosted Firecrawl runs USE_DB_AUTHENTICATION=false, but
              # Open WebUI requires a non-empty key value.
              FIRECRAWL_API_KEY:
                value: "self-hosted-no-auth"

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1500m
                memory: 2Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data
