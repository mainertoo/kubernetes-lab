apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: open-webui
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: openwebui/open-webui
              tag: 0.9.6
              pullPolicy: IfNotPresent

            env:
              TZ:
                value: America/Los_Angeles
              # Single-user mode — no login screen. Tailnet-only access via
              # Traefik IngressRoute on chat.lab.mainertoo.com (no public
              # exposure). Revisit if exposing externally.
              WEBUI_AUTH:
                value: "false"
              # Mac-Ollama is reached via the OpenAI-compatible /v1 endpoint
              # (Phase 0c per pocket-bridge plan §5 — F6 single-mode rule).
              # Native Ollama API path explicitly disabled so the UI doesn't
              # offer two ways to call the same backend.
              ENABLE_OPENAI_API:
                value: "true"
              ENABLE_OLLAMA_API:
                value: "false"
              # Single OpenAI-compatible backend on the Mac via Tailscale
              # egress: mac-llama :8080 — llama.cpp serving Qwen3.6-27B.
              # (Mac-Ollama retired 2026-06-08 — chat consolidated onto
              # llama.cpp, embeddings onto :8081; mac-ollama-egress dropped.)
              OPENAI_API_BASE_URLS:
                value: "http://mac-llama.llama-egress.svc.cluster.local:8080/v1"
              # The backend doesn't enforce the API key, but Open WebUI still
              # requires a non-empty value.
              OPENAI_API_KEYS:
                value: "llama-cpp-ignores-this-too"
              # Route RAG embeddings through the llama.cpp mxbai embeddings
              # server (:8081 on the Mac). Same mxbai-embed-large-v1 model,
              # 1024-dim CLS pooling — verified cosine ~1.000 vs the previous
              # Mac-Ollama mxbai (2026-06-08), so already-stored RAG vectors
              # remain valid (no re-index needed). Consolidates embeddings +
              # chat onto llama.cpp so Mac-Ollama can be retired. Still skips
              # the default HuggingFace sentence-transformers download (that
              # OOM-killed the Pod inside 1Gi loading the model into RAM).
              RAG_EMBEDDING_ENGINE:
                value: "openai"
              RAG_OPENAI_API_BASE_URL:
                value: "http://mac-llama.llama-egress.svc.cluster.local:8081/v1"
              RAG_OPENAI_API_KEY:
                value: "llama-cpp-ignores-this-too"
              RAG_EMBEDDING_MODEL:
                value: "ChristianAzinn/mxbai-embed-large-v1-gguf:Q8_0"
              # Web search + page loading via the in-cluster self-hosted
              # Firecrawl (apps/base/firecrawl). Firecrawl covers both: its
              # /search proxies to the QNAS SearXNG (its SEARXNG_ENDPOINT),
              # and it scrapes the result pages. firecrawl-api svc, :3002.
              ENABLE_WEB_SEARCH:
                value: "true"
              WEB_SEARCH_ENGINE:
                value: "firecrawl"
              WEB_LOADER_ENGINE:
                value: "firecrawl"
              FIRECRAWL_API_BASE_URL:
                value: "http://firecrawl-api.firecrawl.svc.cluster.local:3002"
              # Self-hosted Firecrawl runs USE_DB_AUTHENTICATION=false, but
              # Open WebUI requires a non-empty key value.
              FIRECRAWL_API_KEY:
                value: "self-hosted-no-auth"

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1500m
                memory: 2Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data
