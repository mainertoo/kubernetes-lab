apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: open-webui
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: openwebui/open-webui
              tag: 0.9.6
              pullPolicy: IfNotPresent

            env:
              TZ:
                value: America/Los_Angeles
              # Single-user mode — no login screen. Tailnet-only access via
              # Traefik IngressRoute on chat.lab.mainertoo.com (no public
              # exposure). Revisit if exposing externally.
              WEBUI_AUTH:
                value: "false"
              # Mac-Ollama is reached via the OpenAI-compatible /v1 endpoint
              # (Phase 0c per pocket-bridge plan §5 — F6 single-mode rule).
              # Native Ollama API path explicitly disabled so the UI doesn't
              # offer two ways to call the same backend.
              ENABLE_OPENAI_API:
                value: "true"
              ENABLE_OLLAMA_API:
                value: "false"
              OPENAI_API_BASE_URLS:
                value: "http://mac-ollama.ollama-egress.svc.cluster.local:11434/v1"
              # Ollama ignores the API key but Open WebUI requires the env to
              # be non-empty when OPENAI_API_BASE_URLS is set.
              OPENAI_API_KEYS:
                value: "ollama-ignores-this-but-openwebui-requires-it"
              # Route RAG embeddings through the same Mac-Ollama endpoint
              # (we already have mxbai-embed-large pulled). Skips the
              # default HuggingFace sentence-transformers download at
              # startup — that was OOM-killing the Pod inside 1Gi as it
              # loaded the model into RAM. Side benefit: one less model to
              # keep updated, consistent embedding for chat + RAG.
              RAG_EMBEDDING_ENGINE:
                value: "openai"
              RAG_OPENAI_API_BASE_URL:
                value: "http://mac-ollama.ollama-egress.svc.cluster.local:11434/v1"
              RAG_OPENAI_API_KEY:
                value: "ollama-ignores-this-but-openwebui-requires-it"
              RAG_EMBEDDING_MODEL:
                value: "mxbai-embed-large:latest"

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1500m
                memory: 2Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data
