apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt
  namespace: zigbee2mqtt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      zigbee2mqtt:
        containers:
          app:
            image:
              repository: ghcr.io/koenkk/zigbee2mqtt
              tag: 2.7.2
            envFrom:
              - secretRef:
                  name: zigbee2mqtt
            env:
              TZ: America/Los_Angeles

              ZIGBEE2MQTT_DATA: /config

              ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "80"
              ZIGBEE2MQTT_CONFIG_FRONTEND_URL: "https://zigbee2mqtt.lab.mainertoo.com"

              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://mosquitto.mosquitto.svc.cluster.local:1883"
              ZIGBEE2MQTT_CONFIG_MQTT_VERSION: "5"
              ZIGBEE2MQTT_CONFIG_MQTT_KEEPALIVE: "60"
              ZIGBEE2MQTT_CONFIG_MQTT_INCLUDE_DEVICE_INFORMATION: "true"

              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"

              # Safety: don't allow pairing unless you flip this true temporarily
              ZIGBEE2MQTT_CONFIG_PERMIT_JOIN: "false"

              # Logging
              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL: "info"
              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_OUTPUT: '["console"]'
              ZIGBEE2MQTT_CONFIG_ADVANCED_LAST_SEEN: "ISO_8601"

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 20  # dialout (often needed for serial)

    service:
      app:
        controller: zigbee2mqtt
        ports:
          http:
            port: 80

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config

      # Mount host serial-by-id so your chosen device path can be used
      serial-by-id:
        enabled: true
        type: hostPath
        hostPath: /dev/serial/by-id
        hostPathType: Directory
        globalMounts:
          - path: /dev/serial/by-id
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false