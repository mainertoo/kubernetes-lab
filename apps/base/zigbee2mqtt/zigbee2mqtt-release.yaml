apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt
  namespace: zigbee2mqtt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      zigbee2mqtt:
        containers:
          app:
            image:
              repository: ghcr.io/koenkk/zigbee2mqtt
              tag: 2.7.2

            # Make sure the chart knows what port the container actually listens on
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP

            envFrom:
              - secretRef:
                  name: zigbee2mqtt
            env:
              TZ: America/Los_Angeles
              ZIGBEE2MQTT_DATA: /config

              # Frontend
              ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
              ZIGBEE2MQTT_CONFIG_FRONTEND_URL: "https://zigbee2mqtt.lab.mainertoo.com"

              # MQTT broker in-cluster
              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://mosquitto.mosquitto.svc.cluster.local:1883"
              ZIGBEE2MQTT_CONFIG_MQTT_VERSION: "5"
              ZIGBEE2MQTT_CONFIG_MQTT_KEEPALIVE: "60"
              ZIGBEE2MQTT_CONFIG_MQTT_INCLUDE_DEVICE_INFORMATION: "true"

              # Home Assistant discovery
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"

              # Safety: don't allow pairing unless you flip this true temporarily
              ZIGBEE2MQTT_CONFIG_PERMIT_JOIN: "false"

              # Logging
              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL: "info"
              ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_OUTPUT: '["console"]'
              ZIGBEE2MQTT_CONFIG_ADVANCED_LAST_SEEN: "ISO_8601"

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: zigbee2mqtt
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config

    defaultPodOptions:
      automountServiceAccountToken: false