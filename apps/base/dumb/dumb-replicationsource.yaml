# Hand-written VolSync ReplicationSource for dumb — outside the Kyverno
# `volsync-pvc-backup-restore-kopia` policy (the PVC is labelled
# `backup: paused` so the policy does not generate a competing one).
#
# Why hand-written: dumb's 100Gi cephfs PVC is a composite app (Plex +
# *arrs + Postgres + …) with hundreds of thousands of small files. The
# policy's `copyMethod: Snapshot` triggers a full cephfs subvolume clone
# whose duration scales with file count, not bytes — it overran the CSI
# provisioner timeout and wedged ("clone from snapshot is already in
# progress"). This RS keeps `copyMethod: Snapshot` (so the backup is
# still crash-consistent — important, dumb has Postgres on this volume)
# but points the point-in-time copy at the `cephfs-backingsnapshot`
# StorageClass with `accessModes: [ReadOnlyMany]`. ceph-csi then serves
# the copy as a zero-copy shallow mount of the snapshot — no clone.
#
# Identity (repository/hostname/username/sourcePathOverride) matches
# what the Kyverno policy generated, so this writes into the SAME
# `volsync-dumb` kopia repo — no backup history is orphaned.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: dumb-backup
spec:
  sourcePVC: dumb
  trigger:
    schedule: "4 2 * * *"
  kopia:
    repository: volsync-dumb
    copyMethod: Snapshot
    # Shallow snapshot-backed copy — no subvolume clone.
    storageClassName: cephfs-backingsnapshot
    volumeSnapshotClassName: cephfs-snapclass
    accessModes:
      - ReadOnlyMany
    cacheCapacity: 10Gi
    cacheStorageClassName: ceph-rbd
    cacheAccessModes:
      - ReadWriteOnce
    moverSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsGroup: 1000
    hostname: dumb
    username: dumb-backup
    sourcePathOverride: /data
