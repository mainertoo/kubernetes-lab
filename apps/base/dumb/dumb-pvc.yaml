apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb
  labels:
    # PAUSED 2026-05-22 — dumb's cephfs snapshot+clone wedges Ceph CSI
    # repeatedly (recurring "clone from snapshot is already in progress"
    # lock; user has had to manually rescue wedged backup pods multiple
    # times). Setting backup=paused (a non-matching value for the
    # Kyverno generator policy) tears down the volsync RS/RD/Secret
    # while leaving the rest of the dumb app running normally.
    #
    # To re-enable backups: flip back to `backup: daily`. Don't do
    # this until the underlying Ceph subvolume-clone issue is fixed
    # — otherwise the wedge returns immediately.
    backup: paused
    backup-engine: kopia
  annotations:
    # Override the policy's default 5Gi cache. Dumb's 100Gi cephfs
    # source filled the smaller cache mid-initial-sync (alert
    # KubePersistentVolumeFillingUp fired repeatedly 2026-05-15).
    # Shared-repo cache demand = ~5% of TOTAL repo size, not just
    # this app's snapshots, so the working set is larger than
    # per-app-repo intuition would suggest.
    volsync.backup/cache-capacity: 10Gi
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 100Gi
