apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb
  labels:
    # Folded back onto the label-driven Kyverno policy after Phase 2
    # made cephfs backups use the `cephfs-backingsnapshot` shallow-mount
    # path (zero-copy, no clone) — the same path dumb's hand-written
    # RS used during Phase 1. See:
    #   docs/label-driven-backups.md
    #   infrastructure/controllers/kyverno/policies/README.md
    backup: daily
    backup-engine: kopia
  annotations:
    # Override the policy's default 5Gi cache. Dumb's 100Gi cephfs
    # source filled the smaller cache mid-initial-sync (alert
    # KubePersistentVolumeFillingUp fired repeatedly 2026-05-15).
    # Shared-repo cache demand = ~5% of TOTAL repo size, not just
    # this app's snapshots, so the working set is larger than
    # per-app-repo intuition would suggest.
    volsync.backup/cache-capacity: 10Gi
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 100Gi
