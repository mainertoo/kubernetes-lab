apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb
  labels:
    # `backup: paused` keeps the Kyverno volsync policy OFF for this PVC
    # ON PURPOSE — dumb's backup is hand-written instead. See
    # dumb-replicationsource.yaml: the policy's `copyMethod: Snapshot`
    # triggers a full cephfs subvolume clone that wedged repeatedly on
    # this high-file-count 100Gi PVC. The hand-written RS keeps Snapshot
    # (crash-consistent — dumb has Postgres on this volume) but copies
    # via the `cephfs-backingsnapshot` StorageClass + ReadOnlyMany, so
    # ceph-csi serves a zero-copy shallow snapshot mount — no clone.
    # Do NOT flip this back to `daily`; that would make Kyverno generate
    # a competing RS that collides with the hand-written one.
    backup: paused
    backup-engine: kopia
  annotations:
    # Override the policy's default 5Gi cache. Dumb's 100Gi cephfs
    # source filled the smaller cache mid-initial-sync (alert
    # KubePersistentVolumeFillingUp fired repeatedly 2026-05-15).
    # Shared-repo cache demand = ~5% of TOTAL repo size, not just
    # this app's snapshots, so the working set is larger than
    # per-app-repo intuition would suggest.
    volsync.backup/cache-capacity: 10Gi
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 100Gi
