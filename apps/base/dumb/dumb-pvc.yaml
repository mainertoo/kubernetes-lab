apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb
  labels:
    # Re-enabled 2026-05-22 after the cephfs subvolume-clone wedge was
    # addressed: ceph-csi pinned off the moving `canary` tag to v3.16.2
    # (PR #559), the stuck canceled-clone subvolume + orphan snapshots
    # cleared, and k3s-fs given a hot standby MDS (allow_standby_replay)
    # to speed up clone tasks. If the "clone from snapshot is already
    # in progress" wedge recurs, set `backup: paused` and switch the
    # volsync RS to copyMethod: Direct.
    backup: daily
    backup-engine: kopia
  annotations:
    # Override the policy's default 5Gi cache. Dumb's 100Gi cephfs
    # source filled the smaller cache mid-initial-sync (alert
    # KubePersistentVolumeFillingUp fired repeatedly 2026-05-15).
    # Shared-repo cache demand = ~5% of TOTAL repo size, not just
    # this app's snapshots, so the working set is larger than
    # per-app-repo intuition would suggest.
    volsync.backup/cache-capacity: 10Gi
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 100Gi
