apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb
  labels:
    # PAUSED AGAIN 2026-05-22 — the cephfs snapshot+clone wedge recurred
    # on the first re-enabled backup even after the ceph-csi v3.16.2 pin
    # (#559), debris cleanup, and the k3s-fs hot-standby MDS. The clone
    # PVC stuck on "clone from snapshot is already in progress" with no
    # actual Ceph clone running — a ceph-csi clone-tracking wedge, not a
    # live operation. `copyMethod: Snapshot` is not viable for this
    # 100Gi cephfs PVC. Next: a dedicated hand-written ReplicationSource
    # with `copyMethod: Direct` (the Kyverno policy hardcodes Snapshot
    # and can't be safely overridden — changing it needs a force-recreate
    # that thunders all ~70 generated children).
    backup: paused
    backup-engine: kopia
  annotations:
    # Override the policy's default 5Gi cache. Dumb's 100Gi cephfs
    # source filled the smaller cache mid-initial-sync (alert
    # KubePersistentVolumeFillingUp fired repeatedly 2026-05-15).
    # Shared-repo cache demand = ~5% of TOTAL repo size, not just
    # this app's snapshots, so the working set is larger than
    # per-app-repo intuition would suggest.
    volsync.backup/cache-capacity: 10Gi
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 100Gi
