apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dumb
  namespace: dumb
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 30m

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 30m

  uninstall:
    keepHistory: false

  values:
    controllers:
      dumb:
        type: deployment
        strategy: Recreate

        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: dumb

        annotations:
          container.apparmor.security.beta.kubernetes.io/app: unconfined

        containers:
          app:
            image:
              repository: ghcr.io/i-am-puid-0/dumb
              # Pinned to the rolling :dev tag by digest so a new dev build can't
              # silently roll in on restart (past profiler crashloop). Renovate
              # tracks the dev digest and PRs new builds — bump deliberately.
              tag: dev@sha256:a3eac87e2f4b82a325b0df6334d418c86d19fa4f2f4d5964ecd0cc5ec968e498
              pullPolicy: IfNotPresent

            envFrom:
              - secretRef:
                  name: dumb-secret

            securityContext:
              privileged: true
              allowPrivilegeEscalation: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              capabilities:
                add:
                  - SYS_ADMIN
              seccompProfile:
                type: Unconfined

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            # dumb is a heavy AIO bridge (bundles Plex + Seerr + Riven + debrid
            # mount). Requests reflect its real ~3.2Gi baseline so the scheduler
            # stops over-packing its node (was the root of worker-1 saturation).
            # No CPU limit (would throttle Plex transcodes); memory limit is a
            # generous runaway backstop well above transcode headroom, not a cap
            # meant to bind in normal use.
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 12Gi

    defaultPodOptions:
      hostNetwork: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: false
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      frontend:
        controller: dumb
        type: ClusterIP
        ports:
          http:
            port: 3005
            targetPort: 3005

      api:
        controller: dumb
        type: ClusterIP
        ports:
          http:
            port: 8000
            targetPort: 8000

    persistence:
      dumb-storage:
        # Migrated cephfs → ceph-rbd (RWO; single GPU-pinned Recreate pod
        # never needed RWX). Data rsync'd offline; old cephfs `dumb` PVC
        # retained for rollback until the RBD backup is confirmed seeded.
        existingClaim: dumb-rbd
        advancedMounts:
          dumb:
            app:
              - path: /config
                subPath: config
              - path: /log
                subPath: log
              - path: /data
                subPath: data
              - path: /mnt/debrid
                subPath: mnt-debrid

      # Shared symlink library (cephfs RWX) exposed to the external
      # Plex/Jellyfin in the `media` namespace via a static cephfs PV that
      # references this same backing subvolume. Overlays DUMB's
      # combined_symlinks dir (formerly on the RBD `dumb-storage` claim;
      # seeded 1:1 in phase 1b before this cutover so DUMB's own Plex sees
      # no empty window). DUMB internals otherwise untouched — decypharr and
      # nzbDAV keep writing symlinks to the same path; only the backing
      # storage moved to cephfs so it can be shared cross-namespace.
      dumb-library:
        existingClaim: dumb-library
        advancedMounts:
          dumb:
            app:
              - path: /mnt/debrid/combined_symlinks

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          dumb:
            app:
              - path: /dev/shm

      fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/fuse

      dri:
        type: hostPath
        hostPath: /dev/dri
        hostPathType: Directory
        globalMounts:
          - path: /dev/dri

    route:
      main:
        enabled: false