apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dumb-neutarr-ingressroute
  namespace: dumb
  annotations:
    gethomepage.dev/href: "https://dumb-neutarr.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Neutarr"
    gethomepage.dev/description: "DUMB service"
    gethomepage.dev/app: dumb
    gethomepage.dev/group: "DUMB-Media"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`dumb-neutarr.lab.mainertoo.com`)
      kind: Rule
      # middlewares:
        # - name: authentik-sso
        #   namespace: traefik-system
      services:
        - name: dumb-external
          port: 9705
  tls: {}

