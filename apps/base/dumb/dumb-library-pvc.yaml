apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb-library
spec:
  # RWX cephfs: this holds ONLY DUMB's combined_symlinks tree (tiny, ~42Mi
  # of symlink files) so it can be shared out of the dumb namespace to the
  # external Plex/Jellyfin in `media`. A second, STATIC cephfs PV in the
  # media namespace references this same backing subvolume (cross-namespace
  # share). DUMB's heavy config/DB stays on the RBD `dumb-rbd` claim.
  #
  # No backup label: the symlinks are derived state, regenerated by Riven
  # from its DB (which lives on the backed-up dumb-rbd claim).
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 10Gi
