apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  releaseName: immich

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      # ---- Immich server: API + web + video transcode (QSV via /dev/dri) ----
      server:
        strategy: Recreate
        pod:
          # Pin to an Intel-GPU node for QSV hardware transcoding.
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
        containers:
          app:
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.3
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: IMMICH_MACHINE_LEARNING_URL
                value: "http://immich-ml:3003"
              - name: REDIS_HOSTNAME
                value: "immich-redis"
              # VectorChord is the active vector backend (migrated off the
              # deprecated pgvecto.rs). MUST match the CNPG extension.
              - name: DB_VECTOR_EXTENSION
                value: vectorchord
              # DB credentials come from the CNPG-generated owner secret
              # (<cluster>-app = immich-cnpg-db-app), created at runtime by
              # the CNPG operator. The app Flux Kustomization dependsOn the
              # db one so the secret exists before this release reconciles.
              - name: DB_HOSTNAME
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-db-app
                    key: host
              - name: DB_PORT
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-db-app
                    key: port
              - name: DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-db-app
                    key: username
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-db-app
                    key: password
              - name: DB_DATABASE_NAME
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-db-app
                    key: dbname
            probes:
              liveness: &serverProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *serverProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  # Generous: first boot runs DB migrations + reindex.
                  failureThreshold: 60
                  periodSeconds: 10

      # ---- Machine learning: CLIP smart-search + face detection (OpenVINO) ----
      ml:
        strategy: Recreate
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
        containers:
          app:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 3Gi
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v3.0.3-openvino
            env:
              - name: TZ
                value: America/Los_Angeles
            probes:
              liveness: &mlProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *mlProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  failureThreshold: 60
                  periodSeconds: 10

      # ---- Redis/Valkey: BullMQ job queue + cache (ephemeral) ----
      redis:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 8-bookworm
            env:
              - name: TZ
                value: America/Los_Angeles
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["valkey-cli", "ping"]
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["valkey-cli", "ping"]
                  periodSeconds: 10

    defaultPodOptions:
      securityContext:
        # Run as root (NOT the repo's usual runAsNonRoot:1000). The QNAS photo
        # tree is owned 0:0 mode 755 and the NFS export is no_root_squash; the
        # official immich-server image runs as root and ignores PUID/PGID.
        # Running as root matches current working behaviour and avoids a
        # 187 GB recursive chown. Deliberate deviation — see
        # docs/immich-cluster-migration-plan.md §3 (Permissions). Do NOT set
        # fsGroup here (would risk a recursive chown of the NFS volume).
        runAsUser: 0
        runAsGroup: 0

    service:
      app:
        controller: server
        type: ClusterIP
        ports:
          http:
            port: 2283
      ml:
        controller: ml
        type: ClusterIP
        ports:
          http:
            port: 3003
      redis:
        controller: redis
        type: ClusterIP
        ports:
          http:
            port: 6379

    persistence:
      # The QNAS photo library (NFS). Mounted ONLY on the server — Immich's
      # ML service receives image data from the server over HTTP, so it does
      # not need the upload mount. (Verify in Phase 0; if ML needs disk access
      # add an advancedMounts entry for the ml controller.)
      upload:
        existingClaim: immich-media-pvc
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload

      # ML model cache (ceph-rbd).
      model-cache:
        existingClaim: immich-model-cache
        advancedMounts:
          ml:
            app:
              - path: /cache

      # Intel iGPU for QSV transcode (server) + OpenVINO inference (ml).
      dri:
        type: hostPath
        hostPath: /dev/dri
        advancedMounts:
          server:
            app:
              - path: /dev/dri
          ml:
            app:
              - path: /dev/dri
