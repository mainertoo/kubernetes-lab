apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: open-notebook-ingressroute
  namespace: open-notebook
  annotations:
    gethomepage.dev/href: "https://open-notebook.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Open Notebook"
    gethomepage.dev/description: "Self-hosted research notebook (NotebookLM alternative)"
    gethomepage.dev/app: open-notebook
    gethomepage.dev/group: "AI"
    gethomepage.dev/icon: "sh-notebooklm.png"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    # Open Notebook v1.1+ uses Next.js rewrites: /api/* is proxied internally
    # from port 8502 to FastAPI on 5055. Single-route is required — splitting
    # /api off bypasses the rewrite layer and breaks the frontend.
    - match: Host(`open-notebook.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: open-notebook
          port: 8502
          scheme: http
  tls: {}
