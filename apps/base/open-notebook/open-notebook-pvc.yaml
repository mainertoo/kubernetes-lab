apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-notebook
  labels:
    # Phase 5b of the volsync label-driven restore project.
    # ClusterPolicy volsync-pvc-backup-restore matches this label and
    # generates volsync-open-notebook Secret + open-notebook-backup RS + RD in this ns.
    backup: daily
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 10Gi
