apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-notebook
  namespace: open-notebook
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      open-notebook:
        strategy: Recreate
        containers:
          main:
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 2Gi
            image:
              repository: lfnovo/open_notebook
              tag: 1.10.0-single
            env:
              TZ: America/Los_Angeles
              SURREAL_URL: ws://localhost:8000/rpc
              SURREAL_NAMESPACE: open_notebook
              SURREAL_DATABASE: open_notebook
              # Public URL used for callbacks/webhooks; bare domain (no /api).
              # Next.js handles /api/* rewrites internally on port 8502.
              API_URL: https://open-notebook.lab.mainertoo.com
              # SSR calls the local FastAPI directly on the same pod.
              INTERNAL_API_URL: http://localhost:5055
            envFrom:
              - secretRef:
                  name: open-notebook-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8502
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8502
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8502
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

    service:
      app:
        controller: open-notebook
        type: ClusterIP
        ports:
          http:
            port: 8502
            targetPort: 8502
          api:
            port: 5055
            targetPort: 5055

    persistence:
      data:
        enabled: true
        existingClaim: open-notebook
        advancedMounts:
          open-notebook:
            main:
              - path: /mydata
                subPath: surreal
              - path: /app/data
                subPath: app

    defaultPodOptions:
      automountServiceAccountToken: false
