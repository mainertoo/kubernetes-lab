apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
  namespace: dawarich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 20m

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 20m

  uninstall:
    keepHistory: false

  values:
    controllers:
      dawarich:
        strategy: Recreate

        initContainers:
          init-app-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init Dawarich shared dirs..."
                mkdir -p /var/app/public
                mkdir -p /var/app/tmp/imports/watched
                mkdir -p /var/app/storage
                chown -R 1000:1000 /var/app || true
                chmod -R 0775 /var/app || true
                ls -la /var/app || true
                ls -la /var/app/tmp/imports || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

          wait-for-db:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                # CNPG cutover 2026-05-09 (Phase 3c-cutover): wait on the
                # CNPG-managed dawarich-db-rw service instead of the legacy
                # in-namespace postgres Deployment.
                until nslookup dawarich-db-rw.dawarich.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: dawarich-db-rw.dawarich.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 dawarich-db-rw.dawarich.svc.cluster.local 5432; do
                  echo "waiting for postgres: dawarich-db-rw.dawarich.svc.cluster.local:5432"
                  sleep 2
                done

                echo "db is reachable"

          wait-for-redis:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                until nslookup dawarich-dawarich-redis.dawarich.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: dawarich-dawarich-redis.dawarich.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 dawarich-dawarich-redis.dawarich.svc.cluster.local 6379; do
                  echo "waiting for redis: dawarich-dawarich-redis.dawarich.svc.cluster.local:6379"
                  sleep 2
                done

                echo "redis is reachable"

        containers:
          app:
            image:
              repository: freikin/dawarich
              tag: 1.8.0
              pullPolicy: IfNotPresent
            command:
              - web-entrypoint.sh
            args:
              - bin/rails
              - server
              - -p
              - "3000"
              - -b
              - "::"
            # CNPG cutover 2026-05-09 (Phase 3c-cutover): the env values
            # below override the DATABASE_USERNAME and DATABASE_PASSWORD
            # entries in dawarich-secret (via envFrom) — env is evaluated
            # AFTER envFrom, so the valueFrom references win. This switches
            # the app to the CNPG-managed dawarich-db Cluster.
            env:
              TZ: America/Los_Angeles
              RAILS_ENV: production

              REDIS_URL: redis://dawarich-dawarich-redis.dawarich.svc.cluster.local:6379

              DATABASE_HOST: dawarich-db-rw
              DATABASE_PORT: "5432"
              DATABASE_NAME: dawarich
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: username
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: password

              APPLICATION_HOSTS: "dawarich.lab.mainertoo.com,dawarich.mainertoo.com,192.168.90.186,dawarich,dawarich.dawarich.svc.cluster.local"
              APPLICATION_PROTOCOL: "https"
              TIME_ZONE: America/Los_Angeles

              RAILS_LOG_TO_STDOUT: "true"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"

              PROMETHEUS_EXPORTER_ENABLED: "false"
              PROMETHEUS_EXPORTER_HOST: "0.0.0.0"
              PROMETHEUS_EXPORTER_PORT: "9394"
            envFrom:
              - secretRef:
                  name: dawarich-secret
            ports:
              - name: http
                containerPort: 3000
                protocol: TCP

          health:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-lc"]
            args:
              - |
                set -e
                mkdir -p /www
                echo "ok" >/www/index.html
                exec httpd -f -p 8080 -h /www
            ports:
              - name: health
                containerPort: 8080
                protocol: TCP
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      dawarich-sidekiq:
        strategy: Recreate

        initContainers:
          init-app-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init Dawarich shared dirs for sidekiq..."
                mkdir -p /var/app/public
                mkdir -p /var/app/tmp/imports/watched
                mkdir -p /var/app/storage
                chown -R 1000:1000 /var/app || true
                chmod -R 0775 /var/app || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

          wait-for-db:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                # CNPG cutover 2026-05-09 (Phase 3c-cutover): wait on the
                # CNPG-managed dawarich-db-rw service.
                until nslookup dawarich-db-rw.dawarich.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: dawarich-db-rw.dawarich.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 dawarich-db-rw.dawarich.svc.cluster.local 5432; do
                  echo "waiting for postgres: dawarich-db-rw.dawarich.svc.cluster.local:5432"
                  sleep 2
                done

                echo "db is reachable"

          wait-for-redis:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eux

                until nslookup dawarich-dawarich-redis.dawarich.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: dawarich-dawarich-redis.dawarich.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 dawarich-dawarich-redis.dawarich.svc.cluster.local 6379; do
                  echo "waiting for redis: dawarich-dawarich-redis.dawarich.svc.cluster.local:6379"
                  sleep 2
                done

                echo "redis is reachable"

        containers:
          sidekiq:
            image:
              repository: freikin/dawarich
              tag: 1.8.0
              pullPolicy: IfNotPresent
            command:
              - sidekiq-entrypoint.sh
            args:
              - sidekiq
            # CNPG cutover 2026-05-09 (Phase 3c-cutover): same overrides
            # as the app container — DATABASE_USERNAME/PASSWORD via
            # valueFrom override the legacy values in dawarich-secret.
            env:
              TZ: America/Los_Angeles
              RAILS_ENV: production

              REDIS_URL: redis://dawarich-dawarich-redis.dawarich.svc.cluster.local:6379

              DATABASE_HOST: dawarich-db-rw
              DATABASE_PORT: "5432"
              DATABASE_NAME: dawarich
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: username
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-db-app
                    key: password

              APPLICATION_HOSTS: "dawarich.lab.mainertoo.com,dawarich.mainertoo.com,192.168.90.186,dawarich,dawarich.dawarich.svc.cluster.local"
              APPLICATION_PROTOCOL: "https"

              BACKGROUND_PROCESSING_CONCURRENCY: "10"

              RAILS_LOG_TO_STDOUT: "true"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"

              PROMETHEUS_EXPORTER_ENABLED: "false"
              PROMETHEUS_EXPORTER_HOST: "dawarich.dawarich.svc.cluster.local"
              PROMETHEUS_EXPORTER_PORT: "9394"
            envFrom:
              - secretRef:
                  name: dawarich-secret

      # Legacy `dawarich-db` controller (postgis/postgis:17-3.5-alpine)
      # removed in Phase 5f (CNPG migration cleanup 2026-05-09). App now
      # connects to dawarich-db-rw via the CNPG-managed cluster.

      dawarich-redis:
        strategy: Recreate
        containers:
          redis:
            image:
              repository: redis
              tag: 8.8-alpine
              pullPolicy: IfNotPresent
            command:
              - redis-server
            ports:
              - name: redis
                containerPort: 6379
                protocol: TCP

    service:
      dawarich:
        controller: dawarich
        type: ClusterIP
        ports:
          http:
            port: 3000
            targetPort: 3000
          health:
            port: 8080
            targetPort: 8080

      # `dawarich-db` Service removed in Phase 5f. App connects to
      # dawarich-db-rw (CNPG-managed cluster).

      dawarich-redis:
        controller: dawarich-redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

    persistence:
      # `data` (mounted to the legacy dawarich-db controller, claim name
      # `dawarich-db`, 25 GiB) removed in Phase 5f. The PVC is also pruned
      # via removal of apps/production/dawarich/db.yaml below.

      media:
        enabled: true
        existingClaim: dawarich-media
        advancedMounts:
          dawarich:
            init-app-perms:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage
            app:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage

          dawarich-sidekiq:
            init-app-perms:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage
            sidekiq:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage

    defaultPodOptions:
      automountServiceAccountToken: false