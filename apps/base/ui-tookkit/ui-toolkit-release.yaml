apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ui-toolkit
  namespace: ui-toolkit
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      ui-toolkit:
        strategy: Recreate

        containers:
          app:
            image:
              repository: ghcr.io/crosstalk-solutions/unifi-toolkit
              tag: latest
              pullPolicy: IfNotPresent

            # Non-secret env vars (safe here)
            env:
              TZ: America/Los_Angeles
              DEPLOYMENT_TYPE: local
              STALKER_REFRESH_INTERVAL: "60"

            # Secret-driven env vars:
            # ENCRYPTION_KEY, LOG_LEVEL, UNIFI_CONTROLLER_URL, UNIFI_API_KEY, etc.
            envFrom:
              - secretRef:
                  name: ui-toolkit-secret

            ports:
              - name: http
                containerPort: 8000
                protocol: TCP

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 20
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 6

    service:
      ui-toolkit:
        controller: ui-toolkit
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 8000

    persistence:
      data:
        enabled: true
        existingClaim: ui-toolkit
        globalMounts:
          - path: /app/data

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"