web:
  port: 80

storage:
  type: sqlite
  path: /config/sqlite.db
  caching: true

metrics: true
debug: false

ui:
  title: Status | Gatus
  header: Status

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  # ---------- Homepage ----------
  # External check: allow 200 OR 302 (Authentik redirect)
  - name: homepage-external
    group: external
    url: https://homepage.lab.mainertoo.com
    interval: 1m
    conditions:
      - "[STATUS] < 400"

  # Internal check: bypass TLS + SSO entirely (service DNS)
  - name: homepage-internal
    group: internal
    url: http://homepage.homepage.svc.cluster.local:3000
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  # ---------- Gatus ----------
  - name: gatus-internal
    group: internal
    url: http://gatus.gatus.svc.cluster.local/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  # ---------- Prometheus ----------
  - name: prometheus-internal
    group: internal
    url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090/-/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  # ---------- Alertmanager ----------
  - name: alertmanager-internal
    group: internal
    url: http://kube-prometheus-stack-alertmanager.kube-prometheus-stack.svc.cluster.local:9093/-/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"

alerting:
  discord:
    title: Gatus
    webhook-url: $${DISCORD_WEBHOOK_URL}
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 2

  alertmanager:
    url: http://kube-prometheus-stack-alertmanager.kube-prometheus-stack.svc.cluster.local:9093
    default-alert:
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 2
      labels:
        severity: warning
        source: gatus