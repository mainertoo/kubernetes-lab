web:
  port: 80

storage:
  type: sqlite
  path: /config/sqlite.db
  caching: true

metrics: true
debug: false

ui:
  title: Status | Gatus
  header: Status

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  #
  # INTERNAL SERVICE CHECKS (recommended)
  # These avoid wildcard TLS / split DNS issues entirely.
  #
  - name: homepage-internal
    group: internal
    url: http://homepage.homepage.svc.cluster.local:3000
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  - name: grafana-internal
    group: internal
    url: http://grafana.grafana.svc.cluster.local/api/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  - name: prometheus-internal
    group: internal
    url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090/-/ready
    interval: 30s
    conditions:
      - "[BODY] == Prometheus Server is Ready."

  - name: alertmanager-internal
    group: internal
    url: http://kube-prometheus-stack-alertmanager.kube-prometheus-stack.svc.cluster.local:9093/-/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  - name: gatus-internal
    group: internal
    url: http://gatus.gatus.svc.cluster.local/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  #
  # EXTERNAL INGRESS CHECKS (optional)
  # NOTE: if Homepage is behind Authentik, you will get redirects (302).
  # That's still "healthy" from an ingress standpoint.
  #
  - name: homepage-external
    group: external
    url: https://homepage.lab.mainertoo.com
    interval: 1m
    client:
      # Keep this ONLY if you explicitly want to validate public DNS.
      # If you’d rather follow in-cluster DNS behavior, remove the whole "client:" block.
      dns-resolver: tcp://1.1.1.1:53
    conditions:
      - "[STATUS] < 400"

alerting:
  discord:
    title: Gatus
    webhook-url: ${DISCORD_WEBHOOK_URL}
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 2