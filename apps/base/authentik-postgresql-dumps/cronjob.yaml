---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-postgresql-dump
spec:
  schedule: "10 22 * * *"           # 22:10 UTC, after dawarich-db-dump (22:00) to spread I/O
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1001            # bitnami postgres uid
            runAsGroup: 1001
            fsGroup: 1001
          containers:
            - name: dump
              image: postgres:17-bookworm
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  STAMP=$(date -u +%Y%m%d-%H%M%SZ)
                  OUT="/dumps/authentik-${STAMP}.sql.gz"
                  echo "[dump] start ${STAMP} → ${OUT}"
                  pg_dump \
                    -h authentik-postgresql \
                    -U authentik \
                    --no-owner --no-acl \
                    authentik \
                    | gzip --rsyncable -9 > "${OUT}"
                  ls -lh "${OUT}"
                  echo "[dump] rotating, keeping latest 14"
                  ls -t /dumps/authentik-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -v
                  echo "[dump] done"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: authentik-postgresql
                      key: password
              volumeMounts:
                - name: dumps
                  mountPath: /dumps
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: dumps
              persistentVolumeClaim:
                claimName: authentik-postgresql-dumps
