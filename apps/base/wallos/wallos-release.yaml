apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wallos
  namespace: wallos
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      wallos:
        strategy: Recreate
        containers:
          main:
            image:
              repository: bellamy/wallos
              tag: "4.9.2"
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
            envFrom:
              - secretRef:
                  name: wallos-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health.php
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health.php
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: false

    service:
      wallos:
        controller: wallos
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

    persistence:
      data:
        enabled: true
        existingClaim: wallos
        advancedMounts:
          wallos:
            main:
              - path: /var/www/html/db
                subPath: db
              - path: /var/www/html/images/uploads/logos
                subPath: logos

    defaultPodOptions:
      automountServiceAccountToken: false
