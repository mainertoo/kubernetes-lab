apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wallos-ingressroute
  namespace: wallos
  annotations:
    gethomepage.dev/href: "https://wallos.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Wallos"
    gethomepage.dev/description: "Self-hosted subscription tracker"
    gethomepage.dev/app: wallos
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-wallos.png"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`wallos.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: wallos
          port: 80
          scheme: http
  tls: {}
