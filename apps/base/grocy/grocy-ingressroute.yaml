apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grocy-ingressroute
  namespace: grocy
  annotations:
    gethomepage.dev/href: "https://grocy.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grocy"
    gethomepage.dev/description: "Groceries & household management"
    gethomepage.dev/app: grocy
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-grocy.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`grocy.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: grocy
          port: 80