apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grocy
  namespace: grocy
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/grocy
              tag: "4.5.0"
              pullPolicy: IfNotPresent

            env:
              TZ:
                value: America/Los_Angeles
              PUID:
                value: "1000"
              PGID:
                value: "1000"
              GROCY_BASE_URL:
                value: "https://grocy.lab.mainertoo.com"
              GROCY_AUTH_CLASS:
                value: "Grocy\\Middleware\\ReverseProxyAuthMiddleware"
              GROCY_REVERSE_PROXY_AUTH_HEADER:
                value: "X-authentik-username"

            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

    # Match your other linuxserver apps (tautulli style)
    defaultPodOptions:
      securityContext:
        # Let linuxserver entrypoint run as root and drop to PUID/PGID internally.
        # We only keep the group bits for Ceph access.
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 991

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 80   # grocy listens on 80 in-container

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /config