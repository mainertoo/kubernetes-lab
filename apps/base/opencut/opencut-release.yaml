apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencut
  namespace: opencut
spec:
  interval: 30m
  releaseName: opencut

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      db:
        strategy: Recreate
        containers:
          main:
            image:
              repository: postgres
              tag: "17"
            env:
              TZ: America/Los_Angeles
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_PASSWORD
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_DB
              # Important for Ceph-RBD + lost+found
              PGDATA: /var/lib/postgresql/data/pgdata

      redis:
        strategy: Recreate
        containers:
          main:
            image:
              repository: redis
              tag: "8-alpine"
            env:
              TZ: America/Los_Angeles

      serverless-redis-http:
        strategy: Recreate
        containers:
          main:
            image:
              repository: hiett/serverless-redis-http
              tag: 0.0.10
            env:
              TZ: America/Los_Angeles
              SRH_MODE: env
              SRH_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: SRH_TOKEN
              # IMPORTANT: use the prefixed redis service name
              SRH_CONNECTION_STRING: "redis://opencut-redis:6379"

      web:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/mainertoo/opencut
              tag: v0.3.0
            # CNPG cutover 2026-05-09 (Phase 3e-cutover): converted from
            # map-style env to list-style so PGUSER and PGPASSWORD are
            # declared BEFORE DATABASE_URL — the K8s $(VAR) substitution
            # only resolves vars declared earlier in the env list. The
            # DATABASE_URL value override below points at the CNPG-managed
            # opencut-cnpg-db-rw service using the auto-generated
            # opencut-cnpg-db-app credentials. The legacy `DATABASE_URL`
            # key in `opencut-secret` is no longer referenced.
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: NODE_ENV
                value: production

              # CNPG-generated credentials (must come BEFORE DATABASE_URL
              # so $(VAR) substitution can resolve them).
              - name: PGUSER
                valueFrom:
                  secretKeyRef:
                    name: opencut-cnpg-db-app
                    key: username
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: opencut-cnpg-db-app
                    key: password
              - name: DATABASE_URL
                value: "postgresql://$(PGUSER):$(PGPASSWORD)@opencut-cnpg-db-rw:5432/opencut"

              # IMPORTANT: use the prefixed service name
              - name: UPSTASH_REDIS_REST_URL
                value: "http://opencut-serverless-redis-http:80"

              - name: BETTER_AUTH_URL
                value: "https://opencut.lab.mainertoo.com"

              - name: UPSTASH_REDIS_REST_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: SRH_TOKEN

              - name: BETTER_AUTH_SECRET
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: BETTER_AUTH_SECRET

              - name: FREESOUND_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: FREESOUND_CLIENT_ID
              - name: FREESOUND_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: FREESOUND_API_KEY

              - name: CLOUDFLARE_ACCOUNT_ID
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: CLOUDFLARE_ACCOUNT_ID
              - name: R2_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_ACCESS_KEY_ID
              - name: R2_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_SECRET_ACCESS_KEY
              - name: R2_BUCKET_NAME
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_BUCKET_NAME
              - name: MODAL_TRANSCRIPTION_URL
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: MODAL_TRANSCRIPTION_URL

            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000

    service:
      db:
        controller: db
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

      redis:
        controller: redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

      serverless-redis-http:
        controller: serverless-redis-http
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

      web:
        controller: web
        type: ClusterIP
        ports:
          http:
            port: 3000
            targetPort: 3000

    persistence:
      postgres-data:
        enabled: true
        existingClaim: opencut-postgres
        advancedMounts:
          db:
            main:
              - path: /var/lib/postgresql/data