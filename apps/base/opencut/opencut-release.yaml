apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencut
  namespace: opencut
spec:
  interval: 30m
  releaseName: opencut

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      db:
        strategy: Recreate
        containers:
          main:
            image:
              repository: postgres
              tag: "17"
            env:
              TZ: America/Los_Angeles
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_PASSWORD
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: POSTGRES_DB
              # Important for Ceph-RBD + lost+found
              PGDATA: /var/lib/postgresql/data/pgdata

      redis:
        strategy: Recreate
        containers:
          main:
            image:
              repository: redis
              tag: "8-alpine"
            env:
              TZ: America/Los_Angeles

      serverless-redis-http:
        strategy: Recreate
        containers:
          main:
            image:
              repository: hiett/serverless-redis-http
              tag: 0.0.10
            env:
              TZ: America/Los_Angeles
              SRH_MODE: env
              SRH_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: SRH_TOKEN
              # IMPORTANT: use the prefixed redis service name
              SRH_CONNECTION_STRING: "redis://opencut-redis:6379"

      web:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/mainertoo/opencut
              tag: v0.3.0
            env:
              TZ: America/Los_Angeles
              NODE_ENV: production

              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: DATABASE_URL

              # IMPORTANT: use the prefixed service name
              UPSTASH_REDIS_REST_URL: "http://opencut-serverless-redis-http:80"

              BETTER_AUTH_URL: "https://opencut.lab.mainertoo.com"

              UPSTASH_REDIS_REST_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: SRH_TOKEN

              BETTER_AUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: BETTER_AUTH_SECRET

              FREESOUND_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: FREESOUND_CLIENT_ID
              FREESOUND_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: FREESOUND_API_KEY

              CLOUDFLARE_ACCOUNT_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: CLOUDFLARE_ACCOUNT_ID
              R2_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_ACCESS_KEY_ID
              R2_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_SECRET_ACCESS_KEY
              R2_BUCKET_NAME:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: R2_BUCKET_NAME
              MODAL_TRANSCRIPTION_URL:
                valueFrom:
                  secretKeyRef:
                    name: opencut-secret
                    key: MODAL_TRANSCRIPTION_URL

            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000

    service:
      db:
        controller: db
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

      redis:
        controller: redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

      serverless-redis-http:
        controller: serverless-redis-http
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

      web:
        controller: web
        type: ClusterIP
        ports:
          http:
            port: 3000
            targetPort: 3000

    persistence:
      postgres-data:
        enabled: true
        existingClaim: opencut-postgres
        advancedMounts:
          db:
            main:
              - path: /var/lib/postgresql/data