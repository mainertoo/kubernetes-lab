apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bentopdf
  namespace: bentopdf
spec:
  interval: 30m

  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        replicas: 1

        containers:
          app:
            image:
              # default mode: bentopdf/bentopdf:latest
              # simple mode (clean internal UI): bentopdf/bentopdf-simple:latest
              repository: bentopdf/bentopdf-simple
              tag: v1.1.2
              pullPolicy: IfNotPresent

            # BentoPDF is static; no PVC needed.
            # Keep env empty unless you need sub-path hosting later (BASE_URL).

            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 512Mi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8080