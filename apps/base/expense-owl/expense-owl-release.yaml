apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app expense-owl
  namespace: expense-owl
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      expense-owl:
        containers:
          app:
            image:
              repository: tanq16/expenseowl
              tag: main
            env:
              - name: TZ
                value: America/Los_Angeles

    service:
      app:
        controller: expense-owl
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data