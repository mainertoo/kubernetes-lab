---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firecrawl
  namespace: firecrawl
spec:
  interval: 30m
  releaseName: firecrawl

  # Upstream Firecrawl chart, VENDORED into this repo at ./chart (pinned copy
  # from firecrawl commit 44a6a16, chart 0.2.0 — see chart/VENDORED.md).
  # Firecrawl publishes no Helm/OCI chart artifact, and flux-local CI can only
  # render charts from the flux-system source, so we source the local path via
  # flux-system rather than an external GitRepository.
  chart:
    spec:
      chart: ./apps/base/firecrawl/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    # Default fullname would be "firecrawl-firecrawl" (<release>-<chart>).
    # Override so Services are firecrawl-api / firecrawl-playwright / etc.
    fullnameOverride: firecrawl

    # Chart default is false (no requests/limits at all). Turn on so the
    # per-component resource blocks below are actually rendered.
    resources:
      enabled: true

    # ---- Images: official Firecrawl GHCR builds (cluster is x86) ----
    # api + worker + nuq-worker all share this image/tag.
    image:
      repository: ghcr.io/firecrawl/firecrawl
      tag: "2.11.78"
      pullPolicy: IfNotPresent
      dockerSecretEnabled: false

    # playwright-service + nuq-postgres publish ONLY :latest upstream, so pin
    # by digest (multi-arch index digests captured 2026-06-19; Renovate tracks
    # digest pins, same pattern as the hermes release).
    playwright:
      repository: ghcr.io/firecrawl/playwright-service
      tag: "latest@sha256:1f6eba6403207d501a63d9b1d4685b6316b4fc7968fe64a5839ab1bfec9d1c14"
      pullPolicy: IfNotPresent
      replicaCount: 1

    nuqPostgres:
      image:
        repository: ghcr.io/firecrawl/nuq-postgres
        tag: "latest@sha256:f9388bd25ae2e1f1d034518236f993ce236173c1d8800ce24092ea6643a95a33"
        pullPolicy: IfNotPresent
      # NuQ holds the job queue + crawl state only — regenerable, not precious.
      # Run as emptyDir (persistence off): the chart mounts the volume at the
      # postgres data root with NO PGDATA subPath, which collides with the
      # ext4 lost+found on a ceph-rbd PVC and fails initdb. Ephemeral is fine
      # for a scrape queue; revisit with a subPath PVC if persistence is needed.
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # ---- Scope to the scrape + search core; drop the /extract LLM pipeline ----
    api:
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2000m"
          memory: 3Gi
    worker:
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1000m"
          memory: 2Gi
    nuqWorker:
      replicaCount: 1            # chart default is 5; one is plenty for a homelab
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1000m"
          memory: 2Gi
    extractWorker:
      enabled: false            # /extract LLM-extraction pipeline — not needed
    nuqPrefetchWorker:
      enabled: false            # precrawl prefetch optimizer — not needed
    rabbitmq:
      enabled: true             # tiny; kept to avoid a NuQ broker-dependency risk
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # ---- Config ----
    # Internal-only tool (Traefik tailnet ingress, no public exposure), so the
    # self-hosted no-auth default is kept. Internal service URLs (redis,
    # playwright, nuq-postgres) auto-template from fullname=firecrawl.
    config:
      USE_DB_AUTHENTICATION: "false"
      LOGGING_LEVEL: "INFO"
      # /search is backed by the existing SearXNG on the QNAS Docker host.
      # Reached over the tailnet via a tailscale-operator egress Service
      # (apps/base/searxng-egress) rather than a LAN IP, so the route survives
      # home-network VLAN/IP changes. SearXNG serves the app on :8080.
      # REQUIRES SearXNG to emit JSON (formats: [..., json]); default ships
      # HTML-only — applied on the QNAS via Portainer/gitops.
      SEARXNG_ENDPOINT: "http://searxng.searxng-egress.svc.cluster.local:8080"
