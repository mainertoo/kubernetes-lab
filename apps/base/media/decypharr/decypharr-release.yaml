# /apps/base/media/decypharr/decypharr-release.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: decypharr
  namespace: media
spec:
  interval: 30m
  releaseName: decypharr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        # Keep decypharr off control-plane nodes
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
                      - key: node-role.kubernetes.io/master
                        operator: DoesNotExist

        initContainers:
          init-config:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                if [ ! -f /app/config.json ]; then
                  echo "Seeding /app/config.json from secret..."
                  cp /tmp/config/config.json /app/config.json
                  chmod 644 /app/config.json
                  chown 1000:1000 /app/config.json || true
                else
                  echo "/app/config.json already exists; leaving as-is."
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE"]

          fix-symlinks-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (decypharr)..."
                mkdir -p /mnt/symlinks/decypharr
                chown -R 1000:1000 /mnt/symlinks/decypharr || true
                chmod -R 0775 /mnt/symlinks/decypharr || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/decypharr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: cy01/blackhole
              tag: v1.1.6
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles

    # Run as root (matches upstream blackhole expectations + your prior working config)
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8282

    persistence:
      # /app PVC (ceph-rbd claim "decypharr")
      app:
        enabled: true
        existingClaim: decypharr
        globalMounts:
          - path: /app

      # config secret -> /tmp/config
      config:
        enabled: true
        type: secret
        name: decypharr-secret
        globalMounts:
          - path: /tmp/config

      # rclone/zurg FUSE mount exposed from the node
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # Shared symlinks (CephFS RWX PVC)
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks

      # logs
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs