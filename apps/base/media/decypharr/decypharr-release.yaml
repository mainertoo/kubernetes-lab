apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: decypharr
  namespace: media
spec:
  interval: 30m
  releaseName: decypharr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: cy01/blackhole
              tag: v1.1.6
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles

        initContainers:
          init-config:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -e
                if [ ! -f /app/config.json ]; then
                  echo "Seeding /app/config.json from secret..."
                  cp /tmp/config/config.json /app/config.json
                  chmod 644 /app/config.json
                  chown 1000:1000 /app/config.json || true
                else
                  echo "/app/config.json already exists; leaving as-is."
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE"]

          fix-symlinks-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -e
                echo "Ensuring /mnt/symlinks/decypharr exists and is writable..."
                mkdir -p /mnt/symlinks/decypharr
                chown -R 1000:1000 /mnt/symlinks/decypharr || true
                chmod -R 0775 /mnt/symlinks/decypharr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8282

    persistence:
      # App state (ceph-rbd PVC)
      app:
        enabled: true
        existingClaim: decypharr
        globalMounts:
          - path: /app

      # Secret -> temp mount for initContainer
      config:
        enabled: true
        type: secret
        name: decypharr-secret
        globalMounts:
          - path: /tmp/config

      # Your local/visible hostPath mount
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # Symlinks on CephFS (RWX) with subPath isolation + initContainer mount
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        advancedMounts:
          main:
            main:
              - path: /mnt/symlinks/decypharr
                subPath: decypharr
            fix-symlinks-perms:
              - path: /mnt/symlinks/decypharr
                subPath: decypharr

      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs