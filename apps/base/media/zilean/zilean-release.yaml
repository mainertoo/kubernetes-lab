apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zilean
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    fullnameOverride: zilean

    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ipromknight/zilean
              tag: latest
              pullPolicy: IfNotPresent

            env:
              ASPNETCORE_URLS: "http://+:8282"

              Zilean__Database__ConnectionString:
                valueFrom:
                  secretKeyRef:
                    name: zilean-env
                    key: ZILEAN_DB_CONNECTION

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 2Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8282

    persistence:
      data:
        enabled: true
        existingClaim: zilean-data
        globalMounts:
          - path: /data
      tmp:
        enabled: true
        existingClaim: zilean-tmp
        globalMounts:
          - path: /tmp