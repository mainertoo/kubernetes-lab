apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zilean
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3

  values:
    fullnameOverride: zilean

    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ipromknight/zilean
              tag: v3.5.0
              pullPolicy: IfNotPresent

            env:
              ASPNETCORE_URLS: "http://+:8282"

              # CNPG cutover 2026-05-09 (Phase 3a-cutover):
              # - PGUSER / PGPASSWORD come from the CNPG-generated zilean-db-app
              #   Secret. CNPG rotates these on cluster recovery and the K8s
              #   $(VAR) substitution below resolves them on every pod start.
              # - bjw-s app-template renders env maps as alphabetically-ordered
              #   lists; P < Z, so PGUSER+PGPASSWORD evaluate before the
              #   Zilean__... reference, which $(VAR) substitution requires.
              # - Legacy zilean-env / ZILEAN_DB_CONNECTION no longer referenced;
              #   cleaned up in Phase 3a-decommission after 24h soak.
              PGUSER:
                valueFrom:
                  secretKeyRef:
                    name: zilean-db-app
                    key: username
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: zilean-db-app
                    key: password

              Zilean__Database__ConnectionString: "Host=zilean-db-rw;Port=5432;Database=zilean;Username=$(PGUSER);Password=$(PGPASSWORD);Include Error Detail=true;Timeout=30;CommandTimeout=3600"

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 2Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8282

    persistence:
      data:
        enabled: true
        existingClaim: zilean-data
        globalMounts:
          - path: /data
      tmp:
        enabled: true
        existingClaim: zilean-tmp
        globalMounts:
          - path: /tmp