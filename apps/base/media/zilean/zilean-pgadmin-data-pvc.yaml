apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zilean-pgadmin-data
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    # Phase 5 of the Kopia transition (docs/volsync-kopia-transition.md).
    # ClusterPolicy volsync-pvc-backup-restore-kopia matches both labels
    # and generates volsync-zilean-pgadmin-data Secret + zilean-pgadmin-data-backup RS + RD with
    # spec.kopia in this ns.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 5Gi
