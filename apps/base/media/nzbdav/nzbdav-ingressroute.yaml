apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nzbdav-ingressroute
  namespace: media
  annotations:
    gethomepage.dev/href: "https://nzbdav.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "NzbDav"
    gethomepage.dev/description: "Usenet WebDAV server and SABnzbd-compatible API"
    gethomepage.dev/app: nzbdav
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "mdi-folder-network-outline"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`nzbdav.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: nzbdav
          port: 3000
  tls: {}