apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex
  labels:
    # Phase 5 of the Kopia transition (docs/volsync-kopia-transition.md).
    # ClusterPolicy volsync-pvc-backup-restore-kopia matches both labels
    # and generates volsync-plex Secret + plex-backup RS + RD with
    # spec.kopia in this ns.
    backup: daily
    backup-engine: kopia
  annotations:
    # Override mover cache PVC size (policy default 5Gi). Big-data
    # sources benefit from a larger cache to reduce repeat-fetch from
    # the Kopia repo during the initial scan.
    volsync.backup/cache-capacity: "10Gi"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  # Stale ref left over from the volsync-v2/bootstrap variant's
  # one-time populator (the bootstrap RD itself is long gone).
  # dataSourceRef is immutable on a bound PVC, so we mirror it here
  # to keep Flux's dry-run happy. On a fresh cluster rebuild,
  # Kyverno's mutate rule (CREATE-only) swaps it for plex-backup
  # at admission before bind.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: plex-bootstrap
  resources:
    requests:
      storage: 150Gi
