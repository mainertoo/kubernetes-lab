apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 30m
  releaseName: plex
  # plex's large cephfs /config does a slow fsGroup chown + DB init on a fresh
  # pod (several minutes). The default 5m Helm timeout was shorter than that, so
  # every upgrade "failed" and remediation rolled back to a broken revision in a
  # loop. Give Helm enough patience to let the (probe-protected) pod come up.
  timeout: 20m

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      plex:
        strategy: Recreate

        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
            rclone-mount: "true"

        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /config..."
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 4Gi
            image:
              repository: ghcr.io/linuxserver/plex
              tag: 1.43.2.10687-563d026ea-ls313
              pullPolicy: Always
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PLEX_ADVERTISE_URL
                value: "https://plex.lab.mainertoo.com"
            securityContext:
              privileged: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  periodSeconds: 10
                  # Plex can be slow to answer /identity during library/DB
                  # work; a 1s timeout (the default) SIGKILLs it mid-task.
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  # Generous budget so a post-disruption start (e.g. DB repair
                  # after a pod recreation) completes without being killed.
                  failureThreshold: 60
                  periodSeconds: 10

          # rclone sidecars: mount DUMB's debrid WebDAV backends in-cluster so
          # the combined_symlinks (read from the shared cephfs dumb-library PVC)
          # resolve their targets here, independent of which node DUMB runs on.
          # Each FUSE mount is established under the shared `debrid` emptyDir and
          # propagated (Bidirectional) into the plex app container (which mounts
          # it HostToContainer). Only the sidecars are root/privileged; the app
          # container is unchanged. See apps/base/dumb/dumb-library-pvc.yaml.
          rclone-nzbdav:
            image:
              repository: rclone/rclone
              tag: 1.74.4
            command:
              - /bin/sh
              - -c
            args:
              - |
                mkdir -p /mnt/debrid/nzbdav
                exec rclone mount nzbdav: /mnt/debrid/nzbdav \
                  --config=/cfg/rclone.conf \
                  --allow-other \
                  --dir-cache-time=10s \
                  --poll-interval=0 \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-size=2G \
                  --vfs-cache-max-age=1h \
                  --buffer-size=256M \
                  --links \
                  --use-cookies \
                  --cache-dir=/cache
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

          rclone-decypharr:
            image:
              repository: rclone/rclone
              tag: 1.74.4
            command:
              - /bin/sh
              - -c
            args:
              - |
                mkdir -p /mnt/debrid/decypharr
                exec rclone mount decypharr: /mnt/debrid/decypharr \
                  --config=/cfg/rclone.conf \
                  --allow-other \
                  --dir-cache-time=10s \
                  --poll-interval=0 \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-size=2G \
                  --vfs-cache-max-age=1h \
                  --buffer-size=256M \
                  --links \
                  --use-cookies \
                  --cache-dir=/cache
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        # plex's /config is a large cephfs tree; without OnRootMismatch the
        # kubelet recursively chowns it on EVERY pod start (minutes-long
        # VolumePermissionChangeInProgress), which is what turned the #883
        # rollout into a crashloop. Skip the chown when the root is already 1000.
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 991

    service:
      app:
        controller: plex
        type: ClusterIP
        ports:
          http:
            port: 32400

    persistence:
      config:
        existingClaim: plex
        advancedMounts:
          plex:
            app:
              - path: /config
            fix-config-perms:
              - path: /config

      plex-cache:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache

      logs:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Logs

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      library:
        existingClaim: shared-media-pvc
        advancedMounts:
          plex:
            app:
              - path: /mnt/library

      qnap-media:
        existingClaim: qnap-media-pvc
        advancedMounts:
          plex:
            app:
              - path: /data/qnas

      symlinks:
        existingClaim: symlinks-cephfs
        advancedMounts:
          plex:
            app:
              - path: /mnt/symlinks

      transcode:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /transcode

      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri

      # --- DUMB debrid library (Option B: in-cluster rclone sidecars) ---
      # Shared scratch dir holding the rclone FUSE mounts; the sidecars mount
      # it Bidirectional, the app sees their sub-mounts via HostToContainer.
      debrid:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /mnt/debrid
                mountPropagation: HostToContainer
            rclone-nzbdav:
              - path: /mnt/debrid
                mountPropagation: Bidirectional
            rclone-decypharr:
              - path: /mnt/debrid
                mountPropagation: Bidirectional

      # DUMB's combined_symlinks tree (shared cephfs, read-only). Mounted under
      # /mnt/debrid so its symlink targets (/mnt/debrid/{nzbdav,decypharr}/...)
      # resolve against the sidecar FUSE mounts.
      dumb-library:
        existingClaim: dumb-library
        advancedMounts:
          plex:
            app:
              - path: /mnt/debrid/combined_symlinks
                readOnly: true

      # rclone WebDAV config (nzbdav creds + decypharr) — sidecars only.
      rclone-config:
        type: secret
        name: dumb-rclone-config
        advancedMounts:
          plex:
            rclone-nzbdav:
              - path: /cfg
                readOnly: true
            rclone-decypharr:
              - path: /cfg
                readOnly: true

      debrid-fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          plex:
            rclone-nzbdav:
              - path: /dev/fuse
            rclone-decypharr:
              - path: /dev/fuse

      rclone-cache:
        type: emptyDir
        advancedMounts:
          plex:
            rclone-nzbdav:
              - path: /cache
            rclone-decypharr:
              - path: /cache