apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app seerr
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      seerr:
        replicas: 1

        containers:
          app:
            image:
              # For now Seerr is still built from the jellyseerr image
              # When a dedicated seerr image/tag is published, just change these two lines.
              repository: ghcr.io/seerr-team/seerr
              # tag: "sha-15356df"
              # pullPolicy: IfNotPresent
              tag: "v3.3.0"
              pullPolicy: Always

            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PORT
                value: &port 80

        # Fix CephFS perms before the main container starts
        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /app/config..."
                chown -R 1000:1000 /app/config || true
                chmod -R 0775 /app/config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: seerr
        type: ClusterIP
        ports:
          http:
            port: *port

    persistence:
      # Seerr config on CephFS
      config:
        existingClaim: *app
        advancedMounts:
          seerr:
            app:
              - path: /app/config
            fix-config-perms:
              - path: /app/config

      # Scratch space
      tmp:
        type: emptyDir