apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seerr-ingressroute
  namespace: media
  annotations:
    gethomepage.dev/href: "https://seerr.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Seerr"
    gethomepage.dev/description: "Next-gen media request manager (successor to Jellyseerr/Overseerr)"
    gethomepage.dev/app: seerr
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "sh-jellyseerr.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`seerr.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: seerr
          port: 80