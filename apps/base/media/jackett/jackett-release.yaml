apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jackett
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3

  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/jackett
              tag: 0.24.1957
              pullPolicy: IfNotPresent

            env:
              PUID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PUID
              PGID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PGID
              TZ:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: TZ
              AUTO_UPDATE:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: JACKETT_AUTO_UPDATE
              RUN_OPTS:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: JACKETT_RUN_OPTS

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 9117

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jackett-config
        globalMounts:
          - path: /config

      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jackett-downloads
        globalMounts:
          - path: /downloads