apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readmeabook
  namespace: media
spec:
  interval: 30m
  releaseName: readmeabook

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          init-app-storage:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e

                echo "Initializing ReadMeABook app storage..."
                mkdir -p /storage/config
                mkdir -p /storage/cache
                mkdir -p /storage/pgdata
                mkdir -p /storage/redis
                chown -R 1000:1000 /storage || true
                chmod -R 0775 /storage || true

                echo "Preparing QNAP paths for ReadMeABook..."
                mkdir -p /data/usenet
                mkdir -p /data/usenet/complete
                mkdir -p /data/usenet/incomplete
                mkdir -p /data/torrents
                mkdir -p /data/torrents/books
                mkdir -p /data/media
                mkdir -p /data/media/books

                echo "Adjusting only the /data mount root (non-recursive)..."
                chown 1000:1000 /data || true
                chmod 0775 /data || true

                echo "Adjusting only RMAB-relevant subdirectories..."
                chown 1000:1000 /data/usenet || true
                chown 1000:1000 /data/usenet/complete || true
                chown 1000:1000 /data/usenet/incomplete || true
                chown 1000:1000 /data/torrents || true
                chown 1000:1000 /data/torrents/books || true
                chown 1000:1000 /data/media || true
                chown 1000:1000 /data/media/books || true

                chmod 0775 /data/usenet || true
                chmod 0775 /data/usenet/complete || true
                chmod 0775 /data/usenet/incomplete || true
                chmod 0775 /data/torrents || true
                chmod 0775 /data/torrents/books || true
                chmod 0775 /data/media || true
                chmod 0775 /data/media/books || true

                echo "Testing write access to /data root..."
                touch /data/.readmeabook-write-test
                rm -f /data/.readmeabook-write-test

                echo "Listing key paths..."
                ls -ld /data || true
                ls -ld /data/usenet || true
                ls -ld /data/usenet/complete || true
                ls -ld /data/usenet/incomplete || true
                ls -ld /data/torrents || true
                ls -ld /data/torrents/books || true
                ls -ld /data/media || true
                ls -ld /data/media/books || true

                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/kikootwo/readmeabook
              tag: 1.2.1
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              PUBLIC_URL: "https://readmeabook.mainertoo.com"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3030
                  initialDelaySeconds: 45
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3030
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3030
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 3030

    persistence:
      appdata:
        enabled: true
        existingClaim: readmeabook
        advancedMounts:
          main:
            init-app-storage:
              - path: /storage
            main:
              - path: /app/config
                subPath: config
              - path: /app/cache
                subPath: cache
              - path: /var/lib/postgresql/data
                subPath: pgdata
              - path: /var/lib/redis
                subPath: redis

      qnap-data:
        enabled: true
        existingClaim: qnap-media-pvc
        advancedMounts:
          main:
            init-app-storage:
              - path: /data
            main:
              - path: /data

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi