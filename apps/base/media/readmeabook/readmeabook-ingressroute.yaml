apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: readmeabook-ingressroute
  namespace: media
  annotations:
    gethomepage.dev/href: "https://readmeabook.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ReadMeABook"
    gethomepage.dev/description: "Audiobook request and automation platform"
    gethomepage.dev/app: readmeabook
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "sh-readmeabook.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`readmeabook.lab.mainertoo.com`)
      kind: Rule
      # middlewares:
      #   - name: authentik-sso
      #     namespace: traefik-system
      services:
        - name: readmeabook
          port: 3030
  tls: {}