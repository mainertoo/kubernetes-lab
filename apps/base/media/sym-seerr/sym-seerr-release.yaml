apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sym-seerr
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      seerr:
        replicas: 1

        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: "v3.1.1"
              pullPolicy: Always
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PORT
                value: &port 80

        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /app/config..."
                chown -R 1000:1000 /app/config || true
                chmod -R 0775 /app/config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: seerr
        type: ClusterIP
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: sym-seerr
        advancedMounts:
          seerr:
            app:
              - path: /app/config
            fix-config-perms:
              - path: /app/config

      tmp:
        type: emptyDir

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        advancedMounts:
          seerr:
            app:
              - path: /mnt/symlinks