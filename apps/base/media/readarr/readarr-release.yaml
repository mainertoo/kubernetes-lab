apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
  namespace: media
spec:
  interval: 30m
  releaseName: readarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        # Ensure the per-app folder exists on the shared CephFS symlinks PVC
        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (readarr)..."
                mkdir -p /mnt/symlinks/readarr
                chown -R 1000:1000 /mnt/symlinks/readarr || true
                chmod -R 0775 /mnt/symlinks/readarr || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/readarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/faustvii/readarr
              tag: 0.9.0
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              READARR__AUTH__METHOD: External
              READARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      # Prefer to schedule Readarr on the same node as Calibre.
      # This reduces multi-node RWX attachments and avoids "still attached" cleanup noise later.
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - calibre
                topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8787

    persistence:
      # Readarr config (ceph-rbd PVC named "readarr")
      config:
        enabled: true
        existingClaim: readarr
        advancedMounts:
          main:
            main:
              - path: /config

      # QNAP media share (RW)
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      # Your decypharr visible hostPath (kept as-is)
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # Shared symlinks (CephFS RWX PVC)
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks

      # Calibre library (CephFS RWX PVC) - RW as requested
      # This MUST match what Calibre is using:
      #   /calibre-library/metadata.db
      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library