apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
  namespace: media
spec:
  interval: 30m
  releaseName: readarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (readarr)..."
                echo "Listing /mnt/symlinks before:"
                ls -la /mnt/symlinks || true

                # Create the directories inside the CephFS PVC
                mkdir -p /mnt/symlinks/decypharr /mnt/symlinks/readarr

                # Ensure Readarr can write to its folder
                chown -R 1000:1000 /mnt/symlinks/readarr || true
                chmod -R 0775 /mnt/symlinks/readarr || true

                echo "Listing /mnt/symlinks after:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/readarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          main:
            image:
              repository: ghcr.io/faustvii/readarr
              tag: 0.9.0
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              READARR__AUTH__METHOD: External
              READARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - decypharr
              topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8787

    persistence:
      config:
        enabled: true
        existingClaim: readarr
        advancedMounts:
          main:
            main:
              - path: /config

      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      torrents:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /torrents
            subPath: torrents

      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # ✅ FIX: mount the CephFS PVC root (no subPath) so the initContainer can create directories
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        advancedMounts:
          main:
            fix-symlinks-perms:
              - path: /mnt/symlinks
            main:
              - path: /mnt/symlinks