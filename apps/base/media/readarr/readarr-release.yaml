apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
  namespace: media
spec:
  interval: 30m
  releaseName: readarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/faustvii/readarr
              tag: 0.9.0
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              READARR__AUTH__METHOD: External
              READARR__AUTH__REQUIRED: DisabledForLocalAddresses

        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh","-c"]
            args:
              - |
                set -e
                echo "Ensuring /mnt/symlinks/readarr exists and is writable..."
                mkdir -p /mnt/symlinks/readarr
                chown -R 1000:1000 /mnt/symlinks/readarr || true
                chmod -R 0775 /mnt/symlinks/readarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - decypharr
              topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8787

    persistence:
      # /config on ceph-rbd PVC
      config:
        enabled: true
        existingClaim: readarr
        globalMounts:
          - path: /config

      # QNAP RW share for library + imports
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      # /data/torrents -> /torrents
      torrents:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /torrents
            subPath: torrents

      # Keep for future decypharr integration
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # Symlinks on CephFS (RWX) w/ subPath isolation + initContainer mount
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        advancedMounts:
          main:
            main:
              - path: /mnt/symlinks/decypharr
                subPath: decypharr
                readOnly: true
              - path: /mnt/symlinks/readarr
                subPath: readarr
            fix-symlinks-perms:
              - path: /mnt/symlinks/readarr
                subPath: readarr