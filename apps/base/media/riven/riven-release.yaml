apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app riven
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      riven:
        # Ensure Riven can run on ANY worker, but only on nodes that have the
        # rclone/FUSE mount capability for /mnt/zurg.
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: rclone-mount
                        operator: In
                        values:
                          - "true"

        containers:
          postgres:
            image:
              repository: postgres
              tag: 17.0-alpine3.20
            envFrom:
              - secretRef:
                  name: riven-postgres-secret
              - configMapRef:
                  name: riven-postgres-configmap
            env:
              - name: PGDATA
                value: /var/lib/postgresql/data/pgdata
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "postgres"]
                  initialDelaySeconds: 10
                  periodSeconds: 5

          backend:
            image:
              repository: docker.io/spoked/riven
              tag: v0.23.6
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-backend-secret
              - configMapRef:
                  name: riven-backend-configmap
            dependsOn: postgres

          frontend:
            image:
              repository: docker.io/spoked/riven-frontend
              tag: v0.21.2
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-frontend-secret
              - configMapRef:
                  name: riven-frontend-configmap
            dependsOn: backend

    service:
      frontend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portfrontend 3000

      backend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portbackend 8080

      postgres:
        controller: riven
        type: ClusterIP
        ports:
          postgres:
            port: &portpostgres 5432
            targetPort: 5432

    persistence:
      data:
        existingClaim: riven-data-pvc
        advancedMounts:
          riven:
            backend:
              - path: /riven/data

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        advancedMounts:
          riven:
            backend:
              - path: /mnt/zurg
                readOnly: true

      media:
        existingClaim: shared-media-pvc
        advancedMounts:
          riven:
            backend:
              - path: /mnt/library

      database:
        existingClaim: riven-backend-pvc
        advancedMounts:
          riven:
            postgres:
              - path: /var/lib/postgresql/data