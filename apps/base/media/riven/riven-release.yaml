apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app riven
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      riven:
        # Ensure Riven can run on ANY worker, but only on nodes that have the
        # rclone/FUSE mount capability for /mnt/zurg.
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: rclone-mount
                        operator: In
                        values:
                          - "true"

        containers:
          # CNPG cutover 2026-05-09 (Phase 3b-cutover): the postgres sidecar
          # was removed from this pod. The riven backend now connects to the
          # CNPG-managed cluster `riven-db` via Service `riven-db-rw`. The
          # legacy `riven-backend-pvc` (which used to hold the postgres data)
          # is now unused — decommission in Phase 3b-decommission after 24h soak.

          backend:
            image:
              repository: docker.io/spoked/riven
              tag: v0.23.6
            # env[] is evaluated AFTER envFrom — so the RIVEN_DATABASE_HOST set
            # here OVERRIDES the legacy URL still present in riven-backend-secret.
            # bjw-s app-template renders env list-style entries in declaration
            # order, so PGUSER and PGPASSWORD are evaluated before
            # RIVEN_DATABASE_HOST, satisfying K8s $(VAR) substitution.
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: PGUSER
                valueFrom:
                  secretKeyRef:
                    name: riven-db-app
                    key: username
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: riven-db-app
                    key: password
              - name: RIVEN_DATABASE_HOST
                value: "postgresql+psycopg2://$(PGUSER):$(PGPASSWORD)@riven-db-rw/riven"
            envFrom:
              - secretRef:
                  name: riven-backend-secret
              - configMapRef:
                  name: riven-backend-configmap

          frontend:
            image:
              repository: docker.io/spoked/riven-frontend
              tag: v0.21.2
            env:
              - name: TZ
                value: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: riven-frontend-secret
              - configMapRef:
                  name: riven-frontend-configmap
            dependsOn: backend
        # Note: backend.dependsOn previously listed `postgres`. Now that the
        # postgres sidecar is gone, the backend has no in-pod ordering deps.
        # External ordering (CNPG cluster Ready before this app) is enforced
        # via the Flux-Kustomization-level dependsOn in apps/production/media/riven/app.yaml.

    service:
      frontend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portfrontend 3000

      backend:
        controller: riven
        type: ClusterIP
        ports:
          http:
            port: &portbackend 8080

      # `postgres` Service removed during CNPG cutover 2026-05-09. Was
      # exposing the in-pod postgres sidecar on 5432; that container no
      # longer exists. Apps now connect to riven-db-rw (CNPG primary).

    persistence:
      data:
        existingClaim: riven-data-pvc
        advancedMounts:
          riven:
            backend:
              - path: /riven/data

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        advancedMounts:
          riven:
            backend:
              - path: /mnt/zurg
                readOnly: true

      media:
        existingClaim: shared-media-pvc
        advancedMounts:
          riven:
            backend:
              - path: /mnt/library

      # `database` persistence (was: existingClaim riven-backend-pvc mounted
      # to the postgres sidecar) removed during CNPG cutover 2026-05-09.
      # The riven-backend-pvc still exists in-cluster but is unmounted; it
      # gets pruned in Phase 3b-decommission after the 24h soak.