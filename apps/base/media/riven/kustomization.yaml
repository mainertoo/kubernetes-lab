apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
# Riven's PVCs are NOT defined here — they live in their own Flux Kustomizations:
# apps/base/riven-data-pvc/ and apps/base/riven-sharedmedia-pvc/ (wired via apps/production/media/riven/).
resources:
  - riven-namespace.yaml
  - riven-ingressroute.yaml
  - riven-backend-configmap.yaml
  - riven-frontend-configmap.yaml
  - riven-release.yaml
  - riven-backend-secret.sops.yaml
  - riven-frontend-secret.sops.yaml