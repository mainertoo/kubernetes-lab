apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sym-sonarr4k-ingressroute
  namespace: media
  annotations:
    gethomepage.dev/href: "https://sym-sonarr4k.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Sym Sonarr 4K"
    gethomepage.dev/description: "4K TV organizer for symlink stack"
    gethomepage.dev/app: sym-sonarr4k
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/sonarr.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`sym-sonarr4k.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: sym-sonarr4k
          port: 8989
  tls: {}