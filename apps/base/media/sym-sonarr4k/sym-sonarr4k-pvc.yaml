apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sym-sonarr4k
  labels:
    # Phase 5 of the Kopia transition (docs/volsync-kopia-transition.md).
    # ClusterPolicy volsync-pvc-backup-restore-kopia matches both labels
    # and generates volsync-sym-sonarr4k Secret + sym-sonarr4k-backup RS + RD with
    # spec.kopia in this ns.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 20Gi
