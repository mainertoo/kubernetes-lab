apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dumb-library
  namespace: media
  # Binds to the static dumb-library-media-pv, which maps to DUMB's
  # combined_symlinks cephfs subvolume. Consumed read-only by the external
  # Plex/Jellyfin. NOT volsync-labelled: DUMB owns this data; the symlinks
  # are derived state regenerated by decypharr/nzbDAV.
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: dumb-library-media-pv
  resources:
    requests:
      storage: 10Gi
