apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpackerr
  namespace: media
spec:
  interval: 30m
  releaseName: unpackerr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        containers:
          main:
            image:
              repository: golift/unpackerr
              tag: 0.15.2
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              UN_LOG_FILE: "/data/torrents/unpackerr.log"
              UN_WEBSERVER_METRICS: "true"
              UN_WEBSERVER_LISTEN_ADDR: "0.0.0.0:5656"

            envFrom:
              - secretRef:
                  name: unpackerr-secret

            securityContext:
              runAsUser: 1001
              runAsGroup: 100
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

            ports:
              - name: http
                containerPort: 5656
                protocol: TCP

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 5656
            targetPort: http

    defaultPodOptions:
      securityContext:
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      # VolSync-managed PVC in production; in staging you can still create it manually if you want.
      config:
        enabled: true
        existingClaim: ${APP}
        globalMounts:
          - path: /config

      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data