apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sym-prowlarr
  namespace: media
spec:
  interval: 30m
  releaseName: sym-prowlarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (sym-prowlarr)..."
                mkdir -p /mnt/symlinks/prowlarr
                chown -R 1000:1000 /mnt/symlinks/prowlarr || true
                chmod -R 0775 /mnt/symlinks/prowlarr || true
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/prowlarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/home-operations/prowlarr
              tag: 2.4.0.5391
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              PROWLARR__AUTH__METHOD: External
              PROWLARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9696

    persistence:
      config:
        enabled: true
        existingClaim: sym-prowlarr
        globalMounts:
          - path: /config

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks