apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sym-radarr4k-ingressroute
  namespace: media
  annotations:
    gethomepage.dev/href: "https://sym-radarr4k.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Sym Radarr 4K"
    gethomepage.dev/description: "4K movie organizer for symlink stack"
    gethomepage.dev/app: sym-radarr4k
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/radarr.svg"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`sym-radarr4k.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: sym-radarr4k
          port: 7878
  tls: {}