apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookrequest
  namespace: media
spec:
  interval: 30m
  releaseName: audiobookrequest

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        strategy: Recreate

        containers:
          main:
            image:
              repository: markbeep/audiobookrequest
              tag: "1.9.0"
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              ABR_APP__PORT: "8000"
              ABR_APP__CONFIG_DIR: /config
              ABR_APP__OPENAPI_ENABLED: "false"

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8000

    persistence:
      config:
        enabled: true
        existingClaim: audiobookrequest
        advancedMounts:
          main:
            main:
              - path: /config

    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 512Mi