apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dispatcharr
  namespace: media
  annotations:
    gethomepage.dev/href: "https://dispatcharr.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Dispatcharr"
    gethomepage.dev/description: "Arr-stack dispatch/queue manager"
    gethomepage.dev/app: dispatcharr
    gethomepage.dev/group: "Media"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dispatcharr.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: dispatcharr
          port: 9191
  tls: {}