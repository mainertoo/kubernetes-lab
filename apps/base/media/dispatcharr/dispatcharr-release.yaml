apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          init-data-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -e
                echo "Ensuring /data exists and is writable..."
                mkdir -p /data
                chown -R 1000:1000 /data
                chmod -R 0775 /data
                ls -ld /data
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: latest
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: DISPATCHARR_ENV
                value: aio
              - name: DISPATCHARR_LOG_LEVEL
                value: info
            ports:
              - name: http
                containerPort: 9191
                protocol: TCP

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9191

    persistence:
      data:
        enabled: true
        existingClaim: dispatcharr
        advancedMounts:
          main:
            main:
              - path: /data
            init-data-perms:
              - path: /data