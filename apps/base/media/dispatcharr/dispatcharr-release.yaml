apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr

  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: latest
              pullPolicy: IfNotPresent

            env:
              - name: TZ
                value: America/Los_Angeles

            ports:
              - name: http
                containerPort: 8080
                protocol: TCP

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080

    ingress:
      main:
        enabled: false

    persistence:
      config:
        existingClaim: dispatcharr
        globalMounts:
          - path: /config

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000