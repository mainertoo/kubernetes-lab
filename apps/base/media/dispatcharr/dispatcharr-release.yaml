apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr

  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    controllers:
      main:
        # OPTIONAL: pin to your GPU nodes (same label you use for Plex/Jellyfin)
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.14.0
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              DISPATCHARR_ENV: aio
              DISPATCHARR_LOG_LEVEL: info

            ports:
              - name: http
                containerPort: 9191
                protocol: TCP

    # Run as root (as you had it) since the container may write into /etc and /root at startup.
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: http

    persistence:
      data:
        enabled: true
        existingClaim: dispatcharr
        advancedMounts:
          main:
            main:
              - path: /data

      profile-d:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /etc/profile.d

      root-home:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /root

      # GPU device nodes passthrough (enables /dev/dri/renderD128 inside the pod)
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri