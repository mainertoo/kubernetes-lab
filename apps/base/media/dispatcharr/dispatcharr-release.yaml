apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          fix-data-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -e
                echo "Ensuring /data exists and is writable..."
                mkdir -p /data
                chown -R 1000:1000 /data || true
                chmod -R 0775 /data || true
                ls -ld /data || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: latest
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: DISPATCHARR_ENV
                value: aio
              - name: DISPATCHARR_LOG_LEVEL
                value: info

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9191

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        existingClaim: dispatcharr-data
        advancedMounts:
          main:
            main:
              - path: /data
          main:
            fix-data-perms:
              - path: /data