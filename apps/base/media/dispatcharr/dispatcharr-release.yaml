apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -e
                echo "Preparing writable paths for Dispatcharr entrypoint..."

                # /data must exist and be writable for jwt + embedded postgres dir
                mkdir -p /data
                chown -R 1000:1000 /data
                chmod -R 0775 /data

                # /etc/profile.d is mounted as emptyDir => writable
                mkdir -p /etc/profile.d
                chown -R 1000:1000 /etc/profile.d
                chmod -R 0775 /etc/profile.d

                # /root is mounted as emptyDir => writable for /root/.bashrc
                mkdir -p /root
                touch /root/.bashrc
                chown -R 1000:1000 /root
                chmod 0775 /root
                chmod 0664 /root/.bashrc

                echo "Done. Debug:"
                ls -ld /data /etc/profile.d /root || true
                ls -l /root/.bashrc || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.14.0
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: DISPATCHARR_ENV
                value: aio
              - name: DISPATCHARR_LOG_LEVEL
                value: info
            ports:
              - name: http
                containerPort: 9191
                protocol: TCP

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9191

    persistence:
      data:
        enabled: true
        existingClaim: dispatcharr
        advancedMounts:
          main:
            main:
              - path: /data
            init-perms:
              - path: /data

      # writable /etc/profile.d without changing image layer
      profile-d:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /etc/profile.d
            init-perms:
              - path: /etc/profile.d

      # writable /root for /root/.bashrc writes
      root-home:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /root
            init-perms:
              - path: /root