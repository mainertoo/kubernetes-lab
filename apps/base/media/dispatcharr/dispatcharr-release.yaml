apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dispatcharr
  namespace: media
spec:
  interval: 30m
  releaseName: dispatcharr

  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    controllers:
      main:
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        containers:
          main:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.19.0
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              DISPATCHARR_ENV: aio
              DISPATCHARR_LOG_LEVEL: info

            ports:
              - name: http
                containerPort: 9191
                protocol: TCP

            # IMPORTANT: allow access to /dev/dri character devices (matches Plex behavior)
            securityContext:
              privileged: true

    # Run as root (needed for this image's init behavior)
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        # Keep these for consistency with /dev/dri ownership (card* -> 44, renderD128 -> 991)
        supplementalGroups:
          - 44
          - 991

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: http

    persistence:
      data:
        enabled: true
        existingClaim: dispatcharr
        advancedMounts:
          main:
            main:
              - path: /data

      profile-d:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /etc/profile.d

      root-home:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /root

      # GPU device nodes passthrough
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri