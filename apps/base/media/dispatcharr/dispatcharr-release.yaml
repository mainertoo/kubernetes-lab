values:
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/dispatcharr/dispatcharr
            tag: 0.14.0
            pullPolicy: IfNotPresent

          env:
            - name: TZ
              value: America/Los_Angeles
            - name: DISPATCHARR_ENV
              value: aio
            - name: DISPATCHARR_LOG_LEVEL
              value: info

          ports:
            - name: http
              containerPort: 8001
              protocol: TCP

  defaultPodOptions:
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 80
          targetPort: http   # <-- IMPORTANT: forwards to container port named "http" (8001)

  persistence:
    data:
      enabled: true
      existingClaim: dispatcharr
      advancedMounts:
        main:
          main:
            - path: /data

    profile-d:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /etc/profile.d

    root-home:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /root