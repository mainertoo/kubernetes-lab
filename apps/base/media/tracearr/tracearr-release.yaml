apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
  namespace: media
spec:
  interval: 30m
  releaseName: tracearr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      tracearr:
        initContainers:
          wait-for-deps:
            image:
              repository: busybox
              tag: "1.38"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eux

                until nslookup tracearr-tracearr-timescale.media.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: tracearr-tracearr-timescale.media.svc.cluster.local"
                  sleep 2
                done

                until nslookup tracearr-tracearr-redis.media.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: tracearr-tracearr-redis.media.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 tracearr-tracearr-timescale.media.svc.cluster.local 5432; do
                  echo "waiting for postgres: tracearr-tracearr-timescale.media.svc.cluster.local:5432"
                  sleep 2
                done

                until nc -z -w 2 tracearr-tracearr-redis.media.svc.cluster.local 6379; do
                  echo "waiting for redis: tracearr-tracearr-redis.media.svc.cluster.local:6379"
                  sleep 2
                done

                echo "deps are reachable"

        containers:
          app:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: latest
              pullPolicy: Always

            env:
              TZ: America/Los_Angeles
              PORT: "3000"
              HOST: "0.0.0.0"
              NODE_ENV: production
              LOG_LEVEL: info

              # Must match the services your Helm release actually creates
              REDIS_URL: redis://tracearr-tracearr-redis.media.svc.cluster.local:6379

              # Use your real URL (helps auth + browser behavior)
              CORS_ORIGIN: "https://tracearr.lab.mainertoo.com"

            envFrom:
              - secretRef:
                  name: tracearr-secret

            ports:
              - name: http
                containerPort: 3000
                protocol: TCP

      redis:
        containers:
          main:
            image:
              repository: redis
              tag: 8-alpine
              pullPolicy: IfNotPresent
            command:
              - redis-server
              - --appendonly
              - "yes"

      timescale:
        initContainers:
          init-timescale-pgdata:
            image:
              repository: busybox
              tag: "1.38"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eux
                mkdir -p /var/lib/postgresql/data/pgdata
                chown -R 999:999 /var/lib/postgresql/data/pgdata
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          main:
            image:
              repository: timescale/timescaledb
              tag: latest-pg16
              pullPolicy: IfNotPresent
            env:
              POSTGRES_DB: tracearr
              POSTGRES_USER: tracearr
              PGDATA: /var/lib/postgresql/data/pgdata
            envFrom:
              - secretRef:
                  name: tracearr-secret

    service:
      tracearr:
        controller: tracearr
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 3000

      tracearr-redis:
        controller: redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

      tracearr-timescale:
        controller: timescale
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

    persistence:
      redis-data:
        enabled: true
        existingClaim: tracearr-redis
        advancedMounts:
          redis:
            main:
              - path: /data

      timescale-data:
        enabled: true
        existingClaim: tracearr-timescale
        advancedMounts:
          timescale:
            init-timescale-pgdata:
              - path: /var/lib/postgresql/data
            main:
              - path: /var/lib/postgresql/data

      timescale-shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          timescale:
            main:
              - path: /dev/shm

    defaultPodOptions:
      automountServiceAccountToken: false