apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
  namespace: media
spec:
  interval: 30m
  releaseName: tracearr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      tracearr:
        containers:
          app:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: latest
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PORT: "3000"
              NODE_ENV: production
              LOG_LEVEL: info
              REDIS_URL: redis://tracearr-redis:6379
              CORS_ORIGIN: "*"

            envFrom:
              - secretRef:
                  name: tracearr-secret

            ports:
              - name: http
                containerPort: 3000
                protocol: TCP

      redis:
        containers:
          main:
            image:
              repository: redis
              tag: 8-alpine
              pullPolicy: IfNotPresent
            command:
              - redis-server
              - --appendonly
              - "yes"

      timescale:
        containers:
          main:
            image:
              repository: timescale/timescaledb
              tag: latest-pg16
              pullPolicy: IfNotPresent
            env:
              POSTGRES_DB: tracearr
              POSTGRES_USER: tracearr
              PGDATA: /var/lib/postgresql/data
            envFrom:
              - secretRef:
                  name: tracearr-secret

    service:
      tracearr:
        controller: tracearr
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 3000

      tracearr-redis:
        controller: redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

      tracearr-timescale:
        controller: timescale
        type: ClusterIP
        ports:
          postgres:
            port: 5432
            targetPort: 5432

    persistence:
      redis-data:
        enabled: true
        existingClaim: tracearr-redis
        advancedMounts:
          redis:
            main:
              - path: /data

      timescale-data:
        enabled: true
        existingClaim: tracearr-timescale
        advancedMounts:
          timescale:
            main:
              - path: /var/lib/postgresql/data

      timescale-shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          timescale:
            main:
              - path: /dev/shm

    defaultPodOptions:
      automountServiceAccountToken: false