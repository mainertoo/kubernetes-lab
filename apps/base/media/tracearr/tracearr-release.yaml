apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
  namespace: media
spec:
  interval: 30m
  releaseName: tracearr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 15m

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 15m

  uninstall:
    keepHistory: false

  values:
    controllers:
      tracearr:
        initContainers:
          wait-for-deps:
            image:
              repository: busybox
              tag: "1.38"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eux

                until nslookup tracearr-cnpg-db-rw.media.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: tracearr-cnpg-db-rw.media.svc.cluster.local"
                  sleep 2
                done

                until nslookup tracearr-tracearr-redis.media.svc.cluster.local >/dev/null 2>&1; do
                  echo "waiting for DNS: tracearr-tracearr-redis.media.svc.cluster.local"
                  sleep 2
                done

                until nc -z -w 2 tracearr-cnpg-db-rw.media.svc.cluster.local 5432; do
                  echo "waiting for postgres: tracearr-cnpg-db-rw.media.svc.cluster.local:5432"
                  sleep 2
                done

                until nc -z -w 2 tracearr-tracearr-redis.media.svc.cluster.local 6379; do
                  echo "waiting for redis: tracearr-tracearr-redis.media.svc.cluster.local:6379"
                  sleep 2
                done

                echo "deps are reachable"

        containers:
          app:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: latest
              pullPolicy: Always

            env:
              TZ: America/Los_Angeles
              PORT: "3000"
              HOST: "0.0.0.0"
              NODE_ENV: production
              LOG_LEVEL: info

              # Must match the services your Helm release actually creates
              REDIS_URL: redis://tracearr-tracearr-redis.media.svc.cluster.local:6379

              # Use your real URL (helps auth + browser behavior)
              CORS_ORIGIN: "https://tracearr.lab.mainertoo.com"

              # DB connection points at the CNPG-managed cluster
              # (tracearr-cnpg-db). Sourced from the CNPG-generated app Secret's
              # ready-made connection URI (fqdn-uri uses the in-cluster FQDN),
              # which auto-tracks the managed password. The legacy DATABASE_URL
              # + POSTGRES_PASSWORD keys were dropped from tracearr-secret in the
              # TimescaleDB decommission — this is now the sole DB connection.
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-cnpg-db-app
                    key: fqdn-uri

            envFrom:
              - secretRef:
                  name: tracearr-secret

            ports:
              - name: http
                containerPort: 3000
                protocol: TCP

      redis:
        containers:
          main:
            image:
              repository: redis
              tag: 8.8.0-alpine
              pullPolicy: IfNotPresent
            command:
              - redis-server
              - --appendonly
              - "yes"

    service:
      tracearr:
        controller: tracearr
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 3000

      tracearr-redis:
        controller: redis
        type: ClusterIP
        ports:
          redis:
            port: 6379
            targetPort: 6379

    persistence:
      redis-data:
        enabled: true
        existingClaim: tracearr-redis
        advancedMounts:
          redis:
            main:
              - path: /data

    defaultPodOptions:
      automountServiceAccountToken: false