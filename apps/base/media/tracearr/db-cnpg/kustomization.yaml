apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
# tracearr connects as the CNPG-created owner role `tracearr` via the
# auto-generated `tracearr-cnpg-db-app` Secret — no app-managed role secret is
# needed here. The Cluster / ScheduledBackup / ObjectStore / S3 Secret are all
# rendered by the cnpg-cluster Components referenced from the parent Flux
# Kustomization (apps/production/media/tracearr/db-cnpg.yaml). This directory
# exists so that Flux Kustomization has a valid kustomize build target for the
# Components to layer onto.
#
# The `media` namespace already exists (owned by the broader media stack), so
# it is not (re)declared here.
resources: []
