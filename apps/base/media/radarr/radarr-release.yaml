# /apps/base/media/radarr/radarr-release.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 30m
  releaseName: radarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        # Ensure the per-app folder exists on the shared CephFS symlinks PVC
        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (radarr)..."
                mkdir -p /mnt/symlinks/radarr
                chown -R 1000:1000 /mnt/symlinks/radarr || true
                chmod -R 0775 /mnt/symlinks/radarr || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/radarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.3.0.10514
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      # Radarr config (ceph-rbd PVC named "radarr")
      config:
        enabled: true
        existingClaim: radarr
        globalMounts:
          - path: /config

      # QNAP media share (RW) — gives Radarr /data and /data/torrents
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      # Shared symlinks (CephFS RWX PVC)
      # Mount whole share at /mnt/symlinks; Radarr uses /mnt/symlinks/radarr inside it.
      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks