apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 30m
  releaseName: radarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.1.0.10309
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      # Radarr config (ceph-rbd PVC named "radarr")
      config:
        enabled: true
        existingClaim: radarr
        globalMounts:
          - path: /config

      # QNAP media share (RW) — gives Radarr /data and /data/torrents
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      # OPTIONAL: if you prefer the exact /torrents path like Swarm, uncomment:
      # qnap-torrents:
      #   enabled: true
      #   existingClaim: qnap-media-pvc
      #   globalMounts:
      #     - path: /torrents
      #       subPath: torrents

      # Your decypharr visible hostPath (kept as-is)
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # Shared symlinks PVC (local-path)
      symlinks:
        enabled: true
        existingClaim: symlinks
        globalMounts:
          - path: /mnt/symlinks/decypharr
            readOnly: true
          - path: /mnt/symlinks/radarr