apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speakarr
  namespace: media
spec:
  interval: 30m
  releaseName: speakarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        containers:
          main:
            image:
              repository: ghcr.io/faustvii/readarr
              tag: 0.9.0
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              READARR__AUTH__METHOD: External
              READARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - decypharr
              topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8787

    persistence:
      config:
        enabled: true
        existingClaim: speakarr
        advancedMounts:
          main:
            main:
              - path: /config

      # Mount QNAP ONCE at /data (use /data/torrents inside the app)
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      # symlinks:
      #   enabled: true
      #   existingClaim: symlinks-cephfs
      #   advancedMounts:
      #     main:
      #       main:
      #         - path: /mnt/symlinks/decypharr
      #           subPath: decypharr
      #           readOnly: true
      #         - path: /mnt/symlinks/speakarr
      #           subPath: speakarr