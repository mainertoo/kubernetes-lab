apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lidarr
  namespace: media
spec:
  interval: 30m
  releaseName: lidarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (lidarr)..."
                mkdir -p /mnt/symlinks/lidarr
                chown -R 1000:1000 /mnt/symlinks/lidarr || true
                chmod -R 0775 /mnt/symlinks/lidarr || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/lidarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 3.1.3.4975
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              LIDARR__AUTH__METHOD: External
              LIDARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8686

    persistence:
      config:
        enabled: true
        existingClaim: lidarr
        globalMounts:
          - path: /config

      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks