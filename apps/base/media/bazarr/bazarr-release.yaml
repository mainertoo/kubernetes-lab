apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: media
spec:
  interval: 30m
  releaseName: bazarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (bazarr)..."
                mkdir -p /mnt/symlinks/bazarr
                chown -R 1000:1000 /mnt/symlinks/bazarr || true
                chmod -R 0775 /mnt/symlinks/bazarr || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/bazarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            # Real Bazarr image (not the home-operations sandbox)
            image:
              repository: lscr.io/linuxserver/bazarr
              tag: 1.5.7-development@sha256:f0e05ac221b49f5e12dcb8418455ebda94a4934867371cb31106127edfd848e0
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              UMASK: "002"
            # Readiness probe so a wedged bazarr (app not listening on 6767 —
            # e.g. the 2026-06-04 DB-migration crash-loop) is marked NotReady
            # and pulled from endpoints, instead of falsely showing Running.
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 6767
                  initialDelaySeconds: 20
                  periodSeconds: 20
                  failureThreshold: 3

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 6767

    persistence:
      config:
        enabled: true
        existingClaim: bazarr
        globalMounts:
          - path: /config

      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks