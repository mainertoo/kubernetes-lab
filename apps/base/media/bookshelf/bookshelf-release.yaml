apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookshelf
  namespace: media
spec:
  interval: 30m
  releaseName: bookshelf

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          fix-symlinks-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init symlinks dirs (bookshelf)..."
                mkdir -p /mnt/symlinks/bookshelf
                chown -R 1000:1000 /mnt/symlinks/bookshelf || true
                chmod -R 0775 /mnt/symlinks/bookshelf || true
                echo "Listing /mnt/symlinks:"
                ls -la /mnt/symlinks || true
                ls -la /mnt/symlinks/bookshelf || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/pennydreadful/bookshelf
              tag: hardcover
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - calibre
                topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8787

    persistence:
      config:
        enabled: true
        existingClaim: bookshelf
        advancedMounts:
          main:
            main:
              - path: /config

      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data

      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks

      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library