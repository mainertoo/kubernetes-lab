apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr4k
  namespace: media
spec:
  interval: 30m
  releaseName: radarr4k

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.1.0.10309
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 991

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      # /config on separate ceph-rbd PVC
      config:
        enabled: true
        existingClaim: radarr4k
        globalMounts:
          - path: /config

      # OPTIONAL: match Plex/Jellyfin shared library PVC
      library:
        enabled: true
        existingClaim: shared-media-pvc
        globalMounts:
          - path: /mnt/library

      # QNAP NFS share (RW)
      qnap-media:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data/qnas

      # your local/visible hostPath (same as radarr)
      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      symlinks:
        enabled: true
        existingClaim: symlinks
        globalMounts:
          - path: /mnt/symlinks/decypharr
            readOnly: true
          - path: /mnt/symlinks/radarr4k