apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cinesync
  namespace: media
spec:
  interval: 30m
  releaseName: cinesync

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 20m

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 20m

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: rclone-mount
                        operator: In
                        values:
                          - "true"

        initContainers:
          init-cinesync-dirs:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Preparing CineSync directories..."

                mkdir -p /mnt/symlinks/cinesync
                mkdir -p /mnt/symlinks/cinesync/movies
                mkdir -p /mnt/symlinks/cinesync/shows
                mkdir -p /mnt/symlinks/cinesync/anime
                mkdir -p /mnt/symlinks/cinesync/movies-4k
                mkdir -p /mnt/symlinks/cinesync/shows-4k
                mkdir -p /mnt/symlinks/cinesync/kids-movies
                mkdir -p /mnt/symlinks/cinesync/kids-shows

                mkdir -p /app/db

                chmod -R 0775 /mnt/symlinks/cinesync || true
                chown -R 1000:1000 /mnt/symlinks/cinesync || true
                chown -R 1000:1000 /app/db || true

                echo "Listing /mnt/symlinks/cinesync:"
                ls -la /mnt/symlinks/cinesync || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: sureshfizzy/cinesync
              tag: v3.2.2-alpha
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: cinesync-secret
            env:
              TZ: America/Los_Angeles
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
              allowPrivilegeEscalation: true
              capabilities:
                drop: ["ALL"]
                add: ["SYS_ADMIN"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8082

    persistence:
      config:
        enabled: true
        existingClaim: cinesync
        globalMounts:
          - path: /app/db

      rclone:
        type: hostPath
        hostPath: /mnt/decypharr
        globalMounts:
          - path: /mnt/decypharr
            readOnly: true

      symlinks:
        enabled: true
        existingClaim: symlinks-cephfs
        globalMounts:
          - path: /mnt/symlinks

      fuse:
        type: hostPath
        hostPath: /dev/fuse
        globalMounts:
          - path: /dev/fuse

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp