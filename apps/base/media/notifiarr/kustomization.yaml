apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
# Notifiarr's PVCs are NOT defined here — they live in their own Flux Kustomizations:
# apps/base/notifiarr-config-pvc/ and apps/base/notifiarr-shared-pvc/ (wired via apps/production/media/notifiarr/).
resources:
  - notifiarr-release.yaml
  - notifiarr-ingressroute.yaml
  - notifiarr-secret.sops.yaml