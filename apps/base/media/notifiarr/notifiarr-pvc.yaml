apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notifiarr
  labels:
    # Phase 5b of the volsync label-driven restore project.
    # ClusterPolicy volsync-pvc-backup-restore matches this label and
    # generates volsync-notifiarr Secret + notifiarr-backup RS + RD in this ns.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 2Gi
