apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: notifiarr
  namespace: media
spec:
  interval: 30m
  releaseName: notifiarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          fix-notifiarr-cephfs-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init Notifiarr shared dirs on CephFS..."

                # These paths are both backed by the same RWX PVC (see persistence.shared below)
                mkdir -p /mnt/shared
                mkdir -p /notifiarr/logs

                # Ensure app user can write
                chown -R 1000:1000 /mnt/shared /notifiarr || true
                chmod -R 0775 /mnt/shared /notifiarr || true

                echo "Listing /mnt/shared:"
                ls -la /mnt/shared || true
                echo "Listing /notifiarr:"
                ls -la /notifiarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/notifiarr/notifiarr
              tag: 0.9.2
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              TMPDIR: /tmp
            envFrom:
              - secretRef:
                  name: notifiarr-secret

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 5454

    persistence:
      # /config on ceph-rbd PVC (RWO)
      config:
        enabled: true
        existingClaim: notifiarr
        globalMounts:
          - path: /config

      # Shared RWX area on cephfs (RWX)
      # Mount it BOTH at /mnt/shared and /notifiarr so /notifiarr/logs works.
      shared:
        enabled: true
        existingClaim: notifiarr-shared
        globalMounts:
          - path: /mnt/shared
          - path: /notifiarr

      tmp:
        enabled: true
        type: emptyDir