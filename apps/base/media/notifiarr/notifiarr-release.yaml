apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: notifiarr
  namespace: media
spec:
  interval: 30m
  releaseName: notifiarr

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        initContainers:
          init-notifiarr-shared:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init Notifiarr dirs on CephFS..."
                mkdir -p /mnt/shared/notifiarr/logs
                chown -R 1000:1000 /mnt/shared/notifiarr || true
                chmod -R 0775 /mnt/shared/notifiarr || true
                echo "Listing /mnt/shared/notifiarr:"
                ls -la /mnt/shared/notifiarr || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/notifiarr/notifiarr
              tag: 0.9.5
              pullPolicy: IfNotPresent
            env:
              TZ: America/Los_Angeles
              TMPDIR: /tmp

              # Put logs on RWX PVC (directory that actually exists)
              NOTIFIARR_LOG_DIR: /mnt/shared/notifiarr/logs
              LOG_DIR: /mnt/shared/notifiarr/logs
              LOGS_DIR: /mnt/shared/notifiarr/logs

              # Optional: if the app supports a single file path style
              NOTIFIARR_LOG_FILE: /mnt/shared/notifiarr/logs/application.log
              LOG_FILE: /mnt/shared/notifiarr/logs/application.log

            envFrom:
              - secretRef:
                  name: notifiarr-secret

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 5454

    persistence:
      config:
        enabled: true
        existingClaim: notifiarr
        globalMounts:
          - path: /config

      shared:
        enabled: true
        existingClaim: notifiarr-shared
        globalMounts:
          - path: /mnt/shared

      tmp:
        enabled: true
        type: emptyDir