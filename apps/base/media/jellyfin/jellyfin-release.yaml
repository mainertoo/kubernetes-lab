apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      jellyfin:
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
            rclone-mount: "true"

        containers:
          app:
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 4Gi
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11
            env:
              - name: TZ
                value: America/Los_Angeles

          # rclone sidecars: mount DUMB's debrid WebDAV backends in-cluster so
          # the combined_symlinks (read from the shared cephfs dumb-library PVC)
          # resolve their targets here, independent of which node DUMB runs on.
          # Each FUSE mount is established under the shared `debrid` emptyDir and
          # propagated (Bidirectional) into the jellyfin app container (which
          # mounts it HostToContainer). Only the sidecars are root/privileged.
          # Mirrors apps/base/media/plex/plex-release.yaml.
          rclone-nzbdav:
            image:
              repository: rclone/rclone
              tag: 1.74.4
            command:
              - /bin/sh
              - -c
            args:
              - |
                mkdir -p /mnt/debrid/nzbdav
                exec rclone mount nzbdav: /mnt/debrid/nzbdav \
                  --config=/cfg/rclone.conf \
                  --allow-other \
                  --dir-cache-time=10s \
                  --poll-interval=0 \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-size=2G \
                  --vfs-cache-max-age=1h \
                  --buffer-size=256M \
                  --links \
                  --use-cookies \
                  --cache-dir=/cache
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

          rclone-decypharr:
            image:
              repository: rclone/rclone
              tag: 1.74.4
            command:
              - /bin/sh
              - -c
            args:
              - |
                mkdir -p /mnt/debrid/decypharr
                exec rclone mount decypharr: /mnt/debrid/decypharr \
                  --config=/cfg/rclone.conf \
                  --allow-other \
                  --dir-cache-time=10s \
                  --poll-interval=0 \
                  --vfs-cache-mode=full \
                  --vfs-cache-max-size=2G \
                  --vfs-cache-max-age=1h \
                  --buffer-size=256M \
                  --links \
                  --use-cookies \
                  --cache-dir=/cache
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /config..."
                echo "Before:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true

                echo "Applying chown/chmod..."
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true

                echo "After:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: jellyfin
        type: ClusterIP
        ports:
          http:
            port: &port 8096

    persistence:
      config:
        existingClaim: jellyfin
        advancedMounts:
          jellyfin:
            app:
              - path: /config
            fix-config-perms:
              - path: /config

      library:
        existingClaim: shared-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/library

      qnap-media:
        existingClaim: qnap-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /data/qnas

      symlinks:
        existingClaim: symlinks-cephfs
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/symlinks

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      tmp:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /transcode
                subPath: transcode

      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri

      # --- DUMB debrid library (Option B: in-cluster rclone sidecars) ---
      # Shared scratch dir holding the rclone FUSE mounts; the sidecars mount
      # it Bidirectional, the app sees their sub-mounts via HostToContainer.
      debrid:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/debrid
                mountPropagation: HostToContainer
            rclone-nzbdav:
              - path: /mnt/debrid
                mountPropagation: Bidirectional
            rclone-decypharr:
              - path: /mnt/debrid
                mountPropagation: Bidirectional

      # DUMB's combined_symlinks tree (shared cephfs, read-only). Mounted under
      # /mnt/debrid so its symlink targets (/mnt/debrid/{nzbdav,decypharr}/...)
      # resolve against the sidecar FUSE mounts.
      dumb-library:
        existingClaim: dumb-library
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/debrid/combined_symlinks
                readOnly: true

      # rclone WebDAV config (nzbdav creds + decypharr) — sidecars only.
      rclone-config:
        type: secret
        name: dumb-rclone-config
        advancedMounts:
          jellyfin:
            rclone-nzbdav:
              - path: /cfg
                readOnly: true
            rclone-decypharr:
              - path: /cfg
                readOnly: true

      debrid-fuse:
        type: hostPath
        hostPath: /dev/fuse
        hostPathType: CharDevice
        advancedMounts:
          jellyfin:
            rclone-nzbdav:
              - path: /dev/fuse
            rclone-decypharr:
              - path: /dev/fuse

      rclone-cache:
        type: emptyDir
        advancedMounts:
          jellyfin:
            rclone-nzbdav:
              - path: /cache
            rclone-decypharr:
              - path: /cache