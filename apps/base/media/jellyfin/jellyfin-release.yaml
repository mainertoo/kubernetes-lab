apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      jellyfin:
        # optional: land Jellyfin on GPU nodes, like Plex
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.6
            env:
              - name: TZ
                value: America/Los_Angeles

        # 👇 initContainer with *object* image and NO volumeMounts here
        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: stable
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /config..."
                echo "Before:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true

                echo "Applying chown/chmod..."
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true

                echo "After:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    # Match Plex-style pod security defaults
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: jellyfin
        type: ClusterIP
        ports:
          http:
            port: &port 8096

    persistence:
      # Jellyfin config on CephFS (PVC named "jellyfin")
      config:
        existingClaim: jellyfin
        advancedMounts:
          jellyfin:
            app:
              - path: /config
            fix-config-perms:   # mount /config into initContainer
              - path: /config

      # Shared Riven/Plex/Jellyfin library (CephFS PVC in media ns)
      library:
        existingClaim: shared-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/library

      # Big QNAP media share (static NFS PV / qnap-media-pvc)
      qnap-media:
        existingClaim: qnap-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /data/qnas

      # rclone / zurg – same pattern as Plex & Riven
      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      # Cache / transcode scratch
      tmp:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /transcode
                subPath: transcode

      # GPU device nodes passthrough
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri