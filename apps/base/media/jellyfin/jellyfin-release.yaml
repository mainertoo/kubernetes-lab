apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      jellyfin:
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
            rclone-mount: "true"

        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.10
            env:
              - name: TZ
                value: America/Los_Angeles

        initContainers:
          fix-config-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                echo "Fixing perms on /config..."
                echo "Before:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true

                echo "Applying chown/chmod..."
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true

                echo "After:"
                ls -ld /config || true
                find /config -maxdepth 2 -printf '%M %u:%g %p\n' 2>/dev/null || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 991

    service:
      app:
        controller: jellyfin
        type: ClusterIP
        ports:
          http:
            port: &port 8096

    persistence:
      config:
        existingClaim: jellyfin
        advancedMounts:
          jellyfin:
            app:
              - path: /config
            fix-config-perms:
              - path: /config

      library:
        existingClaim: shared-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/library

      qnap-media:
        existingClaim: qnap-media-pvc
        advancedMounts:
          jellyfin:
            app:
              - path: /data/qnas

      symlinks:
        existingClaim: symlinks-cephfs
        advancedMounts:
          jellyfin:
            app:
              - path: /mnt/symlinks

      rclone:
        type: hostPath
        hostPath: /mnt/zurg/
        globalMounts:
          - path: /mnt/zurg
            readOnly: true

      tmp:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /transcode
                subPath: transcode

      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri