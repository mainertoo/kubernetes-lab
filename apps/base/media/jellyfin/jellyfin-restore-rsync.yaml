apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-restore-rsync
  namespace: media
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: rsync
          image: ghcr.io/instrumentisto/rsync-ssh:latest
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euxo pipefail
              echo "Sanity: list top-level restore contents"
              ls -lah /from || true
              echo "Rsync restore -> live (with --delete)"
              rsync -aHAX --numeric-ids --delete /from/ /to/
              echo "Done."
          volumeMounts:
            - name: from
              mountPath: /from
            - name: to
              mountPath: /to
      volumes:
        - name: from
          persistentVolumeClaim:
            claimName: jellyfin-restore
        - name: to
          persistentVolumeClaim:
            claimName: jellyfin