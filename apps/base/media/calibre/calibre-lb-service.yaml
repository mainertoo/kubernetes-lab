apiVersion: v1
kind: Service
metadata:
  name: calibre-external
  namespace: media
  annotations:
    # Optional: pin a specific IP from your MetalLB pool
    # metallb.universe.tf/loadBalancerIPs: "192.168.1.240"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/instance: calibre
    app.kubernetes.io/name: calibre
    app.kubernetes.io/component: main
  ports:
    # Calibre content server (this is what Readarr uses; also useful for CF)
    - name: content
      port: 8081
      targetPort: 8081
      protocol: TCP

    # Optional: Selkies GUI HTTP (only if you actually want to expose it)
    - name: http
      port: 8092
      targetPort: 8092
      protocol: TCP

    # Optional: Selkies GUI HTTPS (only if you actually want to expose it)
    - name: https
      port: 8194
      targetPort: 8194
      protocol: TCP