apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
  namespace: media
spec:
  interval: 30m
  releaseName: calibre

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          fix-calibre-library-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init calibre library dir on CephFS..."
                mkdir -p /calibre-library
                chown -R 1000:1000 /calibre-library || true
                chmod -R 0775 /calibre-library || true
                echo "Listing /calibre-library:"
                ls -la /calibre-library || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/calibre
              tag: 8.16.2
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              CALIBRE_CUSTOM_PORT: "8092"
              CALIBRE_CUSTOM_HTTPS_PORT: "8194"
              CALIBRE_WEB_API_PORT: "8098"

            envFrom:
              - secretRef:
                  name: calibre-secret

    defaultPodOptions:
      securityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080

    persistence:
      # Calibre config (ceph-rbd; NOT NFS-safe)
      config:
        enabled: true
        existingClaim: calibre
        globalMounts:
          - path: /config

      # Shared Calibre library (CephFS RWX)
      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library