apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
  namespace: media
spec:
  interval: 30m
  releaseName: calibre

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          fix-calibre-library-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init calibre library dir on CephFS..."
                mkdir -p /calibre-library
                chown -R 1000:1000 /calibre-library || true
                chmod -R 0775 /calibre-library || true
                echo "Listing /calibre-library:"
                ls -la /calibre-library || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/calibre
              tag: 9.9.0
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              CUSTOM_PORT: "8092"
              CUSTOM_HTTPS_PORT: "8194"
              CUSTOM_USER: "readarr"

            envFrom:
              - secretRef:
                  name: calibre-secret

          # ✅ Health sidecar that ACTUALLY listens on 8080
          health:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-lc"]
            args:
              - |
                set -e
                mkdir -p /www
                echo "ok" >/www/index.html
                # busybox httpd will listen on 8080
                exec httpd -f -p 8080 -h /www
            ports:
              - name: health
                containerPort: 8080
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8092
            targetPort: 8092
          https:
            port: 8194
            targetPort: 8194
          content:
            port: 8081
            targetPort: 8081

          # ✅ What Gatus internal should hit:
          # http://calibre.media.svc.cluster.local:80/
          health:
            port: 80
            targetPort: 8080

    persistence:
      config:
        enabled: true
        existingClaim: calibre
        globalMounts:
          - path: /config

      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library