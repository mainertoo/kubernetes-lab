apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
  namespace: media
spec:
  interval: 30m
  releaseName: calibre

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          fix-calibre-library-perms:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Init calibre library dir on CephFS..."
                mkdir -p /calibre-library
                chown -R 1000:1000 /calibre-library || true
                chmod -R 0775 /calibre-library || true
                echo "Listing /calibre-library:"
                ls -la /calibre-library || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/calibre
              tag: 8.16.2
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              # Selkies baseimage port overrides (OPTIONAL).
              # If you don't need custom ports, you can delete these.
              CUSTOM_PORT: "8092"        # default 8080
              CUSTOM_HTTPS_PORT: "8194"  # default 8181

              # Optional basic auth user (abc is default if CUSTOM_USER is unset)
              CUSTOM_USER: "readarr"

            envFrom:
              - secretRef:
                  name: calibre-secret

          # -------------------------------------------------------------------
          # NEW: stable internal health endpoint for Gatus (always returns 200)
          # Exposed via Service port 80 (see service.ports.health below)
          # -------------------------------------------------------------------
          health:
            image:
              repository: nginx
              tag: "1.27"
              pullPolicy: IfNotPresent
            command: ["/bin/sh", "-lc"]
            args:
              - |
                cat >/usr/share/nginx/html/index.html <<'EOF'
                ok
                EOF
                exec nginx -g 'daemon off;'
            ports:
              - name: health
                containerPort: 8080

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          # Selkies GUI HTTP (CUSTOM_PORT if set)
          http:
            port: 8092
            targetPort: 8092

          # Selkies GUI HTTPS (CUSTOM_HTTPS_PORT if set)
          https:
            port: 8194
            targetPort: 8194

          # Calibre built-in webserver / content server (fixed inside container: 8081)
          # This is what Readarr should talk to.
          content:
            port: 8081
            targetPort: 8081

          # -------------------------------------------------------------------
          # NEW: internal health check port (maps to the nginx sidecar on 8080)
          # Use this for Gatus internal check: port 80, path /
          # -------------------------------------------------------------------
          health:
            port: 80
            targetPort: 8080

    persistence:
      config:
        enabled: true
        existingClaim: calibre
        globalMounts:
          - path: /config

      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library