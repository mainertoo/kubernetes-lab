apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
  namespace: media
spec:
  interval: 30m
  releaseName: calibre-web-automated

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          init-cwa-storage:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Initializing CWA storage..."
                mkdir -p /config
                mkdir -p /cwa-book-ingest
                mkdir -p /calibre-library
                chown -R 1000:1000 /config /cwa-book-ingest /calibre-library || true
                chmod -R 0775 /config /cwa-book-ingest /calibre-library || true
                echo "Checking calibre metadata.db:"
                find /calibre-library -name metadata.db -print || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: crocodilestick/calibre-web-automated
              tag: v4.0.6
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              CWA_PORT_OVERRIDE: "8083"

              # Your library is on CephFS/RWX, so this is safer for SQLite locking.
              NETWORK_SHARE_MODE: "true"

            envFrom:
              - secretRef:
                  name: cwa-secret

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                # memory-only limit (house style) — no CPU limit so epub
                # conversion / duplicate scans can burst without throttling.
                memory: 1Gi

            probes:
              # HTTP (not TCP): the 2026-07-23 outage was a socket-open /
              # app-hung deadlock in the after-import cwa-duplicates scan that a
              # TCP probe would pass straight through. /health is an
              # unauthenticated 200 endpoint.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8083
                  # generous — SQLite on CephFS (NETWORK_SHARE_MODE); avoid
                  # SIGKILL mid-write. ~3 min of hard hang before restart.
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8083
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8083
                  # up to 5 min for first-run DB migration on CephFS
                  periodSeconds: 10
                  failureThreshold: 30

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - calibre
                topologyKey: kubernetes.io/hostname

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8083
            targetPort: 8083

    persistence:
      config:
        enabled: true
        existingClaim: calibre-web-automated
        globalMounts:
          - path: /config

      ingest:
        enabled: true
        existingClaim: cwa-book-ingest-cephfs
        globalMounts:
          - path: /cwa-book-ingest

      calibre-library:
        enabled: true
        existingClaim: calibre-library-cephfs
        globalMounts:
          - path: /calibre-library