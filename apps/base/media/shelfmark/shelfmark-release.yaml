apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
  namespace: media
spec:
  interval: 30m
  releaseName: shelfmark

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          init-shelfmark-storage:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e

                echo "Initializing Shelfmark storage..."
                mkdir -p /config
                mkdir -p /books

                echo "Preparing Shelfmark audiobook destination on QNAP..."
                mkdir -p /data/media/books/shelfmark-audiobooks

                chown -R 1000:1000 /config /books || true
                chmod -R 0775 /config /books || true

                chown 1000:1000 /data || true
                chown 1000:1000 /data/media || true
                chown 1000:1000 /data/media/books || true
                chown -R 1000:1000 /data/media/books/shelfmark-audiobooks || true

                chmod 0775 /data || true
                chmod 0775 /data/media || true
                chmod 0775 /data/media/books || true
                chmod -R 0775 /data/media/books/shelfmark-audiobooks || true

                echo "Testing write access..."
                touch /books/.shelfmark-ebook-write-test
                rm -f /books/.shelfmark-ebook-write-test

                touch /data/media/books/shelfmark-audiobooks/.shelfmark-audiobook-write-test
                rm -f /data/media/books/shelfmark-audiobooks/.shelfmark-audiobook-write-test

                echo "Listing key paths..."
                ls -ld /books || true
                ls -ld /data/media/books/shelfmark-audiobooks || true

                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.3.3
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"

              FLASK_HOST: "0.0.0.0"
              FLASK_PORT: "8084"
              CONFIG_DIR: /config
              TMP_DIR: /tmp/shelfmark
              DOCKERMODE: "true"

              # Ebooks go to CWA ingest.
              INGEST_DIR: /books
              BOOKS_OUTPUT_MODE: folder
              FILE_ORGANIZATION: rename
              TEMPLATE_RENAME: "{Author} - {Title} ({Year})"
              HARDLINK_TORRENTS: "false"

              # Audiobooks go to the ReadMeABook/QNAP media path.
              DESTINATION_AUDIOBOOK: /data/media/books/shelfmark-audiobooks
              FILE_ORGANIZATION_AUDIOBOOK: organize
              TEMPLATE_AUDIOBOOK_ORGANIZE: "{Author}/{Title}"
              TEMPLATE_AUDIOBOOK_RENAME: "{Author} - {Title}"
              HARDLINK_TORRENTS_AUDIOBOOK: "false"

              CALIBRE_WEB_URL: "https://cwa.lab.mainertoo.com"
              AUDIOBOOK_LIBRARY_URL: "https://readmeabook.lab.mainertoo.com"

            envFrom:
              - secretRef:
                  name: shelfmark-secret

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8084
            targetPort: 8084

    persistence:
      config:
        enabled: true
        existingClaim: shelfmark
        globalMounts:
          - path: /config

      # Ebooks: CWA ingest.
      books:
        enabled: true
        existingClaim: cwa-book-ingest-cephfs
        globalMounts:
          - path: /books

      # Audiobooks: same QNAP PVC used by ReadMeABook.
      qnap-data:
        enabled: true
        existingClaim: qnap-media-pvc
        globalMounts:
          - path: /data