apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
  namespace: media
spec:
  interval: 30m
  releaseName: shelfmark

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        strategy: Recreate

        initContainers:
          init-shelfmark-storage:
            image:
              repository: busybox
              tag: stable
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Initializing Shelfmark storage..."
                mkdir -p /config
                mkdir -p /books
                chown -R 1000:1000 /config /books || true
                chmod -R 0775 /config /books || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]

        containers:
          main:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: latest
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              PUID: "1000"
              PGID: "1000"
              FLASK_HOST: "0.0.0.0"
              FLASK_PORT: "8084"
              CONFIG_DIR: /config
              INGEST_DIR: /books
              DOCKERMODE: "true"

            envFrom:
              - secretRef:
                  name: shelfmark-secret

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8084
            targetPort: 8084

    persistence:
      config:
        enabled: true
        existingClaim: shelfmark
        globalMounts:
          - path: /config

      # Point Shelfmark downloads directly at CWA ingest.
      # CWA deletes processed files after import.
      books:
        enabled: true
        existingClaim: cwa-book-ingest-cephfs
        globalMounts:
          - path: /books