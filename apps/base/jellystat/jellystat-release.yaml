apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellystat
  namespace: jellystat
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      # =========================
      # Postgres for Jellystat
      # =========================
      postgres:
        replicas: 1

        containers:
          app:
            image:
              repository: postgres
              tag: "15.2"
              pullPolicy: IfNotPresent

            # These come from your SOPS secret:
            #   POSTGRES_USER
            #   POSTGRES_PASSWORD
            #   (optional) JELLYSTAT_JWT_SECRET
            envFrom:
              - secretRef:
                  name: jellystat-secret

            env:
              # Name of the DB Jellystat will use
              - name: POSTGRES_DB
                value: jellystat

      # =========================
      # Jellystat app
      # =========================
      jellystat:
        replicas: 1

        containers:
          app:
            image:
              repository: cyfershepard/jellystat
              tag: latest
              pullPolicy: IfNotPresent

            # Pull POSTGRES_USER / POSTGRES_PASSWORD / JWT_SECRET from the same secret
            envFrom:
              - secretRef:
                  name: jellystat-secret

            env:
              - name: TZ
                value: America/Los_Angeles

              # Internal service name for Postgres
              - name: POSTGRES_IP
                value: postgres

              - name: POSTGRES_PORT
                value: "5432"

              # You explicitly wanted this
              - name: REJECT_SELF_SIGNED_CERTIFICATES
                value: "false"

    # -------------------------
    # Services
    # -------------------------
    service:
      # Jellystat HTTP service (what Traefik / IngressRoute will target)
      app:
        controller: jellystat
        type: ClusterIP
        ports:
          http:
            port: 3000

      # Internal Postgres service – used only by Jellystat
      postgres:
        controller: postgres
        type: ClusterIP
        ports:
          postgres:
            port: 5432

    # -------------------------
    # Persistence (PVCs)
    # -------------------------
    persistence:
      # RBD-backed Postgres data
      postgres-data:
        existingClaim: jellystat-postgres-data
        advancedMounts:
          postgres:
            app:
              - path: /var/lib/postgresql/data

      # Backup data (RBD or CephFS depending on your PVC)
      backup-data:
        existingClaim: jellystat-backup-data
        advancedMounts:
          jellystat:
            app:
              - path: /app/backend/backup-data