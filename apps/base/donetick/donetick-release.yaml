apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app donetick
  namespace: donetick
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    force: true
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      donetick:
        initContainers:
          init-config:
            image:
              repository: alpine
              tag: "3.24"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                mkdir -p /config
                if [ ! -f /config/selfhosted.yaml ]; then
                  echo "Seeding /config/selfhosted.yaml from secret"
                  cp /config-src/selfhosted.yaml /config/selfhosted.yaml
                else
                  echo "/config/selfhosted.yaml already exists; leaving as-is"
                fi

        containers:
          app:
            image:
              repository: donetick/donetick
              tag: v0.1.75
            env:
              TZ: America/Los_Angeles
              DT_ENV: "selfhosted"
              DT_SQLITE_PATH: "/donetick-data/donetick.sqlite"
              # If your image supports DT_JWT_SECRET, keep this. If not, remove it.
              DT_JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: donetick-secret
                    key: DT_JWT_SECRET

    service:
      app:
        controller: donetick
        ports:
          http:
            port: 2021

    persistence:
      # Your existing single PVC with subPaths (data + config)
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /donetick-data
            subPath: data
          - path: /config
            subPath: config

      # Secret-mounted template config
      config-template:
        enabled: true
        type: secret
        name: donetick-secret
        globalMounts:
          - path: /config-src
            readOnly: true