apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: donetick
  labels:
    # Phase 5b of the volsync label-driven restore project. ClusterPolicy
    # `volsync-pvc-backup-restore` matches this label and generates the
    # per-PVC `volsync-donetick` Secret + `donetick-backup` RS + RD.
    backup: daily
    backup-engine: kopia
spec:
  storageClassName: ceph-rbd
  accessModes: [ReadWriteOnce]
  # Stale ref left over from the original volsync-v2/bootstrap variant's
  # one-time populator (the bootstrap RD itself is long gone).
  # dataSourceRef is immutable on a bound PVC, so we mirror it here to
  # keep Flux's dry-run happy. On a fresh cluster rebuild Kyverno's
  # mutate rule swaps it for `donetick-backup` at admission before bind.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: donetick-bootstrap
  resources:
    requests:
      storage: 2Gi
