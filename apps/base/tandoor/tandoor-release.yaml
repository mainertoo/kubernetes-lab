apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tandoor
  namespace: tandoor
spec:
  interval: 5m
  releaseName: tandoor
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  install:
    createNamespace: false


  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controllers:
      main:
        # IMPORTANT:
        # Do NOT mount the PVC at /opt/recipes (it hides boot.sh inside the image).
        # Instead, mount only the persistent bits via subPath.
        initContainers:
          create-db:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command:
              - sh
              - -lc
              - |
                set -e
                # Ensure directories exist on the mounted subpaths
                mkdir -p /opt/recipes/mediafiles /opt/recipes/staticfiles
                # Ensure sqlite db exists (this path is mounted as a file via subPath)
                if [ ! -f /opt/recipes/db.sqlite3 ]; then
                  touch /opt/recipes/db.sqlite3
                fi
                ls -lah /opt/recipes || true
                ls -lah /opt/recipes/db.sqlite3 || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0

        containers:
          main:
            image:
              repository: ghcr.io/tandoorrecipes/recipes
              tag: 2.6.13
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: "America/Los_Angeles"
              - name: DEBUG
                value: "0"
              - name: ENABLE_SIGNUP
                value: "0"
              - name: ALLOWED_HOSTS
                value: "tandoor.lab.mainertoo.com,tandoor.tandoor.svc.cluster.local,tandoor"

              # OIDC / django-allauth OpenID Connect provider
              - name: SOCIAL_PROVIDERS
                valueFrom:
                  secretKeyRef:
                    name: tandoor-sso-secret
                    key: SOCIAL_PROVIDERS
              - name: SOCIALACCOUNT_PROVIDERS
                valueFrom:
                  secretKeyRef:
                    name: tandoor-sso-secret
                    key: SOCIALACCOUNT_PROVIDERS

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: false

    persistence:
      data:
        enabled: true
        existingClaim: tandoor
        globalMounts:
          # Persist only what needs persistence, without masking the image's /opt/recipes/*
          - path: /opt/recipes/db.sqlite3
            subPath: db.sqlite3
          - path: /opt/recipes/mediafiles
            subPath: mediafiles
          - path: /opt/recipes/staticfiles
            subPath: staticfiles

      temp:
        type: emptyDir
        globalMounts:
          - path: /tmp