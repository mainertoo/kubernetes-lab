apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app drawio
  namespace: drawio
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation: { retries: 3 }
  upgrade:
    cleanupOnFail: true
    remediation: { retries: 3 }
  uninstall:
    keepHistory: false

  values:
    controllers:
      drawio:
        containers:
          app:
            image:
              repository: jgraph/drawio
              tag: 29.7.9
            env:
              TZ: America/Los_Angeles

    service:
      app:
        controller: drawio
        ports:
          http:
            port: 8080