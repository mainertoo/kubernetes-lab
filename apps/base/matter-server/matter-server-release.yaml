apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
  namespace: matter-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      matter-server:
        pod:
          # Matter discovery/commissioning is happiest on the LAN/mDNS
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet

          # Pin to same node as Home Assistant:
          nodeSelector:
            kubernetes.io/hostname: mainertoo-k3s-worker-2

        containers:
          app:
            # per upstream docker docs
            image:
              repository: ghcr.io/matter-js/python-matter-server
              tag: stable

            env:
              TZ: America/Los_Angeles

            # python-matter-server listens on 5580 (WebSocket endpoint: /ws)
            ports:
              - name: http
                containerPort: 5580
                protocol: TCP

            # Basic hardening / stability
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      app:
        controller: matter-server
        type: ClusterIP
        ports:
          http:
            port: 5580
            targetPort: 5580

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /data

      # Optional: only needed if you plan to commission Matter-over-BLE via the host
      # (Safe to leave; it’s read-only)
      dbus:
        enabled: true
        type: hostPath
        hostPath: /run/dbus
        hostPathType: Directory
        globalMounts:
          - path: /run/dbus
            readOnly: true

    defaultPodOptions:
      automountServiceAccountToken: false