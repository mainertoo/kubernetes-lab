apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebox
  namespace: homebox
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      homebox:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/sysadminsmedia/homebox
              tag: "0.26.2"
            env:
              TZ: America/Los_Angeles
              HBOX_MODE: production
              HBOX_WEB_PORT: "7745"
              HBOX_LOG_LEVEL: info
              HBOX_LOG_FORMAT: text
              HBOX_OPTIONS_ALLOW_REGISTRATION: "true"
              HBOX_OPTIONS_TRUST_PROXY: "true"
              HBOX_STORAGE_DATA: /data/

              # OIDC — set HBOX_OIDC_ENABLED to "true" after configuring
              # the Authentik OAuth2 provider and populating the secret.
              # Redirect URI to register in Authentik:
              #   https://homebox.lab.mainertoo.com/api/v1/users/login/oidc/callback
              HBOX_OIDC_ENABLED: "true"
              HBOX_OIDC_ISSUER_URL: "https://authentik.lab.mainertoo.com/application/o/homebox/"
              HBOX_OIDC_SCOPE: "openid profile email"
              HBOX_OIDC_VERIFY_EMAIL: "false"
              HBOX_OIDC_AUTO_REDIRECT: "false"
              HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "true"

            envFrom:
              - secretRef:
                  name: homebox-secret

    service:
      homebox:
        controller: homebox
        type: ClusterIP
        ports:
          http:
            port: 7745
            targetPort: 7745

    persistence:
      data:
        enabled: true
        existingClaim: homebox
        advancedMounts:
          homebox:
            main:
              - path: /data

    defaultPodOptions:
      automountServiceAccountToken: false
