# SSH client drop-in — mounted at /etc/ssh/ssh_config.d/10-ops-node.conf
# (the image's /etc/ssh/ssh_config already Includes ssh_config.d/*.conf).
#
# Why: `hermes doctor` runs a plain `ssh -o BatchMode=yes ...` host-key
# check. This drop-in points that check at the PERSISTENT PVC known_hosts
# (+ accept-new for first boot) so doctor stays green across pod rolls and
# fresh-PVC rebuilds — otherwise it false-fails on the unknown host key
# until something reseeds it. The actual terminal backend (paramiko) already
# uses the same persistent file, so SSH itself works regardless.
#
# Target = the DGX Spark (spark-fef1, 192.168.1.94), the always-on host-ops
# node for the agent's shell + git/gh GitHub work. Support a role alias
# (`ops-01`), the hostname (`spark`/`spark-fef1`), and the raw IP so health
# checks and human SSH sessions share the same persistent known_hosts file.
Host ops-01 spark spark-fef1 192.168.1.94
    HostName 192.168.1.94
    User mainertoo
    IdentityFile /opt/data/.ssh/id_ed25519
    IdentitiesOnly yes
    StrictHostKeyChecking accept-new
    UserKnownHostsFile /opt/data/.ssh/known_hosts
