---
# Web dashboard / Hermes Desktop remote backend, internal-only via Traefik.
# Reachable off-LAN through Tailscale split DNS (*.lab.mainertoo.com resolves on
# the tailnet), so no separate Tailscale ingress is needed. Authentication is
# handled by Hermes' own dashboard basic-auth provider so the native Desktop app
# can obtain a dashboard session and WebSocket ticket directly.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-ingressroute
  namespace: hermes
  annotations:
    gethomepage.dev/href: "https://hermes.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Hermes"
    gethomepage.dev/description: "Always-on Hermes agent (Codex brain)"
    gethomepage.dev/app: hermes
    gethomepage.dev/group: "AI"
    gethomepage.dev/icon: "mdi-robot-happy"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`hermes.lab.mainertoo.com`)
      kind: Rule
      services:
        # bjw-s names a SINGLE service after the release (`hermes`), not
        # `<release>-<key>` — the multi-service `-app` suffix only applies when
        # there are sibling services (cf. immich-app/immich-ml).
        - name: hermes
          port: 9119
  tls: {}
