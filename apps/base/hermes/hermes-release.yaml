---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: hermes
spec:
  interval: 30m
  releaseName: hermes

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      hermes:
        # Single writer over a SQLite store — never run two replicas.
        strategy: Recreate
        initContainers:
          # openssh (used by `hermes doctor`) refuses a group-readable private
          # key for non-root users, and the PVC fsGroup loosens the in-pod SSH
          # key to 0660 — so the doctor SSH check (run as the hermes user)
          # ignores the key and false-fails. Tighten to 0600 before the gateway
          # starts. Runs as root (image starts as root), idempotent, and a
          # no-op on a fresh PVC where the key isn't generated yet.
          fix-ssh-key-perms:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: "latest@sha256:3d5f7838eb85c47ada110752dbe8ffd889c8549a3e23d149b2cf5627e226e6ca"
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                [ -d /opt/data/.ssh ] && chmod 700 /opt/data/.ssh || true
                [ -f /opt/data/.ssh/id_ed25519 ] && chmod 600 /opt/data/.ssh/id_ed25519 || true
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              # PINNED to a digest so the floating `latest` tag can't silently
              # change the image's s6 / profile layout under us on a pod roll.
              # Renovate proposes digest bumps we can test before adopting.
              tag: latest@sha256:3d5f7838eb85c47ada110752dbe8ffd889c8549a3e23d149b2cf5627e226e6ca
            # Image ENTRYPOINT is s6-overlay `/init … main-wrapper.sh` (starts as
            # root, drops to uid 10000). The CMD `gateway run` IS what starts the
            # always-on gateway: it registers the `default` profile and its
            # dynamically-supervised `gateway-default` service. Do NOT replace
            # this with a no-op (e.g. `sleep infinity`) — without it the profile
            # gateway never registers and :8642 never comes up (verified outage,
            # PR #772 → reverted here). The recurring "port/token already in use"
            # log spam is a benign upstream side effect of `gateway run` also
            # probing a second bind; the gateway itself serves fine. Revisit if
            # the image exposes a clean single-gateway invocation.
            args:
              - gateway
              - run
            env:
              - name: TZ
                value: America/Los_Angeles
              # ---- Web dashboard / Hermes Desktop remote backend ----
              - name: HERMES_DASHBOARD
                value: "1"
              - name: HERMES_DASHBOARD_HOST
                value: "0.0.0.0"
              - name: HERMES_DASHBOARD_PORT
                value: "9119"
              # Do not set HERMES_DASHBOARD_INSECURE here. The dashboard binds
              # non-loopback for the ClusterIP/IngressRoute path, so Hermes'
              # own auth gate must be active for Desktop remote mode. Basic-auth
              # username/password-hash/secret live in hermes-secret.sops.yaml.
              # ---- Gateway OpenAI-compatible API + /health ----
              - name: API_SERVER_ENABLED
                value: "true"
              - name: API_SERVER_HOST
                value: "0.0.0.0"
              # ---- SSH terminal backend → DGX Spark (spark-fef1, always-on) ----
              # backend selection itself lives in /opt/data/config.yaml
              # (terminal.backend: ssh), seeded at bootstrap. These connection
              # params are non-secret; the private key lives on the PVC and is
              # authorized on the Spark for the mainertoo account (which also
              # carries git + gh for the agent's GitHub work).
              - name: TERMINAL_SSH_HOST
                value: "192.168.1.94"
              - name: TERMINAL_SSH_USER
                value: "mainertoo"
              - name: TERMINAL_SSH_PORT
                value: "22"
              - name: TERMINAL_SSH_KEY
                value: "/opt/data/.ssh/id_ed25519"
              # ---- write_file safe root ----
              # The agent's file tools (read_file/write_file/patch) operate on
              # the terminal backend = the Spark, NOT in-pod. The image default
              # HERMES_WRITE_SAFE_ROOT=/opt/data (HERMES_HOME) therefore blocks
              # every Spark-side write (no /opt/data on the Spark). Scope it to
              # the one dir a cron job writes to (the paper-trading ledger) so
              # write_file works there while ~/.ssh, ~/.kube/config, ~/.local/bin
              # and the coding repo stay out of write_file's reach. The shell
              # tool is unaffected (not a real boundary — see file_safety.py).
              - name: HERMES_WRITE_SAFE_ROOT
                value: "/home/mainertoo/investment_simulation"
              # ---- Messaging platforms ----
              # Bot tokens (TELEGRAM_BOT_TOKEN / DISCORD_BOT_TOKEN) live in the
              # SOPS secret and arrive via envFrom; a platform auto-enables when
              # its token is present (no config.yaml flag needed). These
              # allowlists + home-channel IDs are non-secret. All reused
              # verbatim from the retired Mac-local Hermes deployment.
              - name: TELEGRAM_ALLOWED_USERS
                value: "15854701"
              - name: TELEGRAM_HOME_CHANNEL
                value: "15854701"
              - name: DISCORD_ALLOWED_USERS
                value: "1008503804158803978"
              - name: DISCORD_HOME_CHANNEL
                value: "1511918541400576100"
              # Restrict Discord inbound processing to approved Hermes channels,
              # then disable the global @mention requirement. This preserves
              # free-response behavior in dedicated Hermes spaces without letting
              # the bot answer throughout the server.
              # IDs: #hermes-main parent, current hermes-main thread,
              # #hermes-home-assistant parent, Home Assistant topic/thread.
              - name: DISCORD_ALLOWED_CHANNELS
                value: "1511918541400576100,1512254208731123832,1512867343745683576,1512867561933508820"
              - name: DISCORD_REQUIRE_MENTION
                value: "false"
              # Keep explicit free-response IDs too; this documents the dedicated
              # Home Assistant channel/thread and remains compatible if the global
              # mention requirement is restored later.
              - name: DISCORD_FREE_RESPONSE_CHANNELS
                value: "1512867343745683576,1512867561933508820"
              # ---- Home Assistant integration ----
              # HASS_TOKEN lives in hermes-secret.sops.yaml. When present, Hermes
              # auto-enables the homeassistant toolset and gateway integration.
              # Use in-cluster DNS so Hermes does not hairpin through ingress.
              - name: HASS_URL
                value: "http://home-assistant-app.home-assistant.svc.cluster.local:8123"
              # ---- Web search + extraction (Firecrawl) ----
              # Enables Hermes' web_search + web_extract tools via the
              # self-hosted Firecrawl API. In-cluster Service DNS (no tailnet
              # hairpin; the Tailscale HTTPS URL doesn't resolve from a pod).
              # With only FIRECRAWL_API_URL set, Hermes auto-selects Firecrawl
              # for BOTH search and extract — and Firecrawl's /search is itself
              # backed by SearXNG (via apps/base/searxng-egress), so this one
              # URL covers both services. Non-secret; no API key needed
              # (Firecrawl runs USE_DB_AUTHENTICATION=false).
              - name: FIRECRAWL_API_URL
                value: "http://firecrawl-api.firecrawl.svc.cluster.local:3002"
            envFrom:
              # API_SERVER_KEY + dashboard basic-auth creds + the Telegram/Discord
              # bot tokens. These are read as container env, so they come from a
              # SOPS Secret rather than the PVC .env.
              - secretRef:
                  name: hermes-secret
              # Home Assistant Long-Lived Access Token for the homeassistant
              # toolset/gateway integration.
              - secretRef:
                  name: hermes-hass-secret
            probes:
              liveness: &health
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8642
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *health
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8642
                  # First boot runs s6 init + any runtime setup.
                  failureThreshold: 40
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                # Headroom for browser automation / subagents; the brain is
                # remote (Codex), so steady-state is light.
                memory: 3Gi

    defaultPodOptions:
      securityContext:
        # The image drops to uid 10000 (`hermes`); fsGroup makes the ceph-rbd
        # PVC group-owned + writable by it. Do NOT set runAsNonRoot — s6 needs
        # to start as root before dropping privileges.
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: hermes
        type: ClusterIP
        ports:
          gateway:
            port: 8642
          dashboard:
            port: 9119

    persistence:
      data:
        existingClaim: hermes-data
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            # init needs the PVC to chmod the SSH key before the gateway starts
            fix-ssh-key-perms:
              - path: /opt/data
      # Chromium-based browser automation needs more than the default 64Mi /dev/shm.
      dshm:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          hermes:
            app:
              - path: /dev/shm
      # SSH client drop-in so `hermes doctor`'s plain `ssh` host-key check
      # uses the PERSISTENT PVC known_hosts (/opt/data/.ssh/known_hosts)
      # instead of the ephemeral /root copy (HOME=/root, wiped each pod
      # roll). Name is rewritten to the hashed ConfigMap by kustomizeconfig.
      ssh-config:
        type: configMap
        name: hermes-ssh-config
        advancedMounts:
          hermes:
            app:
              - path: /etc/ssh/ssh_config.d/10-ops-node.conf
                subPath: 10-ops-node.conf
