apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes
resources:
  - hermes-namespace.yaml
  - hermes-secret.sops.yaml
  - hermes-hass-secret.sops.yaml
  - hermes-pvc.yaml
  - hermes-release.yaml
  - hermes-ingressroute.yaml

configMapGenerator:
  - name: hermes-ssh-config
    files:
      - 10-ops-node.conf=./ssh-ops-node.conf

generatorOptions:
  disableNameSuffixHash: false

configurations:
  - ./kustomizeconfig.yaml
