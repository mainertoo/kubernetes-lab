# SSH client drop-in — mounted at /etc/ssh/ssh_config.d/10-ops-node.conf
# (the image's /etc/ssh/ssh_config already Includes ssh_config.d/*.conf).
#
# Why: `hermes doctor` runs a plain `ssh -o BatchMode=yes ...` host-key
# check that reads the default known_hosts ($HOME/.ssh/known_hosts, and
# HOME=/root here). That /root copy is EPHEMERAL — wiped on every pod roll —
# so doctor false-fails the SSH terminal backend check after each restart
# until something reseeds it. The actual terminal backend (paramiko) already
# uses the PERSISTENT PVC file /opt/data/.ssh/known_hosts, so SSH itself
# works fine; this drop-in just points plain `ssh` at the same persistent
# file (+ accept-new for first boot) so doctor stays green across rolls.
# VM 701 / zwave-js is the always-on ops node for kubectl/GitHub/Proxmox access.
Host 192.168.1.236
    StrictHostKeyChecking accept-new
    UserKnownHostsFile /opt/data/.ssh/known_hosts
