apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crafty-https
  namespace: crafty
  annotations:
    gethomepage.dev/href: "https://crafty.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Crafty"
    gethomepage.dev/description: "Minecraft server manager"
    gethomepage.dev/app: crafty
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-crafty-controller.svg"
    
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`crafty.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: crafty
          port: 8443
          scheme: https
          serversTransport: crafty-insecure-transport
  tls: {}