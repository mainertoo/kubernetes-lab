apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crafty
  namespace: crafty
spec:
  interval: 30m
  releaseName: crafty

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      crafty:
        strategy: Recreate

        initContainers:
          fix-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                echo "Creating Crafty dirs + fixing perms on CephFS mounts..."
                mkdir -p /data/backups /data/logs /data/servers /data/config /data/import
                chown -R 1000:1000 /data || true
                chmod -R 0775 /data || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: registry.gitlab.com/crafty-controller/crafty-4
              tag: "latest@sha256:d2f61fcabb4756a63bc8538fb4f5e35ffddca3f1916a733c95a31c705c697742"
            env:
              - name: TZ
                value: America/Los_Angeles
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        controller: crafty
        type: ClusterIP
        ports:
          https:
            port: 8443
            targetPort: 8443
            protocol: TCP
          dynmap:
            port: 8123
            targetPort: 8123
            protocol: TCP
          bedrock:
            port: 19132
            targetPort: 19132
            protocol: UDP

    persistence:
      crafty-data:
        enabled: true
        existingClaim: crafty

        # Mount the same CephFS PVC to the same places as your docker-compose,
        # using subPath so we DON'T shadow /crafty/docker_launcher.sh
        advancedMounts:
          crafty:
            app:
              - path: /crafty/backups
                subPath: backups
              - path: /crafty/logs
                subPath: logs
              - path: /crafty/servers
                subPath: servers
              - path: /crafty/app/config
                subPath: config
              - path: /crafty/import
                subPath: import

            # initContainer mount point
            fix-perms:
              - path: /data