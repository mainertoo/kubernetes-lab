apiVersion: v1
kind: Service
metadata:
  name: crafty-bedrock-lb
  namespace: crafty
spec:
  type: LoadBalancer
  ports:
    - name: bedrock
      port: 19132
      targetPort: 19132
      protocol: UDP
  # Selector uses only instance+name — both labels are stable across
  # bjw-s app-template v3 and v5. Adding the controller-discriminator
  # (component= in v3, controller= in v5) would tie this LB to a
  # specific chart-version label key. Safe here: crafty is a single-
  # controller HR so no discriminator is needed.
  selector:
    app.kubernetes.io/instance: crafty
    app.kubernetes.io/name: crafty