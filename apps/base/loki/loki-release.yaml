apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      interval: 1h
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: loki
      version: "*"

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    # -----------------------------
    # DEPLOYMENT MODE: SINGLE BINARY
    # -----------------------------
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    singleBinary:
      enabled: true
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-rbd
        accessModes:
          - ReadWriteOnce
        size: 20Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

    # -----------------------------
    # LOKI CONFIG (PVC filesystem backend)
    # -----------------------------
    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      storage:
        type: filesystem

      compactor:
        retention_enabled: true
        delete_request_store: filesystem

      limits_config:
        ingestion_burst_size_mb: 32
        ingestion_rate_mb: 16
        retention_period: 336h # 14 days

    # -----------------------------
    # GATEWAY (OPTIONAL)
    # If enabled, make it point to single-binary, NOT microservices.
    # -----------------------------
    gateway:
      enabled: true
      # The chart supports different "mode" / backend wiring depending on version.
      # The safest approach is to explicitly tell the gateway where to send traffic.
      # These extraEnvVars are used by the nginx template in many chart versions.
      extraEnvVars:
        - name: LOKI_BACKEND
          value: http://loki.loki.svc.cluster.local:3100
      service:
        type: ClusterIP
        port: 80

    # -----------------------------
    # Monitoring
    # -----------------------------
    monitoring:
      serviceMonitor:
        enabled: true