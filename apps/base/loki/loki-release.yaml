apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  interval: 1h

  chart:
    spec:
      chart: loki
      # You can optionally pin a chart version here later:
      # version: 6.10.0
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: loki
      interval: 1h

  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      limits_config:
        retention_period: 336h  # 14d
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32

      compactor:
        retention_enabled: true
        delete_request_store: filesystem

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      storage:
        type: filesystem

    singleBinary:
      replicas: 1

      persistence:
        enabled: true
        storageClass: ceph-rbd
        accessModes:
          - ReadWriteOnce
        size: 20Gi

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

    # Disable distributed mode components
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    gateway:
      enabled: false

    monitoring:
      serviceMonitor:
        enabled: true