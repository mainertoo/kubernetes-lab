apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      interval: 1h
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: loki
      version: "*"

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    # Force chart into SingleBinary mode (avoids microservices services like distributor/querier/etc)
    deploymentMode: SingleBinary

    # Turn off gateway while we’re single-binary (gateway templates often assume microservices wiring)
    gateway:
      enabled: false

    # Explicitly disable scalable targets
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # SingleBinary Loki
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-rbd
        accessModes:
          - ReadWriteOnce
        size: 20Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      storage:
        type: filesystem

      compactor:
        retention_enabled: true
        delete_request_store: filesystem

      limits_config:
        ingestion_burst_size_mb: 32
        ingestion_rate_mb: 16
        retention_period: 336h # 14 days

    monitoring:
      serviceMonitor:
        enabled: true