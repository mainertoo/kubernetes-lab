apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki
  namespace: loki
  annotations:
    gethomepage.dev/href: "https://loki.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Loki"
    gethomepage.dev/description: "Log storage backend"
    gethomepage.dev/app: loki
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "sh-loki.svg"
spec:
  entryPoints: [websecure, web]
  routes:
    - match: Host(`loki.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: loki
          port: 3100
          scheme: http
  tls: {}