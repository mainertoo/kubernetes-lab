apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  releaseName: podinfo
  interval: 50m

  chart:
    spec:
      chart: podinfo
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: podinfo

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    # Keep Redis enabled if you want a slightly more "real" dependency in-cluster.
    # No persistence required for typical podinfo usage.
    redis:
      enabled: true
      repository: public.ecr.aws/docker/library/redis
      tag: 8.6.2

    # Disable chart-managed Ingress; we use Traefik IngressRoute + Authentik middleware.
    ingress:
      enabled: false

    # Keep service internal; Traefik will reach it via ClusterIP.
    service:
      type: ClusterIP
      port: 9898