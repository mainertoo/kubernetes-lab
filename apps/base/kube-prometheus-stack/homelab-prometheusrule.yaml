---
# Homelab-specific PrometheusRules layered on top of the kube-prom-stack
# defaults. Grouped by domain (storage, backups, certificates) so the
# Alertmanager Discord routing can be tuned per-group later if needed.
#
# Severity convention:
#   warning  — needs attention within a day or so
#   critical — needs attention now
#
# All expressions have been validated against live metric label sets
# in the production cluster on 2026-05-24 (PR introducing this file).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-custom
  namespace: kube-prometheus-stack
  labels:
    app: homelab-custom
spec:
  groups:
    # ----------------------------------------------------------------------
    # Storage — PVC fullness
    # ----------------------------------------------------------------------
    - name: storage.pvc
      rules:
        - alert: PVCNearFull
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= 0.85
            and (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) < 0.95
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "Used / capacity has been ≥ 85% for 30 minutes. Resize, prune, or migrate before it crosses 95%."

        - alert: PVCAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= 0.95
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — critical"
            description: "Used / capacity ≥ 95% for 10 minutes. Imminent ENOSPC risk for the workload backed by this PVC."

    # ----------------------------------------------------------------------
    # Backups — VolSync / Kopia
    # ----------------------------------------------------------------------
    - name: backups.volsync
      rules:
        - alert: VolSyncBackupStale
          # Source-side gauge: 1 if the source PVC hasn't been backed up
          # within its sync window. 30h covers any daily-cadence backup
          # that missed a sync cycle; hourly-cadence backups trip far
          # sooner if they're really wedged.
          expr: max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role="source"}) == 1
          for: 30h
          labels:
            severity: critical
          annotations:
            summary: "VolSync backup stale: {{ $labels.obj_namespace }}/{{ $labels.obj_name }} ({{ $labels.method }})"
            description: "ReplicationSource has been out of sync for >30h. Inspect the source pod logs and check the Kopia repo connectivity."

        - alert: VolSyncKopiaRepoDisconnected
          expr: max by (obj_namespace, obj_name, repository, role) (volsync_kopia_repository_connectivity) == 0
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "VolSync cannot reach Kopia repo {{ $labels.repository }} for {{ $labels.obj_namespace }}/{{ $labels.obj_name }}"
            description: "Repository connectivity gauge has been 0 for 30 minutes — credentials, S3 endpoint, or Garage backend issue. No new backups can land for this PVC."

    # ----------------------------------------------------------------------
    # CNPG cluster health (per-cluster PodMonitors enabled via
    # components/cnpg-cluster/base/cluster.yaml monitoring.enablePodMonitor)
    # ----------------------------------------------------------------------
    - name: cnpg.health
      rules:
        - alert: CNPGCollectorDown
          # The per-cluster postgres collector sidecar can't reach its
          # postgres instance — postgres may be down, networking broken,
          # or the collector itself misconfigured. Distinct from
          # KubePodNotReady (catches gross pod failure later, at 15m).
          expr: cnpg_collector_up == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "CNPG collector down for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "Pod {{ $labels.pod }} can't be scraped by its CNPG sidecar collector. Postgres may be unavailable. Check `kubectl -n {{ $labels.namespace }} get cluster {{ $labels.cluster }}` and the pod's logs."

        - alert: CNPGBackupFailing
          # Last failed backup timestamp is more recent than the last
          # successful one — i.e. the most recent attempt failed and no
          # successful run has happened since.
          expr: |
            cnpg_collector_last_failed_backup_timestamp > 0
            and cnpg_collector_last_failed_backup_timestamp > cnpg_collector_last_available_backup_timestamp
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "CNPG backup failing for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "Latest backup attempt failed and no successful backup since. Inspect the barman-cloud plugin logs on the postgres pod and the ScheduledBackup status."

        - alert: CNPGBackupStale
          # No successful backup in >30h. Catches the silent-stop failure
          # mode where barman-cloud stops trying without setting a failure
          # timestamp. Daily ScheduledBackup cadence + 30h budget = ~1
          # missed cycle of slack before firing.
          expr: (time() - cnpg_collector_last_available_backup_timestamp) > (30 * 60 * 60)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "CNPG backup stale for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "No successful backup in >30h. Daily ScheduledBackup may have stopped firing or the barman-cloud plugin is silently broken. Check the ScheduledBackup CR + the postgres pod's plugin container logs."

        - alert: CNPGManualSwitchoverRequired
          # CNPG only flips this when the operator can't proceed without
          # human intervention (e.g. stuck primary, no healthy replica
          # to promote). Rare but high-signal.
          expr: cnpg_collector_manual_switchover_required == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CNPG manual switchover required for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "The CNPG operator has signaled this cluster needs operator intervention. See `kubectl -n {{ $labels.namespace }} describe cluster {{ $labels.cluster }}` and follow the CNPG cluster-recovery runbook."

    # ----------------------------------------------------------------------
    # Flux — HelmRelease + Kustomization Ready state
    # Backed by the kube-state-metrics customResourceState config in
    # kube-prometheus-stack-release.yaml. Flux v2.8.x removed
    # gotk_resource_info, so KSM-CRS is the canonical "is X ready" source.
    # ----------------------------------------------------------------------
    - name: flux.health
      rules:
        - alert: HelmReleaseNotReady
          # KSM CRS Info-pattern: one sample per condition per HR with
          # type / status / reason labels. We filter to the Ready condition
          # and alert when its status is False. 1h `for:` filters normal
          # upgrade reconcile windows.
          expr: kube_customresource_flux_helmrelease_condition{type="Ready", status="False"} > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} not Ready ({{ $labels.reason }})"
            description: "Ready=False for >1h. Inspect via `flux get hr -n {{ $labels.exported_namespace }} {{ $labels.name }}` and `kubectl -n {{ $labels.exported_namespace }} describe hr {{ $labels.name }}` for the actual error."

        - alert: KustomizationNotReady
          expr: kube_customresource_flux_kustomization_condition{type="Ready", status="False"} > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} not Ready ({{ $labels.reason }})"
            description: "Ready=False for >1h. Inspect via `flux get ks -n {{ $labels.exported_namespace }} {{ $labels.name }}` and `kubectl -n {{ $labels.exported_namespace }} describe ks {{ $labels.name }}` for the actual error."

    # ----------------------------------------------------------------------
    # Certificates — cert-manager
    # ----------------------------------------------------------------------
    - name: certificates.cert-manager
      rules:
        - alert: CertExpiringSoon
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < (14 * 24 * 60 * 60)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Cert {{ $labels.exported_namespace }}/{{ $labels.name }} expires in {{ $value | humanizeDuration }}"
            description: "Issuer: {{ $labels.issuer_kind }}/{{ $labels.issuer_name }}. Verify cert-manager is renewing (normal: 2/3 lifetime). DNS-01 / Cloudflare token issues are the usual cause."

        - alert: CertExpiringCritical
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < (3 * 24 * 60 * 60)
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Cert {{ $labels.exported_namespace }}/{{ $labels.name }} expires in {{ $value | humanizeDuration }} — critical"
            description: "Less than 3 days to expiry. Manually inspect cert-manager controller logs and the underlying Certificate / Order resources."
