---
# Homelab-specific PrometheusRules layered on top of the kube-prom-stack
# defaults. Grouped by domain (storage, backups, certificates) so the
# Alertmanager Discord routing can be tuned per-group later if needed.
#
# Severity convention:
#   warning  — needs attention within a day or so
#   critical — needs attention now
#
# All expressions have been validated against live metric label sets
# in the production cluster on 2026-05-24 (PR introducing this file).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-custom
  namespace: kube-prometheus-stack
  labels:
    app: homelab-custom
spec:
  groups:
    # ----------------------------------------------------------------------
    # Storage — PVC fullness
    # ----------------------------------------------------------------------
    - name: storage.pvc
      rules:
        - alert: PVCNearFull
          expr: |
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= 0.85
            and (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) < 0.95
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "PVC `{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}` has been ≥ 85% full for 30 minutes. Resize, prune, or migrate before it crosses 95%."

        - alert: PVCAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= 0.95
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — critical"
            description: "PVC `{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}` is ≥ 95% full for 10 minutes. Imminent ENOSPC risk for the workload backed by this PVC."

        - alert: PVCWillFillSoon
          # Predictive: based on the last 6h of growth, project 7 days
          # forward — negative result = PVC will hit 0 bytes available
          # within the 7-day horizon. The secondary `> 0.5` filter avoids
          # firing on near-empty PVCs (predict_linear is noisy at low
          # utilization; volsync mover scratch PVCs are the usual
          # false-positive source). Catches slow leaks well before the
          # 85% PVCNearFull threshold trips.
          expr: |
            predict_linear(kubelet_volume_stats_available_bytes[6h], 7 * 24 * 3600) < 0
            and on(namespace, persistentvolumeclaim) (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.5
          for: 6h
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} will fill within 7 days"
            description: "PVC `{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}` will run out of space within 7 days at the current 6h growth rate. Catches slow leaks before the 85% PVCNearFull threshold fires."

    # ----------------------------------------------------------------------
    # Backups — VolSync / Kopia
    # ----------------------------------------------------------------------
    - name: backups.volsync
      rules:
        - alert: VolSyncBackupStale
          # Source-side gauge: 1 if the source PVC hasn't been backed up
          # within its sync window. 30h covers any daily-cadence backup
          # that missed a sync cycle; hourly-cadence backups trip far
          # sooner if they're really wedged.
          expr: max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role="source"}) == 1
          for: 30h
          labels:
            severity: critical
          annotations:
            summary: "VolSync backup stale: {{ $labels.obj_namespace }}/{{ $labels.obj_name }} ({{ $labels.method }})"
            description: "ReplicationSource `{{ $labels.obj_namespace }}/{{ $labels.obj_name }}` ({{ $labels.method }}) has been out of sync for >30h. Inspect the source pod logs and check the Kopia repo connectivity."

        - alert: VolSyncKopiaRepoDisconnected
          expr: max by (obj_namespace, obj_name, repository, role) (volsync_kopia_repository_connectivity) == 0
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "VolSync cannot reach Kopia repo {{ $labels.repository }} for {{ $labels.obj_namespace }}/{{ $labels.obj_name }}"
            description: "ReplicationSource `{{ $labels.obj_namespace }}/{{ $labels.obj_name }}` cannot reach Kopia repo `{{ $labels.repository }}` for 30 minutes. No new backups can land for this PVC. Causes: (1) credentials, S3 endpoint, or Garage backend issue; (2) a wedged sync — check for a `volsync-{{ $labels.obj_name }}-src` VolumeSnapshot stuck Terminating with a stale `volumesnapshot-as-source-protection` finalizer (RS Synchronizing=False/`data PVC not available`, lastSyncTime pinned stale). Clear it with `kubectl patch volumesnapshot <name> -n {{ $labels.obj_namespace }} --type=merge -p '{\"metadata\":{\"finalizers\":[]}}'`."

    # ----------------------------------------------------------------------
    # CNPG cluster health (per-cluster PodMonitors enabled via
    # components/cnpg-cluster/base/cluster.yaml monitoring.enablePodMonitor)
    # ----------------------------------------------------------------------
    - name: cnpg.health
      rules:
        - alert: CNPGCollectorDown
          # The per-cluster postgres collector sidecar can't reach its
          # postgres instance — postgres may be down, networking broken,
          # or the collector itself misconfigured. Distinct from
          # KubePodNotReady (catches gross pod failure later, at 15m).
          expr: cnpg_collector_up == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "CNPG collector down for {{ $labels.namespace }}/{{ $labels.cluster }}"
            description: "Pod {{ $labels.pod }} can't be scraped by its CNPG sidecar collector. Postgres may be unavailable. Check `kubectl -n {{ $labels.namespace }} get cluster {{ $labels.cluster }}` and the pod's logs."

        - alert: CNPGBackupFailing
          # Last failed backup timestamp is more recent than the last
          # successful one — i.e. the most recent attempt failed and no
          # successful run has happened since.
          # Metrics come from the barman-cloud plugin sidecar; the
          # `cnpg_collector_last_*_backup_timestamp` family was deprecated
          # for plugin-method backups (cloudnative-pg PR #8091, 2025-07).
          # The new metric carries `pod` + `namespace` but no `cluster`
          # label — templates use `pod` (uniquely identifies the cluster
          # in our single-instance homelab clusters).
          expr: |
            barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp > 0
            and barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp > barman_cloud_cloudnative_pg_io_last_available_backup_timestamp
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "CNPG backup failing for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Latest backup attempt for `{{ $labels.namespace }}/{{ $labels.pod }}` failed and no successful backup since. Inspect the barman-cloud plugin logs on the postgres pod and the ScheduledBackup status."

        - alert: CNPGBackupStale
          # No successful backup in >30h. Catches the silent-stop failure
          # mode where barman-cloud stops trying without setting a failure
          # timestamp. Daily ScheduledBackup cadence + 30h budget = ~1
          # missed cycle of slack before firing. Same plugin-sidecar
          # metric source as CNPGBackupFailing above.
          expr: (time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp) > (30 * 60 * 60)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "CNPG backup stale for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "No successful backup for `{{ $labels.namespace }}/{{ $labels.pod }}` in >30h. Daily ScheduledBackup may have stopped firing or the barman-cloud plugin is silently broken. Check the ScheduledBackup CR + the postgres pod's plugin container logs."

        - alert: CNPGManualSwitchoverRequired
          # CNPG only flips this when the operator can't proceed without
          # human intervention (e.g. stuck primary, no healthy replica
          # to promote). Rare but high-signal.
          # NOTE: this metric does not carry a `cluster` label (unlike
          # `cnpg_collector_up`); identify the cluster via `pod` (strip
          # `-N` suffix → cluster name).
          expr: cnpg_collector_manual_switchover_required == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CNPG manual switchover required for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "The CNPG operator has signaled cluster `{{ $labels.namespace }}/{{ $labels.pod }}` needs operator intervention. See `kubectl -n {{ $labels.namespace }} describe pod {{ $labels.pod }}` and follow the CNPG cluster-recovery runbook."

    # ----------------------------------------------------------------------
    # Certificates — cert-manager
    # ----------------------------------------------------------------------
    - name: certificates.cert-manager
      rules:
        - alert: CertExpiringSoon
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < (14 * 24 * 60 * 60)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Cert {{ $labels.exported_namespace }}/{{ $labels.name }} expires in {{ $value | humanizeDuration }}"
            description: "Cert `{{ $labels.exported_namespace }}/{{ $labels.name }}` from issuer {{ $labels.issuer_kind }}/{{ $labels.issuer_name }} expires soon. Verify cert-manager is renewing (normal: 2/3 lifetime). DNS-01 / Cloudflare token issues are the usual cause."

        - alert: CertExpiringCritical
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < (3 * 24 * 60 * 60)
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Cert {{ $labels.exported_namespace }}/{{ $labels.name }} expires in {{ $value | humanizeDuration }} — critical"
            description: "Cert `{{ $labels.exported_namespace }}/{{ $labels.name }}` has less than 3 days to expiry. Manually inspect cert-manager controller logs and the underlying Certificate / Order resources."

    # ----------------------------------------------------------------------
    # Observability pipeline health — Loki + Alloy
    # ----------------------------------------------------------------------
    - name: observability.health
      rules:
        - alert: LokiDown
          # Loki scrape job in the loki namespace returned a failed scrape
          # for 5m. Log queries return stale or no data while this fires.
          expr: up{namespace="loki", job=~".*loki.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Loki is down ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "No successful scrape of Loki pod `{{ $labels.namespace }}/{{ $labels.pod }}` in 5 minutes — log queries will return stale or no data. Check `kubectl -n loki get pods` and recent events."

        - alert: AlloyDown
          # Per-node DaemonSet log shipper. A single pod down = that node's
          # logs stop reaching Loki until the pod recovers.
          expr: up{namespace="alloy", job=~".*alloy.*"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alloy log-shipper down ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Alloy DaemonSet pod `{{ $labels.namespace }}/{{ $labels.pod }}` has stopped responding to scrapes. That node's logs are not being shipped to Loki until the pod recovers."
