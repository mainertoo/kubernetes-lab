apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - kube-prometheus-stack-namespace.yaml
  - alertmanager-secret.sops.yaml
  - discord-webhook-secret.sops.yaml
  - alertmanager-discord-bridge.yaml
  - kube-prometheus-stack-ingressroute.yaml
  - kube-prometheus-stack-release.yaml

  # Ceph metrics + alerts
  - ceph-mgr-servicemonitor.yaml
  - ceph-health-prometheusrule.yaml

  # Flux controller metrics (gotk_*) — picked up by the open podMonitorSelector
  - flux-podmonitor.yaml

  # Homelab-specific PrometheusRules (PVC fullness, VolSync, cert expiry)
  - homelab-prometheusrule.yaml