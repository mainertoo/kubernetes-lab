---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kube-prometheus-stack
  namespace: kube-prometheus-stack
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 87.0.1
  url: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: kube-prometheus-stack
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
    namespace: kube-prometheus-stack

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true

    cleanPrometheusOperatorObjectNames: true

    # k3s note:
    # Controller-manager is embedded in the k3s server process and is not exposed like kubeadm clusters.
    # kube-prometheus-stack will create a Service/ServiceMonitor but end up with "No targets",
    # which triggers the KubeControllerManagerDown alert. Disable both the monitor and rule group.
    kubeControllerManager:
      enabled: false

    defaultRules:
      rules:
        kubeControllerManager: false

    # Create default Grafana dashboards as ConfigMaps, even though we are NOT deploying grafana subchart.
    grafana:
      enabled: false
      forceDeployDashboards: true
      defaultDashboardsEnabled: true
      sidecar:
        dashboards:
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder

    alertmanager:
      alertmanagerSpec:
        replicas: &replicasCount 1
        useExistingSecret: true
        configSecret: alertmanager-secret
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - action: keep
            sourceLabels: [ "__name__" ]
            regex: (apiserver_audit|apiserver_client|apiserver_delegated|apiserver_envelope|apiserver_storage|apiserver_webhooks|authentication_token|cadvisor_version|container_blkio|container_cpu|container_fs|container_last|container_memory|container_network|container_oom|container_processes|container|csi_operations|disabled_metric|get_token|go|hidden_metric|kubelet_certificate|kubelet_cgroup|kubelet_container|kubelet_containers|kubelet_cpu|kubelet_device|kubelet_graceful|kubelet_http|kubelet_lifecycle|kubelet_managed|kubelet_node|kubelet_pleg|kubelet_pod|kubelet_run|kubelet_running|kubelet_runtime|kubelet_server|kubelet_started|kubelet_volume|kubelet_graceful|kubelet_managed|kubernetes_build|kubernetes_feature|machine_cpu|machine_memory|machine_nvm|machine_scrape|node_namespace|plugin_manager|prober_probe|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|storage_operation|volume_manager|volume_operation|workqueue)_(.+)
          - action: replace
            sourceLabels: [ "node" ]
            targetLabel: instance
          - action: labeldrop
            regex: (uid)
          - action: labeldrop
            regex: (id|name)
          - action: drop
            sourceLabels: [ "__name__" ]
            regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)

    kubeApiServer:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - action: keep
            sourceLabels: [ "__name__" ]
            regex: (aggregator_openapi|aggregator_unavailable|apiextensions_openapi|apiserver_admission|apiserver_audit|apiserver_cache|apiserver_cel|apiserver_client|apiserver_crd|apiserver_current|apiserver_envelope|apiserver_flowcontrol|apiserver_init|apiserver_kube|apiserver_longrunning|apiserver_request|apiserver_requested|apiserver_response|apiserver_selfrequest|apiserver_storage|apiserver_terminated|apiserver_tls|apiserver_watch|apiserver_webhooks|authenticated_user|authentication|disabled_metric|etcd_bookmark|etcd_lease|etcd_request|field_validation|get_token|go|grpc_client|hidden_metric|kube_apiserver|kubernetes_build|kubernetes_feature|node_authorizer|pod_security|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|serviceaccount_legacy|serviceaccount_stale|serviceaccount_valid|watch_cache|workqueue)_(.+)
          - action: drop
            sourceLabels: [ "__name__" ]
            regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
          - action: drop
            sourceLabels: [ "__name__" ]
            regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true

    prometheus:
      prometheusSpec:
        replicas: *replicasCount
        replicaExternalLabelName: __replica__

        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false

        # All *SelectorNilUsesHelmValues flags above are false → with no explicit
        # selector here, the operator matches every ServiceMonitor / PodMonitor /
        # Probe / Rule / ScrapeConfig in the cluster, regardless of labels.
        # This is the homelab-standard config: we want Loki, Kyverno, VolSync,
        # cert-manager, CNPG, Flux, etc. to all be scraped without each one
        # needing to carry release=kube-prometheus-stack on its monitor.
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        probeNamespaceSelector: {}
        ruleNamespaceSelector: {}
        scrapeConfigNamespaceSelector: {}

        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - auto-gomaxprocs
          - memory-snapshot-on-shutdown
          - new-service-discovery-manager

        retention: 14d
        retentionSize: 18GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 40Gi