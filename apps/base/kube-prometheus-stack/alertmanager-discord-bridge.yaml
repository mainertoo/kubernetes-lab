apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-discord-bridge
  namespace: kube-prometheus-stack
  labels:
    app.kubernetes.io/name: alertmanager-discord-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-discord-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-discord-bridge
    spec:
      containers:
        - name: bridge
          image: ghcr.io/sriramanujam/alertmanager-discord-bridge:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: DISCORD_WEBHOOK
          ports:
            - name: http
              containerPort: 9094
          readinessProbe:
            tcpSocket:
              port: 9094
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-discord-bridge
  namespace: kube-prometheus-stack
spec:
  selector:
    app.kubernetes.io/name: alertmanager-discord-bridge
  ports:
    - name: http
      port: 9094
      targetPort: 9094