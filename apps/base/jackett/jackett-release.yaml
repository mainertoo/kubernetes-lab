apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-jackett
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      # you *can* bump this to 3.7.3 later; keeping 3.5.1 for now to match what Flux shows
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/jackett
              tag: latest
              pullPolicy: IfNotPresent

            env:
              PUID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PUID
              PGID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PGID
              TZ:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: TZ
              AUTO_UPDATE:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: JACKETT_AUTO_UPDATE
              RUN_OPTS:
                valueFrom:
                  secretKeyRef:
                    name: JACKETT_RUN_OPTS
                    key: JACKETT_RUN_OPTS

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 9117

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd          # <== use your existing RBD storage class
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config

      downloads:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd          # <== same here
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /downloads