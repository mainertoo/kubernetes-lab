apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-jackett
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/jackett
              tag: latest
              pullPolicy: IfNotPresent
            env:
              PUID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PUID
              PGID:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: PGID
              TZ:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: TZ
              AUTO_UPDATE:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: JACKETT_AUTO_UPDATE
              RUN_OPTS:
                valueFrom:
                  secretKeyRef:
                    name: jackett-env
                    key: JACKETT_RUN_OPTS
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 9117

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: k3s-rbd
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config

      downloads:
        enabled: true
        type: persistentVolumeClaim
        storageClass: k3s-rbd
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /downloads