apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stirling-pdf
  namespace: stirling-pdf
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      reconcileStrategy: ChartVersion

  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      main:
        type: deployment
        replicas: 1

        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: "1.38.0"
            command:
              - sh
              - -c
              - |
                set -e
                mkdir -p /mnt/pvc/configs /mnt/pvc/tessdata
                chown -R 1000:1000 /mnt/pvc || true
                chmod -R g+rwX /mnt/pvc || true
            securityContext:
              runAsUser: 0
              runAsGroup: 0

        containers:
          app:
            image:
              repository: frooodle/s-pdf
              tag: 2.11.0
              pullPolicy: IfNotPresent

            env:
              TZ: America/Los_Angeles
              # Disable Stirling's internal security/login UI (ForwardAuth will do auth)
              DOCKER_ENABLE_SECURITY: "false"
              SECURITY_ENABLELOGIN: "false"
              SECURITY_LOGINMETHOD: "none"
              SECURITY_OAUTH2_ENABLED: "false"
              SECURITY_OAUTH2_AUTOCREATEUSER: "false"

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ceph-rbd
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          main:
            app:
              - path: /configs
                subPath: configs
              - path: /usr/share/tesseract-ocr/5/tessdata
                subPath: tessdata
            init-perms:
              - path: /mnt/pvc