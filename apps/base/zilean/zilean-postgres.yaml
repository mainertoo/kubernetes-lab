apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zilean-postgres-data
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-rbd
---
apiVersion: v1
kind: Service
metadata:
  name: zilean-postgres
  namespace: media
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: zilean-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zilean-postgres
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zilean-postgres
  template:
    metadata:
      labels:
        app: zilean-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: zilean
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zilean-env
                  key: ZILEAN_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zilean-env
                  key: ZILEAN_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zilean-postgres-data