apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beam
  namespace: beam
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  uninstall:
    keepHistory: false

  values:
    controllers:
      beam:
        containers:
          app:
            image:
              repository: ghcr.io/mainertoo/beam
              tag: sha-556d96279f68e35a857e0c5b712644ef84672ead
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: BEAM_PUBLIC_ORIGIN
                value: https://beam.mainertoo.com
              # handed to browsers as ICE config; coturn lives on the VPS
              # (home_server:docker-vps/coturn) — plan §4. The turns: entry is
              # TURN-over-TLS on 443 via Traefik SNI routing (plan §10 trigger,
              # 2026-07-13) — the escape hatch for venues that only allow HTTPS out.
              - name: BEAM_TURN_URIS
                value: stun:turn.mainertoo.com:3478,turn:turn.mainertoo.com:3478?transport=udp,turn:turn.mainertoo.com:3478?transport=tcp,turns:turn.mainertoo.com:443?transport=tcp
            envFrom:
              # BEAM_TURN_SECRET — same value as the coturn stack env (rotate together)
              - secretRef:
                  name: beam-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
              startup: { enabled: false }

    service:
      app:
        controller: beam
        ports:
          http:
            port: 8080
