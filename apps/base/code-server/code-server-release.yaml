apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app code-server
  namespace: code-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      code-server:
        type: deployment
        replicas: 1

        initContainers:
          init-perms:
            image:
              repository: busybox
              tag: latest
            command: ["/bin/sh","-lc"]
            args:
              - |
                set -e
                echo "== code-server init-perms =="
                mkdir -p /config
                chown -R 1000:1000 /config || true
                chmod -R 0775 /config || true
                ls -ld /config || true
                echo "Done."
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/code-server
              tag: 4.128.0

            # app-template v3 expects env as a MAP, not a list
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: "America/Los_Angeles"
              PROXY_DOMAIN: "vscode.lab.mainertoo.com"
              DEFAULT_WORKSPACE: "/config/workspace"
              PWA_APPNAME: "code-server"

            # Pull PASSWORD / SUDO_PASSWORD (etc) from a Secret as env vars
            envFrom:
              - secretRef:
                  name: code-server-secret

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        enabled: true
        controller: code-server
        ports:
          http:
            port: 8443

    persistence:
      config:
        # PVC is provisioned by components/volsync-v2 with name = ${APP}.
        # Renamed from code-server-config during the Phase 1c migration.
        existingClaim: code-server
        globalMounts:
          - path: /config

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 4Gi