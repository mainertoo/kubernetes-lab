spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`vscode.lab.mainertoo.com`) || Host(`code-server.lab.mainertoo.com`)
      kind: Rule
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
      services:
        - name: code-server
          port: 8443
          scheme: http
  tls: {}