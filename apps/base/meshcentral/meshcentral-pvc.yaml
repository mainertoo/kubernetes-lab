apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meshcentral
  labels:
    # Label-driven volsync backup: ClusterPolicy volsync-pvc-backup-restore-kopia
    # matches these labels and generates the volsync-meshcentral Secret +
    # meshcentral-backup RS + RD in this namespace. `daily` is plenty for an
    # AMT-management console (low-churn: a handful of device records).
    backup: daily
    backup-engine: kopia
spec:
  storageClassName: ceph-rbd
  accessModes: [ReadWriteOnce]
  # dataSourceRef is immutable on a bound PVC; we mirror the bootstrap ref to
  # keep Flux's dry-run happy. Kyverno's CREATE-only mutate rule swaps it for
  # meshcentral-backup at admission before bind. On a fresh install (no prior
  # backup) the restore is a no-op and MeshCentral initializes a clean DB.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: meshcentral-bootstrap
  resources:
    requests:
      storage: 2Gi
