apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meshcentral
  labels:
    # Label-driven volsync backup: ClusterPolicy volsync-pvc-backup-restore-kopia
    # matches these labels and generates the volsync-meshcentral Secret +
    # meshcentral-backup RS + RD in this namespace. `daily` is plenty for an
    # AMT-management console (low-churn: a handful of device records).
    backup: daily
    backup-engine: kopia
spec:
  storageClassName: ceph-rbd
  accessModes: [ReadWriteOnce]
  # NO dataSourceRef: this is a brand-new app with no prior backup. Kyverno's
  # `add-datasource-if-backup-exists` mutate rule only fires when dataSourceRef
  # is EMPTY *and* the oracle reports an existing backup — so omitting it means
  # a fresh install provisions an empty volume (clean DB), while a future
  # cluster-rebuild auto-restores. (Do NOT mirror a `<app>-bootstrap` ref here —
  # that's a legacy Phase-5b pattern for already-bound migrated PVCs; on a fresh
  # PVC it points at a nonexistent RD and the volume-populator hangs forever.
  # Matches apps/base/dawarich/dawarich-media-pvc.yaml.)
  resources:
    requests:
      storage: 2Gi
