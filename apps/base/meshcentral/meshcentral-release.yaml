apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app meshcentral
  namespace: meshcentral
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2

  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      meshcentral:
        type: deployment
        replicas: 1
        containers:
          app:
            image:
              repository: typhonragewind/meshcentral
              tag: "1.1.53"
            # typhonragewind image renders config.json from these env vars at boot.
            # app-template v3 expects env as a MAP, not a list.
            env:
              TZ: "America/Los_Angeles"
              # Internal .lab FQDN + reverse-proxy (Traefik terminates the public
              # TLS; MeshCentral keeps its own self-signed cert on :443).
              HOSTNAME: "meshcentral.lab.mainertoo.com"
              REVERSE_PROXY: "meshcentral.lab.mainertoo.com"
              REVERSE_PROXY_TLS_PORT: "443"
              # NeDB (built-in) — fine for an AMT-only console (a handful of devices).
              USE_MONGODB: "false"
              # Admin account created 2026-06-15 after the prod re-seed; locked
              # down so no further self-signups are possible.
              ALLOW_NEW_ACCOUNTS: "false"
              IFRAME: "false"
              WEBRTC: "false"
              ALLOWPLUGINS: "false"
              # Pin the session key so login sessions survive pod restarts
              # (unset = MeshCentral regenerates it each boot, logging everyone out).
              SESSION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: meshcentral-secret
                    key: SESSION_KEY
            # MeshCentral can take ~20-30s to generate certs/db on first boot;
            # probes left off for the POC to avoid masking real crash loops.
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      app:
        enabled: true
        controller: meshcentral
        ports:
          # MeshCentral terminates its own TLS on 443 (TLSOffload=false; the
          # typhonragewind REVERSE_PROXY env sets certUrl but not offload).
          # Port 80 is only a 301→443 redirect, so Traefik must talk HTTPS to
          # :443 and skip-verify the self-signed backend cert (see ingressroute
          # + servers-transport).
          https:
            port: 443

    persistence:
      data:
        existingClaim: meshcentral
        globalMounts:
          - path: /opt/meshcentral/meshcentral-data

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1Gi
