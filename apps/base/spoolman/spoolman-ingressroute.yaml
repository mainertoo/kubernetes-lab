apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spoolman-ingressroute
  namespace: spoolman
  annotations:
    gethomepage.dev/href: "https://spoolman.lab.mainertoo.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Spoolman"
    gethomepage.dev/description: "Application for managing filament spools."
    gethomepage.dev/app: spoolman
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "sh-spoolman.svg"
    gethomepage.dev/widget.type: "spoolman"
    gethomepage.dev/widget.url: "http://spoolman.spoolman.svc.cluster.local:8000"
spec:
  entryPoints:
    - websecure
  routes:
    # Route WITHOUT middleware for /api
    - match: Host(`spoolman.lab.mainertoo.com`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: spoolman
          port: 8000

    - match: Host(`spoolman.lab.mainertoo.com`)
      kind: Rule
      services:
        - name: spoolman
          port: 8000
      middlewares:
        - name: authentik-sso
          namespace: traefik-system
