apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spoolman
  labels:
    # Label-driven volsync backup — ClusterPolicy volsync-pvc-backup-restore-kopia
    # generates the volsync-spoolman Secret + RS + RD in this namespace.
    backup: daily
    backup-engine: kopia
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 2Gi
