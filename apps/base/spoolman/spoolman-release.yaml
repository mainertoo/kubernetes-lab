apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app spoolman
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      spoolman:
        containers:
          app:
            image:
              repository: ghcr.io/donkie/spoolman
              tag: 0.23.1
            env:
              - name: TZ
                value: America/Los_Angeles
              - name: SPOOLMAN_PORT
                value: "8000"
              - name: SPOOLMAN_DIR_DATA
                value: "/data"
              - name: SPOOLMAN_DIR_BACKUPS
                value: "/data/backups"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      # spoolman runs as UID/GID 1000 and writes to /data. ceph-rbd PVCs mount
      # root:root, so without fsGroup the non-root process can't write its data
      # dir (check_write_permissions → SystemExit(1) crashloop). fsGroup makes
      # the volume group-owned by 1000; OnRootMismatch avoids a recursive chown
      # when the top-level dir is already correct.
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: spoolman
        ports:
          http:
            port: &port 8000

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data