apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
  namespace: paperless-ngx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      paperless-ngx:
        containers:
          app:
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 3Gi
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15
            # 1. pull secrets (including OIDC client/secret) from SOPS Secret
            envFrom:
              - secretRef:
                  name: paperless-oidc

            # 2. non-secret env here
            env:
              TZ: America/Los_Angeles
              COMPOSE_PROJECT_NAME: paperless-ngx
              PAPERLESS_CONSUMPTION_DIR: /paperless/consume
              PAPERLESS_DATA_DIR: /paperless/data
              PAPERLESS_MEDIA_ROOT: /paperless/media

              # OCR settings
              PAPERLESS_OCR_LANGUAGE: dan+eng
              PAPERLESS_OCR_LANGUAGES: dan

              # Redis inside this pod
              PAPERLESS_REDIS: redis://localhost:6379

              # Tika + Gotenberg run as sidecars in this pod (see below)
              # so office formats (docx/odt/xlsx/email) can be ingested.
              PAPERLESS_TIKA_ENABLED: "1"
              PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://localhost:3000

              PAPERLESS_TIME_ZONE: America/Los_Angeles
              PAPERLESS_URL: https://paperless.lab.mainertoo.com

              # 🔐 Authentik / allauth OIDC integration
              PAPERLESS_ENABLE_ALLAUTH: "true"
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_AUTO_LOGIN: "true"
              PAPERLESS_AUTO_CREATE: "true"
              PAPERLESS_LOGOUT_REDIRECT_URL: "https://authentik.lab.mainertoo.com/application/o/paperless-ngx/end-session/"
              PAPERLESS_SOCIAL_AUTO_SIGNUP: "true"
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"

              # 🔕 Turn OFF remote-user auth to stop the noisy logs
              PAPERLESS_ENABLE_HTTP_REMOTE_USER: "0"
              PAPERLESS_ENABLE_HTTP_REMOTE_USER_API: "0"

          redis:
            image:
              repository: docker.io/library/redis
              tag: "8.8.0"

          # Apache Tika — parses office/email formats into text for paperless
          tika:
            image:
              repository: docker.io/apache/tika
              tag: 3.3.1.0-full
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

          # Gotenberg — converts office docs to PDF for paperless
          gotenberg:
            image:
              repository: docker.io/gotenberg/gotenberg
              tag: "8.34.0"
            args:
              - gotenberg
              - --api-timeout=180s
              - --chromium-disable-javascript=true
              - --chromium-allow-list=file:///tmp/.*
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi


    service:
      app:
        controller: paperless-ngx
        ports:
          http:
            port: &port 8000
      redis:
        controller: paperless-ngx
        ports:
          redis:
            enabled: true
            port: &redisport 6379

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /paperless