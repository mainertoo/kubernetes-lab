apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
  namespace: paperless-ngx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      paperless-ngx:
        # If you really want to force GHCR auth, you *can* keep this,
        # but it's not required for the main paperless-ngx image since
        # it pulls fine anonymously in your cluster.
        # pod:
        #   imagePullSecrets:
        #     - name: ghcr-paperless-cred

        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.19.3
            env:
              COMPOSE_PROJECT_NAME: paperless-ngx
              PAPERLESS_CONSUMPTION_DIR: /paperless/consume
              PAPERLESS_DATA_DIR: /paperless/data
              PAPERLESS_MEDIA_ROOT: /paperless/media

              # OCR settings – the main image has Tesseract built-in
              PAPERLESS_OCR_LANGUAGE: dan+eng
              PAPERLESS_OCR_LANGUAGES: dan

              # Redis inside this pod
              PAPERLESS_REDIS: redis://localhost:6379

              # Tika/gotenberg: we are **not** using the private Tika image anymore.
              # The main image provides OCR; if you later want external Tika again,
              # we can revisit, but for now keep this simple & working.
              PAPERLESS_TIKA_ENABLED: "0"

              PAPERLESS_TIME_ZONE: Europe/Copenhagen
              PAPERLESS_URL: https://paperless.lab.mainertoo.com

              # Remote user integration (optional)
              PAPERLESS_ENABLE_HTTP_REMOTE_USER: "1"
              PAPERLESS_ENABLE_HTTP_REMOTE_USER_API: "1"

          redis:
            image:
              repository: docker.io/library/redis
              tag: "8.2.2"

    service:
      app:
        controller: paperless-ngx
        ports:
          http:
            port: &port 8000
      redis:
        controller: paperless-ngx
        ports:
          redis:
            enabled: true
            port: &redisport 6379

    persistence:
      data:
        # PVC named "paperless-ngx" from paperless-ngx-pvc.yaml
        existingClaim: *app
        globalMounts:
          - path: /paperless