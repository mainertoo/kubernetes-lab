apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
  namespace: paperless-ngx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      paperless-ngx:
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.19.3
            env:
              TZ: America/Los_Angeles

              COMPOSE_PROJECT_NAME: paperless-ngx
              PAPERLESS_CONSUMPTION_DIR: /paperless/consume
              PAPERLESS_DATA_DIR: /paperless/data
              PAPERLESS_MEDIA_ROOT: /paperless/media

              # OCR settings – the main image has Tesseract built-in
              PAPERLESS_OCR_LANGUAGE: dan+eng
              PAPERLESS_OCR_LANGUAGES: dan

              # Redis inside this pod
              PAPERLESS_REDIS: redis://localhost:6379

              # We are not using external Tika right now
              PAPERLESS_TIKA_ENABLED: "0"

              PAPERLESS_TIME_ZONE: America/Los_Angeles
              PAPERLESS_URL: https://paperless.lab.mainertoo.com

              # Remote user integration (you can later disable if not needed)
              PAPERLESS_ENABLE_HTTP_REMOTE_USER: "1"
              PAPERLESS_ENABLE_HTTP_REMOTE_USER_API: "1"

            envFrom:
              - secretRef:
                  name: paperless-oidc  # <-- your SOPS Secret name

          redis:
            image:
              repository: docker.io/library/redis
              tag: "8.2.2"

    service:
      app:
        controller: paperless-ngx
        ports:
          http:
            port: &port 8000
      redis:
        controller: paperless-ngx
        ports:
          redis:
            enabled: true
            port: &redisport 6379

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /paperless