apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cephfs
provisioner: cephfs.csi.ceph.com
parameters:
  clusterID: "2b142655-7791-4f14-8934-0ea16121b652"
  fsName: "ceph-swarm"
  rootPath: "/k8s"

  csi.storage.k8s.io/provisioner-secret-name: ceph-csi-cephfs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system
  csi.storage.k8s.io/node-stage-secret-name: ceph-csi-cephfs-secret
  csi.storage.k8s.io/node-stage-secret-namespace: kube-system

  # Space-separated monitor list
  monitors: "192.168.99.12:6789,192.168.99.13:6789,192.168.99.14:6789"

reclaimPolicy: Delete
allowVolumeExpansion: true
mountOptions:
  - noatime
volumeBindingMode: Immediate
