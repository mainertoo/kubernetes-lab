# Phase 1b one-shot: initialize the shared Kopia repo on Garage, then prove
# the credential + password chain end-to-end with a tiny backup/restore/diff.
# Hand-applied (not Flux-reconciled). Lives under apps/archive/ so Renovate
# ignores it and Flux never reconciles it. Modeled after the restic version
# at apps/archive/04-volsync-shared-init-smoketest.yaml.
#
# Prerequisites (Phase 1b user actions):
#   1. Garage bucket `volsync-kopia` created
#   2. Garage IAM key with read+write on that bucket
#   3. Kopia master password generated (openssl rand -base64 32),
#      stored in 1Password ("volsync-kopia repository master password")
#   4. SOPS Secret infrastructure/secrets-prod/volsync-kopia-shared-base.
#      sops.yaml filled with the 3 values + encrypted + merged to master
#      via Flux (infra-secrets-prod kustomization reconciles it)
#
# Usage:
#   kubectl apply -f apps/archive/05-volsync-kopia-init-smoketest.yaml
#   kubectl -n flux-system logs -f job/volsync-kopia-init-smoketest
#   # ... wait for "KOPIA SMOKETEST OK" ...
#   kubectl -n flux-system delete job volsync-kopia-init-smoketest
#
# Expected output ends with "KOPIA SMOKETEST OK".
# Leaves one snapshot tagged `phase1b-smoketest` in the shared repo. Will
# be auto-pruned by the future kopia-maintenance CronJob (Phase 2);
# manual cleanup if desired:
#   kopia snapshot delete --unsafe-ignore-source <snap-id>
#
# Idempotent: re-running this Job after the repo exists will fall through
# to `connect` instead of `create`. Safe to re-run.
apiVersion: batch/v1
kind: Job
metadata:
  name: volsync-kopia-init-smoketest
  namespace: flux-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: volsync-kopia-init-smoketest
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kopia
          # Match the kopia version bundled inside perfectra1n's mover at
          # v0.17.11 — Kopia repository format is stable across minor versions,
          # but matching exactly avoids any "you used a newer client to init
          # this repo than the mover can read" surprises. Override to latest
          # stable if the cluster operator prefers; perfectra1n's mover
          # internal kopia is 0.21.x as of v0.17.11 release.
          image: kopia/kopia:0.21
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            # Repository credentials from the shared Secret.
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: volsync-kopia-shared-base
                  key: KOPIA_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: volsync-kopia-shared-base
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: volsync-kopia-shared-base
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: volsync-kopia-shared-base
                  key: AWS_DEFAULT_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                secretKeyRef:
                  name: volsync-kopia-shared-base
                  key: AWS_EC2_METADATA_DISABLED
            # Bucket + endpoint are plain config — not in the Secret.
            - name: KOPIA_S3_ENDPOINT
              value: "garage.lab.mainertoo.com"
            - name: KOPIA_S3_BUCKET
              value: "volsync-kopia"
            - name: KOPIA_S3_DISABLE_TLS
              value: "false"
            # Cache dir + log dir — emptyDir mounts below. Kopia would
            # otherwise write to /home/$USER which doesn't exist in this
            # image's nonroot setup.
            - name: KOPIA_CACHE_DIRECTORY
              value: /tmp/kopia-cache
            - name: KOPIA_LOG_DIR
              value: /tmp/kopia-logs
            - name: KOPIA_CONFIG_PATH
              value: /tmp/kopia-config/repository.config
            - name: HOME
              value: /tmp
          command:
            - sh
            - -c
            - |
              set -eu  # busybox sh in kopia/kopia image — no `pipefail` support

              echo "=== Phase 1b: Kopia repo init + smoketest ==="
              kopia --version

              # Step 1: try to connect to existing repo (idempotent).
              echo
              echo "=== [1/6] Trying to connect to existing repo ==="
              if kopia repository connect s3 \
                   --bucket="${KOPIA_S3_BUCKET}" \
                   --endpoint="${KOPIA_S3_ENDPOINT}" \
                   --override-username=kopia-init \
                   --override-hostname=cluster-bootstrap 2>&1; then
                echo "Connected to existing repository."
              else
                echo "Connect failed — assuming repo does not exist; creating it."
                # Step 1b: create new repo.
                kopia repository create s3 \
                  --bucket="${KOPIA_S3_BUCKET}" \
                  --endpoint="${KOPIA_S3_ENDPOINT}" \
                  --override-username=kopia-init \
                  --override-hostname=cluster-bootstrap
                echo "Repository created."
              fi

              # Step 2: write deterministic test content to a tmpdir.
              echo
              echo "=== [2/6] Writing deterministic test content ==="
              mkdir -p /tmp/smoketest-src
              echo "kopia phase 1b smoketest" > /tmp/smoketest-src/marker.txt
              dd if=/dev/urandom of=/tmp/smoketest-src/random.bin bs=1k count=10 status=none
              ls -la /tmp/smoketest-src/
              SHA_SRC=$(sha256sum /tmp/smoketest-src/random.bin | awk '{print $1}')
              echo "Source random.bin sha256=${SHA_SRC}"

              # Step 3: backup via kopia snapshot create with a smoketest tag.
              echo
              echo "=== [3/6] Creating Kopia snapshot ==="
              kopia snapshot create /tmp/smoketest-src \
                --tags=phase1b-smoketest:true \
                --description="Phase 1b init/smoketest"

              # Step 4: list snapshots to verify it landed.
              echo
              echo "=== [4/6] Listing snapshots tagged phase1b-smoketest ==="
              SNAP_ID=$(kopia snapshot list --all --tags=phase1b-smoketest:true --json | \
                grep -o '"id":"[a-f0-9]*"' | head -1 | sed 's/.*"id":"//;s/"$//')
              echo "Snapshot ID: ${SNAP_ID}"
              if [ -z "${SNAP_ID}" ]; then
                echo "ERROR: snapshot did not register in repo listing"
                exit 1
              fi

              # Step 5: restore the snapshot to a scratch tmpdir.
              echo
              echo "=== [5/6] Restoring snapshot to scratch ==="
              mkdir -p /tmp/smoketest-dst
              kopia snapshot restore "${SNAP_ID}" /tmp/smoketest-dst/
              ls -la /tmp/smoketest-dst/

              # Step 6: verify sha256 matches.
              echo
              echo "=== [6/6] Verifying sha256 integrity ==="
              SHA_DST=$(sha256sum /tmp/smoketest-dst/random.bin | awk '{print $1}')
              echo "Restored random.bin sha256=${SHA_DST}"
              if [ "${SHA_SRC}" != "${SHA_DST}" ]; then
                echo "ERROR: sha256 mismatch — source ${SHA_SRC} vs restored ${SHA_DST}"
                exit 1
              fi
              echo "sha256 match — backup/restore round-trip OK"

              # Smoketest passed.
              echo
              echo "===================================="
              echo "         KOPIA SMOKETEST OK"
              echo "===================================="
              echo "Repository: s3://${KOPIA_S3_BUCKET}@${KOPIA_S3_ENDPOINT}"
              echo "Test snapshot id: ${SNAP_ID}"
              echo "Run kopia snapshot delete --unsafe-ignore-source ${SNAP_ID} if you want to clean up."
          volumeMounts:
            - name: kopia-cache
              mountPath: /tmp/kopia-cache
            - name: kopia-logs
              mountPath: /tmp/kopia-logs
            - name: kopia-config
              mountPath: /tmp/kopia-config
            - name: smoketest-src
              mountPath: /tmp/smoketest-src
            - name: smoketest-dst
              mountPath: /tmp/smoketest-dst
      volumes:
        - name: kopia-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: kopia-logs
          emptyDir:
            sizeLimit: 64Mi
        - name: kopia-config
          emptyDir:
            sizeLimit: 4Mi
        - name: smoketest-src
          emptyDir:
            sizeLimit: 32Mi
        - name: smoketest-dst
          emptyDir:
            sizeLimit: 32Mi
