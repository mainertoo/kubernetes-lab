# Phase 3 Stage A one-shot: migrate homepage's legacy per-app restic repo
# into the shared `volsync-shared/restic` repo, tagging snapshots with
# `<ns>/<pvc>` (= `homepage/homepage`). Idempotent — re-runnable.
#
# Hand-applied (NOT Flux-reconciled). Lives under apps/archive/ so Renovate
# ignores it and Flux never reconciles it. Per design doc §4.1.
#
# Usage (run these from the kubernetes-lab repo root):
#
#   # 1. Mirror the legacy per-app Secret into volsync-system so the Job
#   #    can reach both creds sets from one namespace. Renames the Secret
#   #    to `migration-src-homepage` and strips namespace-binding fields.
#   kubectl -n homepage get secret homepage-volsync -o json \
#     | jq '.metadata = {name: "migration-src-homepage", namespace: "volsync-system"} | del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp)' \
#     | kubectl apply -f -
#
#   # 2. Run the migration Job
#   kubectl apply -f apps/archive/05-volsync-shared-migrate-homepage.yaml
#
#   # 3. Watch logs
#   kubectl -n volsync-system logs -f job/volsync-shared-migrate-homepage
#
#   # 4. After "STAGE A OK", clean up
#   kubectl -n volsync-system delete job volsync-shared-migrate-homepage
#   kubectl -n volsync-system delete secret migration-src-homepage
#
# Expected output ends with "STAGE A OK: N snapshots present in shared repo".
# Re-running is safe: tagging is idempotent (--tag "" only matches untagged
# snapshots), and restic copy dedupes by content hash.
apiVersion: batch/v1
kind: Job
metadata:
  name: volsync-shared-migrate-homepage
  namespace: volsync-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: volsync-shared-migrate-homepage
        migration-source: homepage
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: restic
          image: restic/restic:0.18.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Destination (shared repo) creds — passed via OLD_* / NEW_*
          # env-var split so a single restic process can target either
          # repo by env-loading at command time. The shared password
          # comes from the Phase 1 Secret.
          env:
            # ── New (shared) repo ──────────────────────────────────────
            - name: NEW_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: AWS_ACCESS_KEY_ID
            - name: NEW_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: NEW_RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: RESTIC_PASSWORD
            - name: NEW_RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: RESTIC_REPOSITORY

            # ── Old (legacy per-app) repo, mirrored from homepage ns ──
            - name: OLD_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: migration-src-homepage
                  key: AWS_ACCESS_KEY_ID
            - name: OLD_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: migration-src-homepage
                  key: AWS_SECRET_ACCESS_KEY
            - name: OLD_RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: migration-src-homepage
                  key: RESTIC_PASSWORD
            - name: OLD_RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: migration-src-homepage
                  key: RESTIC_REPOSITORY

            # ── Common (shared by both repos — same Garage cluster) ───
            # Region pulled from the legacy Secret (the shared Secret
            # was trimmed in Phase 2 to drop AWS_DEFAULT_REGION; both
            # repos live in the same Garage cluster so the region is
            # identical).
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: migration-src-homepage
                  key: AWS_DEFAULT_REGION
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"

            # restic 0.17 + readOnlyRootFilesystem requires an explicit
            # writable cache dir. The default ($HOME/.cache) isn't
            # writable under runAsUser=1000 against a r/o root.
            - name: RESTIC_CACHE_DIR
              value: /var/cache/restic
            - name: HOME
              value: /tmp

            # ── Migration target identity ─────────────────────────────
            - name: NS
              value: "homepage"
            - name: PVC
              value: "homepage"

          volumeMounts:
            - name: restic-cache
              mountPath: /var/cache/restic
            - name: tmp
              mountPath: /tmp

          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail

              echo "== Phase 3 Stage A: ${NS}/${PVC} =="
              echo "  old repo: ${OLD_RESTIC_REPOSITORY}"
              echo "  new repo: ${NEW_RESTIC_REPOSITORY}"

              # Garage requires path-style URLs + list-objects-v1
              OPTS="-o s3.bucket-lookup=path -o s3.list-objects-v1=true"

              # Write password files (restic prefers --password-file
              # over RESTIC_PASSWORD env when both available; explicit
              # is safer when juggling two repos).
              umask 077
              echo -n "${OLD_RESTIC_PASSWORD}" > /tmp/old-pw
              echo -n "${NEW_RESTIC_PASSWORD}" > /tmp/new-pw

              # ── Phase 3 step 1: tag old snapshots ────────────────────
              # --tag "" matches snapshots with EMPTY tag set, which is
              # how the volsync mover creates them. Idempotent — re-run
              # won't re-tag already-tagged snapshots.
              echo ""
              echo "== step 1: tag old snapshots with '${NS}/${PVC}' =="
              AWS_ACCESS_KEY_ID="${OLD_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${OLD_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                -r "${OLD_RESTIC_REPOSITORY}" \
                --password-file /tmp/old-pw \
                tag --add "${NS}/${PVC}" --tag ""

              # ── Phase 3 step 2: restic copy old → new ────────────────
              # restic copy dedupes by content, so re-running is cheap.
              # The destination snapshot inherits the source tags (so
              # the <ns>/<pvc> tag we just added carries over).
              #
              # --no-lock: legacy bucket grant is read-only, so restic
              # can't write the from-repo lock. Safe here because:
              # (1) we hold step 1's tag-add lock on the OLD repo until
              #     this process exits, blocking the volsync mover;
              # (2) we run migration Jobs serially per app.
              echo ""
              echo "== step 2: restic copy old → shared =="
              AWS_ACCESS_KEY_ID="${NEW_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${NEW_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                --no-lock \
                -r "${NEW_RESTIC_REPOSITORY}" \
                --password-file /tmp/new-pw \
                copy \
                --from-repo "${OLD_RESTIC_REPOSITORY}" \
                --from-password-file /tmp/old-pw \
                -o "from-s3.bucket-lookup=path" \
                -o "from-s3.list-objects-v1=true"

              # ── Phase 3 step 3: verify by timestamp intersection ─────
              # restic copy preserves each snapshot's `time` field
              # (snapshot metadata is preserved across copy; only the
              # encryption key differs). The destination snapshot IDs
              # differ from source by design (different repo key), so
              # comparing IDs doesn't work. Instead: every OLD timestamp
              # must appear in NEW (filtered to our tag).
              #
              # This is content-derived: two snapshots with the same
              # time field are the same backup point regardless of repo.
              echo ""
              echo "== step 3: verify (source timestamps ⊆ destination timestamps for tag) =="
              AWS_ACCESS_KEY_ID="${OLD_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${OLD_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                --no-lock \
                -r "${OLD_RESTIC_REPOSITORY}" \
                --password-file /tmp/old-pw \
                snapshots --json | jq -r '.[].time' | sort -u > /tmp/old-times

              AWS_ACCESS_KEY_ID="${NEW_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${NEW_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                -r "${NEW_RESTIC_REPOSITORY}" \
                --password-file /tmp/new-pw \
                snapshots --tag "${NS}/${PVC}" --json \
                | jq -r '.[].time' | sort -u > /tmp/new-times

              OLD_COUNT=$(wc -l < /tmp/old-times)
              NEW_COUNT=$(wc -l < /tmp/new-times)
              echo "  old snapshots: ${OLD_COUNT}"
              echo "  new (tag ${NS}/${PVC}) snapshots: ${NEW_COUNT}"

              MISSING=$(comm -23 /tmp/old-times /tmp/new-times || true)
              if [ -n "${MISSING}" ]; then
                echo ""
                echo "STAGE A FAIL: source timestamps not present in shared repo:"
                echo "${MISSING}"
                exit 1
              fi

              echo ""
              echo "STAGE A OK: ${OLD_COUNT} snapshots from ${NS}/${PVC} present in shared repo"

      volumes:
        - name: restic-cache
          emptyDir:
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
