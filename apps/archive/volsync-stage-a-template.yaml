# Phase 3 Stage A — REUSABLE TEMPLATE.
# Do NOT apply this file directly. The placeholders __NS__, __PVC__,
# __JOB_NAME__, __MIRROR_SECRET__ are substituted by
# scripts/migrate-stage-a.sh and the rendered manifest is piped to
# `kubectl apply`. The first migration (homepage) lives at
# apps/archive/05-volsync-shared-migrate-homepage.yaml as a historical
# reference for the original working pattern.
#
# See PHASE3-STAGE-A-LOG.md for the running list of migrated apps.
apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: volsync-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: volsync-stage-a
        migration-source-namespace: __NS__
        migration-source-pvc: __PVC__
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: restic
          image: restic/restic:0.18.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # ── New (shared) repo ──────────────────────────────────────
            - name: NEW_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: AWS_ACCESS_KEY_ID
            - name: NEW_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: NEW_RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: RESTIC_PASSWORD
            - name: NEW_RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: RESTIC_REPOSITORY

            # ── Old (legacy per-app) repo, mirrored from <ns> ─────────
            - name: OLD_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: __MIRROR_SECRET__
                  key: AWS_ACCESS_KEY_ID
            - name: OLD_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: __MIRROR_SECRET__
                  key: AWS_SECRET_ACCESS_KEY
            - name: OLD_RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: __MIRROR_SECRET__
                  key: RESTIC_PASSWORD
            - name: OLD_RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: __MIRROR_SECRET__
                  key: RESTIC_REPOSITORY

            # ── Common ─────────────────────────────────────────────────
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: __MIRROR_SECRET__
                  key: AWS_DEFAULT_REGION
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: RESTIC_CACHE_DIR
              value: /var/cache/restic
            - name: HOME
              value: /tmp

            # ── Migration target identity ─────────────────────────────
            - name: NS
              value: "__NS__"
            - name: PVC
              value: "__PVC__"

          volumeMounts:
            - name: restic-cache
              mountPath: /var/cache/restic
            - name: tmp
              mountPath: /tmp

          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail

              echo "== Phase 3 Stage A: ${NS}/${PVC} =="
              echo "  old repo: ${OLD_RESTIC_REPOSITORY}"
              echo "  new repo: ${NEW_RESTIC_REPOSITORY}"

              OPTS="-o s3.bucket-lookup=path -o s3.list-objects-v1=true"

              umask 077
              echo -n "${OLD_RESTIC_PASSWORD}" > /tmp/old-pw
              echo -n "${NEW_RESTIC_PASSWORD}" > /tmp/new-pw

              # ── step 1: tag old snapshots (idempotent) ───────────────
              echo ""
              echo "== step 1: tag old snapshots with '${NS}/${PVC}' =="
              AWS_ACCESS_KEY_ID="${OLD_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${OLD_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                -r "${OLD_RESTIC_REPOSITORY}" \
                --password-file /tmp/old-pw \
                tag --add "${NS}/${PVC}" --tag ""

              # ── step 2: restic copy old → new ────────────────────────
              # --no-lock: legacy bucket grant is read-only (see
              # PHASE3-STAGE-A-LOG.md "Garage permissions" section).
              echo ""
              echo "== step 2: restic copy old → shared =="
              AWS_ACCESS_KEY_ID="${NEW_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${NEW_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                --no-lock \
                -r "${NEW_RESTIC_REPOSITORY}" \
                --password-file /tmp/new-pw \
                copy \
                --from-repo "${OLD_RESTIC_REPOSITORY}" \
                --from-password-file /tmp/old-pw \
                -o "from-s3.bucket-lookup=path" \
                -o "from-s3.list-objects-v1=true"

              # ── step 3: verify by `time` intersection ────────────────
              # restic copy changes snapshot IDs (different repo key)
              # but preserves the `time` field. Every OLD time must
              # appear in the NEW set filtered to our tag.
              echo ""
              echo "== step 3: verify (source timestamps ⊆ destination timestamps for tag) =="
              AWS_ACCESS_KEY_ID="${OLD_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${OLD_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                --no-lock \
                -r "${OLD_RESTIC_REPOSITORY}" \
                --password-file /tmp/old-pw \
                snapshots --json | jq -r '.[].time' | sort -u > /tmp/old-times

              AWS_ACCESS_KEY_ID="${NEW_AWS_ACCESS_KEY_ID}" \
              AWS_SECRET_ACCESS_KEY="${NEW_AWS_SECRET_ACCESS_KEY}" \
              restic ${OPTS} \
                -r "${NEW_RESTIC_REPOSITORY}" \
                --password-file /tmp/new-pw \
                snapshots --tag "${NS}/${PVC}" --json \
                | jq -r '.[].time' | sort -u > /tmp/new-times

              OLD_COUNT=$(wc -l < /tmp/old-times)
              NEW_COUNT=$(wc -l < /tmp/new-times)
              echo "  old snapshots: ${OLD_COUNT}"
              echo "  new (tag ${NS}/${PVC}) snapshots: ${NEW_COUNT}"

              MISSING=$(comm -23 /tmp/old-times /tmp/new-times || true)
              if [ -n "${MISSING}" ]; then
                echo ""
                echo "STAGE A FAIL: source timestamps not present in shared repo:"
                echo "${MISSING}"
                exit 1
              fi

              echo ""
              echo "STAGE A OK: ${OLD_COUNT} snapshots from ${NS}/${PVC} present in shared repo"
      volumes:
        - name: restic-cache
          emptyDir:
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
