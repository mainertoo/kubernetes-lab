# Phase 1 one-shot: initialize the shared restic repo on Garage, then prove
# the credential + password chain end-to-end with a tiny backup/restore/diff.
# Hand-applied (not Flux-reconciled). Lives under apps/archive/ so Renovate
# ignores it and Flux never reconciles it.
#
# Usage:
#   kubectl apply -f apps/archive/04-volsync-shared-init-smoketest.yaml
#   kubectl -n flux-system logs -f job/volsync-shared-init-smoketest
#   kubectl -n flux-system delete job volsync-shared-init-smoketest
#
# Expected output ends with "SMOKETEST OK".
# Leaves one snapshot tagged `phase1-smoketest` in the shared repo. Optional
# cleanup after Phase 1 PR merges:
#   restic ... forget --tag phase1-smoketest --prune
apiVersion: batch/v1
kind: Job
metadata:
  name: volsync-shared-init-smoketest
  namespace: flux-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: volsync-shared-init-smoketest
    spec:
      restartPolicy: Never

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: restic
          image: restic/restic:0.17.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: AWS_DEFAULT_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: AWS_EC2_METADATA_DISABLED
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: RESTIC_PASSWORD
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: volsync-shared-base
                  key: S3_BUCKET

            - name: RESTIC_REPOSITORY
              value: "s3:https://garage.lab.mainertoo.com/volsync-shared/restic"

          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail

              echo "== Phase 1 init + smoketest =="
              echo "  endpoint: ${S3_ENDPOINT}"
              echo "  bucket:   ${S3_BUCKET}"
              echo "  repo:     ${RESTIC_REPOSITORY}"
              echo "  region:   ${AWS_DEFAULT_REGION}"

              # path-style URL + list-objects-v1 are required for Garage
              RESTIC_OPTS="-o s3.bucket-lookup=path -o s3.region=${AWS_DEFAULT_REGION} -o s3.list-objects-v1=true"

              echo "== init (idempotent) =="
              restic ${RESTIC_OPTS} init || true

              echo "== write scratch source =="
              SRC=/tmp/phase1-src
              DST=/tmp/phase1-restore
              mkdir -p "${SRC}"
              date -u +"%Y-%m-%dT%H:%M:%SZ" > "${SRC}/timestamp.txt"
              echo "volsync-shared phase1 smoketest" > "${SRC}/marker.txt"
              sha256sum "${SRC}"/* | sort > /tmp/src.sha256

              echo "== backup (tag phase1-smoketest) =="
              restic ${RESTIC_OPTS} backup --tag phase1-smoketest "${SRC}"

              echo "== snapshots --tag phase1-smoketest =="
              restic ${RESTIC_OPTS} snapshots --tag phase1-smoketest

              echo "== restore to scratch =="
              mkdir -p "${DST}"
              restic ${RESTIC_OPTS} restore --tag phase1-smoketest --target "${DST}" latest

              echo "== diff source vs restored =="
              # restic prepends the absolute source path under the target dir
              RESTORED="${DST}${SRC}"
              ls -la "${RESTORED}"
              sha256sum "${RESTORED}"/* | sed "s|${DST}||" | sort > /tmp/restored.sha256
              diff /tmp/src.sha256 /tmp/restored.sha256

              echo "== repo stats =="
              restic ${RESTIC_OPTS} stats --mode raw-data

              echo "SMOKETEST OK"
