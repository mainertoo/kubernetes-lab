apiVersion: batch/v1
kind: Job
metadata:
  name: restic-garage-smoketest
  namespace: flux-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: restic-garage-smoketest
    spec:
      restartPolicy: Never

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: restic
          image: restic/restic:0.17.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          env:
            # Base values
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_DEFAULT_REGION
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: RESTIC_PASSWORD
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_EC2_METADATA_DISABLED
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: S3_ENDPOINT

            # Per-test repository (bucket + prefix)
            - name: RESTIC_REPOSITORY
              value: "s3:https://garage.lab.mainertoo.com/volsync/restic-smoketest"

          command: ["/bin/sh","-lc"]
          args:
            - |
              set -euo pipefail

              echo "== Restic repository =="
              echo "${RESTIC_REPOSITORY}"
              echo "== Endpoint =="
              echo "${S3_ENDPOINT}"
              echo "== Region =="
              echo "${AWS_DEFAULT_REGION}"

              # Force path-style bucket lookup (important behind reverse proxies)
              RESTIC_OPTS="-o s3.bucket-lookup=path -o s3.region=${AWS_DEFAULT_REGION} -o s3.list-objects-v1=true"

              echo "== init (idempotent) =="
              restic ${RESTIC_OPTS} init || true

              echo "== write test data =="
              mkdir -p /tmp/data
              date > /tmp/data/hello.txt

              echo "== backup =="
              restic ${RESTIC_OPTS} backup /tmp/data

              echo "== snapshots =="
              restic ${RESTIC_OPTS} snapshots

              echo "SUCCESS"