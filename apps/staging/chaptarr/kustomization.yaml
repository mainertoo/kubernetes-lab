---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Chaptarr — Readarr fork (audiobooks + ebooks in one instance). Deployed to
# STAGING for evaluation only. Community Docker Hub image (robertlordhood/chaptarr,
# `latest` only — no official image yet). No gatus monitoring (eval). PVC is
# local-path until staging gets ceph-csi-rbd.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app chaptarr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/chaptarr
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
