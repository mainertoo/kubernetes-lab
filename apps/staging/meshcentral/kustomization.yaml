---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# MeshCentral — Intel AMT/vPro management console. Deployed to STAGING as a
# proof-of-concept (reaches the AMT IPs .207-.209 on the management LAN).
# No gatus monitoring (POC). PVC is local-path until staging gets ceph-csi-rbd.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app meshcentral
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/base/meshcentral
  targetNamespace: *app

  prune: true
  retryInterval: 2m
  timeout: 10m
  wait: false

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
