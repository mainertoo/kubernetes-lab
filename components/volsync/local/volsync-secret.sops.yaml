apiVersion: v1
kind: Secret
metadata:
  name: "${APP}-volsync"
type: Opaque
stringData:
  # --- Restic repo (S3) ---
  # Example:
  VOLSYNC_S3_ENDPOINT: "https://garage.lab.mainertoo.com" # "http://192.168.1.252:3900" for IP based
  #   -> RESTIC_REPOSITORY becomes:
  #      s3:http://192.168.1.252:3900/volsync/gatus
  RESTIC_REPOSITORY: "s3:${VOLSYNC_S3_ENDPOINT}/volsync/${APP}"

  # --- Restic encryption password (you choose) ---
  RESTIC_PASSWORD: "${VOLSYNC_RESTIC_PASSWORD}"

  # --- S3 credentials from Garage ---
  AWS_ACCESS_KEY_ID: "GKe86828cde626fbff87333194"
  AWS_SECRET_ACCESS_KEY: "59de176cddc9047827b80b09bdffc5614a942dc1745a46d7a7954fb5b2fc5b90"

  # --- S3 compatibility knobs (Garage/MinIO-style) ---
  AWS_DEFAULT_REGION: "${VOLSYNC_S3_REGION:=us-east-1}"
  AWS_REGION: "${VOLSYNC_S3_REGION:=us-east-1}"

  # Garage is typically happier with path-style requests.
  AWS_S3_FORCE_PATH_STYLE: "true"

  # (Optional but nice) avoid AWS metadata timeouts in-cluster
  AWS_EC2_METADATA_DISABLED: "true"