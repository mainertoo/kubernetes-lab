apiVersion: v1
kind: Secret
metadata:
  name: "${APP}-volsync"
type: Opaque
stringData:
  # Choose ONE style based on your backend:
  #
  # (1) S3 style (recommended)
  # RESTIC_REPOSITORY: "s3:http://minio.minio.svc.cluster.local:9000/volsync/${APP}"
  # AWS_ACCESS_KEY_ID: "${VOLSYNC_S3_ACCESS_KEY}"
  # AWS_SECRET_ACCESS_KEY: "${VOLSYNC_S3_SECRET_KEY}"

  # (2) Restic REST server style
  # RESTIC_REPOSITORY: "rest:http://rest-server.volsync-system.svc.cluster.local:8000/${APP}"

  # (3) Local-path repo style (ONLY if you also mount /repository into mover jobs)
  # RESTIC_REPOSITORY: "/repository/${APP}"

  RESTIC_REPOSITORY: "${VOLSYNC_RESTIC_REPOSITORY}"
  RESTIC_PASSWORD: "${VOLSYNC_RESTIC_PASSWORD}"