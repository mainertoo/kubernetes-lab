apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-bootstrap"
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    # Do not auto-restore; we flip this manually when ready
    manual: restore-once
  restic:
    repository: "${APP}-volsync"
    copyMethod: Snapshot

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=10Gi}"

    storageClassName: "${VOLSYNC_STORAGECLASS:=ceph-rbd}"
    accessModes: ["${VOLSYNC_ACCESSMODES:=ReadWriteOnce}"]
    capacity: "${CAPACITY:=1Gi}"

    # moverSecurityContext:
    #   runAsUser: ${VOLSYNC_PUID:=1000}
    #   runAsGroup: ${VOLSYNC_PGID:=1000}
    #   fsGroup: ${VOLSYNC_PGID:=1000}
    moverSecurityContext:
      runAsUser: ${VOLSYNC_MOVER_UID:=0}
      runAsGroup: ${VOLSYNC_MOVER_GID:=0}
      fsGroup: ${VOLSYNC_MOVER_FSGROUP:=0}

    enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true