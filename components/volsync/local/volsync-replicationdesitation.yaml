apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-bootstrap"
  labels:
    # prevents SSA from clobbering status-managed bits
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    manual: restore-once
  restic:
    # Secret name in the *app namespace* with RESTIC_* + AWS_* keys
    repository: "${APP}-volsync"

    # We want the destination volume populated from a snapshot-style PiT copy
    copyMethod: Snapshot

    # Snapshot class must match the PVC's CSI driver (cephfs vs rbd)
    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=cephfs-snapclass}"

    # Destination volume settings (this is what the populator will provision)
    storageClassName: "${VOLSYNC_STORAGECLASS:=cephfs}"
    accessModes: ["${VOLSYNC_ACCESSMODES:=ReadWriteMany}"]
    capacity: "${CAPACITY:=10Gi}"

    # Restic metadata cache (can be a different SC; RBD is totally fine here)
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=1Gi}"

    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}

    # housekeeping
    enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true