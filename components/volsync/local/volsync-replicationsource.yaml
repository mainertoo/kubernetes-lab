apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}"
spec:
  sourcePVC: "${APP}"
  trigger:
    schedule: "05 00/12 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 14

    repository: "${APP}-volsync"

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=10Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]

    # temp mover PVC (can be RBD)
    storageClassName: "${VOLSYNC_MOVER_STORAGECLASS:=ceph-rbd}"
    accessModes: ["${VOLSYNC_MOVER_ACCESSMODES:=ReadWriteOnce}"]

    # ✅ critical: mover runs as app user
    moverSecurityContext:
      runAsUser: ${VOLSYNC_MOVER_UID:=1000}
      runAsGroup: ${VOLSYNC_MOVER_GID:=1000}
      fsGroup: ${VOLSYNC_MOVER_FSGROUP:=1000}

    retain:
      hourly: 24
      daily: 7
      weekly: 5
      monthly: 3