apiVersion: v1
kind: Secret
metadata:
  name: "${APP}-volsync"
type: Opaque
stringData:
  # Build a unique repo path per app (required when sharing a bucket)  [oai_citation:0‡VolSync](https://volsync.readthedocs.io/en/stable/usage/restic/index.html)
  # Example result:
  #   s3:https://garage.lab.mainertoo.com/volsync/audiobookshelf/abs
  RESTIC_REPOSITORY: "s3:${S3_ENDPOINT}/${S3_BUCKET}/${VOLSYNC_REPO_PATH:=${APP}}"

  # Shared restic password is OK; keep it forever if you want restores
  RESTIC_PASSWORD: "${RESTIC_PASSWORD}"

  # AWS/S3 credentials + region (must match garage.toml s3_region)
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
  AWS_REGION: "${AWS_REGION}"

  AWS_EC2_METADATA_DISABLED: "${AWS_EC2_METADATA_DISABLED}"

  # Avoid /.cache permission issues (restic respects XDG paths)
  XDG_CACHE_HOME: "/tmp/.cache"
  XDG_CONFIG_HOME: "/tmp/.config"