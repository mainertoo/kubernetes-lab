apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-volsync
type: Opaque
stringData:
  # Restic repository URL (S3 via Garage)
  # Example:
  #   S3_ENDPOINT=https://garage.lab.mainertoo.com
  #   S3_BUCKET=volsync
  #   VOLSYNC_REPO_PATH=audiobookshelf/abs
  # -> s3:https://garage.lab.mainertoo.com/volsync/audiobookshelf/abs
  RESTIC_REPOSITORY: s3:${S3_ENDPOINT}/${S3_BUCKET}/${VOLSYNC_REPO_PATH}

  # Provided by volsync-garage-base
  RESTIC_PASSWORD: ${RESTIC_PASSWORD}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
  AWS_REGION: ${AWS_REGION}

  # MUST be a string (Flux error if boolean)
  AWS_EC2_METADATA_DISABLED: "true"

  # Optional convenience key (useful for debug Jobs)
  S3_ENDPOINT: ${S3_ENDPOINT}