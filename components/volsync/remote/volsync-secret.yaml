apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-volsync
type: Opaque
stringData:
  # Restic wants repository in this form
  # Using path-style URLs with bucket in path:
  #   s3:https://garage.lab.mainertoo.com/volsync/<prefix>
  RESTIC_REPOSITORY: "s3:${S3_ENDPOINT}/${S3_BUCKET}/${VOLSYNC_REPO_PATH}"

  RESTIC_PASSWORD: "${RESTIC_PASSWORD}"

  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
  AWS_EC2_METADATA_DISABLED: "${AWS_EC2_METADATA_DISABLED}"