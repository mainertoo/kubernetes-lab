apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-volsync-remote
type: Opaque
stringData:
  # Endpoint (where the S3 API lives)
  VOLSYNC_S3_ENDPOINT: ${VOLSYNC_S3_ENDPOINT}

  # Restic repo path (S3 backend). Do NOT include https:// here.
  # Bucket is "volsync" in your setup.
  RESTIC_REPOSITORY: s3:${VOLSYNC_GARAGE_BUCKET:=volsync}/${APP}/remote

  RESTIC_PASSWORD: ${VOLSYNC_RESTIC_PASSWORD}

  AWS_ACCESS_KEY_ID: ${VOLSYNC_GARAGE_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_GARAGE_SECRET_ACCESS_KEY}

  AWS_DEFAULT_REGION: ${VOLSYNC_S3_REGION:=us-east-1}
  AWS_REGION: ${VOLSYNC_S3_REGION:=us-east-1}

  AWS_S3_FORCE_PATH_STYLE: "true"
  AWS_EC2_METADATA_DISABLED: "true"