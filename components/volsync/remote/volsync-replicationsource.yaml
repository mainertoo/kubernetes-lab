---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}-b2"
spec:
  sourcePVC: "${APP}"
  trigger:
    schedule: "${VOLSYNC_REMOTE_SCHEDULE:=45 0 * * *}"
  restic:
    repository: "${APP}-volsync-b2"
    copyMethod: "${VOLSYNC_COPYMETHOD:=Snapshot}"
    pruneIntervalDays: ${VOLSYNC_PRUNE_DAYS:=14}

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=1Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes:
      - "${VOLSYNC_CACHE_ACCESSMODE:=ReadWriteOnce}"

    storageClassName: "${VOLSYNC_WORK_STORAGECLASS:=ceph-rbd}"
    accessModes:
      - "${VOLSYNC_WORK_ACCESSMODE:=ReadWriteOnce}"

    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}

    retain:
      daily: ${VOLSYNC_REMOTE_RETAIN_DAILY:=7}