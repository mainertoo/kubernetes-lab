# Backup-only ReplicationSource for apps that own their own PVC.
#
# Use this Component when an app's PVC is created by something else (its
# HelmRelease, a StatefulSet's volumeClaimTemplates, etc.) — instead of by
# the volsync-v2 component's pvc/ subcomponent.
#
# REQUIRED substitutions:
#   APP                       — used as ReplicationSource name and restic repo Secret name
#   VOLSYNC_SOURCE_PVC        — name of the existing PVC to back up
#   VOLSYNC_REPO_PATH         — Garage S3 path
#   VOLSYNC_PUID/PGID         — uid/gid the source app runs as
#
# Optional (have defaults):
#   VOLSYNC_STORAGECLASS, VOLSYNC_SNAPSHOTCLASS, VOLSYNC_SNAP_ACCESSMODES
#   VOLSYNC_CACHE_*           — cache PVC sizing
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}"
spec:
  sourcePVC: "${VOLSYNC_SOURCE_PVC}"
  trigger:
    schedule: "05 00/12 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 14

    repository: "${APP}-volsync"

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=10Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]

    storageClassName: "${VOLSYNC_STORAGECLASS:=ceph-rbd}"
    accessModes: ["${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}"]

    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}

    retain:
      hourly: 24
      daily: 7
      weekly: 5
      monthly: 3
