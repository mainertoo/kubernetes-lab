apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${APP}-restore"
spec:
  accessModes:
    - ${VOLSYNC_ACCESSMODES:=ReadWriteOnce}
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: "${APP}-restore"
  resources:
    requests:
      storage: ${CAPACITY:=1Gi}
  storageClassName: "${VOLSYNC_STORAGECLASS:=ceph-rbd}"