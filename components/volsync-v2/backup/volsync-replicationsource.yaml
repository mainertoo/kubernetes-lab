apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${APP}"
spec:
  sourcePVC: "${APP}"
  trigger:
    schedule: "05 00/12 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 14

    repository: "${APP}-volsync"

    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=ceph-rbd-snapclass}"

    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=10Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=ceph-rbd}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"]

    # IMPORTANT: for CephFS apps set VOLSYNC_SNAP_ACCESSMODES=ReadWriteMany in the app kustomization
    storageClassName: "${VOLSYNC_STORAGECLASS:=ceph-rbd}"
    accessModes: ["${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}"]

    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}

    retain:
      hourly: 24
      daily: 7
      weekly: 5
      monthly: 3