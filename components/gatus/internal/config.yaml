endpoints:
  - name: "${APP}"
    group: internal
    url: "${GATUS_SCHEME:=http}://${GATUS_APP:=${APP}}.${APP_NAMESPACE:=${APP}}.svc.cluster.local:${GATUS_PORT:=80}${GATUS_PATH:=/}"
    interval: 1m
    client:
      insecure: ${GATUS_INSECURE:=false}
      dont-follow-redirects: ${GATUS_DONT_FOLLOW_REDIRECTS:=false}
    conditions:
      - "[STATUS] == ${GATUS_STATUS_INTERNAL:=200}"
    alerts:
      - type: discord