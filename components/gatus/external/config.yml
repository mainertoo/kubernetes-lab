endpoints:
  - name: "${APP}"
    group: external
    url: "https://${SUBDOMAIN:=${APP}}.${EXTERNAL_DOMAIN:=lab.mainertoo.com}${GATUS_PATH:=/}"
    interval: 1m
    conditions:
      # If Authentik protects the endpoint, you may see 302. This allows both.
      - "[STATUS] < 400"
    alerts:
      - type: discord