---
# CNPG Cluster restored from a barman-cloud S3 base backup + WAL chain.
#
# This variant is consumed instead of `components/cnpg-cluster` during
# disaster recovery — e.g. cluster nuke, or recovering an app's database
# into a fresh cluster after data loss. Once the recovered Cluster reaches
# `Ready`, the consumer's Flux Kustomization should be flipped back to the
# base `components/cnpg-cluster` Component (bootstrap is no-op after init,
# so this is purely hygiene).
#
# Required substitutions (same as base):
#   APP                 cluster name (also Service prefix: <APP>-rw, <APP>-ro)
#   APP_NAMESPACE       deployment namespace
#
# Required substituteFrom Secret (in flux-system):
#   volsync-garage-base — AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                         AWS_DEFAULT_REGION, S3_ENDPOINT, S3_BUCKET
#
# Optional substitutions:
#   APP_RESTORE_FROM    source cluster name in S3 path. Defaults to ${APP}.
#                       Override when restoring into a renamed cluster
#                       (e.g. side-by-side test: APP=joplin-db-restored,
#                       APP_RESTORE_FROM=joplin-db).
#
#   CNPG_INSTANCES, CNPG_IMAGE, CNPG_STORAGE_SIZE, CNPG_STORAGECLASS,
#   CNPG_RETENTION, CNPG_CPU_REQUEST, CNPG_MEMORY_REQUEST,
#   CNPG_MEMORY_LIMIT — same semantics + defaults as the base Component.
#
# Point-in-time recovery (PITR):
#   This Component recovers to the LATEST available WAL by default. For
#   PITR, add a Kustomize patch in the consumer Flux Kustomization that
#   inserts a recoveryTarget block, e.g.:
#
#     patches:
#       - target:
#           group: postgresql.cnpg.io
#           kind: Cluster
#           name: ${APP}
#         patch: |
#           - op: add
#             path: /spec/bootstrap/recovery/recoveryTarget
#             value:
#               targetTime: "2026-05-09 14:23:51"
#
# NOTE on initdb fields: bootstrap.recovery does NOT need CNPG_DB_NAME /
# CNPG_DB_OWNER because the database + owner come from the restored
# backup. The base Component's required substitutions list keeps them
# only for the initdb path.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
spec:
  instances: ${CNPG_INSTANCES:=1}
  imageName: ${CNPG_IMAGE:=ghcr.io/cloudnative-pg/postgresql:17.5-bookworm}

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"

  storage:
    size: ${CNPG_STORAGE_SIZE:=2Gi}
    storageClass: ${CNPG_STORAGECLASS:=ceph-rbd}

  bootstrap:
    recovery:
      source: ${APP_RESTORE_FROM:=${APP}}

  externalClusters:
    # NOTE on `name` and `serverName`: in CNPG, `externalClusters[].name` is
    # only a logical identifier referenced by `bootstrap.recovery.source`.
    # The actual S3 path uses `barmanObjectStore.serverName` (which defaults
    # to externalClusters[].name when omitted). We set both explicitly to
    # the source cluster name so the path resolves to:
    #   <destinationPath>/<serverName>/{base,wals}/...
    - name: ${APP_RESTORE_FROM:=${APP}}
      barmanObjectStore:
        serverName: ${APP_RESTORE_FROM:=${APP}}
        destinationPath: s3://${S3_BUCKET}/cnpg/${APP_RESTORE_FROM:=${APP}}
        endpointURL: ${S3_ENDPOINT}
        s3Credentials:
          accessKeyId:
            name: ${APP}-cnpg-s3
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: ${APP}-cnpg-s3
            key: AWS_SECRET_ACCESS_KEY
          region:
            name: ${APP}-cnpg-s3
            key: AWS_DEFAULT_REGION
        wal:
          compression: gzip
          maxParallel: 4
        data:
          compression: gzip

  backup:
    retentionPolicy: "${CNPG_RETENTION:=30d}"
    barmanObjectStore:
      destinationPath: s3://${S3_BUCKET}/cnpg/${APP}
      endpointURL: ${S3_ENDPOINT}
      s3Credentials:
        accessKeyId:
          name: ${APP}-cnpg-s3
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: ${APP}-cnpg-s3
          key: AWS_SECRET_ACCESS_KEY
        region:
          name: ${APP}-cnpg-s3
          key: AWS_DEFAULT_REGION
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip

  resources:
    requests:
      cpu: ${CNPG_CPU_REQUEST:=100m}
      memory: ${CNPG_MEMORY_REQUEST:=256Mi}
    limits:
      memory: ${CNPG_MEMORY_LIMIT:=1Gi}
