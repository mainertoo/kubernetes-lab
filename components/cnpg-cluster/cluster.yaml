---
# Reusable CNPG Cluster definition.
#
# Required substitutions:
#   APP                 cluster name (also used as Service prefix: <APP>-rw, <APP>-ro)
#   APP_NAMESPACE       deployment namespace
#   CNPG_DB_NAME        initial database to create
#   CNPG_DB_OWNER       owner role for the initial database
#
# Required substituteFrom Secret (in flux-system):
#   volsync-garage-base — must provide AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                         AWS_DEFAULT_REGION, S3_ENDPOINT, S3_BUCKET
#
# Optional substitutions (defaults shown):
#   CNPG_INSTANCES         1
#   CNPG_IMAGE             ghcr.io/cloudnative-pg/postgresql:17.5-bookworm
#   CNPG_STORAGE_SIZE      2Gi
#   CNPG_STORAGECLASS      ceph-rbd
#   CNPG_RETENTION         30d
#   CNPG_CPU_REQUEST       100m
#   CNPG_MEMORY_REQUEST    256Mi
#   CNPG_MEMORY_LIMIT      1Gi
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
spec:
  instances: ${CNPG_INSTANCES:=1}
  imageName: ${CNPG_IMAGE:=ghcr.io/cloudnative-pg/postgresql:17.5-bookworm}

  # PostgreSQL configuration tuned for small homelab DBs.
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"

  storage:
    size: ${CNPG_STORAGE_SIZE:=2Gi}
    storageClass: ${CNPG_STORAGECLASS:=ceph-rbd}

  bootstrap:
    initdb:
      database: ${CNPG_DB_NAME}
      owner: ${CNPG_DB_OWNER}

  # WAL archive + base backups handled by the barman-cloud CNPG-I plugin.
  # The plugin watches the sibling ObjectStore resource (${APP}-store) for
  # destination + credentials. CNPG 1.30 will remove the in-tree
  # spec.backup.barmanObjectStore field — this is the forward-compatible path.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: ${APP}-store
        serverName: ${APP}

  resources:
    requests:
      cpu: ${CNPG_CPU_REQUEST:=100m}
      memory: ${CNPG_MEMORY_REQUEST:=256Mi}
    limits:
      memory: ${CNPG_MEMORY_LIMIT:=1Gi}
