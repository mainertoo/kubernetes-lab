---
# Per-app S3 credentials Secret used by CNPG to write base backups + WAL stream
# to Garage S3. Populated via Flux postBuild substituteFrom volsync-garage-base.
apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-cnpg-s3
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
