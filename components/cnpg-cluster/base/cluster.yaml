---
# Reusable CNPG Cluster spec WITHOUT spec.bootstrap.
# Bootstrap is layered via an overlay Component (initdb/ or recovery/).
# This file is the single source of truth for image, storage, plugins,
# resources — everything except the bootstrap mode.
#
# Required substitutions:
#   APP                 cluster name (also used as Service prefix: <APP>-rw, <APP>-ro)
#   APP_NAMESPACE       deployment namespace
#
# Required substituteFrom Secret (in flux-system):
#   volsync-garage-base — must provide AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                         AWS_DEFAULT_REGION, S3_ENDPOINT, S3_BUCKET
#
# Optional substitutions (defaults shown):
#   CNPG_INSTANCES         1
#   CNPG_IMAGE             ghcr.io/cloudnative-pg/postgresql:17.5-bookworm
#   CNPG_STORAGE_SIZE      2Gi
#   CNPG_STORAGECLASS      ceph-rbd
#   CNPG_LINEAGE           v1   (lineage suffix appended to serverName; bumped on every DR)
#   CNPG_CPU_REQUEST       100m
#   CNPG_MEMORY_REQUEST    256Mi
#   CNPG_MEMORY_LIMIT      1Gi
#
# initdb-only substitutions (consumed by the initdb overlay):
#   CNPG_DB_NAME, CNPG_DB_OWNER
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
spec:
  instances: ${CNPG_INSTANCES:=1}
  imageName: ${CNPG_IMAGE:=ghcr.io/cloudnative-pg/postgresql:17.5-bookworm}

  # PostgreSQL configuration tuned for small homelab DBs.
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"

  storage:
    size: ${CNPG_STORAGE_SIZE:=2Gi}
    storageClass: ${CNPG_STORAGECLASS:=ceph-rbd}

  # spec.bootstrap is layered via an initdb/ or recovery/ overlay Component.
  # CNPG webhook requires exactly one bootstrap method; the CI gate at
  # .github/workflows/cnpg-overlay-guard.yml rejects any db-cnpg.yaml that
  # references base/ without exactly one of initdb/ or recovery/.

  # WAL archive + base backups handled by the barman-cloud CNPG-I plugin.
  # Plugin watches the sibling ObjectStore ${APP}-store for destination + creds.
  # serverName is lineage-suffixed so post-DR WAL writes go to a fresh S3 prefix
  # instead of co-mingling with pre-DR WAL. CNPG handles timeline IDs anyway,
  # but the prefix separation is defense-in-depth + makes lineage history obvious.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: ${APP}-store
        serverName: ${APP}-${CNPG_LINEAGE:=v1}

  resources:
    requests:
      cpu: ${CNPG_CPU_REQUEST:=100m}
      memory: ${CNPG_MEMORY_REQUEST:=256Mi}
    limits:
      memory: ${CNPG_MEMORY_LIMIT:=1Gi}

  # Per-cluster Prometheus PodMonitor. The cloudnative-pg chart's
  # monitoring.podMonitorEnabled flag only creates a PodMonitor for the
  # OPERATOR — not for each Cluster. Setting this here on the base spec
  # makes the operator create a PodMonitor per Cluster CR, surfacing
  # cnpg_collector_*, cnpg_pg_stat_database_*, and related per-cluster
  # postgres metrics. Picked up automatically by the open Prometheus
  # podMonitorSelector (no release label needed).
  monitoring:
    enablePodMonitor: true
