---
# Daily base backup. WAL streaming runs continuously; this is the periodic
# full snapshot that lets PITR truncate WAL chains.
#
# CNPG schedule format is 6-field cron with seconds: <s> <m> <h> <dom> <mon> <dow>
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: ${APP}-daily
spec:
  schedule: "${CNPG_BACKUP_SCHEDULE:=0 0 4 * * *}"
  cluster:
    name: ${APP}
  backupOwnerReference: self
  immediate: false
  # Plugin-based backup (replaces the deprecated default `barmanObjectStore`
  # method). The pluginConfiguration name must match the plugin's CNPG-I
  # registration name; barmanObjectName references the sibling ObjectStore.
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: ${APP}-store
