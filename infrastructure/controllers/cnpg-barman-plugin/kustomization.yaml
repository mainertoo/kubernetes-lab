---
# plugin-barman-cloud — CNPG-I plugin that replaces the deprecated in-tree
# spec.backup.barmanObjectStore + spec.externalClusters[].barmanObjectStore
# fields. CNPG 1.30 will remove the in-tree fields entirely.
#
# Used by: components/cnpg-cluster (base + recovery variants).
#
# Install manifest is vendored verbatim from the upstream release. To bump,
# update the manifest-version sentinel below (Renovate proposes this PR), then
# re-fetch the manifest:
#
#   VER=<vX.Y.Z>
#   curl -sL "https://github.com/cloudnative-pg/plugin-barman-cloud/releases/download/${VER}/manifest.yaml" \
#     -o infrastructure/controllers/cnpg-barman-plugin/manifest.yaml
#
# Compatibility: requires CNPG 1.26+ (recommends 1.27+). Cluster is on 1.29.1.
# Requires cert-manager (already deployed via infrastructure/controllers/cert-manager).
#
# renovate: datasource=github-releases depName=cloudnative-pg/plugin-barman-cloud
# manifest-version: v0.13.0
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - manifest.yaml
