apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: snapshot-controller
    namespace: snapshot-controller-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    controller:
      replicaCount: 2
      args:
        enableDistributedSnapshotting: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: snapshot-controller
              app.kubernetes.io/instance: snapshot-controller-system-snapshot-controller
  targetNamespace: snapshot-controller-system
