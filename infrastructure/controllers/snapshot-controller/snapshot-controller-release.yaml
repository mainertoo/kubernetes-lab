apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller-system
spec:
  interval: 1h
  # Pin the actual Helm release name. Without this, Flux defaults to
  # "<targetNamespace>-<metadata.name>" — already what's deployed, but
  # making it explicit (a) keeps Helm release identity stable across
  # any future Flux default changes and (b) lets tools like flux-local
  # render labels accurately when computing diffs.
  releaseName: snapshot-controller-system-snapshot-controller
  chartRef:
    kind: OCIRepository
    name: snapshot-controller
    namespace: snapshot-controller-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Chart 5.x moved CRDs into templates (gated on installCRDs). Our existing
    # cluster CRDs are externally-managed (no Helm ownership labels), and we
    # want to keep them that way to avoid Helm trying to reconcile the
    # conversion-webhook clientConfig the chart bakes into CRDs by default.
    installCRDs: false
    # The chart also introduces an optional CRD conversion webhook in 5.x.
    # On K8s 1.27+ (we're on 1.35) v1beta1 VolumeSnapshot is gone, so the
    # webhook is a no-op — disable to keep the upgrade controller-only.
    # tls.autogenerate must also be false, otherwise crds.yaml still renders
    # a self-signed Secret even when the webhook Deployment is off.
    webhook:
      enabled: false
      tls:
        autogenerate: false
    controller:
      replicaCount: 2
      args:
        enableDistributedSnapshotting: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: snapshot-controller
              app.kubernetes.io/instance: snapshot-controller-system-snapshot-controller
  targetNamespace: snapshot-controller-system
