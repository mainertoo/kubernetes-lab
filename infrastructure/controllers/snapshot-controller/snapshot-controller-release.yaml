apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller-system
spec:
  interval: 1h
  # Pin the actual Helm release name. Without this, Flux defaults to
  # "<targetNamespace>-<metadata.name>" — already what's deployed, but
  # making it explicit (a) keeps Helm release identity stable across
  # any future Flux default changes and (b) lets tools like flux-local
  # render labels accurately when computing diffs.
  releaseName: snapshot-controller-system-snapshot-controller
  chartRef:
    kind: OCIRepository
    name: snapshot-controller
    namespace: snapshot-controller-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Chart 5.x moved CRDs into templates (gated on installCRDs). The v8.5.0
    # controller hard-fails at startup unless VolumeGroupSnapshot CRDs serve
    # v1beta2, and the only way to update them via this chart is installCRDs.
    # PR #631 tried installCRDs=false (treating the existing 4.0.2-era CRDs as
    # external); v8.5.0 controller crash-looped with "Failed to list v1beta2
    # volumegroupsnapshots: the server could not find the requested resource".
    # Letting the chart manage CRDs is the correct path.
    installCRDs: true
    # Chart 5.x attaches conversion: strategy: Webhook to ONE CRD
    # (volumegroupsnapshotcontents). Other 5 CRDs use conversion: None.
    # The webhook is dormant unless v1beta1 ↔ v1beta2 conversion is requested
    # on volumegroupsnapshotcontents — which never happens here (we don't use
    # VolumeGroupSnapshot at all). But the CRD spec validates that the webhook
    # Service exists, so we deploy it. ~30 MB RAM for the dormant pod.
    # tls.autogenerate=true makes Helm generate a self-signed cert at install
    # time (no cert-manager dependency).
    webhook:
      enabled: true
      tls:
        autogenerate: true
    controller:
      replicaCount: 2
      args:
        enableDistributedSnapshotting: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: snapshot-controller
              app.kubernetes.io/instance: snapshot-controller-system-snapshot-controller
  targetNamespace: snapshot-controller-system
