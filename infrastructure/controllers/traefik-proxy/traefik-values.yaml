image:
  tag: "v3.6.7"

ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - websecure
    matchRule: Host(`traefik.lab.mainertoo.com`) && PathPrefix(`/dashboard`)
    tls:
      secretName: wildcard-lab-mainertoo-com-tls

providers:
  kubernetesCRD:
    allowCrossNamespace: true

persistence:
  enabled: true
  path: /certs
  size: 128Mi

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

additionalArguments:
  - "--providers.file.directory=/config"
  - "--providers.file.watch=true"

deployment:
  additionalVolumes:
    - name: traefik-file-provider-pve
      configMap:
        name: traefik-file-provider-pve

additionalVolumeMounts:
  - name: traefik-file-provider-pve
    mountPath: /config
    readOnly: true