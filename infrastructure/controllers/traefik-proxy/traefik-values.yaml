image:
  tag: "v3.6.7"

deployment:
  replicas: 3
  additionalVolumes:
    - name: traefik-file-provider-pve
      configMap:
        name: traefik-file-provider-pve

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik
        app.kubernetes.io/instance: traefik-proxy-traefik-system

# Persistence is unused: TLS is provided by cert-manager-issued
# Secrets referenced via IngressRoute `tls.secretName`, not by an
# in-Traefik ACME resolver. The previous local-path PVC also
# pinned Traefik to a single node, defeating any HA scale-out.
persistence:
  enabled: false

ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - websecure
    matchRule: Host(`traefik.lab.mainertoo.com`) && PathPrefix(`/dashboard`)
    tls:
      secretName: wildcard-lab-mainertoo-com-tls

providers:
  kubernetesCRD:
    allowCrossNamespace: true

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

additionalArguments:
  - "--providers.file.directory=/config"
  - "--providers.file.watch=true"

additionalVolumeMounts:
  - name: traefik-file-provider-pve
    mountPath: /config
    readOnly: true
