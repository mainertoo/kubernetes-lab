ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - websecure
    matchRule: Host(`traefik.lab.mainertoo.com`) && PathPrefix(`/dashboard`)
    tls:
      secretName: wildcard-lab-mainertoo-com-tls

providers:
  kubernetesCRD:
    allowCrossNamespace: true

persistence:
  enabled: true
  path: /certs
  size: 128Mi

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true

# 👇 NEW: tell Traefik to use the file provider from /config
additionalArguments:
  - "--providers.file.directory=/config"
  - "--providers.file.watch=true"

# 👇 NEW: mount the ConfigMap we created as /config inside the Traefik pod
volumes:
  - name: traefik-file-provider-pve
    mountPath: "/config"
    type: configMap