apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik-system
resources:
- traefik-proxy-repository.yaml
- traefik-proxy-release.yaml
- traefik-namespace.yaml
- file-provider-pve-config.yaml
- authentik-middleware.yaml
- tlsstore-default.yaml
configMapGenerator:
- name: traefik-values
  files:
  - values.yaml=traefik-values.yaml
configurations:
  - kustomizeconfig.yaml