apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-file-provider-pve
  namespace: traefik-system
data:
  # ----------------------------
  # Existing: PVE/PBS/Kopia
  # ----------------------------
  app-pve.yaml: |
    http:
      middlewares:
        authentik-sso:
          forwardAuth:
            address: "http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik"
            trustForwardHeader: true
            authResponseHeaders:
              - X-authentik-username
              - X-authentik-groups
              - X-authentik-entitlements
              - X-authentik-email
              - X-authentik-name
              - X-authentik-uid
              - X-authentik-jwt
              - X-authentik-meta-jwks
              - X-authentik-meta-outpost
              - X-authentik-meta-provider
              - X-authentik-meta-app
              - X-authentik-meta-version
              - Authorization
            # If you want to tighten this later, switch to the regex below:
            # authResponseHeadersRegex: "^(X-authentik-|Set-Cookie|Authorization)$"
            authResponseHeadersRegex: ".*"

      routers:
        pve-whistler:
          rule: "Host(`pve-whistler.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-whistler

        pve-s13:
          rule: "Host(`pve-s13.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-s13

        pve-s12:
          rule: "Host(`pve-s12.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-s12

        pve-ugreen:
          rule: "Host(`pve-ugreen.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-ugreen

        pve-mac:
          rule: "Host(`pve-mac.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-mac

        pve-zermatt:
          rule: "Host(`pve-zermatt.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-zermatt

        pve-mammoth:
          rule: "Host(`pve-mammoth.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pve-mammoth

        pbs:
          rule: "Host(`pbs.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pbs

        # You had this protected with Authentik. Keeping that behavior:
        kopia:
          rule: "Host(`kopia.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: kopia
          middlewares:
            - authentik-sso@file

        garage:
          rule: "Host(`garage.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: garage_s3

        garageui:
          rule: "Host(`garageui.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: garage_ui
          middlewares:
            - authentik-sso@file

      services:
        pve-whistler:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.108:8006/"

        pve-s13:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.20:8006/"

        pve-s12:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.244:8006/"

        pve-ugreen:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.251:8006/"

        pve-mac:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.250:8006/"

        pve-zermatt:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.107:8006/"

        pve-mammoth:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.109:8006/"

        pbs:
          loadBalancer:
            passHostHeader: true
            serversTransport: "pve"
            servers:
              - url: "https://192.168.1.245:8007/"

        kopia:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.117:51515"

        garage_s3:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:3900"

        garage_ui:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:3909"

      serversTransports:
        pve:
          insecureSkipVerify: true

  # ----------------------------
  # QNAP + other LAN apps
  # ----------------------------
  app-lan.yaml: |
    http:
      routers:
        # --- No SSO ---
        qnas:
          rule: "Host(`qnas.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: qnap_https

        portainer-qnas:
          rule: "Host(`portainer-qnas.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: portainer_http

        # --- SSO via Authentik forwardAuth ---
        sabnzbd:
          rule: "Host(`sabnzbd.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: sabnzbd_http
          middlewares:
            - authentik-sso@file

        # qBittorrent:
        # - UI protected by Authentik
        # - API NOT protected by Authentik (prevents "read-only" behavior in WebUI)
        qbittorrent-api:
          rule: "Host(`qbittorrent.lab.mainertoo.com`) && PathPrefix(`/api/`)"
          entryPoints: [websecure]
          service: qbittorrent_http
          priority: 200

        qbittorrent-ui:
          rule: "Host(`qbittorrent.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: qbittorrent_http
          middlewares:
            - authentik-sso@file
          priority: 100

        homebridge:
          rule: "Host(`homebridge.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: homebridge_http
          # middlewares:
          #   - authentik-sso@file

        resilio:
          rule: "Host(`resilio.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: resilio_http
          # middlewares:
          #   - authentik-sso@file

        syncthing:
          rule: "Host(`syncthing.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: syncthing_http
          # middlewares:
          #   - authentik-sso@file

        pinchflat:
          rule: "Host(`pinchflat.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: pinchflat_http
          # middlewares:
          #   - authentik-sso@file

        searxng:
          rule: "Host(`searxng.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: searxng_http
          # middlewares:
          #   - authentik-sso@file

        # --- Z-Wave JS UI (SSO protected) ---
        zwave-js:
          rule: "Host(`zwave-js.lab.mainertoo.com`)"
          entryPoints: [websecure]
          service: zwave_js_ui_http
          middlewares:
            - authentik-sso@file

      services:
        # QNAP UI (self-signed HTTPS typically)
        qnap_https:
          loadBalancer:
            passHostHeader: true
            serversTransport: qnap-insecure
            servers:
              - url: "https://192.168.1.252"

        # Portainer on QNAP
        portainer_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:9000"

        sabnzbd_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8090"

        qbittorrent_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8383"

        # Homebridge UI
        homebridge_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8581"

        # Resilio Sync UI
        resilio_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8888"

        # Syncthing UI
        syncthing_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8384"

        # Pinchflat UI
        pinchflat_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8945"

        # SearXNG
        searxng_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.252:8080"

        # Z-Wave JS UI backend
        zwave_js_ui_http:
          loadBalancer:
            passHostHeader: true
            servers:
              - url: "http://192.168.1.236:8091"

      serversTransports:
        qnap-insecure:
          insecureSkipVerify: true