apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Ceph CSI shared (namespace + ConfigMaps consumed by both drivers)
  - ceph-csi-base
  # Ceph CSI drivers
  - ceph-csi-cephfs
  - ceph-csi-rbd
  - ceph-dashboard

  # cert-manager + Traefik
  - cert-manager
  - traefik-proxy

  # CSI drivers & storageclasses
  - nfs-csi
  - storage  # cephfs / rbd / nfs-qnap storageclasses

  # Add hardware iGPU passthrough
  - intel-gpu

  # Tailscale operator
  - tailscale-operator

  # Cloudflared
  - cloudflared

  # Newt
  - newt

  # Snapshot Controller
  - snapshot-controller

  # # Volsync
  - volsync

  # Kyverno policy engine (manages volsync mover jitter + future policies)
  - kyverno

  # CloudNativePG operator — manages postgres Clusters with WAL streaming to S3
  - cnpg

  # pvc-plumber-restic — shadow-mode backup-existence oracle for the
  # volsync label-driven restore project (Phase 2;
  # docs/volsync-storage-recovery.md)
  - pvc-plumber-restic
