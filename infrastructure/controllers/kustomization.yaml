apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Ceph CSI shared (namespace + ConfigMaps consumed by both drivers)
  - ceph-csi-base
  # Ceph CSI drivers
  - ceph-csi-cephfs
  - ceph-csi-rbd
  - ceph-dashboard

  # cert-manager + Traefik
  - cert-manager
  - traefik-proxy

  # CSI drivers & storageclasses
  - nfs-csi
  - storage  # cephfs / rbd / nfs-qnap storageclasses

  # Add hardware iGPU passthrough
  - intel-gpu

  # Tailscale operator
  - tailscale-operator

  # Cloudflared
  - cloudflared

  # Newt
  - newt

  # Snapshot Controller
  - snapshot-controller

  # # Volsync
  - volsync

  # Kyverno policy engine (manages volsync mover jitter + future policies)
  - kyverno

  # CloudNativePG operator — manages postgres Clusters with WAL streaming to S3
  - cnpg

  # plugin-barman-cloud — CNPG-I plugin that replaces the deprecated
  # spec.backup.barmanObjectStore (removed in CNPG 1.30). Additive on install;
  # Cluster spec migration to spec.plugins[] is a separate PR.
  - cnpg-barman-plugin

  # pvc-plumber (Kopia oracle) — HTTP-only mode, mitchross/pvc-plumber:3.1.0.
  # Phase 2 of docs/volsync-kopia-transition.md. The restic-side oracle
  # (pvc-plumber-restic) was decommissioned in Phase 7.2 (2026-05-19)
  # once all 70 PVCs migrated to backup-engine=kopia.
  - pvc-plumber

  # Kubernetes Descheduler — CronJob that rebalances pod count across
  # workers every 15 min. Fixes the post-drain imbalance that the default
  # scheduler can't (it scores at create time on CPU/memory, not pod
  # count, so rolling drains pile pods on whichever node uncordoned
  # first). See [[project_install_descheduler]].
  - descheduler
