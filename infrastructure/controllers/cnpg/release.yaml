---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: cnpg-system
  releaseName: cloudnative-pg
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Multi-replica operator with leader election (matches cluster HA pattern)
    replicaCount: 2

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: cloudnative-pg

    # Resources are conservative; operator is mostly idle reconciling Cluster CRs.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    # CRDs managed by the chart so Renovate-driven version bumps stay aligned.
    crds:
      create: true

    # Disable monitoring for now — no Prometheus operator deployed in cluster.
    monitoring:
      podMonitorEnabled: false
      grafanaDashboard:
        create: false
