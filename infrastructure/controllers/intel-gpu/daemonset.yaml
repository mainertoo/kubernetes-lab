apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugins-gpu
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      # Only run on nodes you've labeled
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"

      # This is the big one: plugin must be privileged so it can talk to /dev/dri and kubelet
      containers:
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.32.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Optional but helpful: more verbose logs
          args:
            - -v=3
            - -logtostderr
          volumeMounts:
            # Access to host GPU devices
            - name: devfs
              mountPath: /dev/dri
              readOnly: false
            # This must match the kubelet device-plugins directory on your nodes
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins
              readOnly: false

      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kubelet-device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory

      restartPolicy: Always