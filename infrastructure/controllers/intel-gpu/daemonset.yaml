apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugins-gpu
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      containers:
        # --- main Intel GPU plugin ---
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.32.0
          imagePullPolicy: IfNotPresent
          args:
            - -v=3
            - -logtostderr
          securityContext:
            privileged: true
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins

        # --- debug sidecar for inspection ---
        - name: debug
          image: busybox:1.36
          command: ["sleep", "infinity"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins

      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
            type: Directory

        - name: kubelet-device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory