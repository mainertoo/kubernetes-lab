apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugins-gpu
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      # Only run on nodes you've labeled as GPU nodes
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"

      # Allow the plugin to talk to host kernel, PCI, and kubelet
      hostPID: true
      hostNetwork: false
      dnsPolicy: ClusterFirstWithHostNet

      tolerations:
        - operator: Exists

      containers:
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.32.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "4"
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev-dri
              mountPath: /dev/dri
              readOnly: true

      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory