apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-device-plugins-gpu
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.32.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            # keep it simple for now; we can tune later
            - "-enable-monitoring=true"
          volumeMounts:
            - name: dev-dri
              mountPath: /dev/dri
              readOnly: true
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins
              readOnly: false
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      tolerations:
        - operator: "Exists"
      volumes:
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kubelet-device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: DirectoryOrCreate