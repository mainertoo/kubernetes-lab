apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
  namespace: flux-system
spec:
  interval: 30m
  releaseName: intel-device-plugins-operator
  targetNamespace: intel-device-plugins-gpu
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: 0.32.0 # or latest stable from `helm search repo intel`
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
  values: {}