apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-gpu
  namespace: flux-system
spec:
  interval: 30m
  releaseName: intel-device-plugins-gpu
  targetNamespace: intel-device-plugins-gpu
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.32.0 # match operator major version
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
  values:
    name: gpudeviceplugin
    sharedDevNum: 1
    logLevel: 2
    resourceManager: false
    allocationPolicy: "none"
    enableMonitoring: true

    # Only run plugin pods on nodes we labeled earlier
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: "true"

    # We are not using Node Feature Discovery here
    nodeFeatureRule: false