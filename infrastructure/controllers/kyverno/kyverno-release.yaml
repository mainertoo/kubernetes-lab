apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: kyverno
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: 3.8.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    admissionController:
      replicas: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno
      serviceMonitor:
        enabled: true

    backgroundController:
      replicas: 2
      # Chart default 128Mi limit OOMs the controller when it has to
      # process a wide UpdateRequest burst (e.g. 96+ URs queued during
      # the 2026-05-17 volsync ClusterPolicy delete+recreate to drop
      # `retain:` from generated RSes — see [[project_volsync_label_
      # driven_restore]] 2026-05-17 entry). At 42 backup-labeled PVCs
      # each generate cycle queues 3 URs (Secret/RS/RD) so a single
      # policy reload is ~126 URs in flight. Bump request + limit to
      # give headroom; this scales with herd size, not steady state.
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
              app.kubernetes.io/instance: kyverno
      serviceMonitor:
        enabled: true

    cleanupController:
      replicas: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
              app.kubernetes.io/instance: kyverno
      serviceMonitor:
        enabled: true

    reportsController:
      replicas: 2
      # Chart defaults (128Mi limit, 100m CPU, default client rate limits) are
      # too tight for this cluster's report churn. During a pod-churn burst
      # (e.g. a multi-replica app rollout) kyverno generates a flood of
      # ephemeralreports; the controller gets buried processing them and its
      # leader-election lease renewal misses its deadline
      # ("Failed to renew lease: context deadline exceeded") → it drops
      # leadership, restarts, and its /metrics target flaps (TargetDown 50%).
      # Mirror the backgroundController headroom: more CPU + a wider client
      # rate limit so a burst can drain without starving lease renewal.
      # Surfaced 2026-06-04; this scales with churn-burst size, not steady state.
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          memory: 512Mi
      extraArgs:
        clientRateLimitQPS: 100
        clientRateLimitBurst: 200
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
              app.kubernetes.io/instance: kyverno
      serviceMonitor:
        enabled: true
