apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - kyverno-volsync-jitter.yaml
  - volsync-policy-rbac.yaml
  # Engine-label admission gate (validate, Enforce). Allowed values: [kopia].
  - volsync-pvc-engine-required.yaml
  # Kopia policy — generates Secret/RS/RD trio with spec.kopia for any
  # PVC carrying both `backup: hourly|daily` and `backup-engine: kopia`.
  - volsync-pvc-backup-restore-kopia.yaml
