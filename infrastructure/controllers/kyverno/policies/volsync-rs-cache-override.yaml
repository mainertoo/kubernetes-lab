# Separate ClusterPolicy for cache-capacity overrides on generated
# ReplicationSources. Lives outside the volsync-pvc-backup-restore
# policy because Kyverno treats generate-rule contents as immutable
# after first apply, so the original policy's hardcoded 1Gi cache
# can't be changed in-place. This policy uses `mutateExisting` —
# a separate rule kind that doesn't carry the same immutability
# constraint and can react to ongoing RS sync events.
#
# Mechanism:
#   1. Trigger: PVC update events where backup label is set AND the
#      `volsync.backup/cache-capacity` annotation carries a value.
#   2. Target: the corresponding `<pvc>-backup` ReplicationSource in
#      the same namespace.
#   3. Mutation: patch spec.restic.cacheCapacity to the annotation's
#      value.
#
# Race concern: Kyverno's BG generate-sync re-renders the RS to the
# original policy's 1Gi template after any drift. Whether
# mutateExisting wins that race depends on Kyverno's internal
# event ordering; if it loses, fallback is to expand the
# cache PVC directly (storageClass allowVolumeExpansion=true).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-rs-cache-override
  annotations:
    policies.kyverno.io/title: VolSync RS cache capacity override
    policies.kyverno.io/category: VolSync
    policies.kyverno.io/subject: ReplicationSource
    policies.kyverno.io/description: >-
      Overrides spec.restic.cacheCapacity on Kyverno-generated
      ReplicationSources from a per-PVC annotation. Workaround for
      the hardcoded cache size in the volsync-pvc-backup-restore
      generate-rule template (which is immutable post-apply).
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: bump-cache-from-pvc-annotation
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/cache-capacity\" || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        targets:
          - apiVersion: volsync.backube/v1alpha1
            kind: ReplicationSource
            name: "{{request.object.metadata.name}}-backup"
            namespace: "{{request.object.metadata.namespace}}"
        patchStrategicMerge:
          spec:
            restic:
              cacheCapacity: "{{ request.object.metadata.annotations.\"volsync.backup/cache-capacity\" }}"
