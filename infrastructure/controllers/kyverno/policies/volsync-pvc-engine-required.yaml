# volsync-pvc-engine-required — Phase 3b of docs/volsync-kopia-transition.md,
# tightened in Phase 7.3 (2026-05-19) post-Restic-decom.
#
# Deny-on-missing-engine validate-only policy. The engine label MUST be
# explicit on any backup-labeled PVC, NEVER inferred at admission time
# by some downstream webhook. Without this policy, a PVC with
# `backup: hourly|daily` but no `backup-engine` label could match no
# engine-gated generate rule (silent backup loss) or pass through to
# whichever default landed last.
#
# Allowed set: {kopia} only.
#   - restic was the original allow value through Phase 5; removed in
#     Phase 7.3 once all 70 PVCs cut over and the Restic ClusterPolicy +
#     pvc-plumber-restic stack were decommissioned.
#   - migrating was reserved for an intermediate cutover state that
#     v3+ protocol never used; dropped in Phase 7.3 for the same reason.
#
# Mode: validationFailureAction=Enforce (flipped from Audit in Phase 7.3).
# Now that Phase 6 is closed and the cluster has 70 PVCs steady-state on
# Kopia, Enforce blocks any accidental engine-label typo at admission
# rather than just audit-logging the mistake.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-pvc-engine-required
  annotations:
    policies.kyverno.io/title: VolSync engine-label admission gate
    policies.kyverno.io/category: VolSync
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: PersistentVolumeClaim
    policies.kyverno.io/description: >-
      Requires every backup-labeled PVC to carry `backup-engine: kopia`.
      Without it, the kopia-gated generate policy would not match and the
      PVC would have no backups configured.
spec:
  validationFailureAction: Enforce
  background: false
  failurePolicy: Fail
  webhookTimeoutSeconds: 10
  rules:
    - name: require-backup-engine-label
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}
          has `backup: {{request.object.metadata.labels.backup}}` but
          no valid `backup-engine` label. Add `backup-engine: kopia`.
          See docs/volsync-kopia-transition.md.
        deny:
          conditions:
            any:
              # Missing label entirely → deny.
              - key: "{{ request.object.metadata.labels.\"backup-engine\" || '' }}"
                operator: Equals
                value: ""
              # Present but not in allow set → deny.
              - key: "{{ request.object.metadata.labels.\"backup-engine\" || '' }}"
                operator: NotIn
                value: [kopia]
