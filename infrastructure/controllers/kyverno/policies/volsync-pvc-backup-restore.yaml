# volsync-pvc-backup-restore — 7-rule ClusterPolicy for the volsync
# label-driven restore project. Rules 1-4 validate admission; rule 2
# mutates dataSourceRef on restore; rules 5-7 generate the per-PVC
# Secret + ReplicationSource + ReplicationDestination trio that
# replaces the legacy components/volsync/remote Component.
#
# Phase ordering:
#   - Phase 4 (PR #345): only rules 1 + 4 (both validate, Audit)
#   - Phase 5 prep (THIS commit): adds rules 2, 3, 5, 6, 7
#   - Phase 6: flips validationFailureAction Audit → Enforce
#
# Activation: a PVC must carry label `backup: hourly` or `backup: daily`
# for the policy to fire. Until per-app 5a PRs land, no production PVC
# has that label; the policy stays dormant.
#
# References:
#   - design doc: docs/volsync-storage-recovery.md §2.3
#   - shared repo url: s3:https://garage.lab.mainertoo.com/volsync-shared/restic
#   - shared creds source: Secret/flux-system/volsync-shared-base (RESTIC_PASSWORD + AWS_*)
#   - aggregated RBAC: volsync-policy-rbac.yaml in this directory
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-pvc-backup-restore
  annotations:
    # One-shot force-recreate for Phase 3c selector tightening (2026-05-18).
    # PR #453 hit Kyverno's immutability check: "changes of immutable fields
    # of a rule spec in a generate rule is disallowed". v6 Codex finding [2]
    # said the in-place selector edit on rules 5-7 SHOULD be allowed because
    # it's not a generate.data change — Kyverno enforces a broader
    # immutability than that, catching predicate changes (match/exclude)
    # that could cause synchronize:true GC of existing generated children.
    #
    # Safe to force-recreate now (unlike the 2026-05-17 incident's hazard):
    # volsync controller is at replicas=0, so no mover Jobs exist to be
    # disrupted during the brief Secret/RS/RD GC + regen window. 42 PVCs
    # all carry backup-engine: restic (Phase 3a parity verified PR #452),
    # so generateExisting: true emits 42 identical children right back.
    #
    # SAFE TO REMOVE in a follow-up commit after Flux reconciles + all 42
    # children regenerated. Per feedback_kyverno_generate_rules_immutable:
    # leaving this annotation in place sets up future policy edits to
    # silently force-recreate again.
    kustomize.toolkit.fluxcd.io/force: "Enabled"
    policies.kyverno.io/title: VolSync PVC backup/restore admission
    policies.kyverno.io/category: VolSync
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: PersistentVolumeClaim
    policies.kyverno.io/description: >-
      Backup-existence-aware PVC admission validation + mutation +
      generation. Calls pvc-plumber-restic to inject dataSourceRef on
      restore, validates the answer is authoritative, and generates
      the per-PVC Secret/RS/RD trio that drives the VolSync mover.
spec:
  validationFailureAction: Audit
  background: false
  failurePolicy: Fail
  webhookTimeoutSeconds: 10
  rules:
    # ─────────────────────────────────────────────────────────────────
    # Rule 1: require-authoritative-backup-decision  (validate, Audit)
    # ─────────────────────────────────────────────────────────────────
    - name: require-authoritative-backup-decision
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber-restic.volsync-system.svc.cluster.local:8080/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}
          admission requires an authoritative backup-existence decision.
          Oracle returned authoritative={{existsResponse.authoritative}},
          decision={{existsResponse.decision}},
          error={{existsResponse.error || 'none'}}.
        deny:
          conditions:
            any:
              - key: "{{ existsResponse.authoritative }}"
                operator: NotEquals
                value: true
              - key: "{{ existsResponse.error || '' }}"
                operator: NotEquals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 2: add-datasource-if-backup-exists  (mutate)
    # ─────────────────────────────────────────────────────────────────
    # When the oracle says decision=restore AND the PVC doesn't already
    # carry a dataSourceRef, patch in a ReplicationDestination ref so
    # the CSI populator pulls the source data from the shared repo.
    # Skips when skip-restore=true (escape hatch) or when the PVC's
    # dataSourceRef is already set (don't clobber).
    #
    # operations: [CREATE] — mutate is ONLY meaningful at PVC create
    # time (before bind, so the CSI populator can act on it). PVC spec
    # is immutable post-bind, so firing on UPDATE events (e.g. when
    # Phase 5 adds the backup label to an existing PVC with no
    # dataSourceRef) causes K8s admission to reject the entire change.
    # First surfaced on mealie cutover: its PVC had dataSourceRef=null
    # so the precondition matched, mutate fired on label-add, K8s
    # rejected the patch.
    - name: add-datasource-if-backup-exists
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber-restic.volsync-system.svc.cluster.local:8080/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ existsResponse.decision }}"
            operator: Equals
            value: "restore"
          - key: "{{ existsResponse.authoritative }}"
            operator: Equals
            value: true
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
          # Don't clobber a dataSourceRef the user explicitly set.
          - key: "{{ request.object.spec.dataSourceRef.name || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            dataSourceRef:
              apiGroup: volsync.backube
              kind: ReplicationDestination
              name: "{{request.object.metadata.name}}-backup"

    # ─────────────────────────────────────────────────────────────────
    # Rule 3: require-datasource-when-restore  (validate post-mutate)
    # ─────────────────────────────────────────────────────────────────
    # Closes the validate/mutate race: if rule 2's apiCall returned
    # non-authoritative on the mutate webhook BUT this validate
    # webhook's call succeeded, the PVC would otherwise be created
    # without dataSourceRef but oracle says restore — empty PVC over
    # historical data. Catch that here.
    #
    # operations: [CREATE] — pairs with rule 2; only meaningful at
    # create time when rule 2 had a chance to fire.
    - name: require-datasource-when-restore
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber-restic.volsync-system.svc.cluster.local:8080/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ existsResponse.decision }}"
            operator: Equals
            value: "restore"
          - key: "{{ existsResponse.authoritative }}"
            operator: Equals
            value: true
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}:
          oracle says decision=restore but spec.dataSourceRef.name is
          empty. The mutate rule (rule 2) should have patched it in;
          if you see this, the mutate rule's apiCall returned
          non-authoritative on a webhook that succeeded here. Retry.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.dataSourceRef.name || '' }}"
                operator: Equals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 4: require-skip-restore-reason  (validate, Audit)
    # ─────────────────────────────────────────────────────────────────
    - name: require-skip-restore-reason
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: Equals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}
          carries volsync.backup/skip-restore=true but no
          volsync.backup/skip-restore-reason annotation. Document
          the bypass.
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore-reason\" || '' }}"
                operator: Equals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 5: generate-restic-secret  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates per-PVC `volsync-<pvc>` Secret in the PVC's namespace.
    # Pulls shared password + S3 creds from Secret/flux-system/volsync-
    # shared-base; adds RESTIC_REPOSITORY (hardcoded shared repo URL)
    # and RESTIC_HOSTNAME=<ns>/<pvc> for tag enforcement on backup.
    #
    # Skipped via precondition when skip-restore=true; the design
    # doc §2.6 specifies that skip-restore suppresses backup generation
    # entirely, not just the restore path.
    - name: generate-restic-secret
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: sharedSecret
          apiCall:
            method: GET
            urlPath: "/api/v1/namespaces/flux-system/secrets/volsync-shared-base"
            jmesPath: "@"
      generate:
        synchronize: true
        # Fire on existing matching PVCs at policy load, not just on
        # PVC CREATE/UPDATE events. Without this, force-recreating the
        # policy (e.g. to change generate.data values via [[feedback_
        # kyverno_generate_rules_immutable]]) leaves all matching PVCs
        # without their generated children until each PVC is manually
        # touched. Verified 2026-05-16 on the cacheCapacity v2 rollout.
        generateExisting: true
        apiVersion: v1
        kind: Secret
        name: "volsync-{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          type: Opaque
          stringData:
            # Hardcoded shared repo URL — single point of truth, single
            # password unlocks all backups. Acknowledged in design §2.1.
            RESTIC_REPOSITORY: "s3:https://garage.lab.mainertoo.com/volsync-shared/restic"
            RESTIC_PASSWORD: "{{ base64_decode(sharedSecret.data.RESTIC_PASSWORD) }}"
            AWS_ACCESS_KEY_ID: "{{ base64_decode(sharedSecret.data.AWS_ACCESS_KEY_ID) }}"
            AWS_SECRET_ACCESS_KEY: "{{ base64_decode(sharedSecret.data.AWS_SECRET_ACCESS_KEY) }}"
            # Tag enforcement on backup: the mover's restic invocation
            # carries this hostname; VolSync auto-tags snapshots with
            # the hostname for downstream filtering.
            RESTIC_HOSTNAME: "{{request.object.metadata.namespace}}/{{request.object.metadata.name}}"
            AWS_EC2_METADATA_DISABLED: "true"

    # ─────────────────────────────────────────────────────────────────
    # Rule 6: generate-replication-source-v2  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates `<pvc>-backup` RS in the PVC's namespace. Schedule + cron
    # minute derived from label and namespace length per design §2.4.
    # Storage class and snapshot class are derived from the source PVC's
    # own spec so the generated RS handles cephfs and ceph-rbd uniformly.
    #
    # Renamed from `generate-replication-source` to bypass Kyverno's
    # admission block on in-place generate.data edits (PRs #373/#376
    # round-tripped that path). The old rule is removed; Kyverno's
    # synchronize: true cleanup GCs its RSes and this rule regenerates
    # them with the new cacheCapacity semantics.
    - name: generate-replication-source-v2
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        # Minute is `length(namespace) % 60` — gives each namespace a
        # distinct minute spread across the hour.
        - name: scheduleMinute
          variable:
            jmesPath: "to_string(modulo(length(request.namespace), `60`))"
        # Hour is '*' for hourly schedules, '2' for daily (02:MM local).
        - name: scheduleHour
          variable:
            jmesPath: "request.object.metadata.labels.backup == 'hourly' && '*' || '2'"
        # Snapshot class matches storage class — closed set in cluster:
        # cephfs → cephfs-snapclass; everything else → ceph-rbd-snapclass.
        - name: snapClass
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'cephfs-snapclass' || 'ceph-rbd-snapclass'"
        # accessModes is a list; derive from storage class type.
        # cephfs is RWX; ceph-rbd is RWO. Matches what `kubectl get rs
        # -A` shows on the existing 70 RSes.
        - name: rwMode
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'ReadWriteMany' || 'ReadWriteOnce'"
        # Cache PVC size. Default 5Gi (was hardcoded 1Gi in the v1 rule —
        # too small for the shared-repo design where the cache holds
        # restic index/pack metadata for ALL apps' snapshots in the
        # shared repo, not just this app's). Per-PVC override via
        # annotation `volsync.backup/cache-capacity: 10Gi`. Apps with
        # >50Gi sources or large file counts (dumb, plex, jellyfin,
        # large media libraries, esphome/platformio toolchains) should
        # set explicit values.
        - name: cacheCap
          variable:
            jmesPath: "request.object.metadata.annotations.\"volsync.backup/cache-capacity\" || '5Gi'"
      generate:
        synchronize: true
        # See rule 5 comment — fires on existing matching PVCs at policy
        # load so future force-recreates self-heal.
        generateExisting: true
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          spec:
            sourcePVC: "{{request.object.metadata.name}}"
            trigger:
              schedule: "{{scheduleMinute}} {{scheduleHour}} * * *"
            restic:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              storageClassName: "{{request.object.spec.storageClassName}}"
              volumeSnapshotClassName: "{{snapClass}}"
              accessModes:
                - "{{rwMode}}"
              cacheCapacity: "{{cacheCap}}"
              cacheStorageClassName: ceph-rbd
              cacheAccessModes:
                - ReadWriteOnce
              moverSecurityContext:
                fsGroup: 1000
                runAsUser: 1000
                runAsGroup: 1000
              # `retain:` intentionally omitted. With `retain` present,
              # the volsync mover runs `restic forget --retry-lock=0s`
              # after each backup — that's an exclusive lock on the
              # shared repo and N concurrent movers collide. Without
              # `retain` the mover script skips forget entirely. The
              # 24h/7d/4w/3m retention policy is now applied centrally
              # by the `volsync-restic-forget` CronJob (volsync-system),
              # which is the sole writer holding the exclusive lock.
              # pruneIntervalDays is also omitted — repack/prune runs
              # under the central CronJob's --prune flag instead.

    # ─────────────────────────────────────────────────────────────────
    # Rule 7: generate-replication-destination-v2  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates `<pvc>-backup` RD in the PVC's namespace. The mutate rule
    # patches the PVC's dataSourceRef to point here, and the CSI
    # populator triggers the RD to populate fresh PVCs from restic.
    # `trigger.manual` is constant — the RD fires once on first
    # restore, then idles.
    #
    # Renamed from `generate-replication-destination` alongside rule 6
    # so the RD's cache PVC sizing tracks the same annotation override.
    - name: generate-replication-destination-v2
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  # Engine-gate added Phase 3c (docs/volsync-kopia-transition.md).
                  # Phase 3a backfilled this label on all 42 currently-managed PVCs
                  # (parity gate verified before this commit landed).
                  # Phase 3d adds volsync-pvc-backup-restore-kopia for backup-engine=kopia.
                  # See docs/volsync-kopia-transition.md §10 v6 finding [3] for the
                  # in-place-vs-rename rationale (rename would have force-recreated
                  # all 42 Secret/RS/RD via synchronize:true GC).
                  - key: backup-engine
                    operator: In
                    values: [restic]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: snapClass
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'cephfs-snapclass' || 'ceph-rbd-snapclass'"
        - name: rwMode
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'ReadWriteMany' || 'ReadWriteOnce'"
        # Cache PVC size; mirrors rule 6's logic. See rule 6 comment.
        - name: cacheCap
          variable:
            jmesPath: "request.object.metadata.annotations.\"volsync.backup/cache-capacity\" || '5Gi'"
      generate:
        synchronize: true
        # See rule 5 comment — fires on existing matching PVCs at policy
        # load so future force-recreates self-heal.
        generateExisting: true
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          spec:
            trigger:
              manual: restore-once
            restic:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              capacity: "{{request.object.spec.resources.requests.storage}}"
              accessModes:
                - "{{rwMode}}"
              storageClassName: "{{request.object.spec.storageClassName}}"
              volumeSnapshotClassName: "{{snapClass}}"
              cacheCapacity: "{{cacheCap}}"
              cacheStorageClassName: ceph-rbd
              cacheAccessModes:
                - ReadWriteOnce
              moverSecurityContext:
                fsGroup: 1000
