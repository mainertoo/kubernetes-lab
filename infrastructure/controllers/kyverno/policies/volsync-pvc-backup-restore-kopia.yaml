# volsync-pvc-backup-restore-kopia — Phase 3d of docs/volsync-kopia-transition.md.
#
# Twin of volsync-pvc-backup-restore (the Restic policy) for the Kopia
# data path. Same 7-rule structure, same admission semantics, same
# generate-rule shape — but:
#   1. Engine selector: backup-engine=kopia (Restic policy uses =restic)
#   2. Oracle URL: pvc-plumber.volsync-system (Kopia, port 80 — HTTP-only
#      mode deployed Phase 2). Restic policy uses pvc-plumber-restic on
#      port 8080.
#   3. Generated Secret holds KOPIA_PASSWORD + KOPIA_S3_* + AWS_* creds
#      sourced from Secret/flux-system/volsync-kopia-shared-base. Restic
#      Secret holds RESTIC_PASSWORD + RESTIC_REPOSITORY + AWS_*.
#   4. Generated RS/RD use spec.kopia: instead of spec.restic:. Includes
#      hostname=<ns>, username=<pvc>-backup, sourcePathOverride=/data
#      to match the source-path convention pvc-plumber-kopia expects
#      (verified at Phase 2 smoketest: oracle returns
#      source=<pvc>-backup@<ns>:/data for any /exists query).
#   5. Additional namespace-label exclude for CNPG-managed PVCs
#      (cnpg.io/cluster Exists OR app.kubernetes.io/managed-by ∈
#      {cnpg, cloudnative-pg}). Per docs/volsync-kopia-transition.md §10
#      v3-finding [3], CNPG data PVCs are out of scope: they use
#      Cluster.bootstrap.recovery per docs/backup-recovery.md.
#   6. webhookTimeoutSeconds: 20 (Restic policy uses 10). v8 Codex v5
#      finding [5]: kopia pvc-plumber's HTTP_TIMEOUT is 15s (Garage
#      HTTPS via Traefik). Kyverno webhook timeout must exceed it.
#   7. retain: omitted from rule 6 (mirror of v7 Restic-side change).
#      Per perfectra1n's mover Phase 0 audit, controller mover.go:898
#      returns empty env vars when retainPolicy is nil → mover does no
#      retention work, just snapshot+create. Maintenance happens via
#      the KopiaMaintenance CRD (mitchross pvc-plumber:3.1.0 ships it).
#
# Mode: validationFailureAction=Audit during Phase 5. v8 §6 OQ#4:
# flip to Enforce in Phase 6.
#
# Activation: PVC must carry BOTH labels: backup ∈ {hourly, daily}
# AND backup-engine: kopia. Until per-app Phase 5 cutovers flip the
# engine label, no PVC matches → policy is dormant. Phase 3e validates
# this via a scratch namespace + scratch PVC before any production PVC
# touches the new policy.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-pvc-backup-restore-kopia
  annotations:
    policies.kyverno.io/title: VolSync Kopia PVC backup/restore admission
    policies.kyverno.io/category: VolSync
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: PersistentVolumeClaim
    policies.kyverno.io/description: >-
      Backup-existence-aware PVC admission validation + mutation +
      generation for Kopia-backed apps. Calls pvc-plumber to inject
      dataSourceRef on restore, validates the answer is authoritative,
      and generates the per-PVC Secret/RS/RD trio with spec.kopia
      that drives the VolSync Kopia mover.
spec:
  validationFailureAction: Audit
  background: false
  failurePolicy: Fail
  # v8 Codex v5 finding [5]: kopia HTTP_TIMEOUT=15s (Garage HTTPS via
  # Traefik). Webhook timeout must exceed it. Restic policy still uses
  # 10s because pvc-plumber-restic's HTTP_TIMEOUT is shorter.
  webhookTimeoutSeconds: 20
  rules:
    # ─────────────────────────────────────────────────────────────────
    # Rule 1: require-authoritative-backup-decision  (validate, Audit)
    # ─────────────────────────────────────────────────────────────────
    - name: require-authoritative-backup-decision
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          # Namespace excludes (mirror of Restic policy).
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          # CNPG label excludes (v6 finding [3]: by label, NOT namespace —
          # CNPG dbs share namespaces with app PVCs we DO want to migrate).
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber.volsync-system.svc.cluster.local:80/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}
          admission requires an authoritative backup-existence decision
          (Kopia oracle). Oracle returned
          authoritative={{existsResponse.authoritative}},
          decision={{existsResponse.decision}},
          error={{existsResponse.error || 'none'}}.
        deny:
          conditions:
            any:
              - key: "{{ existsResponse.authoritative }}"
                operator: NotEquals
                value: true
              - key: "{{ existsResponse.error || '' }}"
                operator: NotEquals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 2: add-datasource-if-backup-exists  (mutate)
    # ─────────────────────────────────────────────────────────────────
    - name: add-datasource-if-backup-exists
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber.volsync-system.svc.cluster.local:80/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ existsResponse.decision }}"
            operator: Equals
            value: "restore"
          - key: "{{ existsResponse.authoritative }}"
            operator: Equals
            value: true
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
          - key: "{{ request.object.spec.dataSourceRef.name || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            dataSourceRef:
              apiGroup: volsync.backube
              kind: ReplicationDestination
              name: "{{request.object.metadata.name}}-backup"

    # ─────────────────────────────────────────────────────────────────
    # Rule 3: require-datasource-when-restore  (validate post-mutate)
    # ─────────────────────────────────────────────────────────────────
    - name: require-datasource-when-restore
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      context:
        - name: existsResponse
          apiCall:
            method: GET
            service:
              url: "http://pvc-plumber.volsync-system.svc.cluster.local:80/exists/{{request.namespace}}/{{request.object.metadata.name}}"
            jmesPath: "@"
      preconditions:
        all:
          - key: "{{ existsResponse.decision }}"
            operator: Equals
            value: "restore"
          - key: "{{ existsResponse.authoritative }}"
            operator: Equals
            value: true
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}:
          oracle says decision=restore but spec.dataSourceRef.name is
          empty. Rule 2 should have patched it in; if you see this,
          the mutate rule's apiCall returned non-authoritative on a
          webhook that succeeded here. Retry.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.dataSourceRef.name || '' }}"
                operator: Equals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 4: require-skip-restore-reason  (validate, Audit)
    # ─────────────────────────────────────────────────────────────────
    - name: require-skip-restore-reason
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: Equals
            value: "true"
      validate:
        message: >-
          PVC {{request.namespace}}/{{request.object.metadata.name}}
          carries volsync.backup/skip-restore=true but no
          volsync.backup/skip-restore-reason annotation. Document
          the bypass.
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore-reason\" || '' }}"
                operator: Equals
                value: ""

    # ─────────────────────────────────────────────────────────────────
    # Rule 5: generate-kopia-secret  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates per-PVC `volsync-<pvc>` Secret in the PVC's namespace.
    # Sources KOPIA_PASSWORD + AWS_* from Secret/flux-system/volsync-
    # kopia-shared-base. Hardcodes KOPIA_S3_ENDPOINT, KOPIA_S3_BUCKET,
    # KOPIA_S3_DISABLE_TLS to match the values pvc-plumber-kopia uses
    # (single source of truth: same Garage endpoint + bucket).
    - name: generate-kopia-secret
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: sharedSecret
          apiCall:
            method: GET
            urlPath: "/api/v1/namespaces/flux-system/secrets/volsync-kopia-shared-base"
            jmesPath: "@"
      generate:
        synchronize: true
        generateExisting: true
        apiVersion: v1
        kind: Secret
        name: "volsync-{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          type: Opaque
          stringData:
            # Required by volsync 0.15.0 Kopia mover controller validation:
            # `secret is missing field: KOPIA_REPOSITORY` error at Phase 6
            # 2026-05-18 first turn-up. The mover's entry.sh parses this
            # URI prefix (s3:) and then uses the separate KOPIA_S3_* env
            # vars for the actual S3 connect. Per-PVC isolation within
            # this single shared repo is via hostname=<ns> + username=
            # <pvc>-backup (see ReplicationSource generate rule below).
            KOPIA_REPOSITORY: "s3://garage.lab.mainertoo.com/volsync-kopia"
            KOPIA_PASSWORD: "{{ base64_decode(sharedSecret.data.KOPIA_PASSWORD) }}"
            AWS_ACCESS_KEY_ID: "{{ base64_decode(sharedSecret.data.AWS_ACCESS_KEY_ID) }}"
            AWS_SECRET_ACCESS_KEY: "{{ base64_decode(sharedSecret.data.AWS_SECRET_ACCESS_KEY) }}"
            # Hardcoded Garage endpoint + bucket — single source of truth,
            # matches pvc-plumber-kopia's deployment env. Bare host (kopia
            # rejects fully-qualified URLs). HTTPS implied via
            # KOPIA_S3_DISABLE_TLS=false.
            KOPIA_S3_ENDPOINT: "garage.lab.mainertoo.com"
            KOPIA_S3_BUCKET: "volsync-kopia"
            KOPIA_S3_DISABLE_TLS: "false"
            AWS_DEFAULT_REGION: "us-west-1"
            AWS_REGION: "us-west-1"
            AWS_EC2_METADATA_DISABLED: "true"

    # ─────────────────────────────────────────────────────────────────
    # Rule 6: generate-replication-source  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates `<pvc>-backup` RS in the PVC's namespace. Schedule + cron
    # minute derived from label and namespace length (mirror of Restic
    # policy rule 6). spec.kopia uses hostname=<ns> + username=<pvc>-
    # backup + sourcePathOverride=/data to match the source-path
    # convention pvc-plumber-kopia returns from /exists.
    - name: generate-replication-source
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: scheduleMinute
          variable:
            jmesPath: "to_string(modulo(length(request.namespace), `60`))"
        - name: scheduleHour
          variable:
            jmesPath: "request.object.metadata.labels.backup == 'hourly' && '*' || '2'"
        - name: snapClass
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'cephfs-snapclass' || 'ceph-rbd-snapclass'"
        - name: rwMode
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'ReadWriteMany' || 'ReadWriteOnce'"
        # Cache PVC size. Default 5Gi; v8 plan calls for 10Gi default
        # on PVCs >100Gi (Phase 5 batch-4 big-data apps set explicit
        # 10Gi via the existing `volsync.backup/cache-capacity` annotation).
        - name: cacheCap
          variable:
            jmesPath: "request.object.metadata.annotations.\"volsync.backup/cache-capacity\" || '5Gi'"
      generate:
        synchronize: true
        generateExisting: true
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          spec:
            sourcePVC: "{{request.object.metadata.name}}"
            trigger:
              schedule: "{{scheduleMinute}} {{scheduleHour}} * * *"
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              storageClassName: "{{request.object.spec.storageClassName}}"
              volumeSnapshotClassName: "{{snapClass}}"
              accessModes:
                - "{{rwMode}}"
              cacheCapacity: "{{cacheCap}}"
              cacheStorageClassName: ceph-rbd
              cacheAccessModes:
                - ReadWriteOnce
              moverSecurityContext:
                fsGroup: 1000
                runAsUser: 1000
                runAsGroup: 1000
              # Kopia source-identity overrides — matches the convention
              # pvc-plumber-kopia returns from /exists/<ns>/<pvc>:
              # source=<pvc>-backup@<ns>:/data (verified Phase 2 smoketest).
              hostname: "{{request.object.metadata.namespace}}"
              username: "{{request.object.metadata.name}}-backup"
              sourcePathOverride: "/data"
              # retain: intentionally omitted (same reasoning as Restic
              # policy v7 onward). Kopia's controller passes empty env
              # vars when retainPolicy is nil → mover does no retention.
              # Maintenance happens via the KopiaMaintenance CRD shipped
              # by perfectra1n's chart + reconciled by mitchross's
              # pvc-plumber operator (when we flip OPERATOR_MODE=true
              # in a future PR; for now HTTP-only oracle, manual
              # KopiaMaintenance CR creation if needed).

    # ─────────────────────────────────────────────────────────────────
    # Rule 7: generate-replication-destination  (generate, synchronize: true)
    # ─────────────────────────────────────────────────────────────────
    # Creates `<pvc>-backup` RD in the PVC's namespace. Same hostname/
    # username/sourcePathOverride identity as RS so the populator can
    # find snapshots saved by the mover.
    - name: generate-replication-destination
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: [hourly, daily]
                  - key: backup-engine
                    operator: In
                    values: [kopia]
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kube-system
                - kyverno
                - volsync-system
                - cert-manager
                - traefik
                - ceph-csi-rbd
                - ceph-csi-cephfs
                - monitoring
                - tailscale
                - cloudflared
                - newt
                - intel-gpu
          - resources:
              selector:
                matchExpressions:
                  - key: cnpg.io/cluster
                    operator: Exists
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/managed-by
                    operator: In
                    values: [cnpg, cloudnative-pg]
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || '' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: snapClass
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'cephfs-snapclass' || 'ceph-rbd-snapclass'"
        - name: rwMode
          variable:
            jmesPath: "request.object.spec.storageClassName == 'cephfs' && 'ReadWriteMany' || 'ReadWriteOnce'"
        - name: cacheCap
          variable:
            jmesPath: "request.object.metadata.annotations.\"volsync.backup/cache-capacity\" || '5Gi'"
      generate:
        synchronize: true
        generateExisting: true
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          spec:
            trigger:
              manual: restore-once
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              capacity: "{{request.object.spec.resources.requests.storage}}"
              accessModes:
                - "{{rwMode}}"
              storageClassName: "{{request.object.spec.storageClassName}}"
              volumeSnapshotClassName: "{{snapClass}}"
              cacheCapacity: "{{cacheCap}}"
              cacheStorageClassName: ceph-rbd
              cacheAccessModes:
                - ReadWriteOnce
              moverSecurityContext:
                fsGroup: 1000
                runAsUser: 1000
                runAsGroup: 1000
              hostname: "{{request.object.metadata.namespace}}"
              username: "{{request.object.metadata.name}}-backup"
              sourcePathOverride: "/data"
