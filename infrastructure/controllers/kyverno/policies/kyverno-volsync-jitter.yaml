apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-mover-jitter
  annotations:
    policies.kyverno.io/title: VolSync Mover Jitter
    policies.kyverno.io/description: >-
      Adds a random sleep initContainer to volsync source mover jobs to stagger
      backup start times and prevent thundering-herd lock contention in restic.
spec:
  failurePolicy: Ignore
  rules:
    - name: add-jitter
      match:
        any:
          - resources:
              kinds:
                - Job
              # Covers both backup (volsync-src-*) and restore
              # (volsync-dst-*) movers.
              name: "volsync-*"
              selector:
                matchLabels:
                  app.kubernetes.io/created-by: volsync
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                initContainers:
                  - name: jitter
                    image: busybox:latest
                    imagePullPolicy: IfNotPresent
                    # TEMPORARILY 30 min (was 180s) to spread the
                    # fleet-wide cold-start when the volsync Kyverno
                    # policy is force-recreated for Phase 2 (cephfs
                    # backingSnapshot rollout). Revert to `% 180` once
                    # Phase 2 has settled — Kopia's concurrent
                    # multi-writer access means 3 min is normally
                    # plenty (no Restic-era lock contention).
                    command: ["sh", "-c", "sleep $((RANDOM % 1800))"]
