apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-mover-jitter
  annotations:
    policies.kyverno.io/title: VolSync Mover Jitter
    policies.kyverno.io/description: >-
      Adds a random sleep initContainer to volsync source mover jobs to stagger
      backup start times and prevent thundering-herd lock contention in restic.
spec:
  failurePolicy: Ignore
  rules:
    - name: add-jitter
      match:
        any:
          - resources:
              kinds:
                - Job
              # Covers both backup (volsync-src-*) and restore
              # (volsync-dst-*) movers.
              name: "volsync-*"
              selector:
                matchLabels:
                  app.kubernetes.io/created-by: volsync
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                initContainers:
                  - name: jitter
                    image: busybox:latest
                    imagePullPolicy: IfNotPresent
                    # 3-min spread (RANDOM % 180). Kopia's concurrent
                    # multi-writer access means this is plenty in
                    # steady state — there is no Restic-era
                    # mover-vs-mover lock contention to avoid.
                    # Widen temporarily (e.g. `% 1800`) before
                    # force-recreating the volsync generate policy,
                    # to spread the resulting cold-start wave; revert
                    # once the wave drains.
                    command: ["sh", "-c", "sleep $((RANDOM % 180))"]
