apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-mover-jitter
  annotations:
    policies.kyverno.io/title: VolSync Mover Jitter
    policies.kyverno.io/description: >-
      Adds a random sleep initContainer to volsync source mover jobs to stagger
      backup start times and prevent thundering-herd lock contention in restic.
spec:
  failurePolicy: Ignore
  rules:
    - name: add-jitter
      match:
        any:
          - resources:
              kinds:
                - Job
              name: "volsync-src-*"
              selector:
                matchLabels:
                  app.kubernetes.io/created-by: volsync
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                initContainers:
                  - name: jitter
                    image: busybox:latest
                    imagePullPolicy: IfNotPresent
                    # 3-min spread. Kopia supports concurrent multi-writer
                    # access to a shared repo, so the mover-vs-mover lock
                    # contention that forced the 30-min window during the
                    # Restic era (commit a61cb51f, 2026-05-16) no longer
                    # applies post-Kopia migration.
                    command: ["sh", "-c", "sleep $((RANDOM % 180))"]
