apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-mover-jitter
  annotations:
    policies.kyverno.io/title: VolSync Mover Jitter
    policies.kyverno.io/description: >-
      Adds a random sleep initContainer to volsync source mover jobs to stagger
      backup start times and prevent thundering-herd lock contention in restic.
spec:
  failurePolicy: Ignore
  rules:
    - name: add-jitter
      match:
        any:
          - resources:
              kinds:
                - Job
              name: "volsync-src-*"
              selector:
                matchLabels:
                  app.kubernetes.io/created-by: volsync
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                initContainers:
                  - name: jitter
                    image: busybox:latest
                    imagePullPolicy: IfNotPresent
                    # Spread up to 30 min. With ~70 movers on a shared restic
                    # repo, 180s (3 min) wasn't enough — mover-vs-mover
                    # `restic forget --retry-lock=0s` collisions piled up,
                    # and on 2026-05-16 a fleet force-recreate that spawned
                    # 51 fresh RSes simultaneously OOM'd worker-2 (kubelet
                    # killed restic) and pinned worker-1 at 99% CPU.
                    command: ["sh", "-c", "sleep $((RANDOM % 1800))"]
