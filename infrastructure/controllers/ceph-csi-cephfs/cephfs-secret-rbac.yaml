apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cephfs-csi-secret-access
  namespace: ceph-csi
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cephfs-csi-secret-access
  namespace: ceph-csi
subjects:
  - kind: ServiceAccount
    name: cephfs-csi-provisioner
    namespace: ceph-csi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cephfs-csi-secret-access
