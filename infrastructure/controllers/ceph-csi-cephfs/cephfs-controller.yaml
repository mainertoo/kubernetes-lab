apiVersion: apps/v1
kind: Deployment
metadata:
  name: csi-cephfsplugin-provisioner
  namespace: ceph-csi
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: csi-cephfsplugin-provisioner
  template:
    metadata:
      labels:
        app: csi-cephfsplugin-provisioner
    spec:
      serviceAccountName: cephfs-csi-provisioner
      containers:
        # ---- Main CephFS CSI controller ----
        - name: csi-cephfsplugin
          image: quay.io/cephcsi/cephcsi:v3.17.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add: ["SYS_ADMIN"]
          args:
            - "--nodeid=$(NODE_ID)"
            - "--type=cephfs"
            - "--controllerserver=true"
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--csi-addons-endpoint=$(CSI_ADDONS_ENDPOINT)"
            - "--v=5"
            - "--drivername=cephfs.csi.ceph.com"
            - "--enableprofiling=false"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: CSI_ADDONS_ENDPOINT
              value: unix:///csi/csi-addons.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: ceph-config
              mountPath: /etc/ceph/
            - name: ceph-csi-config
              mountPath: /etc/ceph-csi-config/
            - name: ceph-csi-encryption-kms-config
              mountPath: /etc/ceph-csi-encryption-kms-config/
            # 🔴 This is the critical mount for keyfiles
            - name: keys-tmp-dir
              mountPath: /tmp/csi/keys

        # ---- Sidecars ----
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v6.3.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=2"
            - "--feature-gates=Topology=true"
            - "--leader-election=true"
            # - "--leader-election-namespace=ceph-csi"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v2.1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=2"
            - "--leader-election=true"
            # - "--leader-election-namespace=ceph-csi"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.6.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=2"
            - "--leader-election=true"
            # - "--leader-election-namespace=ceph-csi"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: liveness-prometheus
          image: quay.io/cephcsi/cephcsi:v3.17.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          args:
            - "--type=liveness"
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--metricsport=8680"
            - "--metricspath=/metrics"
            - "--polltime=60s"
            - "--timeout=3s"
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v4.12.0
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=2"
            - "--leader-election=true"
            # - "--leader-election-namespace=ceph-csi"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: ceph-config
          hostPath:
            path: /etc/ceph
            type: DirectoryOrCreate
        - name: ceph-csi-config
          configMap:
            name: ceph-csi-config
        - name: ceph-csi-encryption-kms-config
          configMap:
            name: ceph-csi-encryption-kms-config
        # 🔴 This ensures /tmp/csi/keys exists and is writable
        - name: keys-tmp-dir
          emptyDir: {}