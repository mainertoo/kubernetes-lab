apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cephfs-csi-node-reader
  labels:
    app.kubernetes.io/name: cephfs-csi-rbac-fix
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cephfs-csi-node-reader-binding
  labels:
    app.kubernetes.io/name: cephfs-csi-rbac-fix
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cephfs-csi-node-reader
subjects:
  - kind: ServiceAccount
    name: cephfs-csi-provisioner
    namespace: ceph-csi