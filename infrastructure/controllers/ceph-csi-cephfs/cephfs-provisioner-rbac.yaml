kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cephfs-csi-provisioner
rules:
  # Core PVC / PV / SC management
  - apiGroups: [""]
    resources:
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - update
      - patch
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - persistentvolumeclaims/status
    verbs:
      - get
      - list
      - watch
      - update
      - patch

  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch

  # Secrets (for Ceph credentials)
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch

  # VolumeAttachments (publish / unpublish)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - volumeattachments
    verbs:
      - get
      - list
      - watch
      - update
      - patch

  # Nodes / CSINodes / CSIDrivers (some sidecars look at these)
  - apiGroups: [""]
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csinodes
      - csidrivers
    verbs:
      - get
      - list
      - watch

  # Events
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - list
      - watch
      - create
      - update
      - patch

  # Snapshot APIs (harmless if you don’t use them, but standard)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotcontents
      - volumesnapshotclasses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots/status
      - volumesnapshotcontents/status
    verbs:
      - update
      - patch

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cephfs-csi-provisioner
subjects:
  - kind: ServiceAccount
    name: cephfs-csi-provisioner
    namespace: ceph-csi
roleRef:
  kind: ClusterRole
  name: cephfs-csi-provisioner
  apiGroup: rbac.authorization.k8s.io
