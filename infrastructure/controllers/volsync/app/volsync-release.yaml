apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: 0.18.5
      sourceRef:
        kind: HelmRepository
        name: perfectra1n-volsync
        namespace: volsync-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    manageCRDs: true
    # Phase 6 of the Kopia transition (2026-05-18). Lifted from 0 → 1 after
    # all 70 PVCs cut over to backup-engine=kopia (zero remaining on Restic).
    # Kopia is concurrent-multi-writer per [[feedback_kopia_vs_restic_shared_repo]]
    # so the 70 simultaneous initial backups won't lock-contend the way Restic
    # did in the 2026-05-17 storm. Restic-related circuit-breaker reasoning
    # for keeping this at 0 (see git history) no longer applies — both
    # Restic policy and pvc-plumber-restic are slated for Phase 7 decom.
    replicaCount: 1
    metrics:
      disableAuth: true
    # Perfectra1n image overrides — pattern from mitchross's values.yaml.
    # All movers point at the same fork image. Chart 0.18.5 / image v0.17.11
    # is the last-verified-working combination per mitchross's notes.
    image: &volsyncImage
      repository: ghcr.io/perfectra1n/volsync
      tag: v0.17.11
    kopia: *volsyncImage
    rclone: *volsyncImage
    restic: *volsyncImage
    rsync: *volsyncImage
    rsync-tls: *volsyncImage
    syncthing: *volsyncImage
  targetNamespace: volsync-system
