# Periodic maintenance for the shared Kopia repo at the BUCKET ROOT
# (`s3://garage.lab.mainertoo.com`, bucket `volsync-kopia`). The repo moved
# from the `volsync-kopia/` prefix to the root in the oracle-prefix-mismatch
# fix (docs/volsync-kopia-oracle-prefix-mismatch.md) so movers + maintenance
# + the pvc-plumber oracle all converge on one repo. The old prefixed repo is
# a frozen manual-restore-only archive and intentionally gets no maintenance.
#
# WHY: every backup adds index entries; over time the index fragments into
# many small blobs. Without `kopia maintenance run`, snapshot operations
# scan more and more index blobs and slow down. Healthy is ~10–100 blobs;
# the mover log warned at 1128. Maintenance is repo-wide, so one CR
# covers the whole fleet.
#
# Schedule: daily 09:00 UTC — clear of the 01:30–08:00 backup/kopia/CNPG
# band (see docs/backup-architecture.md §8). Maintenance jobs run a few
# minutes and then exit.
#
# The job uses Secret `volsync-kopia-maintenance` in this namespace for
# the repo connection (same shared creds as every per-PVC `volsync-<pvc>`
# Secret — KOPIA_REPOSITORY / KOPIA_PASSWORD / KOPIA_S3_* / AWS_*).
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: volsync-kopia-shared
  namespace: volsync-system
spec:
  repository:
    repository: volsync-kopia-maintenance
  # NOTE: the cron must be set on the TOP-LEVEL `spec.schedule`, NOT on
  # `spec.trigger.schedule`. The CRD's defaulting webhook fills
  # `spec.schedule` with `0 2 * * *` when absent — and the controller
  # treats the top-level schedule and `spec.trigger` as mutually
  # exclusive (PR #572 hit this: `spec.trigger.schedule` was set, the
  # defaulter still wrote `spec.schedule: "0 2 * * *"`, and the live
  # cron used the defaulted one). Set top-level here so the value is
  # authoritative.
  schedule: "0 9 * * *"
