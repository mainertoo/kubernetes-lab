# volsync-restic-forget — single nightly writer that applies the cluster's
# restic retention policy against the shared repo. Replaces the per-mover
# `retain:` block that used to live in the Kyverno-generated RS (rule 6 of
# ClusterPolicy/volsync-pvc-backup-restore). See that policy's annotation
# comment for the why.
#
# Retention: 24 hourly · 7 daily · 4 weekly · 3 monthly per tag.
# `--group-by tag` makes restic apply the policy independently per
# `<ns>/<pvc>` tag — each app gets its own retention window even though
# they all share one repo.
#
# `--prune` runs the repack/garbage-collection at the end. Skipped if
# `forget` decided nothing was removable (restic handles that internally).
#
# Schedule: 03:30 UTC daily — after the 02:XX daily-backup wave (per
# ClusterPolicy schedule formula) and before the 04:00 hourly tick of
# any namespace whose `length % 60` lands in the 03-04 window. Single
# writer, no contention with the mover backup-only operations (which
# only take shared/reader locks).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: volsync-restic-forget
  namespace: volsync-system
spec:
  schedule: "30 3 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: volsync-restic-forget
            app.kubernetes.io/component: retention
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: restic-forget
              image: restic/restic:0.18.0
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  echo "=== unlock stale locks (idempotent) ==="
                  restic unlock --remove-all
                  echo "=== forget per-tag retention ==="
                  restic forget \
                    --group-by tag \
                    --keep-hourly 24 \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 3 \
                    --prune
                  echo "=== summary ==="
                  restic snapshots --compact --group-by tag | tail -50
              envFrom:
                - secretRef:
                    name: pvc-plumber-restic-creds
              env:
                - name: AWS_EC2_METADATA_DISABLED
                  value: "true"
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: cache
                  mountPath: /.cache
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            - name: cache
              emptyDir:
                sizeLimit: 5Gi
