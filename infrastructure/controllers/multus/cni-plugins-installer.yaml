apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k3s-cni-plugins-installer
  namespace: kube-system
  labels:
    app: k3s-cni-plugins-installer
spec:
  selector:
    matchLabels:
      app: k3s-cni-plugins-installer
  template:
    metadata:
      labels:
        app: k3s-cni-plugins-installer
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-plugins
          image: ghcr.io/containernetworking/plugins:v1.5.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -eux

              K3S_DATA="/host/var/lib/rancher/k3s/data"
              test -d "${K3S_DATA}"

              # Resolve k3s current dir to the real hash dir (current is usually a symlink)
              CUR="$(readlink -f "${K3S_DATA}/current" 2>/dev/null || true)"
              if [ -n "${CUR}" ] && [ -d "${CUR}/bin" ]; then
                BIN="${CUR}/bin"
              else
                BIN="$(ls -d1 ${K3S_DATA}/*/bin 2>/dev/null | sort | tail -n1 || true)"
              fi
              test -n "${BIN}"
              mkdir -p "${BIN}"

              # Also populate /opt/cni/bin
              OPT="/host/opt/cni/bin"
              mkdir -p "${OPT}"

              # Plugins shipped in this image live in /opt/cni/bin inside the container
              SRC="/opt/cni/bin"

              # Install what we need (macvlan is the big one)
              for p in macvlan host-local loopback ptp bridge tuning; do
                if [ -x "${SRC}/${p}" ]; then
                  install -m 0755 "${SRC}/${p}" "${BIN}/${p}"
                  install -m 0755 "${SRC}/${p}" "${OPT}/${p}"
                fi
              done

              echo "Installed plugins into k3s bin:"
              ls -la "${BIN}" | egrep " macvlan$| host-local$| loopback$| ptp$| bridge$| tuning$" || true

              echo "Installed plugins into /opt/cni/bin:"
              ls -la "${OPT}" | egrep " macvlan$| host-local$| loopback$| ptp$| bridge$| tuning$" || true
          volumeMounts:
            - name: k3s-data
              mountPath: /host/var/lib/rancher/k3s/data
            - name: opt-cni
              mountPath: /host/opt/cni/bin
      containers:
        - name: pause
          image: alpine:3.20
          command: ["/bin/sh","-lc"]
          args: ["sleep infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
      volumes:
        - name: k3s-data
          hostPath:
            path: /var/lib/rancher/k3s/data
            type: Directory
        - name: opt-cni
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate