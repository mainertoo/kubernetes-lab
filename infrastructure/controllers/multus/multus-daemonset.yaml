apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        # Install multus binary into BOTH:
        #  - /opt/cni/bin (common)
        #  - /var/lib/rancher/k3s/data/cni (required for k3s; fixes "failed to find plugin multus" error)
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -eu

              SRC="/usr/src/multus-cni/bin/multus"
              if [ ! -f "${SRC}" ]; then
                echo "ERROR: multus binary not found at ${SRC}"
                ls -la /usr/src/multus-cni/bin || true
                exit 1
              fi

              # Targets
              OPT_DIR="/host/opt/cni/bin"
              K3S_DIR="/host/var/lib/rancher/k3s/data/cni"

              mkdir -p "${OPT_DIR}" "${K3S_DIR}"

              cp -f "${SRC}" "${OPT_DIR}/multus"
              chmod 0755 "${OPT_DIR}/multus"

              cp -f "${SRC}" "${K3S_DIR}/multus"
              chmod 0755 "${K3S_DIR}/multus"

              echo "Installed multus to:"
              ls -la "${OPT_DIR}/multus" || true
              ls -la "${K3S_DIR}/multus" || true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
            - name: k3s-cnibin
              mountPath: /host/var/lib/rancher/k3s/data/cni

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          command: ["/thin_entrypoint"]
          args:
            - --multus-conf-file=auto
            # k3s: point at the k3s CNI conf dir where 10-flannel.conflist lives
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate

        # k3s "CNI config" dir (conflist lives here)
        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate

        # k3s "CNI bin" dir (kubelet searches here in your error)
        - name: k3s-cnibin
          hostPath:
            path: /var/lib/rancher/k3s/data/cni
            type: DirectoryOrCreate