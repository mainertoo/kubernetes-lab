apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        # 1) Install multus into /opt/cni/bin using the image's supported installer (NO /bin/sh in this image)
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/install_multus"]
          args: ["--type", "thin"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin

        # 2) Ensure k3s finds multus in /var/lib/rancher/k3s/data/current/bin
        #    (We avoid node-level /etc/rancher edits by doing this declaratively.)
        - name: link-multus-into-k3s-bin
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -eux

              SRC="/host/opt/cni/bin/multus"
              test -x "${SRC}"

              K3S_BIN="/host/var/lib/rancher/k3s/data/current/bin"
              mkdir -p "${K3S_BIN}"

              # Prefer symlink; fall back to copy
              ln -sf "${SRC}" "${K3S_BIN}/multus" || cp -f "${SRC}" "${K3S_BIN}/multus"
              chmod 0755 "${K3S_BIN}/multus"

              echo "Installed/linked multus:"
              ls -la "${SRC}"
              ls -la "${K3S_BIN}/multus"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
            - name: k3s-data
              mountPath: /host/var/lib/rancher/k3s/data

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/thin_entrypoint"]
          args:
            - --multus-conf-file=auto
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d

            # Tell multus where to look for plugins on k3s.
            # This path is written into generated config (binDir).
            - --cni-bin-dir=/host/var/lib/rancher/k3s/data/current/bin
            - --additional-bin-dir=/var/lib/rancher/k3s/data/current/bin

            - --multus-master-cni-file-name=10-flannel.conflist
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - name: k3s-data
              mountPath: /host/var/lib/rancher/k3s/data
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate
        - name: k3s-data
          hostPath:
            path: /var/lib/rancher/k3s/data
            type: DirectoryOrCreate
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate