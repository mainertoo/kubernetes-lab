apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  # Multus must be able to read pods/nodes/namespaces to resolve
  # annotations and attach networks.
  - apiGroups: [""]
    resources:
      - pods
      - pods/status
      - nodes
      - namespaces
      - events
    verbs: ["get", "list", "watch"]

  # NetworkAttachmentDefinitions CRD
  - apiGroups: ["k8s.cni.cncf.io"]
    resources:
      - network-attachment-definitions
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        # This installs the multus binary into /opt/cni/bin on the host
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/install_multus"]
          args: ["--type","thin"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin

        # This links/copies multus into the *actual* k3s hash bin dir (not /current/bin)
        - name: link-multus-into-k3s-bin
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -eux

              SRC="/host/opt/cni/bin/multus"
              test -x "${SRC}"

              K3S_DATA="/host/var/lib/rancher/k3s/data"
              test -d "${K3S_DATA}"

              CUR="$(readlink -f "${K3S_DATA}/current" 2>/dev/null || true)"
              if [ -n "${CUR}" ] && [ -d "${CUR}/bin" ]; then
                BIN="${CUR}/bin"
              else
                BIN="$(ls -d1 ${K3S_DATA}/*/bin 2>/dev/null | sort | tail -n1 || true)"
              fi
              test -n "${BIN}"
              mkdir -p "${BIN}"

              ln -sf "${SRC}" "${BIN}/multus" || cp -f "${SRC}" "${BIN}/multus"
              chmod 0755 "${BIN}/multus"

              ls -la "${BIN}/multus" || true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: k3s-data
              mountPath: /host/var/lib/rancher/k3s/data
            - name: cnibin
              mountPath: /host/opt/cni/bin

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/thin_entrypoint"]
          args:
            - --multus-conf-file=auto
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            # IMPORTANT: do not rely on /current/bin existing as a directory;
            # multus will still work if additional-bin-dir points at /opt/cni/bin.
            - --cni-bin-dir=/host/opt/cni/bin
            - --additional-bin-dir=/host/var/lib/rancher/k3s/data/current/bin
            - --multus-master-cni-file-name=10-flannel.conflist
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - name: k3s-data
              mountPath: /host/var/lib/rancher/k3s/data
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate
        - name: k3s-data
          hostPath:
            path: /var/lib/rancher/k3s/data
            type: DirectoryOrCreate
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate