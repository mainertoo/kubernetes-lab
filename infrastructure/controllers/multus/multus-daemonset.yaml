apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        # Install the multus binary into the host CNI bin directory.
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          command: ["/usr/src/multus-cni/bin/install_multus"]
          args:
            - --type
            - thin
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          # Run the multus daemon directly (NOT /entrypoint.sh, which doesn't exist in this image)
          command: ["/usr/src/multus-cni/bin/multus"]
          args:
            - --multus-conf-file=auto
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            # Optional but helpful for some setups:
            - --multus-master-cni-file-name=10-flannel.conflist
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            # k3s CNI config dir (where 10-flannel.conflist lives)
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            # host /etc/cni/net.d (multus.d and generated confs may be written here)
            - name: etc-cniconf
              mountPath: /host/etc/cni/net.d
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate
        - name: etc-cniconf
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate