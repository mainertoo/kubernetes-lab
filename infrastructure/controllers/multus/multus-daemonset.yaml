apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -eux

              SRC="/usr/src/multus-cni/bin/multus"
              test -f "${SRC}"

              # k3s CNI bin dir (THIS is what kubelet uses in k3s)
              K3S_BIN_DIR="/host/var/lib/rancher/k3s/data/current/bin"
              mkdir -p "${K3S_BIN_DIR}"
              install -m 0755 "${SRC}" "${K3S_BIN_DIR}/multus"

              # Optional: also place in /opt/cni/bin for compatibility/debug
              OPT_DIR="/host/opt/cni/bin"
              mkdir -p "${OPT_DIR}"
              install -m 0755 "${SRC}" "${OPT_DIR}/multus"

              echo "Installed multus to:"
              ls -la "${K3S_BIN_DIR}/multus" || true
              ls -la "${OPT_DIR}/multus" || true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: k3s-bin
              mountPath: /host/var/lib/rancher/k3s/data/current/bin
            - name: cnibin
              mountPath: /host/opt/cni/bin

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/thin_entrypoint"]
          args:
            - --multus-conf-file=auto

            # k3s CNI config dir (where 10-flannel.conflist lives)
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d

            # Tell multus where plugins live on k3s
            - --cni-bin-dir=/host/var/lib/rancher/k3s/data/current/bin
            # Write binDir into generated multus config so it matches k3s
            - --additional-bin-dir=/var/lib/rancher/k3s/data/current/bin

            # Be explicit: delegate from flannel
            - --multus-master-cni-file-name=10-flannel.conflist

            # Optional: keep flannel file as-is (safer on k3s)
            - --rename-conf-file=false
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - name: k3s-bin
              mountPath: /host/var/lib/rancher/k3s/data/current/bin
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate
        - name: k3s-bin
          hostPath:
            path: /var/lib/rancher/k3s/data/current/bin
            type: DirectoryOrCreate
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate