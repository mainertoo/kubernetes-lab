apiVersion: v1
kind: ServiceAccount
metadata:
  name: multus
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multus
subjects:
  - kind: ServiceAccount
    name: multus
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    app: multus
spec:
  selector:
    matchLabels:
      app: multus
  template:
    metadata:
      labels:
        app: multus
    spec:
      hostNetwork: true
      serviceAccountName: multus
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists

      initContainers:
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -eux

              SRC="/usr/src/multus-cni/bin/multus"

              # Standard CNI bin dir
              OPT_DIR="/host/opt/cni/bin"
              mkdir -p "${OPT_DIR}"
              install -m 0755 "${SRC}" "${OPT_DIR}/multus"
              ls -la "${OPT_DIR}/multus" || true

              # --- k3s specific ---
              # On k3s, /var/lib/rancher/k3s/data/cni is a REAL directory and contains symlinks
              # like "bridge -> /var/lib/rancher/k3s/data/<hash>/bin/cni".
              # We resolve the symlink target of "cni" and install multus into that real directory.
              K3S_CNI_LINK_DIR="/host/var/lib/rancher/k3s/data/cni"

              if [ ! -d "${K3S_CNI_LINK_DIR}" ]; then
                echo "ERROR: ${K3S_CNI_LINK_DIR} does not exist or is not a directory"
                ls -la /host/var/lib/rancher/k3s/data || true
                exit 1
              fi

              # Resolve the real target behind /var/lib/rancher/k3s/data/cni/cni
              # (this points to .../data/<hash>/bin/cni)
              REAL_K3S_CNI_DIR="$(readlink -f "${K3S_CNI_LINK_DIR}/cni")"

              if [ -z "${REAL_K3S_CNI_DIR}" ] || [ ! -d "${REAL_K3S_CNI_DIR}" ]; then
                echo "ERROR: could not resolve real k3s CNI dir from ${K3S_CNI_LINK_DIR}/cni"
                ls -la "${K3S_CNI_LINK_DIR}" || true
                exit 1
              fi

              install -m 0755 "${SRC}" "${REAL_K3S_CNI_DIR}/multus"

              echo "Installed multus to REAL k3s CNI dir:"
              echo "  ${REAL_K3S_CNI_DIR}/multus"
              ls -la "${REAL_K3S_CNI_DIR}/multus" || true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
            - name: k3s-data-cni
              mountPath: /host/var/lib/rancher/k3s/data/cni

      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.0.2
          securityContext:
            privileged: true
          command: ["/thin_entrypoint"]
          args:
            - --multus-conf-file=auto
            - --multus-autoconfig-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - --cni-conf-dir=/host/var/lib/rancher/k3s/agent/etc/cni/net.d
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: k3s-cniconf
              mountPath: /host/var/lib/rancher/k3s/agent/etc/cni/net.d
            - name: cnibin
              mountPath: /host/opt/cni/bin

      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate

        - name: k3s-cniconf
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/cni/net.d
            type: DirectoryOrCreate

        # IMPORTANT: mount the k3s CNI symlink directory (always a real directory)
        - name: k3s-data-cni
          hostPath:
            path: /var/lib/rancher/k3s/data/cni
            type: Directory