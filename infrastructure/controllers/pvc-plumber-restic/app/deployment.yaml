apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber-restic
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: pvc-plumber-restic
    app.kubernetes.io/component: backup-existence-oracle
    app.kubernetes.io/part-of: volsync-shared
spec:
  # Shadow phase: single replica. Phase 4+ may scale up if admission
  # traffic warrants; the cache layer is per-pod so HA replicas add
  # capacity but not durability.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber-restic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber-restic
        app.kubernetes.io/component: backup-existence-oracle
        app.kubernetes.io/part-of: volsync-shared
    spec:
      serviceAccountName: pvc-plumber-restic
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pvc-plumber
          image: ghcr.io/mainertoo/pvc-plumber-restic:sha-1e3bff9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Shadow phase: HTTP-only mode (no admission webhooks, no
            # controller-runtime manager). Webhooks land in Phase 4
            # when Kyverno policies are wired up.
            - name: BACKEND_TYPE
              value: restic-s3
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: info
            # CACHE_TTL omitted — image sha-1e3bff9+ defaults it to
            # RE_WARM_INTERVAL so entries stay valid between re-warms
            # (was 60s here, which left a 4-min cold-cache gap and was
            # the trigger for the issue #1 503 storm).
            - name: RE_WARM_INTERVAL
              value: 5m
            # HTTP_TIMEOUT, HEALTH_CHECK_TIMEOUT, RESTIC_MAX_CONCURRENCY
            # left at image defaults (30s, 15s, 2 respectively as of
            # sha-1e3bff9). Override here if cluster behavior diverges.
            - name: RESTIC_CREDENTIALS_PATH
              value: /var/secret/pvc-plumber-restic
            - name: RESTIC_CACHE_DIR
              value: /var/cache/restic
            - name: RESTIC_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-restic-creds
                  key: RESTIC_REPOSITORY
          volumeMounts:
            - name: creds
              mountPath: /var/secret/pvc-plumber-restic
              readOnly: true
            - name: restic-cache
              mountPath: /var/cache/restic
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: creds
          secret:
            secretName: pvc-plumber-restic-creds
            items:
              # Each Secret key becomes one file under
              # /var/secret/pvc-plumber-restic — the DirCredentialsSource
              # loader reads RESTIC_PASSWORD + AWS_ACCESS_KEY_ID +
              # AWS_SECRET_ACCESS_KEY at every restic subprocess call.
              - key: RESTIC_PASSWORD
                path: RESTIC_PASSWORD
              - key: AWS_ACCESS_KEY_ID
                path: AWS_ACCESS_KEY_ID
              - key: AWS_SECRET_ACCESS_KEY
                path: AWS_SECRET_ACCESS_KEY
        - name: restic-cache
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
