apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ceph-dashboard
  namespace: ceph-dashboard
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Ceph Dashboard"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/href: "https://ceph.lab.mainertoo.com"
    gethomepage.dev/icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/ceph.svg"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ceph.lab.mainertoo.com`)
      kind: Rule
      # SSO is handled by oauth2-proxy (OIDC against Authentik), which proxies
      # to the ceph-dashboard Service and injects X-Access-Token for the
      # dashboard's oauth2 SSO mode. Do NOT also add the authentik-sso
      # forward-auth middleware here — that would double-authenticate.
      services:
        - name: oauth2-proxy
          port: 4180
  tls: {}