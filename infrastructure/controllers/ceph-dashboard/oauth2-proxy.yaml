apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: ceph-dashboard
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
          args:
            - --alpha-config=/etc/oauth2-proxy/config/oauth2-proxy.yaml
          env:
            # Non-alpha options (alpha config only covers providers/upstreams/
            # injectRequestHeaders/server). These are general/cookie options.
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
            - name: OAUTH2_PROXY_EMAIL_DOMAINS
              value: "*"
            - name: OAUTH2_PROXY_REDIRECT_URL
              value: "https://ceph.lab.mainertoo.com/oauth2/callback"
            - name: OAUTH2_PROXY_COOKIE_SECURE
              value: "true"
            - name: OAUTH2_PROXY_REVERSE_PROXY
              value: "true"
            # Skip oauth2-proxy's own sign-in page; bounce straight to Authentik.
            - name: OAUTH2_PROXY_SKIP_PROVIDER_BUTTON
              value: "true"
          ports:
            - name: http
              containerPort: 4180
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy/config
              readOnly: true
            - name: secret
              mountPath: /etc/oauth2-proxy/secret
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-config
        - name: secret
          secret:
            secretName: oauth2-proxy-secret
            items:
              - key: client-secret
                path: client-secret
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: ceph-dashboard
  labels:
    app: oauth2-proxy
spec:
  type: ClusterIP
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
