apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: ceph-dashboard
data:
  # oauth2-proxy alpha config (the only place injectRequestHeaders is supported).
  # Non-alpha options (cookie-secret, email-domains, redirect-url, …) come from
  # env vars on the Deployment. clientSecret is mounted from the SOPS secret.
  oauth2-proxy.yaml: |
    upstreamConfig:
      upstreams:
        - id: ceph-dashboard
          path: /
          uri: https://ceph-dashboard.ceph-dashboard.svc.cluster.local:8443
          insecureSkipTLSVerify: true
    # The ceph dashboard (Tentacle oauth2 SSO) reads the JWT from a cookie named
    # `token` or the header `X-Access-Token`, then decodes sub/name/email/iat/roles.
    # oauth2-proxy injects the OIDC id_token under that exact header name.
    # v7.14+ requires header values nested under `claimSource:`.
    injectRequestHeaders:
      - name: X-Access-Token
        values:
          - claimSource:
              claim: id_token
    providers:
      - id: authentik
        provider: oidc
        clientID: AccHvipbyqG5ZNFeXfrgTbqHjXdckA2IPLsuXJgJ
        clientSecretFile: /etc/oauth2-proxy/secret/client-secret
        scope: "openid profile email roles"
        oidcConfig:
          issuerURL: https://authentik.lab.mainertoo.com/application/o/ceph-dashboard/
          userIDClaim: sub
          emailClaim: email
    server:
      BindAddress: 0.0.0.0:4180
