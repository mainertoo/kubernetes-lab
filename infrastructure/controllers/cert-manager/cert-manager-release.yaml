apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: cert-manager
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: v1.20.3
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    installCRDs: true

    # Expose controller + webhook metrics via a ServiceMonitor so the
    # kube-prometheus-stack Prometheus scrapes them. Powers cert-expiry
    # alerts and the cert-manager Grafana dashboard.
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true

    # Controller (issues certs, talks to ACME)
    replicaCount: 2
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: cert-manager
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/component: controller

    # Webhook (admission validation for Issuer/Certificate/etc.)
    webhook:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: webhook
              app.kubernetes.io/instance: cert-manager
              app.kubernetes.io/component: webhook

    # CA injector (injects CA bundles into webhooks/APIServices)
    cainjector:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cainjector
              app.kubernetes.io/instance: cert-manager
              app.kubernetes.io/component: cainjector
