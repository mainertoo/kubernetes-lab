---
# Flux source for the Firecrawl Helm chart. Firecrawl does not publish its
# chart to a Helm/OCI registry we trust — the chart lives in-tree under
# examples/kubernetes/firecrawl-helm — so we vendor it via a GitRepository
# pinned to a commit. The HelmRelease (apps/base/firecrawl) references this
# source by path.
#
# Pinned to a commit (not a branch) for reproducibility; bump deliberately.
# The whole repo is fetched (no ignore filter) so the chart path is always
# present — correctness over artifact size.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: firecrawl
  namespace: flux-system
spec:
  interval: 12h
  url: https://github.com/firecrawl/firecrawl
  ref:
    commit: 44a6a1665e6ecb565c16a05b25719b377c45c0c5
