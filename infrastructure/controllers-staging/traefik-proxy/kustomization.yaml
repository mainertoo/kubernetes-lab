apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik-system
resources:
  - repository.yaml
  - release.yaml
  - traefik-namespace.yaml
  # tlsstore-default.yaml intentionally NOT here. Traefik's TLSStore CRD
  # ships with the Helm chart, but kustomize-controller's server-side
  # dry-run for THIS Kustomization runs before helm-controller installs
  # the chart, so a TLSStore CR colocated here deadlocks the
  # Kustomization with "no matches for kind TLSStore". The TLSStore
  # lives in infrastructure/configs/cert-manager/staging/ alongside the
  # wildcard Certificate, whose Flux Kustomization dependsOn this one.
configMapGenerator:
  - name: traefik-values
    files:
      - values.yaml=traefik-values.yaml
configurations:
  - kustomizeconfig.yaml
