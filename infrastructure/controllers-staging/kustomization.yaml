apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Bare-minimum controller set for the staging cluster. Staging is a
# testbed, not a clone — add specific controllers from
# ../controllers/<name> as the apps you opt into staging actually need
# them.
#
# Currently shipping:
#   - cert-manager  — required for the staging LE issuer + any cert
#                     resources apps bring along
#
# Deliberately NOT in staging yet (add later when needed):
#   - traefik-proxy / snapshot-controller / volsync / kyverno / cnpg /
#     ceph-csi-* / cloudflared / newt / tailscale-operator / intel-gpu /
#     pvc-plumber / kube-prometheus-stack / etc.
#
# Most omitted controllers either bring CRDs whose CRs are referenced
# elsewhere in the same Kustomization (chicken-and-egg dry-run failure
# on first reconcile) or are production-singletons (one tunnel/oauth
# per homelab).
resources:
  - ../controllers/cert-manager
