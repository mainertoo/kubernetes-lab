apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Bare-minimum controller set for the staging cluster. Staging is a
# testbed, not a clone — add specific controllers from
# ../controllers/<name> (shared) or ./controllers-staging/<name>/
# (staging-specific) as the apps you opt into staging actually need
# them.
#
# Currently shipping:
#   - cert-manager   — shared with production (../controllers/cert-manager).
#                      Pairs with infrastructure/configs/cert-manager/staging/
#                      which adds the LE-staging ClusterIssuer + the
#                      *.staging.mainertoo.com wildcard Certificate.
#   - traefik-proxy  — staging-specific (./traefik-proxy/). Uses
#                      the staging wildcard cert; no Authentik
#                      middleware, no PVE file provider.
#   - ceph-csi-rbd   — RBD CSI driver via the shared, cluster-agnostic
#                      manifests (../controllers/ceph-csi-base +
#                      ceph-csi-rbd; same Ceph cluster as production). The
#                      StorageClass is staging-specific (./storage/ceph-rbd/)
#                      and points at the dedicated, quota'd `staging-rbd`
#                      pool through a cephx user scoped to that pool only —
#                      isolated from production's k3s-rbd.
#
# Deliberately NOT in staging yet (add later when needed):
#   - newt           — pangolin tunnel client for external access at
#                      *.staging.mainertoo.com. Needs a fresh pangolin
#                      client registration; follow-up PR once you have
#                      the secret.
#   - cephfs / snapshot-controller / volsync / kyverno / cnpg /
#     cloudflared / tailscale-operator / intel-gpu / pvc-plumber /
#     kube-prometheus-stack / etc.
resources:
  - ../controllers/cert-manager
  - ./traefik-proxy
  # Ceph RBD storage — shared driver manifests + staging-only StorageClass.
  - ../controllers/ceph-csi-base
  - ../controllers/ceph-csi-rbd
  - ./storage/ceph-rbd
  # Multus (rke2-multus chart) — STAGED, NOT YET ACTIVE. The manifests live in
  # ./multus/ for review; uncommenting the line below DEPLOYS Multus to staging
  # (Phase 1 of docs/multus-ha-failover-runbook.md). Only do so after backing up
  # 10-flannel.conflist on each node and having the node-level rollback ready.
  # - ./multus
