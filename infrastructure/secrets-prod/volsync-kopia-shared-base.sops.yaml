# Canonical shared Kopia repository credentials for the volsync label-driven
# backup project. Mirrors the role volsync-shared-base played for restic.
#
# Consumed by:
#   1. Phase 1b one-shot init + smoketest Job (apps/archive/05-volsync-kopia-
#      init-smoketest.yaml), via secretKeyRef on the Job container env.
#   2. Phase 2 pvc-plumber-kopia deployment (infrastructure/controllers/pvc-
#      plumber/deployment.yaml), via volumeMount of a same-content Secret in
#      volsync-system namespace (cross-namespace reference is not allowed for
#      mounts, so Phase 2 will either render a duplicate Secret in
#      volsync-system OR adopt mitchross's pattern of a separate creds
#      bundle there).
#   3. Phase 3 Kyverno ClusterPolicy volsync-pvc-backup-restore-kopia, which
#      reads from this Secret at admission time via apiCall to populate the
#      per-PVC volsync-<pvc> Secret in each app's namespace.
#
# Bucket name + S3 endpoint are NOT in this Secret — those are plain config
# values, not credentials. They live as env vars in the consumer manifests:
#   KOPIA_S3_ENDPOINT=garage.lab.mainertoo.com
#   KOPIA_S3_BUCKET=volsync-kopia
#   KOPIA_S3_DISABLE_TLS=false  (Garage is HTTPS via Traefik)
#
# Region: AWS_DEFAULT_REGION=us-west-1 matches the existing volsync-shared-
# base + volsync-garage configs; Garage doesn't actually care about region
# but the AWS SDK requires the env var to be present.
#
# How to fill in the values BEFORE committing:
#   1. Replace <PASTE_*> placeholders with actual values from 1Password /
#      Garage admin (kopia master password, Garage IAM access-key, Garage
#      IAM secret-key).
#   2. Save in VS Code — the .sops.yaml extension matches the
#      .sops.yaml encryption regex in .sops.yaml at repo root, so VS Code
#      auto-encrypts on save (per project memory feedback re: SOPS workflow).
#   3. Verify encryption: `head -30` should show all the values as
#      ENC[AES256_GCM,...] blobs, not plaintext.
