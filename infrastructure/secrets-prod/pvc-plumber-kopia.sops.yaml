# pvc-plumber-kopia — operator-side mount of the Kopia repo creds.
# Mirrors the 3 cred keys from volsync-kopia-shared-base (in flux-system),
# but lives in volsync-system because k8s Secret mounts must be same-ns.
#
# Consumed by infrastructure/controllers/pvc-plumber/deployment.yaml at
# /var/secret/pvc-plumber-kopia (each key becomes a file at mode 0440).
# The operator reads creds from disk on each kopia subprocess invocation
# (v3.1.0 lazy-credentials pattern — see deployment.yaml header comment
# for the v3.0.0 ES-race rationale).
#
# Rotation: change KOPIA_PASSWORD here AND in volsync-kopia-shared-base
# (flux-system) — same value, two encrypted blobs. The per-PVC
# volsync-<pvc> Secrets Kyverno generates for mover Jobs source from
# volsync-kopia-shared-base, not from this Secret. Drift between the
# two = the oracle and movers disagree on the password = bad.
