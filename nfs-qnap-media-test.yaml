apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-qnap-media-test
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-qnap-media
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nfs-qnap-media-tester
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "[init] $(date) writing to NFS..." ;
          mkdir -p /mnt/nfs/test ;
          echo "hello from NFS $(date)" > /mnt/nfs/test/hello.txt ;
          ls -R /mnt/nfs ;
          sleep 3600
      volumeMounts:
        - name: nfs-media
          mountPath: /mnt/nfs
  volumes:
    - name: nfs-media
      persistentVolumeClaim:
        claimName: nfs-qnap-media-test
  restartPolicy: Never
