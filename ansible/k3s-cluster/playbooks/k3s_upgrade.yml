---
# Cluster-agnostic K3s upgrade. Per-cluster k3s_version comes from
# inventory/<cluster>/group_vars/all.yml. Upgrades one node at a
# time (serial: 1), draining the node first and uncordoning after
# K3s restarts.
#
# Pre-flight checklist (do these manually before invoking):
#   - All volsync ReplicationSources show recent successful sync
#   - kubectl get pods -A --field-selector=status.phase!=Running shows nothing
#   - You've reviewed the Rancher support matrix for the target k3s_version

- name: Upgrade K3s masters (one at a time, drain then upgrade)
  hosts: master
  become: yes
  serial: 1
  max_fail_percentage: 0
  vars:
    first_master: "{{ groups['master'][0] }}"
    k3s_disable_args: "{{ k3s_disable | map('regex_replace', '^(.+)$', '--disable=\\1') | join(' ') }}"
    k3s_apiserver_args: "{{ k3s_apiserver_extra_args | join(' ') }}"
    k3s_node_name: "{{ ansible_hostname | default(inventory_hostname) }}"
  tasks:
    - name: Cordon the K3s node so new pods don't schedule here
      ansible.builtin.shell: |
        k3s kubectl cordon {{ k3s_node_name }}
      register: cordon
      changed_when: "'cordoned' in cordon.stdout"
      delegate_to: "{{ first_master }}"

    - name: Drain the K3s node (ignore daemonsets, delete emptyDir, force, disable eviction, 10 min timeout)
      # --disable-eviction=true uses the delete API instead of the
      # eviction API, which bypasses PodDisruptionBudgets. Required
      # for single-replica workloads with PDBs that would otherwise
      # block drain forever (e.g. CloudNativePG single-instance
      # clusters create a `<app>-db-primary` PDB with minAvailable=1
      # — uneviictable because there's no standby to keep the count
      # at 1 during eviction). On HA-replicated workloads (Traefik,
      # Flux controllers, MetalLB), drain still proceeds pod-by-pod
      # via delete; PDB bypass is moot because remaining replicas
      # are on other nodes. Discovered during Phase 5b production
      # upgrade 2026-05-22.
      ansible.builtin.shell: |
        k3s kubectl drain {{ k3s_node_name }} \
          --ignore-daemonsets \
          --delete-emptydir-data \
          --force \
          --disable-eviction=true \
          --timeout=600s
      register: drain
      changed_when: "'drained' in drain.stdout or 'evicted' in drain.stdout or 'deleted' in drain.stdout"
      delegate_to: "{{ first_master }}"

    - name: Upgrade K3s on master (pinned to k3s_version)
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        INSTALL_K3S_EXEC="server \
          --tls-san {{ kube_vip_ip }} \
          --write-kubeconfig-mode=644 \
          {{ k3s_disable_args }} \
          {{ k3s_apiserver_args }}" \
        sh -

    - name: Wait for k3s service to be active after upgrade
      ansible.builtin.systemd:
        name: k3s
        state: started
      register: k3s_svc
      retries: 30
      delay: 4
      until: k3s_svc is success

    - name: Wait for this node to report Ready against the API
      ansible.builtin.shell: |
        k3s kubectl get node {{ k3s_node_name }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 60
      delay: 5
      until: node_ready.stdout == "True"
      changed_when: false
      delegate_to: "{{ first_master }}"

    - name: Uncordon the K3s node
      ansible.builtin.shell: |
        k3s kubectl uncordon {{ k3s_node_name }}
      register: uncordon
      changed_when: "'uncordoned' in uncordon.stdout"
      delegate_to: "{{ first_master }}"


- name: Upgrade K3s workers (one at a time, drain then upgrade)
  hosts: worker
  become: yes
  serial: 1
  max_fail_percentage: 0
  vars:
    first_master: "{{ groups['master'][0] }}"
    k3s_node_name: "{{ ansible_hostname | default(inventory_hostname) }}"
  tasks:
    - name: Cordon the K3s worker
      ansible.builtin.shell: |
        k3s kubectl cordon {{ k3s_node_name }}
      register: cordon
      changed_when: "'cordoned' in cordon.stdout"
      delegate_to: "{{ first_master }}"

    - name: Drain the K3s worker (ignore daemonsets, delete emptyDir, force, disable eviction, 10 min timeout)
      # See the master-side drain task above for the rationale on
      # --disable-eviction. Same reasoning applies here, and the
      # worker plays are where the CNPG primary PDBs actually live.
      ansible.builtin.shell: |
        k3s kubectl drain {{ k3s_node_name }} \
          --ignore-daemonsets \
          --delete-emptydir-data \
          --force \
          --disable-eviction=true \
          --timeout=600s
      register: drain
      changed_when: "'drained' in drain.stdout or 'evicted' in drain.stdout or 'deleted' in drain.stdout"
      delegate_to: "{{ first_master }}"

    - name: Upgrade K3s agent on worker (pinned to k3s_version)
      # The K3s install script ALWAYS installs as server when K3S_URL is
      # unset — re-running without it on an existing agent installs a
      # broken k3s.service (server unit) alongside the running
      # k3s-agent.service and exits non-zero. Source the existing
      # /etc/systemd/system/k3s-agent.service.env into the remote shell
      # so K3S_URL + K3S_TOKEN are present in the installer's env. We
      # use `set -a` + `.` rather than parsing the file in Ansible
      # because the env file's values are single-quoted (systemd
      # convention) and re-emitting them through Jinja interpolation
      # corrupts the URL ("'https://…'" round-trips as a literal-
      # quoted string the K3s installer rejects → falls back to
      # server mode all over again). Sourcing inside the remote shell
      # also keeps the token off Ansible's variable tape.
      # (Lessons from the staging Phase 5 first + second runs on
      # 2026-05-21.)
      ansible.builtin.shell: |
        set -a
        . /etc/systemd/system/k3s-agent.service.env
        set +a
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -

    - name: Wait for k3s-agent service to be active after upgrade
      ansible.builtin.systemd:
        name: k3s-agent
        state: started
      register: k3s_agent_svc
      retries: 30
      delay: 4
      until: k3s_agent_svc is success

    - name: Wait for this worker to report Ready against the API
      ansible.builtin.shell: |
        k3s kubectl get node {{ k3s_node_name }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 60
      delay: 5
      until: node_ready.stdout == "True"
      changed_when: false
      delegate_to: "{{ first_master }}"

    - name: Uncordon the K3s worker
      ansible.builtin.shell: |
        k3s kubectl uncordon {{ k3s_node_name }}
      register: uncordon
      changed_when: "'uncordoned' in uncordon.stdout"
      delegate_to: "{{ first_master }}"

# K3s rewrites its bundled AddOn manifests (incl. CoreDNS) on upgrade, so re-derive the
# 2-replica HA override from the freshly-written manifest — otherwise CoreDNS would either
# revert to 1 replica or stay pinned to the pre-upgrade image. See docs/plans/coredns-ha.md.
- name: Re-apply CoreDNS HA override after upgrade
  hosts: master
  become: true
  tasks:
    - name: Re-derive coredns-ha.yaml from the post-upgrade bundled manifest
      ansible.builtin.import_tasks: tasks/coredns_ha.yml
