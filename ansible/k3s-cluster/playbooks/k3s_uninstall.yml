---
# Cluster-agnostic K3s uninstall. Tears down via the official K3s
# uninstall scripts so service units, data dirs, and CNI state get
# cleaned up — not just the binary.

- name: Uninstall K3s servers
  hosts: master
  become: yes
  tasks:
    - name: Run k3s-uninstall.sh
      ansible.builtin.shell: |
        k3s-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-uninstall.sh

- name: Uninstall K3s agents
  hosts: worker
  become: yes
  tasks:
    - name: Run k3s-agent-uninstall.sh
      ansible.builtin.shell: |
        k3s-agent-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-agent-uninstall.sh
