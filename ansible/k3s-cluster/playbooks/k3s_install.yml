---
# Play 1: Common prep on all nodes (masters + workers)
- name: Prepare nodes for K3s
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Disable swap (runtime)
      command: swapoff -a
      when: ansible_swaptotal_mb | default(0) | int > 0
      ignore_errors: true

    - name: Ensure swap is disabled on boot
      replace:
        path: /etc/fstab
        regexp: '^(.*\sswap\s+sw\s+.*)$'
        replace: '# \1'
      register: swap_fstab
      ignore_errors: true

    - name: Install base packages
      apt:
        name:
          - curl
          - ca-certificates
          - net-tools
        state: present
        update_cache: yes
    
    - name: Install ceph-common and load ceph kernel module
      block:
        - name: Install ceph-common
          apt:
            name: ceph-common
            state: present
            update_cache: yes

        - name: Load ceph kernel module now
          ansible.builtin.command: modprobe ceph
          register: ceph_modprobe
          changed_when: ceph_modprobe.rc == 0
          failed_when: false   # If ceph is already loaded, don't fail

        - name: Persist ceph kernel module across reboots
          copy:
            dest: /etc/modules-load.d/ceph.conf
            content: "ceph\n"
            owner: root
            group: root
            mode: "0644"
    

# Play 2: Install K3s HA control-plane on all masters
- name: Install K3s servers (embedded etcd HA)
  hosts: master
  become: yes
  vars:
    # You already saw v1.33.5+k3s1 running; keep that unless you want another version
    k3s_version: "v1.33.5+k3s1"
    # First master is our "bootstrap" node
    first_master: "{{ groups['master'][0] }}"
    # You can later use kube-vip on this IP; for now this is just a SAN for the cert
    kube_vip_ip: "192.168.90.160"
  tasks:
    - name: Install K3s server on first master (cluster-init)
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        INSTALL_K3S_EXEC="server \
          --cluster-init \
          --tls-san {{ kube_vip_ip }} \
          --write-kubeconfig-mode=644 \
          --disable servicelb \
          --disable traefik" \
        sh -
      args:
        creates: /usr/local/bin/k3s
      when: inventory_hostname == first_master

    - name: Wait for node token to exist on first master
      stat:
        path: /var/lib/rancher/k3s/server/node-token
      register: node_token_stat
      retries: 30
      delay: 4
      until: node_token_stat.stat.exists
      delegate_to: "{{ first_master }}"
      run_once: true

    - name: Read K3s node token from first master
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_raw
      delegate_to: "{{ first_master }}"
      run_once: true

    - name: Store K3s cluster token as fact on first master
      set_fact:
        k3s_token: "{{ node_token_raw.content | b64decode | trim }}"
      delegate_to: "{{ first_master }}"
      run_once: true

    - name: Install K3s server on additional masters (join existing cluster)
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_URL="https://{{ first_master }}:6443" \
        K3S_TOKEN="{{ hostvars[first_master].k3s_token }}" \
        INSTALL_K3S_EXEC="server \
          --tls-san {{ kube_vip_ip }} \
          --write-kubeconfig-mode=644 \
          --disable servicelb \
          --disable traefik" \
        sh -
      args:
        creates: /usr/local/bin/k3s
      when: inventory_hostname != first_master

# Play 3: Install K3s agents on all workers
- name: Install K3s agents (workers)
  hosts: worker
  become: yes
  vars:
    first_master: "{{ groups['master'][0] }}"
  tasks:
    - name: Wait until K3s API port is open on first master
      become: no
      delegate_to: localhost
      run_once: true
      wait_for:
        host: "{{ first_master }}"
        port: 6443
        delay: 5         # wait 5 seconds before first check
        timeout: 300     # give it up to 5 minutes
        state: started

    - name: Install K3s agent on worker nodes
      shell: |
        curl -sfL https://get.k3s.io | \
        K3S_URL="https://{{ first_master }}:6443" \
        K3S_TOKEN="{{ hostvars[first_master].k3s_token }}" \
        sh -
      args:
        creates: /usr/local/bin/k3s-agent