---
# Reconfigure K3s's bundled metrics-server to run 2 replicas (HA) across separate nodes.
#
# Run with:
#   ansible-playbook -i ansible/k3s-cluster/inventory/dynamic_terraform_inventory.sh \
#     ansible/k3s-cluster/playbooks/k3s_metrics_server_ha.yml
#
# Idempotent and safe to re-run. No K3s restart required — the deploy controller
# applies metrics-server-ha.yaml as soon as it appears.

- name: metrics-server HA (2 replicas) on K3s servers
  hosts: master
  become: true
  tasks:
    - name: Apply the metrics-server HA manifest override on every server
      ansible.builtin.import_tasks: tasks/metrics_server_ha.yml

    - name: Wait for metrics-server to report 2 ready replicas
      ansible.builtin.command:
        cmd: k3s kubectl -n kube-system get deploy metrics-server -o jsonpath={.status.readyReplicas}
      register: _ms_ready
      changed_when: false
      retries: 30
      delay: 5
      until: _ms_ready.stdout == "2"
      run_once: true
