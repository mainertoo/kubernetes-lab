---
- name: Install and configure kube-vip for HA control-plane endpoint
  hosts: master
  become: yes
  # kube_vip_ip / kubevip_image / kubevip_interface come from
  # inventory/<cluster>/group_vars/all.yml. The template (see
  # templates/kubevip_daemonset.yml.j2) references the variable
  # name `kubevip_vip` for backwards compat.
  vars:
    kubevip_vip: "{{ kube_vip_ip }}"

  tasks:
    - name: Apply kube-vip RBAC
      ansible.builtin.shell: >
        kubectl apply -f https://kube-vip.io/manifests/rbac.yaml
      register: kubevip_rbac
      changed_when: >
        'created' in kubevip_rbac.stdout or
        'configured' in kubevip_rbac.stdout
      run_once: true
      delegate_to: "{{ groups['master'][0] }}"

    - name: Render kube-vip DaemonSet manifest to first master
      ansible.builtin.template:
        src: kubevip_daemonset.yml.j2
        dest: /tmp/kubevip-daemonset.yml
        mode: "0644"
      run_once: true
      delegate_to: "{{ groups['master'][0] }}"

    - name: Apply kube-vip DaemonSet manifest
      ansible.builtin.shell: >
        kubectl apply -f /tmp/kubevip-daemonset.yml
      register: kubevip_apply
      changed_when: >
        'created' in kubevip_apply.stdout or
        'configured' in kubevip_apply.stdout
      run_once: true
      delegate_to: "{{ groups['master'][0] }}"