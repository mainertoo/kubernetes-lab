---
# Make K3s deploy CoreDNS with 2 replicas (HA) instead of the bundled default of 1.
#
# Why: K3s ships CoreDNS as a server AddOn manifest with NO `replicas:` field (so it
# defaults to a single pod) — a cluster-wide DNS single point of failure. When that one
# pod reschedules (node drain, upgrade, eviction) DNS is briefly unavailable, which trips
# DB-coupled liveness probes (e.g. authentik-server) and causes needless restarts.
# The bundled manifest ALREADY carries a hostname topologySpreadConstraint with
# whenUnsatisfiable: DoNotSchedule, so simply setting replicas: 2 forces the two pods
# onto separate nodes — no extra affinity needed.
#
# Mechanism: derive a copy of K3s's *current* bundled manifest with `replicas: 2` injected,
# write it as coredns-ha.yaml, and drop coredns.yaml.skip so K3s stops re-applying (and
# reverting to 1 replica) its bundled copy. Re-deriving from the on-node bundled manifest
# each run means it auto-tracks the CoreDNS image/config across K3s upgrades — which is why
# this task is also imported at the end of k3s_upgrade.yml.
#
# Service-ownership handoff: on a fresh cluster the bundled `coredns` AddOn has already
# created the kube-dns Service, and a Service's clusterIP is IMMUTABLE — so the coredns-ha
# objectset cannot adopt it and loops forever on ApplyManifestFailed ("failed to allocate IP
# 10.43.0.10 ... already allocated"). `.skip` stops the bundled manifest re-applying but does
# NOT transfer ownership of objects it already created. So once, this task removes the bundled
# addon's claim and lets coredns-ha re-create + own kube-dns. This is idempotent and a no-op
# once kube-dns is already owned by coredns-ha (e.g. on every upgrade-replay run).
#
# Runs on K3s SERVER (master) nodes only — the manifests dir is server-only. Idempotent.
# Full design + execution/rollback procedure: docs/plans/coredns-ha.md.

- name: Stat the bundled CoreDNS manifest
  ansible.builtin.stat:
    path: /var/lib/rancher/k3s/server/manifests/coredns.yaml
  register: _coredns_bundled

- name: Configure CoreDNS HA (skip nodes without the bundled manifest)
  when: _coredns_bundled.stat.exists
  block:
    - name: Guard — confirm the replicas-injection anchor still exists upstream
      # The Deployment's `spec:` is uniquely followed by `  revisionHistoryLimit: 0`.
      # If K3s changes the CoreDNS manifest layout this fails loudly instead of
      # silently producing a 1-replica (or malformed) manifest.
      ansible.builtin.command:
        cmd: "grep -qx '  revisionHistoryLimit: 0' /var/lib/rancher/k3s/server/manifests/coredns.yaml"
      changed_when: false
      register: _coredns_anchor
      failed_when: _coredns_anchor.rc != 0

    - name: Copy the bundled CoreDNS manifest as the HA base (tracks K3s's current version)
      ansible.builtin.copy:
        src: /var/lib/rancher/k3s/server/manifests/coredns.yaml
        dest: /var/lib/rancher/k3s/server/manifests/coredns-ha.yaml
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: Set the CoreDNS Deployment to 2 replicas
      ansible.builtin.lineinfile:
        path: /var/lib/rancher/k3s/server/manifests/coredns-ha.yaml
        insertbefore: '^  revisionHistoryLimit: 0$'
        line: "  replicas: 2"
        firstmatch: true
        state: present

    - name: Stop K3s re-applying (and reverting) the bundled 1-replica CoreDNS
      # `.skip` makes the K3s deploy controller leave the bundled coredns.yaml alone
      # (it does NOT delete the already-applied objects); our coredns-ha.yaml then owns
      # the Deployment at 2 replicas.
      ansible.builtin.copy:
        dest: /var/lib/rancher/k3s/server/manifests/coredns.yaml.skip
        content: |
          # Managed by Ansible (tasks/coredns_ha.yml) — CoreDNS runs via coredns-ha.yaml
          # with replicas: 2 (HA). See docs/plans/coredns-ha.md.
        owner: root
        group: root
        mode: "0644"

    - name: Hand the kube-dns Service over to coredns-ha (one-time; bundled coredns owns it on a fresh cluster)
      # Cluster-scoped reconcile — run on a single master. A no-op once kube-dns is already
      # owned by the coredns-ha objectset (so it stays silent on every upgrade-replay run).
      run_once: true
      block:
        - name: Read the current kube-dns Service objectset owner
          # argv form (not a `cmd:` string): Ansible shlex-splits `cmd:` in POSIX mode and
          # would strip the backslash-escapes in the dotted annotation key (objectset\.rio\.…)
          # before kubectl ever sees them, yielding an empty result. argv is passed literally.
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - -n
              - kube-system
              - get
              - svc
              - kube-dns
              - -o
              - 'jsonpath={.metadata.annotations.objectset\.rio\.cattle\.io/owner-name}'
          register: _kubedns_owner
          changed_when: false
          failed_when: false

        - name: Free the kube-dns Service from the bundled coredns addon (brief one-time DNS blip)
          # Only when the bundled `coredns` objectset still owns the Service. K3s does NOT
          # auto-prune the Service when its AddOn is deleted, so delete the Service explicitly
          # to free clusterIP 10.43.0.10; the coredns-ha deploy controller recreates kube-dns
          # (same clusterIP) on its next reconcile, now under the coredns-ha objectset.
          when: _kubedns_owner.stdout == 'coredns'
          block:
            - name: Remove the stale bundled coredns AddOn (kept inert by .skip, but still claims kube-dns)
              ansible.builtin.command:
                cmd: k3s kubectl -n kube-system delete addon coredns --ignore-not-found
              changed_when: true

            - name: Delete the orphaned kube-dns Service so coredns-ha can recreate and own it
              ansible.builtin.command:
                cmd: k3s kubectl -n kube-system delete svc kube-dns --ignore-not-found
              changed_when: true

        - name: Wait until kube-dns exists and is owned by coredns-ha
          # argv form for the same reason as above (preserve the dotted-key backslashes).
          ansible.builtin.command:
            argv:
              - k3s
              - kubectl
              - -n
              - kube-system
              - get
              - svc
              - kube-dns
              - -o
              - 'jsonpath={.metadata.annotations.objectset\.rio\.cattle\.io/owner-name}'
          register: _kubedns_owner_final
          changed_when: false
          retries: 30
          delay: 5
          until: _kubedns_owner_final.stdout == 'coredns-ha'
