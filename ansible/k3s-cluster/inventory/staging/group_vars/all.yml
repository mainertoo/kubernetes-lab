---
# Per-cluster Ansible variables for the STAGING K3s cluster.
# Auto-loaded for all hosts in inventory/staging/.

cluster_name: staging

# K3s version pinned for both install and upgrade. Phase 5 upgrade
# from v1.34.5+k3s1 → v1.35.5+k3s1 on 2026-05-22 as the canary
# before production. Rancher 2.14.1 supports K3s 1.33 through 1.35;
# 1.36 is out but breaks Rancher's matrix until the next Rancher
# release lands.
k3s_version: "v1.35.5+k3s1"

# Match production's disabled built-ins.
k3s_disable:
  - traefik
  - servicelb

# Control-plane HA virtual IP. Production uses .160 + MetalLB pool
# .180-.199, so staging takes .170 as VIP and a non-overlapping
# MetalLB pool .200-.219.
kube_vip_ip: "192.168.90.170"
kubevip_image: "ghcr.io/kube-vip/kube-vip:v0.8.4"
kubevip_interface: "eth0"

# MetalLB L2 advertisement pool. The IPAddressPool / L2Advertisement
# names are derived in the template from cluster_name (staging-l2-pool
# / staging-l2-adv).
metallb_pool_range: "192.168.90.200-192.168.90.219"

# No extra apiserver flags by default for staging.
#
# Production carries `feature-gates=MutatingAdmissionPolicy=true` plus
# `runtime-config=admissionregistration.k8s.io/v1alpha1=true` only
# because the cluster was upgraded in place from K3s 1.33 (where the
# v1alpha1 surface still existed). A fresh 1.34.5 install rejects the
# v1alpha1 runtime-config because the resource has moved to v1beta1;
# the apiserver fails to start. Leave this empty for staging unless
# you're explicitly testing an alpha feature gate. See the bug found
# 2026-05-21 during the staging cluster bootstrap.
k3s_apiserver_extra_args: []
