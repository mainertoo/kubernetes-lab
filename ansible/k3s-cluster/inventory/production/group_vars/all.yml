---
# Per-cluster Ansible variables for the PRODUCTION K3s cluster.
# Auto-loaded for all hosts in inventory/production/.

cluster_name: mainertoo

# K3s version pinned for both install and upgrade. Currently on
# v1.34.5+k3s1. Phase 5 of the two-cluster restoration will bump
# this to v1.35.<latest>+k3s1 — first on staging, then here.
k3s_version: "v1.34.5+k3s1"

# K3s built-ins to disable. We run Traefik via Helm and MetalLB
# for service LoadBalancers.
k3s_disable:
  - traefik
  - servicelb

# Control-plane HA virtual IP (kube-vip).
kube_vip_ip: "192.168.90.160"
kubevip_image: "ghcr.io/kube-vip/kube-vip:v0.8.4"
kubevip_interface: "eth0"

# MetalLB L2 advertisement pool. The IPAddressPool / L2Advertisement
# names are derived in the template from cluster_name (mainertoo-l2-pool
# / mainertoo-l2-adv) — matches what's currently live in production.
metallb_pool_range: "192.168.90.180-192.168.90.199"

# No extra apiserver args.
#
# Until 2026-05-21 this list pinned `feature-gates=MutatingAdmissionPolicy=true`
# and `runtime-config=admissionregistration.k8s.io/v1alpha1=true`. Both were
# left over from the K3s 1.33 era — MutatingAdmissionPolicy was alpha then,
# behind a feature gate. In K3s 1.34 it's beta and enabled by default, so
# the feature gate is a no-op. The v1alpha1 runtime-config is worse than
# a no-op: the v1alpha1 surface was removed in 1.34, and on a fresh 1.34.5
# install the apiserver fails to start with kube-system/default namespace
# errors. The live production cluster tolerates the broken flag only
# because it was upgraded in place from 1.33 — by the time the upgrade
# rewrote the systemd unit, kube-system already existed.
#
# Cleared proactively before Phase 5 so the next k3s_upgrade.yml run
# doesn't render a broken INSTALL_K3S_EXEC into the systemd unit and
# trip over its own apiserver restart. See staging's bootstrap log from
# 2026-05-21 for the failure mode.
k3s_apiserver_extra_args: []
