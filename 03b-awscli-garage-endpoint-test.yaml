apiVersion: batch/v1
kind: Job
metadata:
  name: awscli-garage-endpoint-test
  namespace: flux-system
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: awscli
          image: amazon/aws-cli:2.15.57
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_DEFAULT_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                secretKeyRef:
                  name: volsync-garage-base
                  key: AWS_EC2_METADATA_DISABLED

            # Test the same endpoint restic uses:
            - name: S3_ENDPOINT
              value: "https://garage.lab.mainertoo.com"

          command: ["/bin/sh","-lc"]
          args:
            - |
              set -euo pipefail
              echo "Endpoint: ${S3_ENDPOINT}"
              echo "Region: ${AWS_DEFAULT_REGION}"

              echo "== list buckets =="
              aws --endpoint-url "${S3_ENDPOINT}" s3api list-buckets

              echo "== head bucket volsync =="
              aws --endpoint-url "${S3_ENDPOINT}" s3api head-bucket --bucket volsync

              echo "== list s3://volsync/ =="
              aws --endpoint-url "${S3_ENDPOINT}" s3 ls "s3://volsync/" || true

              echo "SUCCESS"