<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>beam — share</title>
  <link rel="stylesheet" href="/static/beam.css">
</head>
<body>
  <main>
    <h1>beam</h1>
    <form id="join">
      <input id="code" placeholder="CODE" maxlength="8" autocapitalize="characters"
             autocomplete="off" required>
      <input id="name" placeholder="your name" maxlength="40">
      <button>Join</button>
    </form>
    <section id="session" hidden>
      <p id="status">joining…</p>
      <p id="path" class="hint"></p>
      <div id="modes" hidden>
        <button id="share" hidden>Share screen</button>
        <button id="camera">Camera</button>
        <button id="flip" hidden>Flip</button>
        <!-- label-wrapped hidden inputs: tapping the label opens the OS picker -->
        <label class="button">Photos<input id="photopick" type="file"
               accept="image/*" multiple hidden></label>
        <label class="button">Video<input id="videopick" type="file"
               accept="video/*" hidden></label>
      </div>
      <div id="photonav" hidden>
        <button id="prev">&lsaquo; prev</button>
        <span id="pcount" class="hint"></span>
        <button id="next">next &rsaquo;</button>
      </div>
    </section>
  </main>

  <script type="module" src="/static/sender.js"></script>
</body>
</html>
