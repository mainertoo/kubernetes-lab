---
# One-shot migration Job: dumps joplin's existing postgres → joplin-db CNPG cluster.
#
# This file is intentionally NOT in any kustomization.yaml — Flux will not apply it.
# Apply manually after CNPG cluster joplin-db is healthy:
#
#   kubectl apply -f docs/migrations/joplin-cnpg-2026-05-08.yaml
#
# Watch:
#
#   kubectl -n joplin logs -f job/joplin-cnpg-migration
#
# After completion, the Job auto-deletes after 1 hour (ttlSecondsAfterFinished).
# To delete sooner: kubectl delete job/joplin-cnpg-migration -n joplin
#
# IMPORTANT: scale joplin app to 0 BEFORE running this so writes don't go to the
# old DB during the dump:
#
#   kubectl -n joplin scale deploy joplin --replicas=0
#
# Keep joplin at 0 until the cutover PR merges and Flux scales it back up.
apiVersion: batch/v1
kind: Job
metadata:
  name: joplin-cnpg-migration
  namespace: joplin
  labels:
    app.kubernetes.io/name: joplin
    app.kubernetes.io/component: db-migration
    migration.kubernetes-lab/source: joplin-joplin-db
    migration.kubernetes-lab/target: joplin-db
spec:
  backoffLimit: 0           # No auto-retry — re-run manually if needed
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: joplin
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16-bookworm    # matches both source and CNPG operand version
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "==========================================="
              echo " joplin postgres → CNPG migration"
              echo " started: $(date -u)"
              echo "==========================================="

              echo ""
              echo "[1/5] Verify source connectivity (joplin-joplin-db) ..."
              PGPASSWORD="$SRC_PASSWORD" psql -h joplin-joplin-db -U "$SRC_USER" -d "$SRC_DB" \
                -c "SELECT 'src ok ' || version()"

              echo ""
              echo "[2/5] Verify destination connectivity (joplin-db-rw) ..."
              PGPASSWORD="$DST_PASSWORD" psql -h joplin-db-rw -U "$DST_USER" -d "$DST_DB" \
                -c "SELECT 'dst ok ' || version()"

              echo ""
              echo "[3/5] Source row counts (pg_stat — approximate but fast) ..."
              PGPASSWORD="$SRC_PASSWORD" psql -h joplin-joplin-db -U "$SRC_USER" -d "$SRC_DB" -c "
                SELECT schemaname || '.' || relname AS table_name,
                       n_live_tup AS approx_rows
                FROM pg_stat_user_tables
                ORDER BY n_live_tup DESC
                LIMIT 30;
              "

              echo ""
              echo "[4/5] pg_dump | psql --single-transaction (atomic; rolls back on any error) ..."
              PGPASSWORD="$SRC_PASSWORD" pg_dump --no-owner --no-acl --no-publications --no-subscriptions \
                -h joplin-joplin-db -U "$SRC_USER" "$SRC_DB" |
              PGPASSWORD="$DST_PASSWORD" psql --single-transaction --set ON_ERROR_STOP=1 \
                -h joplin-db-rw -U "$DST_USER" -d "$DST_DB"

              echo ""
              echo "[5/5] Destination row counts (post-restore) — should match source ..."
              PGPASSWORD="$DST_PASSWORD" psql -h joplin-db-rw -U "$DST_USER" -d "$DST_DB" -c "
                SELECT schemaname || '.' || relname AS table_name,
                       n_live_tup AS approx_rows
                FROM pg_stat_user_tables
                ORDER BY n_live_tup DESC
                LIMIT 30;
              "

              echo ""
              echo "[bonus] ANALYZE destination to refresh planner stats ..."
              PGPASSWORD="$DST_PASSWORD" psql -h joplin-db-rw -U "$DST_USER" -d "$DST_DB" -c "ANALYZE"

              echo ""
              echo "==========================================="
              echo " migration complete: $(date -u)"
              echo "==========================================="

          env:
            # ----- SOURCE: existing joplin-joplin-db (postgres 16, raw-PVC backed) -----
            - name: SRC_USER
              valueFrom:
                secretKeyRef:
                  name: joplin-secret
                  key: POSTGRES_USER
            - name: SRC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-secret
                  key: POSTGRES_PASSWORD
            - name: SRC_DB
              valueFrom:
                secretKeyRef:
                  name: joplin-secret
                  key: POSTGRES_DB

            # ----- DESTINATION: CNPG-managed joplin-db (auto-generated by operator) -----
            - name: DST_USER
              valueFrom:
                secretKeyRef:
                  name: joplin-db-app
                  key: username
            - name: DST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-db-app
                  key: password
            - name: DST_DB
              value: "joplin"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
