---
# One-shot migration Job: dumps zilean's existing postgres → zilean-db CNPG cluster.
#
# This file is intentionally NOT in any kustomization.yaml — Flux will not apply it.
# Apply manually after CNPG cluster zilean-db is healthy:
#
#   kubectl apply -f docs/migrations/zilean-cnpg-2026-05-09.yaml
#
# Watch:
#
#   kubectl -n media logs -f job/zilean-cnpg-migration
#
# After completion, the Job auto-deletes after 1 hour (ttlSecondsAfterFinished).
#
# IMPORTANT: scale zilean app to 0 BEFORE running this so writes don't go to the
# old DB during the dump. (The legacy zilean-postgres Deployment stays running so
# the dump can read from it; just the consumer app needs to be paused.)
#
#   kubectl -n media scale deploy zilean --replicas=0
#
# Keep zilean at 0 until the cutover PR merges and Flux scales it back up.
# zilean-pgadmin can stay running — it's an admin UI, no harm if it's idle.
apiVersion: batch/v1
kind: Job
metadata:
  name: zilean-cnpg-migration
  namespace: media
  labels:
    app.kubernetes.io/name: zilean
    app.kubernetes.io/component: db-migration
    migration.kubernetes-lab/source: zilean-postgres
    migration.kubernetes-lab/target: zilean-db
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zilean
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16-bookworm
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "==========================================="
              echo " zilean postgres → CNPG migration"
              echo " started: $(date -u)"
              echo "==========================================="

              echo ""
              echo "[1/5] Verify source connectivity (zilean-postgres) ..."
              PGPASSWORD="$SRC_PASSWORD" psql -h zilean-postgres -U "$SRC_USER" -d "$SRC_DB" \
                -c "SELECT 'src ok ' || version()"

              echo ""
              echo "[2/5] Verify destination connectivity (zilean-db-rw) ..."
              PGPASSWORD="$DST_PASSWORD" psql -h zilean-db-rw -U "$DST_USER" -d "$DST_DB" \
                -c "SELECT 'dst ok ' || version()"

              echo ""
              echo "[3/5] Source row counts (pg_stat — approximate but fast) ..."
              PGPASSWORD="$SRC_PASSWORD" psql -h zilean-postgres -U "$SRC_USER" -d "$SRC_DB" -c "
                SELECT schemaname || '.' || relname AS table_name,
                       n_live_tup AS approx_rows
                FROM pg_stat_user_tables
                ORDER BY n_live_tup DESC
                LIMIT 30;
              "

              echo ""
              echo "[4/5] pg_dump | psql --single-transaction (atomic; rolls back on any error) ..."
              PGPASSWORD="$SRC_PASSWORD" pg_dump --no-owner --no-acl --no-publications --no-subscriptions \
                -h zilean-postgres -U "$SRC_USER" "$SRC_DB" |
              PGPASSWORD="$DST_PASSWORD" psql --single-transaction --set ON_ERROR_STOP=1 \
                -h zilean-db-rw -U "$DST_USER" -d "$DST_DB"

              echo ""
              echo "[5/5] Destination row counts (post-restore) — should match source ..."
              PGPASSWORD="$DST_PASSWORD" psql -h zilean-db-rw -U "$DST_USER" -d "$DST_DB" -c "
                SELECT schemaname || '.' || relname AS table_name,
                       n_live_tup AS approx_rows
                FROM pg_stat_user_tables
                ORDER BY n_live_tup DESC
                LIMIT 30;
              "

              echo ""
              echo "[bonus] ANALYZE destination to refresh planner stats ..."
              PGPASSWORD="$DST_PASSWORD" psql -h zilean-db-rw -U "$DST_USER" -d "$DST_DB" -c "ANALYZE"

              echo ""
              echo "==========================================="
              echo " migration complete: $(date -u)"
              echo "==========================================="

          env:
            # ----- SOURCE: existing zilean-postgres (postgres 16, raw-PVC backed) -----
            - name: SRC_USER
              valueFrom:
                secretKeyRef:
                  name: zilean-env
                  key: ZILEAN_DB_USER
            - name: SRC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zilean-env
                  key: ZILEAN_DB_PASSWORD
            - name: SRC_DB
              value: "zilean"

            # ----- DESTINATION: CNPG-managed zilean-db (auto-generated by operator) -----
            - name: DST_USER
              valueFrom:
                secretKeyRef:
                  name: zilean-db-app
                  key: username
            - name: DST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zilean-db-app
                  key: password
            - name: DST_DB
              value: "zilean"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
