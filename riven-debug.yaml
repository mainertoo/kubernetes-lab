apiVersion: apps/v1
kind: Deployment
metadata:
  name: riven-debug
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: riven-debug
  template:
    metadata:
      labels:
        app: riven-debug
    spec:
      containers:
        - name: backend
          image: docker.io/spoked/riven:latest
          command: ["sleep", "3600"]
          env:
            - name: TZ
              value: America/Los_Angeles