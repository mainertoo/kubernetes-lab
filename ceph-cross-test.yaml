apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cephfs-cross-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cephrbd-cross-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ceph-cross-test-pod
spec:
  initContainers:
    - name: init-writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eux

          echo "hello from cephfs: $(date)" > /mnt/cephfs/from-cephfs.txt
          echo "hello from rbd:    $(date)" > /mnt/rbd/from-rbd.txt

          # cross-copy to prove both mounts work
          cp /mnt/cephfs/from-cephfs.txt /mnt/rbd/copied-from-cephfs.txt
          cp /mnt/rbd/from-rbd.txt       /mnt/cephfs/copied-from-rbd.txt
      volumeMounts:
        - mountPath: /mnt/cephfs
          name: cephfs-vol
        - mountPath: /mnt/rbd
          name: rbd-vol

  containers:
    - name: cross-tester
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - mountPath: /mnt/cephfs
          name: cephfs-vol
        - mountPath: /mnt/rbd
          name: rbd-vol

  volumes:
    - name: cephfs-vol
      persistentVolumeClaim:
        claimName: cephfs-cross-pvc
    - name: rbd-vol
      persistentVolumeClaim:
        claimName: cephrbd-cross-pvc
