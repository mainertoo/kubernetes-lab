apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cephfs-cross-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cephrbd-cross-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ceph-cross-test-pod
spec:
  restartPolicy: Never
  volumes:
    - name: cephfs-vol
      persistentVolumeClaim:
        claimName: cephfs-cross-pvc
    - name: rbd-vol
      persistentVolumeClaim:
        claimName: cephrbd-cross-pvc
  initContainers:
    - name: init-writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eux
          echo "[init] starting on $(date)"

          echo "hello from cephfs v2: $(date)" > /mnt/cephfs/from-cephfs.txt
          echo "hello from rbd v2:    $(date)" > /mnt/rbd/from-rbd.txt

          # cross-copy to prove both mounts are writable
          cp /mnt/cephfs/from-cephfs.txt /mnt/rbd/copied-from-cephfs.txt
          cp /mnt/rbd/from-rbd.txt       /mnt/cephfs/copied-from-rbd.txt

          echo "[init] ls -l /mnt/cephfs"
          ls -l /mnt/cephfs || true

          echo "[init] ls -l /mnt/rbd"
          ls -l /mnt/rbd || true

          touch /mnt/cephfs/INIT_OK
          touch /mnt/rbd/INIT_OK

          echo "[init] completed successfully"
      volumeMounts:
        - name: cephfs-vol
          mountPath: /mnt/cephfs
        - name: rbd-vol
          mountPath: /mnt/rbd

  containers:
    - name: cross-tester
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "=== cross-tester starting at $(date) ==="
          echo
          echo "--- df -h ---"
          df -h
          echo
          echo "--- ls -l /mnt/cephfs ---"
          ls -l /mnt/cephfs || echo "no cephfs dir"
          echo
          echo "--- ls -l /mnt/rbd ---"
          ls -l /mnt/rbd || echo "no rbd dir"
          echo
          echo "--- file contents ---"
          for f in \
            /mnt/cephfs/from-cephfs.txt \
            /mnt/cephfs/copied-from-rbd.txt \
            /mnt/rbd/from-rbd.txt \
            /mnt/rbd/copied-from-cephfs.txt \
            /mnt/cephfs/INIT_OK \
            /mnt/rbd/INIT_OK
          do
            if [ -f "$f" ]; then
              echo ">>> $f"
              cat "$f" || true
              echo
            else
              echo "MISSING: $f"
            fi
          done

          echo "=== verification complete, sleeping to keep pod alive ==="
          sleep 3600
      volumeMounts:
        - name: cephfs-vol
          mountPath: /mnt/cephfs
        - name: rbd-vol
          mountPath: /mnt/rbd